<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#7B6FA0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Veeda"/>
<title>Veeda</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow-x:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F7F5FC;color:#3A3350;-webkit-text-size-adjust:100%;}
input,textarea,select{font-family:inherit;font-size:16px;border:1px solid #DDD8EE;border-radius:8px;padding:9px 12px;color:#3A3350;width:100%;background:#fff;outline:none;-webkit-appearance:none;}
button{font-family:inherit;cursor:pointer;}
textarea{resize:vertical;font-size:16px;}
#root{max-width:480px;margin:0 auto;min-height:100vh;}
@keyframes vPulse{0%{transform:scale(1);opacity:.6}70%{transform:scale(2.4);opacity:0}100%{transform:scale(1);opacity:0}}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes notifDrop{from{transform:translateY(-50px) translateX(-50%);opacity:0}to{transform:translateY(0) translateX(-50%);opacity:1}}
@keyframes popIn{from{transform:scale(0.88);opacity:0}to{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;
const PROFILES_KEY="veeda_profiles";
const SESSION_KEY="veeda_session";
const LOGO_KEY="veeda_logo";
const C={purple:"#7B6FA0",purpleLight:"#EDE9F6",purpleMid:"#B8AEDD",blue:"#5B7FA6",blueLight:"#E6EEF8",blueMid:"#A8C0DA",cardBorder:"#DDD8EE",bg:"#F7F5FC",text:"#3A3350",textMid:"#7A7090",textLight:"#ADA8C0",white:"#FFFFFF",green:"#1D9E75",greenLight:"#E6F9F2",red:"#C0392B",amber:"#D4860A"};
const DAY_COLORS=[{label:"Lavanda",bg:"#F7F5FC",dot:"#B8AEDD"},{label:"Pêssego",bg:"#FDF5F0",dot:"#E8B89A"},{label:"Menta",bg:"#F0FAF5",dot:"#8FD1B0"},{label:"Céu",bg:"#F0F6FD",dot:"#9ABEDD"},{label:"Rosa",bg:"#FDF0F5",dot:"#DDA8C0"},{label:"Baunilha",bg:"#FDFAF0",dot:"#D4C48A"},{label:"Cinza",bg:"#F5F5F7",dot:"#ACACBC"}];
const FEELINGS=[{emoji:"😊",label:"Feliz"},{emoji:"😌",label:"Tranquilo"},{emoji:"🥰",label:"Grato"},{emoji:"😔",label:"Triste"},{emoji:"😤",label:"Frustrado"},{emoji:"😴",label:"Cansado"},{emoji:"🤩",label:"Animado"},{emoji:"😶",label:"Neutro"}];
const AVATAR_EMOJIS=["🌿","🌸","🌊","🌙","⭐","🦋","🍀","🎵","🌻","🦉","🐾","🌈","🦊","🐬","🌺","🎯","🧩","🪴","🦚","🌵"];
const AVATAR_COLORS=["#EDE9F6","#E6EEF8","#FDF5F0","#F0FAF5","#FDF0F5","#FDFAF0","#F5F5F7"];
const EVENT_TYPES=[{id:"show",emoji:"🎵",label:"Show"},{id:"encontro",emoji:"🤝",label:"Encontro"},{id:"viagem",emoji:"✈️",label:"Viagem"},{id:"aniversario",emoji:"🎂",label:"Aniversário"},{id:"outro",emoji:"📅",label:"Outro"}];

// ── Crypto ──
const strToKey=async(pw,salt)=>{const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:150000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);};
const encryptObj=async(obj,pw)=>{const salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12)),key=await strToKey(pw,salt),buf=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,new TextEncoder().encode(JSON.stringify(obj)));return btoa(JSON.stringify({salt:Array.from(salt),iv:Array.from(iv),data:Array.from(new Uint8Array(buf))}));};
const decryptObj=async(ct,pw)=>{const{salt,iv,data}=JSON.parse(atob(ct)),key=await strToKey(pw,new Uint8Array(salt)),buf=await crypto.subtle.decrypt({name:"AES-GCM",iv:new Uint8Array(iv)},key,new Uint8Array(data));return JSON.parse(new TextDecoder().decode(buf));};
const hashPw=async pw=>{const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode("veeda:"+pw));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");};
const genCode=()=>{const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789",rand=crypto.getRandomValues(new Uint8Array(16)),s=Array.from(rand).map(b=>chars[b%chars.length]).join("");return`${s.slice(0,4)}-${s.slice(4,8)}-${s.slice(8,12)}-${s.slice(12,16)}`;};

// ── Helpers ──
const getVideoEmbed=url=>{const yt=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);if(yt)return`https://www.youtube.com/embed/${yt[1]}`;const v=url.match(/vimeo\.com\/(\d+)/);if(v)return`https://player.vimeo.com/video/${v[1]}`;return null;};
const isVideoLink=url=>!!getVideoEmbed(url);
const typeIcons={texto:"✏️",foto:"📷",link:"🔗",musica:"🎵",video:"🎬",videolink:"🔗",evento:"📅"};
const typeColor=t=>({texto:C.purple,foto:C.blue,link:C.blue,musica:C.purple,video:C.blue,videolink:C.blue,evento:C.amber}[t]||C.purple);
const typeBg=t=>({texto:C.purpleLight,foto:C.blueLight,link:C.blueLight,musica:C.purpleLight,video:C.blueLight,videolink:C.blueLight,evento:"#FFF3DC"}[t]||C.purpleLight);
const fmt=ts=>new Date(ts).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
const todayStr=()=>new Date().toISOString().slice(0,10);
const offsetDay=(d,n)=>{const dt=new Date(d+"T12:00:00");dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);};
const fmtLabel=d=>{const t=todayStr(),y=offsetDay(t,-1);if(d===t)return"hoje";if(d===y)return"ontem";const[yr,m,dy]=d.split("-");return new Date(yr,m-1,dy).toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"});};
const fmtFull=d=>{const[y,m,dy]=d.split("-");return new Date(y,m-1,dy).toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});};
const defaultData=()=>({moments:{},received:[],contacts:[],groupName:"Família & Amigos",dayColors:{},dayFeelings:{},reminders:[],sharedLog:{},events:[],lastBackupPrompt:null});
const loadProfiles=()=>{try{return JSON.parse(localStorage.getItem(PROFILES_KEY)||"[]");}catch{return[];}};
const saveProfiles=ps=>localStorage.setItem(PROFILES_KEY,JSON.stringify(ps));
const saveSession=(id,pw)=>sessionStorage.setItem(SESSION_KEY,JSON.stringify({profileId:id,pw}));
const loadSession=()=>{try{return JSON.parse(sessionStorage.getItem(SESSION_KEY)||"null");}catch{return null;}};
const clearSession=()=>sessionStorage.removeItem(SESSION_KEY);
const getLogo=()=>localStorage.getItem(LOGO_KEY)||null;

// ── Shared UI ──
function AvatarBubble({src,emoji,color,size=38,ring=false}){
  return src
    ?<img src={src} alt="av" style={{width:size,height:size,borderRadius:"50%",objectFit:"cover",border:`${ring?"3px":"1.5px"} solid ${ring?C.purpleMid:C.cardBorder}`,flexShrink:0,display:"block"}}/>
    :<div style={{width:size,height:size,borderRadius:"50%",background:color||C.purpleLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.46,border:`${ring?"3px":"1.5px"} solid ${ring?C.purpleMid:C.cardBorder}`,flexShrink:0}}>{emoji||"🌿"}</div>;
}

function Modal({onClose,title,children}){
  return <div style={{position:"fixed",inset:0,background:"rgba(40,30,60,0.48)",display:"flex",alignItems:"flex-end",zIndex:300}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div style={{background:C.white,borderRadius:"20px 20px 0 0",padding:"20px 16px 40px",width:"100%",maxWidth:480,margin:"0 auto",boxSizing:"border-box",maxHeight:"92vh",overflowY:"auto",animation:"slideUp 0.28s ease"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
        <p style={{margin:0,fontSize:15,fontWeight:600,color:C.text}}>{title}</p>
        <button onClick={onClose} style={{background:C.purpleLight,border:"none",borderRadius:"50%",width:28,height:28,color:C.purple,fontSize:16,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
      </div>
      {children}
    </div>
  </div>;
}

function PulsingDot({onClick,color}){const c=color||C.purple,cm=color?color+"88":C.purpleMid;return <div style={{position:"relative",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}} onClick={onClick}><div style={{position:"absolute",width:22,height:22,borderRadius:"50%",background:cm,animation:"vPulse 2s ease-out infinite"}}/><div style={{position:"absolute",width:22,height:22,borderRadius:"50%",background:cm,animation:"vPulse 2s ease-out infinite",animationDelay:"0.7s"}}/><div style={{position:"relative",width:16,height:16,borderRadius:"50%",background:c,border:`3px solid ${C.white}`,zIndex:1}}/></div>;}

function Btn({onClick,children,style={},disabled=false,variant="primary",type="button"}){
  const base={width:"100%",padding:"13px 0",border:"none",borderRadius:12,fontWeight:600,fontSize:15,cursor:disabled?"not-allowed":"pointer",opacity:disabled?0.6:1,transition:"transform 0.1s, opacity 0.1s"};
  const vars={primary:{background:C.purple,color:C.white},outline:{background:"transparent",color:C.purple,border:`2px solid ${C.purple}`},ghost:{background:"none",border:"none",color:C.textMid,fontSize:13,padding:"8px 0"},danger:{background:C.red,color:C.white},green:{background:C.green,color:C.white}};
  return <button type={type} onClick={onClick} disabled={disabled} style={{...base,...vars[variant],...style}} onMouseDown={e=>{if(!disabled)e.currentTarget.style.transform="scale(0.97)";}} onMouseUp={e=>e.currentTarget.style.transform="scale(1)"} onTouchStart={e=>{if(!disabled)e.currentTarget.style.transform="scale(0.97)";}} onTouchEnd={e=>e.currentTarget.style.transform="scale(1)"}>{children}</button>;
}

// ── Received notification popup ──
function ReceivedNotif({notif,onOpen,onDismiss}){
  return <div style={{position:"fixed",top:16,left:"50%",width:"calc(100% - 32px)",maxWidth:440,zIndex:500,animation:"notifDrop 0.4s cubic-bezier(.22,1,.36,1)"}}>
    <div style={{background:C.white,borderRadius:18,overflow:"hidden",boxShadow:"0 12px 40px rgba(60,40,120,0.22)"}}>
      <div style={{background:`linear-gradient(135deg,${C.purple} 0%,${C.blue} 100%)`,padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
        <AvatarBubble src={notif.avatarSrc} emoji={notif.emoji} color={notif.avatarColor||C.purpleLight} size={46} ring/>
        <div style={{flex:1}}>
          <p style={{margin:0,fontSize:12,color:"rgba(255,255,255,0.75)"}}>✨ Novo Dia de Veeda recebido</p>
          <p style={{margin:"2px 0 0",fontSize:15,fontWeight:600,color:"#fff"}}><strong>{notif.author}</strong> compartilhou o dia com você</p>
        </div>
        <button onClick={onDismiss} style={{background:"rgba(255,255,255,0.18)",border:"none",borderRadius:"50%",width:28,height:28,color:"#fff",fontSize:16,cursor:"pointer"}}>×</button>
      </div>
      {notif.message&&<div style={{padding:"12px 16px",background:"#FAF8FF"}}><p style={{margin:0,fontSize:14,color:C.textMid,fontStyle:"italic",lineHeight:1.6}}>"{notif.message}"</p></div>}
      <div style={{padding:"12px 16px",display:"flex",gap:8}}>
        <button onClick={onDismiss} style={{flex:1,padding:"9px 0",background:C.purpleLight,border:"none",borderRadius:10,color:C.purple,cursor:"pointer",fontSize:13,fontWeight:500}}>Depois</button>
        <button onClick={onOpen} style={{flex:2,padding:"9px 0",background:C.purple,border:"none",borderRadius:10,color:"#fff",cursor:"pointer",fontSize:14,fontWeight:600}}>Abrir linha do tempo →</button>
      </div>
    </div>
  </div>;
}

// ── Backup prompt ──
function BackupPrompt({onBackup,onDismiss}){
  return <div style={{position:"fixed",inset:0,background:"rgba(40,30,60,0.5)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:20}}>
    <div style={{background:C.white,borderRadius:20,padding:"28px 24px",maxWidth:360,width:"100%",animation:"popIn 0.3s ease",textAlign:"center"}}>
      <div style={{fontSize:48,marginBottom:12}}>📦</div>
      <p style={{fontSize:17,fontWeight:600,color:C.text,marginBottom:8}}>Seus Dias de Veeda</p>
      <p style={{fontSize:14,color:C.textMid,lineHeight:1.65,marginBottom:24}}>Já se passou um mês! Seus registros mais antigos podem ser perdidos. Que tal fazer um backup dos seus Dias de Veeda antes disso?</p>
      <Btn onClick={onBackup} style={{marginBottom:10}}>📥 Fazer backup agora</Btn>
      <Btn onClick={onDismiss} variant="ghost">Lembrar depois</Btn>
    </div>
  </div>;
}

// ── Install Guide ──
function InstallGuide({onClose}){
  const[tab,setTab]=useState("ios");
  const steps={ios:[["Abra o Safari","Acesse o endereço do Veeda no Safari. Não funciona no Chrome do iPhone."],["Toque em Compartilhar","Ícone de quadrado com seta ↑ na barra inferior."],["Adicionar à Tela de Início","Role a lista e toque nessa opção."],["Confirme","Toque em Adicionar no canto superior direito."]],android:[["Abra o Chrome","Acesse o endereço do Veeda no Google Chrome."],["Menu do navegador","Toque nos três pontos ⋮ no canto superior direito."],["Adicionar à tela inicial","Toque em 'Adicionar à tela inicial' ou 'Instalar app'."],["Confirme","Toque em Adicionar. Pronto!"]]};
  return <Modal title="Instalar o Veeda no celular" onClose={onClose}>
    <div style={{display:"flex",gap:8,marginBottom:20}}>
      {[["ios","iPhone"],["android","Android"]].map(([k,l])=><button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"10px 0",background:tab===k?C.purple:C.purpleLight,color:tab===k?C.white:C.purple,border:"none",borderRadius:10,fontWeight:600,cursor:"pointer",fontSize:14}}>{l}</button>)}
    </div>
    {steps[tab].map(([t,d],i)=><div key={i} style={{display:"flex",gap:14,marginBottom:18}}>
      <div style={{width:30,height:30,borderRadius:"50%",background:C.purple,color:C.white,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:600,flexShrink:0}}>{i+1}</div>
      <div><p style={{margin:0,fontSize:14,fontWeight:600,color:C.text}}>{t}</p><p style={{margin:"3px 0 0",fontSize:13,color:C.textMid,lineHeight:1.5}}>{d}</p></div>
    </div>)}
    <div style={{background:C.purpleLight,border:`1px solid ${C.purpleMid}`,borderRadius:12,padding:"12px 16px",marginTop:4}}>
      <p style={{fontSize:13,color:C.purple,margin:0}}>🌿 Depois de instalado, o Veeda funciona mesmo sem internet e abre direto da sua tela inicial.</p>
    </div>
  </Modal>;
}

// ── Invite Modal ──
function InviteModal({profile,onClose}){
  const appUrl=window.location.href.split("?")[0];
  const msg=`Olá! Eu uso o Veeda para registrar e compartilhar os momentos do meu dia. Que tal entrar também?\n\n📱 Acesse: ${appUrl}\n\nNo Veeda você registra os momentos que viveu ao longo do dia e, quando quiser, compartilha sua linha do tempo com quem ama. 🌿`;
  const waUrl=`https://wa.me/?text=${encodeURIComponent(msg)}`;
  const signalUrl=`https://signal.me/#composetextlink=${encodeURIComponent(msg)}`;
  const emailUrl=`mailto:?subject=${encodeURIComponent("Te convidar para o Veeda 🌿")}&body=${encodeURIComponent(msg)}`;
  const smsUrl=`sms:?body=${encodeURIComponent(msg)}`;
  const[copied,setCopied]=useState(false);
  return <Modal title="Convidar para o Veeda" onClose={onClose}>
    <div style={{textAlign:"center",marginBottom:20}}>
      <div style={{width:64,height:64,borderRadius:"50%",background:`linear-gradient(135deg,${C.purple},${C.blue})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28,margin:"0 auto 12px"}}>🌿</div>
      <p style={{fontSize:15,fontWeight:600,color:C.text,marginBottom:6}}>Compartilhe seus Dias de Veeda</p>
      <p style={{fontSize:13,color:C.textMid,lineHeight:1.6}}>Convide amigos e familiares para viverem juntos seus dias no Veeda.</p>
    </div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
      {[
        {label:"WhatsApp",emoji:"💬",color:"#25D366",bg:"#E8FBF0",url:waUrl},
        {label:"Signal",emoji:"🔒",color:"#3A76F0",bg:"#EAF0FD",url:signalUrl},
        {label:"E-mail",emoji:"✉️",color:C.purple,bg:C.purpleLight,url:emailUrl},
        {label:"SMS",emoji:"📱",color:C.blue,bg:C.blueLight,url:smsUrl},
      ].map(opt=><a key={opt.label} href={opt.url} target="_blank" rel="noopener noreferrer" style={{display:"flex",flexDirection:"column",alignItems:"center",gap:8,padding:"16px 8px",background:opt.bg,borderRadius:14,textDecoration:"none",border:`1px solid ${opt.color}22`}}>
        <span style={{fontSize:26}}>{opt.emoji}</span>
        <span style={{fontSize:13,fontWeight:600,color:opt.color}}>{opt.label}</span>
      </a>)}
    </div>
    <div style={{background:C.purpleLight,borderRadius:12,padding:"12px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
      <p style={{flex:1,margin:0,fontSize:12,color:C.textMid,wordBreak:"break-all"}}>{appUrl}</p>
      <button onClick={()=>{navigator.clipboard&&navigator.clipboard.writeText(appUrl);setCopied(true);setTimeout(()=>setCopied(false),2000);}} style={{flexShrink:0,padding:"6px 12px",background:copied?C.green:C.purple,color:"#fff",border:"none",borderRadius:8,fontSize:12,fontWeight:600,cursor:"pointer"}}>{copied?"✓":"Copiar"}</button>
    </div>
  </Modal>;
}

// ── Share Day Modal ──
function ShareDayModal({profile,data,curDay,onClose,onShared}){
  const[sel,setSel]=useState([]);
  const[msg,setMsg]=useState("");
  const[loading,setLoading]=useState(false);
  const[done,setDone]=useState(false);
  const contacts=data.contacts||[];
  const moments=data.moments[curDay]||[];
  const alreadyShared=(data.sharedLog||{})[curDay]||[];
  const available=contacts.filter(c=>!alreadyShared.includes(c.code));
  const toggle=code=>setSel(p=>p.includes(code)?p.filter(x=>x!==code):[...p,code]);
  const doShare=async()=>{
    if(!sel.length)return;
    setLoading(true);
    const payload={date:curDay,author:profile.name,emoji:profile.emoji,avatarColor:profile.avatarColor,avatarSrc:profile.avatarSrc||null,moments,feeling:(data.dayFeelings||{})[curDay],message:msg.trim(),importedAt:Date.now()};
    sel.forEach(code=>{const k=`veeda_inbox_${code}`,ex=JSON.parse(localStorage.getItem(k)||"[]");ex.push(payload);localStorage.setItem(k,JSON.stringify(ex));});
    const newLog={...(data.sharedLog||{}),[curDay]:[...alreadyShared,...sel]};
    await onShared(newLog);
    setDone(true);setLoading(false);
  };
  if(done)return <Modal title="" onClose={onClose}>
    <div style={{textAlign:"center",padding:"16px 0 8px"}}>
      <div style={{fontSize:52,marginBottom:14}}>🌿</div>
      <p style={{fontSize:18,fontWeight:600,color:C.text,marginBottom:8}}>Dia compartilhado!</p>
      <p style={{fontSize:14,color:C.textMid,marginBottom:24,lineHeight:1.6}}>Seus contatos receberão uma notificação ao abrirem o Veeda.</p>
      <Btn onClick={onClose}>Fechar</Btn>
    </div>
  </Modal>;
  return <Modal title="Compartilhar meu Dia de Veeda" onClose={onClose}>
    {moments.length===0?<p style={{fontSize:14,color:C.textMid,textAlign:"center",padding:"20px 0"}}>Nenhum momento registrado hoje.</p>:<div>
      <p style={{fontSize:13,color:C.textMid,marginBottom:14}}>{moments.length} momento{moments.length!==1?"s":""} · {fmtFull(curDay)}</p>
      {available.length===0&&<div style={{background:"#FFF8E1",border:"1px solid #FFD54F",borderRadius:12,padding:"12px 14px",marginBottom:16}}><p style={{fontSize:13,color:"#7A5800",margin:0}}>Você já compartilhou este dia com todos os seus contatos.</p></div>}
      {available.map(c=><button key={c.code} onClick={()=>toggle(c.code)} style={{width:"100%",background:sel.includes(c.code)?C.purpleLight:C.white,border:`2px solid ${sel.includes(c.code)?C.purple:C.cardBorder}`,borderRadius:14,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12,cursor:"pointer",textAlign:"left",transition:"border-color 0.15s"}}>
        <AvatarBubble src={c.avatarSrc} emoji={c.emoji||"🌿"} color={c.avatarColor||C.purpleLight} size={38}/>
        <span style={{fontSize:14,fontWeight:500,color:C.text,flex:1}}>{c.name}</span>
        <div style={{width:22,height:22,borderRadius:"50%",border:`2px solid ${sel.includes(c.code)?C.purple:C.cardBorder}`,background:sel.includes(c.code)?C.purple:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#fff",transition:"all 0.15s"}}>{sel.includes(c.code)?"✓":""}</div>
      </button>)}
      <div style={{marginTop:16,marginBottom:16}}>
        <label style={{fontSize:13,fontWeight:600,color:C.text,display:"block",marginBottom:8}}>Mensagem para acompanhar (opcional)</label>

    const archive={profile:{name:profile.name,emoji:profile.emoji},exportedAt:new Date().toISOString(),days:allDays.map(d=>({date:d,label:fmtFull(d),feeling:(data.dayFeelings||{})[d]||null,moments:(data.moments[d]||[])}))};

      <button onClick={()=>{if(navigator.clipboard)navigator.clipboard.writeText(code);setCopied(true);setTimeout(()=>setCopied(false),2500);}} style={{width:"100%",padding:"11px 0",marginBottom:20,background:copied?"#E8FBF0":"#fff",color:copied?C.green:C.purple,border:`2px solid ${copied?C.green:C.purple}`,borderRadius:12,fontWeight:600,fontSize:14,cursor:"pointer",transition:"all 0.2s"}}>{copied?"✓ Código copiado!":"Copiar código"}</button>

      {/* Checkbox with proper states */}
      <label style={{display:"flex",alignItems:"flex-start",gap:12,cursor:"pointer",marginBottom:20,padding:"14px",background:confirmed?"#E8FBF0":C.white,border:`2px solid ${confirmed?C.green:err?C.red:C.cardBorder}`,borderRadius:14,transition:"all 0.2s"}} onClick={()=>{setConfirmed(c=>!c);setErr("");}}>
        <div style={{width:22,height:22,borderRadius:6,border:`2px solid ${confirmed?C.green:err?C.red:C.cardBorder}`,background:confirmed?C.green:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,transition:"all 0.2s",marginTop:1}}>
          {confirmed&&<span style={{color:"#fff",fontSize:14,lineHeight:1}}>✓</span>}
        </div>
        <span style={{fontSize:14,color:confirmed?C.green:C.textMid,lineHeight:1.5,fontWeight:confirmed?500:400,transition:"color 0.2s"}}>Eu anotei meu código de recuperação em um lugar seguro.</span>
      </label>
      {err&&<p style={{fontSize:13,color:C.red,margin:"0 0 14px",fontWeight:500}}>{err}</p>}
      <Btn onClick={finish} disabled={loading}>{loading?"Criando conta...":"Entrar no Veeda 🌿"}</Btn>
    </div>}
  </div>;
}

// ── Screen: Forgot ──
function ScreenForgot({profile,onSuccess,onBack}){
  const[step,setStep]=useState(1),[ code,setCode]=useState(""),[ pw,setPw]=useState(""),[ pw2,setPw2]=useState(""),[ err,setErr]=useState(""),[ loading,setLoading]=useState(false);
  const verify=async()=>{setLoading(true);setErr("");const h=await hashPw(code.trim().toUpperCase());if(h!==profile.recoveryHash){setErr("Código incorreto.");setLoading(false);return;}setStep(2);setLoading(false);};
  const reset=async()=>{if(pw.length<6){setErr("Mínimo 6 caracteres.");return;}if(pw!==pw2){setErr("As senhas não coincidem.");return;}setLoading(true);try{const stored=localStorage.getItem(`veeda_data_${profile.id}`);let d=defaultData();try{d=await decryptObj(stored,code.trim().toUpperCase());}catch{}const ps=loadProfiles(),idx=ps.findIndex(p=>p.id===profile.id);if(idx>=0){ps[idx].passwordHash=await hashPw(pw);saveProfiles(ps);}localStorage.setItem(`veeda_data_${profile.id}`,await encryptObj(d,pw));onSuccess(pw);}catch{setErr("Erro.");setLoading(false);}};
  return <div style={{maxWidth:400,margin:"0 auto",padding:"2.5rem 1.25rem",background:C.bg,minHeight:"100vh"}}>
    <Btn onClick={onBack} variant="ghost" style={{width:"auto",marginBottom:24}}>‹ Voltar</Btn>
    <div style={{textAlign:"center",marginBottom:24}}><AvatarBubble src={profile.avatarSrc} emoji={profile.emoji} color={profile.avatarColor||C.purpleLight} size={64} ring/><p style={{margin:"10px 0 0",fontSize:16,fontWeight:700,color:C.text}}>{profile.name}</p></div>
    <div style={{background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:16,padding:"20px"}}>
      {step===1&&<div><p style={{fontSize:15,fontWeight:600,color:C.text,margin:"0 0 14px"}}>Código de recuperação</p><input value={code} onChange={e=>{setCode(e.target.value);setErr("");}} placeholder="XXXX-XXXX-XXXX-XXXX" style={{border:`1.5px solid ${err?C.red:C.cardBorder}`,fontFamily:"monospace",letterSpacing:"1px",marginBottom:err?6:14}}/>{err&&<p style={{fontSize:13,color:C.red,margin:"0 0 12px",fontWeight:500}}>{err}</p>}<Btn onClick={verify} disabled={loading}>{loading?"Verificando...":"Verificar"}</Btn></div>}
      {step===2&&<div><p style={{fontSize:15,fontWeight:600,color:C.text,margin:"0 0 14px"}}>Nova senha</p><input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr("");}} placeholder="Nova senha" style={{marginBottom:12}}/><input type="password" value={pw2} onChange={e=>{setPw2(e.target.value);setErr("");}} placeholder="Confirmar" style={{border:`1.5px solid ${err?C.red:C.cardBorder}`,marginBottom:err?6:14}}/>{err&&<p style={{fontSize:13,color:C.red,margin:"0 0 12px",fontWeight:500}}>{err}</p>}<Btn onClick={reset} disabled={loading}>{loading?"Salvando...":"Redefinir senha"}</Btn></div>}
    </div>
  </div>;
}

// ── Main App ──
function VeedaApp({profile,password,onLogout,onUpdateProfile}){
  const dataKey=`veeda_data_${profile.id}`;
  const[data,setData]=useState(null);
  const[view,setView]=useState("hoje");
  const[dayOffset,setDayOffset]=useState(0);
  const[addType,setAddType]=useState("texto");
  const[addContent,setAddContent]=useState("");
  const[addCaption,setAddCaption]=useState("");
  const[addMedia,setAddMedia]=useState(null);
  const[showModal,setShowModal]=useState(false);
  const[showEditDay,setShowEditDay]=useState(false);
  const[showFeeling,setShowFeeling]=useState(false);
  const[showAvatar,setShowAvatar]=useState(false);
  const[showInvite,setShowInvite]=useState(false);
  const[showInviteApp,setShowInviteApp]=useState(false);
  const[showGroupName,setShowGroupName]=useState(false);
  const[showShare,setShowShare]=useState(false);
  const[showReminders,setShowReminders]=useState(false);
  const[showEvents,setShowEvents]=useState(false);
  const[showBackup,setShowBackup]=useState(false);
  const[showGuide,setShowGuide]=useState(false);
  const[importKey,setImportKey]=useState("");
  const[importFile,setImportFile]=useState(null);
  const[importMsg,setImportMsg]=useState("");
  const[viewRec,setViewRec]=useState(null);
  const[pendingNotif,setPendingNotif]=useState(null);
  const[showBackupPrompt,setShowBackupPrompt]=useState(false);
  const[expandedMedia,setExpandedMedia]=useState(null);
  const[now,setNow]=useState(new Date());
  const[invCode,setInvCode]=useState("");
  const[invName,setInvName]=useState("");
  const[newGroup,setNewGroup]=useState("");
  const[lastId,setLastId]=useState(null);
  const fileRef=useRef(),vidRef=useRef(),photoRef=useRef(),galleryRef=useRef(),touchX=useRef(null),lastRef=useRef(null);

  useEffect(()=>{
    (async()=>{try{const enc=localStorage.getItem(dataKey);const d=enc?await decryptObj(enc,password):defaultData();setData(d);
      // Check monthly backup prompt
      const lastPrompt=d.lastBackupPrompt?new Date(d.lastBackupPrompt):null;
      const now=new Date();
      if(!lastPrompt||(now-lastPrompt)>30*24*60*60*1000)setShowBackupPrompt(true);
    }catch{setData(defaultData());}})();
    const t=setInterval(()=>setNow(new Date()),30000);
    return()=>clearInterval(t);
  },[]);

  useEffect(()=>{if(!data)return;const k=`veeda_inbox_${profile.id}`;const inbox=JSON.parse(localStorage.getItem(k)||"[]");if(inbox.length>0){const notif=inbox[0];const already=(data.received||[]).find(r=>r.date===notif.date&&r.author===notif.author&&r.importedAt===notif.importedAt);if(!already)setPendingNotif(notif);}},[data]);
  useEffect(()=>{if(lastId&&lastRef.current){setTimeout(()=>lastRef.current&&lastRef.current.scrollIntoView({behavior:"smooth",block:"center"}),120);setLastId(null);}},[lastId,data]);

  const save=async d=>{setData(d);localStorage.setItem(dataKey,await encryptObj(d,password));};
  const resetModal=()=>{setAddContent("");setAddCaption("");setAddMedia(null);setShowModal(false);};
  const readFile=(f,cb)=>{const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsDataURL(f);};

  const acceptNotif=async()=>{if(!pendingNotif)return;const k=`veeda_inbox_${profile.id}`;const inbox=JSON.parse(localStorage.getItem(k)||"[]");localStorage.setItem(k,JSON.stringify(inbox.filter(x=>!(x.date===pendingNotif.date&&x.author===pendingNotif.author&&x.importedAt===pendingNotif.importedAt))));const newData={...data,received:[...(data.received||[]),pendingNotif]};await save(newData);setPendingNotif(null);setView("recebidos");setViewRec(pendingNotif);};
  const dismissNotif=()=>{if(!pendingNotif)return;const k=`veeda_inbox_${profile.id}`;const inbox=JSON.parse(localStorage.getItem(k)||"[]");localStorage.setItem(k,JSON.stringify(inbox.filter(x=>!(x.date===pendingNotif.date&&x.author===pendingNotif.author&&x.importedAt===pendingNotif.importedAt))));setPendingNotif(null);};
  const dismissBackupPrompt=async()=>{const d={...data,lastBackupPrompt:new Date().toISOString()};await save(d);setShowBackupPrompt(false);};

  if(!data)return <div style={{padding:32,textAlign:"center",color:C.textMid,fontSize:32}}>🌿</div>;

  const curDay=offsetDay(todayStr(),-dayOffset),isToday=dayOffset===0;
  const moments=(data.moments[curDay]||[]).slice().sort((a,b)=>a.ts-b.ts);
  const allDays=Object.keys(data.moments).filter(d=>(data.moments[d]||[]).length>0).sort((a,b)=>b.localeCompare(a));
  const nowKey=`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
  const dayColor=DAY_COLORS.find(c=>c.label===(data.dayColors||{})[curDay])||DAY_COLORS[0];
  const feeling=(data.dayFeelings||{})[curDay];
  const group=data.groupName||"Família & Amigos";
  const lastMId=moments.length>0?moments[moments.length-1].id:null;
  const upcomingEvents=(data.events||[]).filter(e=>e.date>=todayStr()).sort((a,b)=>a.date.localeCompare(b.date));

  const addMoment=()=>{const isMedia=addType==="foto"||addType==="video";if(isMedia&&!addMedia)return;if(!isMedia&&!addContent.trim())return;let type=addType,content=isMedia?addMedia:addContent.trim();if(type==="link"&&isVideoLink(content))type="videolink";const id=Date.now();save({...data,moments:{...data.moments,[todayStr()]:[...(data.moments[todayStr()]||[]),{id,ts:id,type,content,caption:addCaption.trim()}]}});resetModal();setLastId(id);};
  const delMoment=(day,id)=>save({...data,moments:{...data.moments,[day]:(data.moments[day]||[]).filter(m=>m.id!==id)}});

  const renderContent=(m,full=false,mini=false)=>{
    if(m.type==="foto"||m.type==="video"){
      if(mini)return <div onClick={()=>setExpandedMedia(m)} style={{width:52,height:52,borderRadius:"50%",overflow:"hidden",cursor:"pointer",border:`2.5px solid ${C.white}`,flexShrink:0}}>{m.type==="foto"?<img src={m.content} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:<video src={m.content} style={{width:"100%",height:"100%",objectFit:"cover"}}/>}</div>;
      if(m.type==="foto")return <img src={m.content} alt="" style={{width:"100%",borderRadius:10,display:"block",cursor:"pointer"}} onClick={()=>setExpandedMedia(m)}/>;
      return <video src={m.content} controls style={{width:"100%",borderRadius:10,display:"block",maxHeight:full?320:160}}/>;
    }
    if(m.type==="evento")return <div style={{background:"#FFF8E1",borderRadius:10,padding:"10px 14px"}}><p style={{margin:0,fontSize:14,fontWeight:600,color:C.amber}}>{m.content}</p>{m.caption&&<p style={{margin:"4px 0 0",fontSize:13,color:C.textMid}}>{m.caption}</p>}</div>;
    if(m.type==="videolink"){const e=getVideoEmbed(m.content);return e?<div style={{position:"relative",paddingBottom:"56.25%",height:0,borderRadius:10,overflow:"hidden"}}><iframe src={e} style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",border:"none"}} allowFullScreen title="v"/></div>:<a href={m.content} target="_blank" rel="noopener noreferrer" style={{color:C.blue,fontSize:13,wordBreak:"break-all"}}>{m.content}</a>;}
    if(m.type==="link")return <a href={m.content} target="_blank" rel="noopener noreferrer" style={{color:C.blue,fontSize:13,wordBreak:"break-all"}}>{m.content}</a>;
    if(m.type==="musica")return <p style={{margin:0,fontSize:14,color:C.text}}>🎵 {m.content}</p>;
    return <p style={{margin:0,fontSize:14,color:C.text,lineHeight:1.65}}>{m.content}</p>;
  };

  const MiniCard=({m,isNew})=>{const isMedia=m.type==="foto"||m.type==="video";return <div ref={isNew?lastRef:null} style={{marginBottom:4}}>{isMedia?renderContent(m,false,true):<div style={{background:C.white,border:`1px solid ${isNew?C.purpleMid:C.cardBorder}`,borderRadius:10,padding:"8px 10px",maxWidth:150}}><span style={{fontSize:10,color:C.textLight,display:"block",marginBottom:3}}>{fmt(m.ts)}</span><p style={{margin:0,fontSize:12,color:C.text,lineHeight:1.35,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{typeIcons[m.type]} {m.content}</p></div>}</div>;};

  const FullCard=({m,onDelete,isNew})=><div ref={isNew?lastRef:null} style={{background:C.white,border:`1.5px solid ${isNew?C.purpleMid:C.cardBorder}`,borderRadius:14,padding:"14px",marginBottom:10}}>
    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><span style={{width:28,height:28,borderRadius:"50%",background:typeBg(m.type),display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>{typeIcons[m.type]||"🔗"}</span><span style={{fontSize:12,color:C.textLight}}>{fmt(m.ts)}</span>{onDelete&&<button onClick={()=>onDelete()} style={{marginLeft:"auto",fontSize:12,color:C.textLight,background:"none",border:"none",cursor:"pointer"}}>remover</button>}</div>
    {renderContent(m,true)}
    {m.caption&&m.type!=="evento"&&<p style={{margin:"8px 0 0",fontSize:12,color:C.textMid}}>{m.caption}</p>}
  </div>;

  const buildSlots=()=>{const byTime={};moments.forEach(m=>{const k=fmt(m.ts);if(!byTime[k])byTime[k]=[];byTime[k].push(m);});const times=new Set(Object.keys(byTime));if(isToday)times.add(nowKey);return Array.from(times).sort().map(time=>({time,moments:byTime[time]||[],isNow:isToday&&time===nowKey}));};
  const slots=buildSlots();

  const updateAv=updated=>{const ps=loadProfiles(),idx=ps.findIndex(p=>p.id===updated.id);if(idx>=0){ps[idx]={...ps[idx],emoji:updated.emoji,avatarColor:updated.avatarColor,avatarSrc:updated.avatarSrc};saveProfiles(ps);onUpdateProfile(updated);}};

  return <div style={{maxWidth:480,margin:"0 auto",background:dayColor.bg,minHeight:"100vh",transition:"background 0.4s"}}>
    {pendingNotif&&<ReceivedNotif notif={pendingNotif} onOpen={acceptNotif} onDismiss={dismissNotif}/>}
    {showBackupPrompt&&<BackupPrompt onBackup={()=>{setShowBackupPrompt(false);setShowBackup(true);dismissBackupPrompt();}} onDismiss={dismissBackupPrompt}/>}
    {expandedMedia&&<div onClick={()=>setExpandedMedia(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",zIndex:400,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}>
      {expandedMedia.type==="foto"?<img src={expandedMedia.content} alt="" style={{maxWidth:"100%",maxHeight:"90vh",borderRadius:12}}/>:<video src={expandedMedia.content} controls autoPlay style={{maxWidth:"100%",maxHeight:"90vh",borderRadius:12}}/>}
    </div>}
    {showGuide&&<InstallGuide onClose={()=>setShowGuide(false)}/>}

    {/* Header */}
    <div style={{background:C.white,borderBottom:`1px solid ${C.cardBorder}`}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px 6px"}}>
        <div style={{display:"flex",alignItems:"center",gap:6}}>{getLogo()?<img src={getLogo()} alt="logo" style={{width:28,height:28,objectFit:"contain",borderRadius:6}}/>:<span style={{fontSize:18}}>🌿</span>}<span style={{fontSize:15,fontWeight:700,color:C.text,letterSpacing:"-0.3px"}}>Veeda</span></div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>setShowInviteApp(true)} style={{background:C.purpleLight,border:"none",borderRadius:20,padding:"5px 12px",fontSize:12,color:C.purple,fontWeight:600,cursor:"pointer"}}>+ Convidar</button>
          <button onClick={onLogout} style={{fontSize:12,color:C.textLight,background:"none",border:"none",cursor:"pointer"}}>sair</button>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 0 12px",borderBottom:`1px solid ${C.cardBorder}`,cursor:"pointer"}} onClick={()=>view==="hoje"&&setShowAvatar(true)}>

        <p style={{margin:"8px 0 0",fontSize:14,fontWeight:600,color:C.text}}>{profile.name}</p>
        {feeling&&<div style={{display:"inline-flex",alignItems:"center",gap:4,marginTop:4,background:C.purpleLight,borderRadius:20,padding:"3px 12px"}}><span style={{fontSize:13}}>{feeling.emoji}</span><span style={{fontSize:11,color:C.purple,fontWeight:500}}>{feeling.label}</span></div>}
        {view==="hoje"&&<span style={{fontSize:11,color:C.textLight,marginTop:4}}>editar perfil</span>}
      </div>
      <div style={{display:"flex",padding:"0 8px",overflowX:"auto"}}>
        {[["hoje","Hoje"],["grupo",group],["recebidos","Recebidos"]].map(([v,label])=><button key={v} onClick={()=>setView(v)} style={{padding:"10px 14px",fontSize:13,fontWeight:view===v?600:400,background:"none",border:"none",borderBottom:`2.5px solid ${view===v?C.purple:"transparent"}`,color:view===v?C.purple:C.textMid,cursor:"pointer",whiteSpace:"nowrap"}}>{label}</button>)}

        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 8px 2px"}}>
          <button onClick={()=>setDayOffset(o=>o+1)} style={{background:"none",border:"none",fontSize:22,color:C.textMid,cursor:"pointer",padding:"4px 10px"}}>‹</button>
          <p style={{margin:0,fontSize:12,color:C.textLight}}>{fmtFull(curDay).split(",").slice(1).join(",").trim()}</p>
          <button onClick={()=>setDayOffset(o=>Math.max(0,o-1))} style={{background:"none",border:"none",fontSize:22,color:dayOffset===0?"transparent":C.textMid,cursor:dayOffset===0?"default":"pointer",padding:"4px 10px",pointerEvents:dayOffset===0?"none":"auto"}}>›</button>
        </div>

          <button onClick={()=>setShowEditDay(true)} style={{fontSize:12,padding:"4px 12px",background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:20,color:C.textMid,cursor:"pointer"}}>🎨 cor</button>

          {slots.length===0&&<div style={{textAlign:"center",padding:"3rem 2rem"}}><p style={{fontSize:14,color:C.textLight,margin:0}}>{isToday?"Nenhum momento ainda.":"Nenhum momento neste dia."}</p></div>}

            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"flex-end",paddingRight:20,paddingLeft:12}}>{isLeft&&(slot.isNow?<button onClick={()=>setShowModal(true)} style={{background:C.white,border:`2px solid ${dayColor.dot}`,borderRadius:20,padding:"9px 16px",fontSize:13,color:C.purple,cursor:"pointer",fontWeight:600,lineHeight:1.4,textAlign:"center"}}>registrar<br/>acontecimento</button>:slot.moments.map(m=><MiniCard key={m.id} m={m} isNew={m.id===lastMId&&lastId===null}/>))}</div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0,position:"relative",zIndex:2}}>{slot.isNow?<PulsingDot onClick={()=>setShowModal(true)} color={dayColor.dot}/>:<div style={{width:14,height:14,borderRadius:"50%",background:typeColor(slot.moments[0]&&slot.moments[0].type),border:`2.5px solid ${C.white}`,outline:`2px solid ${typeBg(slot.moments[0]&&slot.moments[0].type)}`}}/>}<span style={{fontSize:10,color:C.textLight,marginTop:4,whiteSpace:"nowrap"}}>{slot.time}</span></div>
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"flex-start",paddingLeft:20,paddingRight:12}}>{!isLeft&&(slot.isNow?<button onClick={()=>setShowModal(true)} style={{background:C.white,border:`2px solid ${dayColor.dot}`,borderRadius:20,padding:"9px 16px",fontSize:13,color:C.purple,cursor:"pointer",fontWeight:600,lineHeight:1.4,textAlign:"center"}}>registrar<br/>acontecimento</button>:slot.moments.map(m=><MiniCard key={m.id} m={m} isNew={m.id===lastMId&&lastId===null}/>))}</div>
          </div>;})}
        </div>
        {moments.length>0&&<div style={{padding:"0 16px 16px"}}><p style={{margin:"0 0 10px",fontSize:13,fontWeight:600,color:C.textMid}}>Momentos do dia</p>{moments.map(m=><FullCard key={m.id} m={m} onDelete={()=>delMoment(curDay,m.id)} isNew={m.id===lastMId&&lastId===null}/>)}</div>}
      </div>}

      {/* GRUPO */}
      {view==="grupo"&&<div style={{padding:"20px 16px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}><p style={{margin:0,fontSize:16,fontWeight:700,color:C.text}}>{group}</p><button onClick={()=>{setNewGroup(group);setShowGroupName(true);}} style={{fontSize:12,color:C.purple,background:"none",border:"none",cursor:"pointer"}}>renomear</button></div>
        <Btn onClick={()=>setShowInvite(true)} style={{marginBottom:20}}>+ Adicionar contato</Btn>
        {(!data.contacts||data.contacts.length===0)?<div style={{textAlign:"center",padding:"2rem 0"}}><p style={{fontSize:14,color:C.textLight}}>Nenhum contato ainda.</p><button onClick={()=>setShowInviteApp(true)} style={{marginTop:12,background:"none",border:`1px solid ${C.purple}`,borderRadius:20,padding:"8px 18px",color:C.purple,cursor:"pointer",fontSize:13,fontWeight:600}}>Convidar alguém para o Veeda</button></div>:data.contacts.map((c,i)=><div key={i} style={{background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:14,padding:"14px",marginBottom:10,display:"flex",alignItems:"center",gap:12}}>
          <AvatarBubble src={c.avatarSrc} emoji={c.emoji||"🌿"} color={c.avatarColor||C.purpleLight} size={42}/>
          <div style={{flex:1}}><p style={{margin:0,fontSize:14,fontWeight:600,color:C.text}}>{c.name}</p><p style={{margin:0,fontSize:12,color:C.textMid}}>ID: <span style={{fontFamily:"monospace",color:C.purple}}>{c.code}</span></p></div>
          <button onClick={()=>{const nc=[...data.contacts];nc.splice(i,1);save({...data,contacts:nc});}} style={{fontSize:12,color:C.textLight,background:"none",border:"none",cursor:"pointer"}}>remover</button>
        </div>)}
      </div>}

      {/* RECEBIDOS */}
      {view==="recebidos"&&!viewRec&&<div style={{padding:"20px 16px"}}>
        {(data.received||[]).length===0?<p style={{fontSize:14,color:C.textLight,textAlign:"center",marginTop:40}}>Nenhum Dia de Veeda recebido ainda.</p>:(data.received||[]).slice().sort((a,b)=>b.importedAt-a.importedAt).map((r,i)=><div key={i} onClick={()=>setViewRec(r)} style={{background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:14,padding:"14px",marginBottom:10,cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
          <AvatarBubble src={r.avatarSrc} emoji={r.emoji||"🌿"} color={r.avatarColor||C.purpleLight} size={44} ring/>
          <div style={{flex:1}}><p style={{margin:0,fontSize:14,fontWeight:600,color:C.text}}>{r.author}</p><p style={{margin:0,fontSize:12,color:C.textMid}}>{fmtLabel(r.date)} · {r.moments.length} momento{r.moments.length!==1?"s":""}{r.feeling?` · ${r.feeling.emoji}`:""}</p></div>
          <span style={{color:C.textLight,fontSize:20}}>›</span>
        </div>)}
      </div>}
      {view==="recebidos"&&viewRec&&<div style={{paddingBottom:20}}>
        <div style={{background:C.white,borderBottom:`1px solid ${C.cardBorder}`,display:"flex",flexDirection:"column",alignItems:"center",padding:"18px 16px 14px"}}>
          <AvatarBubble src={viewRec.avatarSrc} emoji={viewRec.emoji||"🌿"} color={viewRec.avatarColor||C.purpleLight} size={70} ring/>
          <p style={{margin:"10px 0 2px",fontSize:16,fontWeight:700,color:C.text}}>{viewRec.author}</p>
          <p style={{margin:0,fontSize:12,color:C.textLight}}>Dia de Veeda · {fmtFull(viewRec.date)}</p>
          {viewRec.feeling&&<div style={{display:"inline-flex",alignItems:"center",gap:4,marginTop:8,background:C.purpleLight,borderRadius:20,padding:"4px 12px"}}><span style={{fontSize:13}}>{viewRec.feeling.emoji}</span><span style={{fontSize:11,color:C.purple,fontWeight:500}}>{viewRec.feeling.label}</span></div>}
          {viewRec.message&&<div style={{margin:"12px 0 0",background:C.purpleLight,borderRadius:12,padding:"12px 16px",width:"100%",boxSizing:"border-box"}}><p style={{margin:0,fontSize:14,color:C.purple,fontStyle:"italic",lineHeight:1.6}}>"{viewRec.message}"</p></div>}
          <button onClick={()=>setViewRec(null)} style={{marginTop:12,fontSize:13,color:C.textMid,background:"none",border:`1px solid ${C.cardBorder}`,borderRadius:20,padding:"5px 16px",cursor:"pointer"}}>‹ Voltar</button>
        </div>
        <div style={{padding:"16px"}}>{(viewRec.moments||[]).slice().sort((a,b)=>a.ts-b.ts).map(m=><div key={m.id} style={{background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:14,padding:"14px",marginBottom:10}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><span style={{width:28,height:28,borderRadius:"50%",background:typeBg(m.type),display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>{typeIcons[m.type]||"🔗"}</span><span style={{fontSize:12,color:C.textLight}}>{fmt(m.ts)}</span></div>
          {renderContent(m,true)}
          {m.caption&&<p style={{margin:"8px 0 0",fontSize:12,color:C.textMid}}>{m.caption}</p>}
        </div>)}</div>
      </div>}
    </div>

    {/* Share FAB */}
    {view==="hoje"&&moments.length>0&&<div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,padding:"12px 16px 28px",background:`linear-gradient(to top,${dayColor.bg} 55%,transparent)`,pointerEvents:"none"}}>
      <button onClick={()=>setShowShare(true)} style={{width:"100%",padding:"15px 0",background:C.purple,color:"#fff",border:"none",borderRadius:18,fontWeight:700,fontSize:15,cursor:"pointer",pointerEvents:"auto",boxShadow:"0 6px 24px rgba(123,111,160,0.38)"}}>🌿 Compartilhar meu Dia de Veeda</button>
    </div>}
    {view==="hoje"&&isToday&&moments.length===0&&<div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,padding:"12px 16px 28px",background:`linear-gradient(to top,${dayColor.bg} 55%,transparent)`,pointerEvents:"none"}}>
      <button onClick={()=>setShowModal(true)} style={{width:"100%",padding:"15px 0",background:C.purple,color:"#fff",border:"none",borderRadius:18,fontWeight:700,fontSize:15,cursor:"pointer",pointerEvents:"auto",boxShadow:"0 6px 24px rgba(123,111,160,0.38)"}}>+ Registrar primeiro momento</button>
    </div>}

    {/* Modals */}
    {showShare&&<ShareDayModal profile={profile} data={data} curDay={curDay} onClose={()=>setShowShare(false)} onShared={async log=>{await save({...data,sharedLog:log});}}/>}
    {showEvents&&<EventsModal data={data} profile={profile} onSave={events=>save({...data,events})} onClose={()=>setShowEvents(false)}/>}
    {showBackup&&<BackupModal data={data} profile={profile} onClose={()=>setShowBackup(false)}/>}
    {showReminders&&<RemindersModal reminders={data.reminders||[]} onSave={list=>save({...data,reminders:list})} onClose={()=>setShowReminders(false)}/>}
    {showInviteApp&&<InviteModal profile={profile} onClose={()=>setShowInviteApp(false)}/>}

    {showModal&&<Modal title="Registrar acontecimento" onClose={resetModal}>
      <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>{[["texto","✏️","texto"],["foto","📷","foto"],["video","🎬","vídeo"],["link","🔗","link"],["musica","🎵","música"]].map(([t,icon,label])=><button key={t} onClick={()=>{setAddType(t);setAddMedia(null);setAddContent("");}} style={{padding:"6px 12px",fontSize:13,background:addType===t?typeBg(t):"#F5F3FB",border:`1.5px solid ${addType===t?typeColor(t):C.cardBorder}`,borderRadius:20,cursor:"pointer",color:addType===t?typeColor(t):C.textMid,fontWeight:addType===t?600:400}}>{icon} {label}</button>)}</div>
      {addType==="foto"&&(!addMedia?<div style={{display:"flex",gap:8,marginBottom:10}}><input ref={photoRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)readFile(f,setAddMedia);}}/><input ref={galleryRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)readFile(f,setAddMedia);}}/><button onClick={()=>photoRef.current.click()} style={{flex:1,padding:"10px 0",background:C.blueLight,color:C.blue,border:`1px solid ${C.blueMid}`,borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:500}}>📷 Câmera</button><button onClick={()=>galleryRef.current.click()} style={{flex:1,padding:"10px 0",background:C.purpleLight,color:C.purple,border:`1px solid ${C.purpleMid}`,borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:500}}>🖼️ Galeria</button></div>:<div style={{marginBottom:10,position:"relative"}}><img src={addMedia} alt="" style={{width:"100%",borderRadius:10}}/><button onClick={()=>setAddMedia(null)} style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,0.5)",border:"none",borderRadius:"50%",width:30,height:30,color:"#fff",cursor:"pointer",fontSize:15}}>×</button></div>)}
      {addType==="video"&&(!addMedia?<div style={{display:"flex",gap:8,marginBottom:10}}><input ref={vidRef} type="file" accept="video/*" capture="environment" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)readFile(f,setAddMedia);}}/><input ref={fileRef} type="file" accept="video/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)readFile(f,setAddMedia);}}/><button onClick={()=>vidRef.current.click()} style={{flex:1,padding:"10px 0",background:C.blueLight,color:C.blue,border:`1px solid ${C.blueMid}`,borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:500}}>🎥 Gravar</button><button onClick={()=>fileRef.current.click()} style={{flex:1,padding:"10px 0",background:C.purpleLight,color:C.purple,border:`1px solid ${C.purpleMid}`,borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:500}}>📁 Galeria</button></div>:<div style={{marginBottom:10,position:"relative"}}><video src={addMedia} controls style={{width:"100%",borderRadius:10,maxHeight:240}}/><button onClick={()=>setAddMedia(null)} style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,0.5)",border:"none",borderRadius:"50%",width:30,height:30,color:"#fff",cursor:"pointer",fontSize:15}}>×</button></div>)}
      {(addType==="texto"||addType==="link"||addType==="musica")&&<textarea value={addContent} onChange={e=>setAddContent(e.target.value)} placeholder={addType==="link"?"Cole o link...":addType==="musica"?"Música e artista...":"O que aconteceu?"} style={{width:"100%",minHeight:88,marginBottom:10,padding:"10px 12px",border:`1px solid ${C.cardBorder}`,borderRadius:10,fontSize:16,boxSizing:"border-box"}}/>}
      <input value={addCaption} onChange={e=>setAddCaption(e.target.value)} placeholder="Legenda (opcional)" style={{marginBottom:16}}/>
      <Btn onClick={addMoment}>Adicionar momento</Btn>
    </Modal>}

    {showEditDay&&<Modal title="Cor do dia" onClose={()=>setShowEditDay(false)}><div style={{display:"flex",gap:10,flexWrap:"wrap",justifyContent:"center",padding:"8px 0"}}>{DAY_COLORS.map(col=><button key={col.label} onClick={()=>{save({...data,dayColors:{...(data.dayColors||{}),[curDay]:col.label}});setShowEditDay(false);}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,background:"none",border:"none",cursor:"pointer",padding:8}}><div style={{width:48,height:48,borderRadius:"50%",background:col.bg,border:`3px solid ${col.dot}`,outline:dayColor.label===col.label?`3px solid ${C.purple}`:"none",outlineOffset:2,transition:"outline 0.15s"}}/><span style={{fontSize:11,color:C.textMid,fontWeight:500}}>{col.label}</span></button>)}</div></Modal>}
    {showFeeling&&<Modal title="Como foi esse Dia de Veeda?" onClose={()=>setShowFeeling(false)}><div style={{display:"flex",gap:10,flexWrap:"wrap",justifyContent:"center",padding:"8px 0"}}>{FEELINGS.map(f=><button key={f.label} onClick={()=>{save({...data,dayFeelings:{...(data.dayFeelings||{}),[curDay]:f}});setShowFeeling(false);}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,background:feeling&&feeling.label===f.label?C.purpleLight:"#F5F3FB",border:`2px solid ${feeling&&feeling.label===f.label?C.purple:C.cardBorder}`,borderRadius:14,padding:"12px 14px",cursor:"pointer",minWidth:68,transition:"all 0.15s"}}><span style={{fontSize:28}}>{f.emoji}</span><span style={{fontSize:11,color:C.textMid,fontWeight:500}}>{f.label}</span></button>)}</div></Modal>}

    {showAvatar&&<Modal title="Personalizar perfil" onClose={()=>setShowAvatar(false)}>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <input ref={photoRef} type="file" accept="image/*" capture="user" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)readFile(f,src=>updateAv({...profile,avatarSrc:src}));}}/>
        <input ref={galleryRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)readFile(f,src=>updateAv({...profile,avatarSrc:src}));}}/>
        <button onClick={()=>photoRef.current.click()} style={{flex:1,padding:"9px 0",background:C.blueLight,color:C.blue,border:`1px solid ${C.blueMid}`,borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:500}}>📷 Câmera</button>
        <button onClick={()=>galleryRef.current.click()} style={{flex:1,padding:"9px 0",background:C.purpleLight,color:C.purple,border:`1px solid ${C.purpleMid}`,borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:500}}>🖼️ Galeria</button>
        {profile.avatarSrc&&<button onClick={()=>updateAv({...profile,avatarSrc:null})} style={{padding:"9px 12px",background:"#FDE8E8",color:C.red,border:`1px solid #F5B5B5`,borderRadius:10,cursor:"pointer",fontSize:13}}>Remover</button>}
      </div>
      {!profile.avatarSrc&&<div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>{AVATAR_EMOJIS.map(e=><button key={e} onClick={()=>updateAv({...profile,emoji:e})} style={{fontSize:20,background:profile.emoji===e?C.purpleLight:"#F5F3FB",border:`2px solid ${profile.emoji===e?C.purple:C.cardBorder}`,borderRadius:10,width:44,height:44,cursor:"pointer"}}>{e}</button>)}</div>
        <div style={{display:"flex",gap:10,marginBottom:14}}>{AVATAR_COLORS.map(col=><button key={col} onClick={()=>updateAv({...profile,avatarColor:col})} style={{width:36,height:36,borderRadius:"50%",background:col,border:`3px solid ${profile.avatarColor===col?C.purple:C.cardBorder}`,cursor:"pointer"}}/>)}</div>
      </div>}
      <div style={{display:"flex",justifyContent:"center",marginBottom:20}}><AvatarBubble src={profile.avatarSrc} emoji={profile.emoji} color={profile.avatarColor||C.purpleLight} size={64} ring/></div>
      <Btn onClick={()=>setShowAvatar(false)}>Salvar</Btn>
    </Modal>}

    {showInvite&&<Modal title="Adicionar contato" onClose={()=>setShowInvite(false)}>
      <p style={{fontSize:13,color:C.textMid,marginBottom:14,lineHeight:1.6}}>Adicione o ID de um contato para poder compartilhar seus Dias de Veeda com ele.</p>
      <label style={{fontSize:13,color:C.textMid,display:"block",marginBottom:6}}>Nome</label>
      <input value={invName} onChange={e=>setInvName(e.target.value)} placeholder="Ex: Mamãe" style={{marginBottom:14}}/>
      <label style={{fontSize:13,color:C.textMid,display:"block",marginBottom:6}}>ID do contato no Veeda</label>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <input value={invCode} onChange={e=>setInvCode(e.target.value)} placeholder="Ex: sol-lua-7" style={{flex:1,width:"auto"}}/>
        <button onClick={()=>{const w=["sol","lua","rio","mar","flor","paz","luz","céu","vale","nuvem"];setInvCode(`${w[Math.floor(Math.random()*w.length)]}-${Math.floor(100+Math.random()*900)}`);}} style={{padding:"0 12px",background:C.purpleLight,border:`1px solid ${C.purpleMid}`,borderRadius:8,color:C.purple,cursor:"pointer",fontSize:13,fontWeight:600}}>gerar</button>
      </div>
      <Btn onClick={()=>{if(!invName.trim()||!invCode.trim())return;save({...data,contacts:[...(data.contacts||[]),{name:invName.trim(),code:invCode.trim(),emoji:"🌿",addedAt:Date.now()}]});setInvName("");setInvCode("");setShowInvite(false);}}>Adicionar ao grupo</Btn>
    </Modal>}

    {showGroupName&&<Modal title="Renomear grupo" onClose={()=>setShowGroupName(false)}>
      <input value={newGroup} onChange={e=>setNewGroup(e.target.value)} placeholder="Nome do grupo" style={{marginBottom:16}}/>
      <Btn onClick={()=>{if(newGroup.trim()){save({...data,groupName:newGroup.trim()});setShowGroupName(false);}}}>Salvar</Btn>
    </Modal>}
  </div>;
}

// ── ROOT ──
function Veeda(){
  const[screen,setScreen]=useState("loading");
  const[profiles,setProfiles]=useState([]);
  const[selProfile,setSelProfile]=useState(null);
  const[activeProfile,setActiveProfile]=useState(null);
  const[activePw,setActivePw]=useState(null);
  const[forgotProfile,setForgotProfile]=useState(null);
  const[showGuide,setShowGuide]=useState(false);

  useEffect(()=>{
    const session=loadSession();
    const ps=loadProfiles();
    setProfiles(ps);
    if(session&&session.profileId&&session.pw){
      const p=ps.find(x=>x.id===session.profileId);
      if(p){setActiveProfile(p);setActivePw(session.pw);setScreen("app");return;}
    }
    setScreen("splash");
  },[]);

  const refresh=()=>{const ps=loadProfiles();setProfiles(ps);return ps;};
  const updateProfile=updated=>{const ps=loadProfiles(),idx=ps.findIndex(p=>p.id===updated.id);if(idx>=0){ps[idx]={...ps[idx],emoji:updated.emoji,avatarColor:updated.avatarColor,avatarSrc:updated.avatarSrc};saveProfiles(ps);setActiveProfile({...updated});}};

  if(screen==="loading")return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg,fontSize:40}}>🌿</div>;

  if(screen==="app"&&activeProfile&&activePw)return <VeedaApp profile={activeProfile} password={activePw} onLogout={()=>{clearSession();setActiveProfile(null);setActivePw(null);const ps=refresh();setScreen("splash");}} onUpdateProfile={updateProfile}/>;

  if(screen==="forgot"&&forgotProfile)return <ScreenForgot profile={forgotProfile} onBack={()=>setScreen("password")} onSuccess={pw=>{const ps=loadProfiles(),p=ps.find(x=>x.id===forgotProfile.id);saveSession(p.id,pw);setActiveProfile(p);setActivePw(pw);setForgotProfile(null);setScreen("app");}}/>;

  if(screen==="password"&&selProfile)return <ScreenPassword profile={selProfile} onBack={()=>setScreen(profiles.length>0?"select":"splash")} onForgot={()=>{setForgotProfile(selProfile);setScreen("forgot");}} onSuccess={pw=>{saveSession(selProfile.id,pw);setActiveProfile(selProfile);setActivePw(pw);setScreen("app");}}/>;

  if(screen==="create")return <ScreenCreate onBack={()=>setScreen("splash")} onDone={(profile,pw)=>{refresh();saveSession(profile.id,pw);setActiveProfile(profile);setActivePw(pw);setScreen("app");}}/>;

  if(screen==="select")return <ScreenSelect profiles={profiles} onSelect={p=>{setSelProfile(p);setScreen("password");}} onNew={()=>setScreen("create")} onBack={()=>setScreen("splash")}/>;

  // splash
  return <>
    {showGuide&&<InstallGuide onClose={()=>setShowGuide(false)}/>}
    <SplashScreen
      onLogin={()=>setScreen(profiles.length>0?"select":"password")}
      onCreate={()=>setScreen("create")}
      onGuide={()=>setShowGuide(true)}
    />
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Veeda/>);

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    const sw=`const CACHE="veeda-v4",FILES=["./index.html"];self.addEventListener("install",e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(FILES))));self.addEventListener("activate",e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k))))));self.addEventListener("fetch",e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:"application/javascript"}))).catch(()=>{});
  });
}
</script>
</body>
