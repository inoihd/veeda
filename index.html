// SETTINGS / DASHBOARD
// ═══════════════════════════════════════════════════
function SettingsModal({profile,data,password,onUpdateProfile,onSave,onLogout,onClose,addToast}){
  const [showBackup,setShowBackup]=useState(false);
  const [showCode,setShowCode]=useState(false);
  const [showHandle,setShowHandle]=useState(false);
  const [handleInput,setHandleInput]=useState((profile.handle||nameToHandle(profile.name)).replace(/^@/,""));
  const [handleErr,setHandleErr]=useState("");
  const [tab,setTab]=useState("conta");

  const saveHandle=()=>{
    const h=sanitizeHandle(handleInput);
    if(h.length<3){setHandleErr("Mínimo 3 caracteres.");return;}
    if(!/^[a-z0-9_]+$/.test(h)){setHandleErr("Use apenas letras, números e _.");return;}
    if(!isHandleAvailable("@"+h,profile.id)){setHandleErr("Este @handle já está em uso.");return;}
    const ps=loadProfiles();const idx=ps.findIndex(p=>p.id===profile.id);
    if(idx>=0){ps[idx].handle="@"+h;saveProfiles(ps);registryUpdate({...ps[idx]});onUpdateProfile({...profile,handle:"@"+h});}
    addToast?.("@handle atualizado!","success");
    setShowHandle(false);
  };

  const totalDays=Object.keys(data.moments||{}).filter(d=>(data.moments[d]||[]).length>0).length;
  const totalMoments=Object.values(data.moments||{}).reduce((s,m)=>s+(m||[]).length,0);

  return(
    <>
      {showBackup&&<BackupModal data={data} profile={profile} password={password} onClose={()=>setShowBackup(false)} addToast={addToast}/>}
      {showCode&&<ConnectionCodeModal profile={profile} onClose={()=>setShowCode(false)}/>}

      <Modal title="Configurações" onClose={onClose} fullHeight>
        {/* Profile Card */}
        <div style={{textAlign:"center",paddingBottom:20,marginBottom:16,borderBottom:`1px solid ${C.headerBorder}`}}>
          <AvatarBubble src={profile.avatarSrc} emoji={profile.emoji} color={profile.avatarColor||C.purpleLight} size={68} ring/>
          <p style={{margin:"10px 0 2px",fontSize:16,fontWeight:700,color:C.text,fontFamily:PASSO}}>{profile.name}</p>
          <p style={{margin:"0 0 2px",fontSize:13,color:C.purple,fontWeight:600}}>{profile.handle||nameToHandle(profile.name)}</p>
          {profile.email&&<p style={{margin:0,fontSize:12,color:C.textLight}}>{profile.email}</p>}
          <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:10,flexWrap:"wrap"}}>
            <span style={{padding:"3px 10px",background:C.purpleLight,borderRadius:20,fontSize:11,color:C.purple}}>{totalDays} dias</span>
            <span style={{padding:"3px 10px",background:C.greenLight,borderRadius:20,fontSize:11,color:C.green}}>{totalMoments} momentos</span>
          </div>
        </div>

        {/* Tab nav */}
        <div style={{display:"flex",gap:6,marginBottom:20,overflowX:"auto",paddingBottom:4}}>
          {[["conta","Conta"],["dados","Meus Dados"],["notif","Notif."],["campos","Campos"],["sobre","Sobre"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{padding:"7px 14px",background:tab===k?C.purple:C.purpleLight,color:tab===k?C.white:C.purple,border:"none",borderRadius:20,fontWeight:600,cursor:"pointer",fontSize:12,flexShrink:0}}>{l}</button>
          ))}
        </div>

        {tab==="conta"&&<div>
          {/* ── Conta Google / Nuvem ── */}
          {(profile.cloud||getCachedUser())&&<div style={{background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:14,padding:"14px 16px",marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
              {getCachedUser()?.picture?<img src={getCachedUser().picture} alt="" style={{width:36,height:36,borderRadius:"50%"}}/>:<div style={{width:36,height:36,borderRadius:"50%",background:C.purpleLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>☁️</div>}
              <div style={{flex:1}}>
                <p style={{margin:0,fontSize:11,color:C.textMid,fontWeight:600,letterSpacing:".3px",textTransform:"uppercase"}}>Conta Google {profile.cloud?"· Nuvem ativa":""}</p>
                <p style={{margin:"2px 0 0",fontSize:13,color:C.text,fontWeight:500}}>{getCachedUser()?.email||profile.email||"—"}</p>
              </div>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {profile.cloud&&<button onClick={async()=>{
                const t=await cloudSync.tokenOrNull();
                if(!t){addToast?.("Faça login no Google novamente.","error");return;}
                await cloudSync.flushAll();
                const enc=safeLS.raw(`veeda_data_${profile.id}`);
                if(enc){try{await cloudData.save(profile.id,enc,t);addToast?.("Sincronizado com a nuvem ☁️","success");}catch{addToast?.("Falha ao sincronizar.","error");}}
              }} style={{flex:1,minWidth:120,padding:"9px 12px",background:C.purpleLight,color:C.purple,border:`1px solid ${C.purple}44`,borderRadius:10,cursor:"pointer",fontSize:12,fontWeight:600}}>☁️ Sincronizar agora</button>}
              <button onClick={()=>{
                clearGoogleAuth();
                addToast?.("Google desconectado. Seus dados locais continuam salvos.","info");
                onLogout();onClose();
              }} style={{flex:1,minWidth:120,padding:"9px 12px",background:"#fff",color:C.textMid,border:`1px solid ${C.cardBorder}`,borderRadius:10,cursor:"pointer",fontSize:12,fontWeight:600}}>Sair do Google</button>
            </div>
            <p style={{margin:"10px 0 0",fontSize:11,color:C.textLight,lineHeight:1.5}}>{profile.cloud?"Seus dias são enviados cifrados ao Google Drive (pasta privada do app). Só você, com sua senha, consegue ler.":"Este perfil é local. Entre com o Google para habilitar a nuvem."}</p>
          </div>}

          {showHandle?(
            <div style={{marginBottom:14}}>
              <label style={{fontSize:12,color:C.textMid,display:"block",marginBottom:6}}>Novo @handle</label>
              <div style={{position:"relative",marginBottom:handleErr?6:12}}>
                <span style={{position:"absolute",left:16,top:"50%",transform:"translateY(-50%)",color:C.purple,fontWeight:700,pointerEvents:"none"}}>@</span>
                <input value={handleInput} onChange={e=>{setHandleInput(sanitizeHandle(e.target.value));setHandleErr("");}} style={{paddingLeft:28}} autoFocus/>
              </div>
              {handleErr&&<p style={{fontSize:12,color:C.red,margin:"0 0 10px"}}>{handleErr}</p>}
              <div style={{display:"flex",gap:8}}>
                <Btn onClick={saveHandle} style={{flex:1,fontSize:13,padding:"10px 0"}}>Salvar</Btn>
                <Btn onClick={()=>setShowHandle(false)} variant="ghost" style={{flex:1}}>Cancelar</Btn>
              </div>
            </div>
          ):(
            <div>
              {[{label:"@handle",val:profile.handle||nameToHandle(profile.name),action:()=>setShowHandle(true)},{label:"E-mail",val:profile.email||"—"},{label:"Código de Conexão",val:"Compartilhar",action:()=>setShowCode(true)},{label:"Backup / Restaurar",val:"→",action:()=>setShowBackup(true)}].map((row,i,arr)=>(
                <div key={row.label}>
                  <button onClick={row.action} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 16px",background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:i===0?"14px 14px 0 0":i===arr.length-1?"0 0 14px 14px":"0",borderTop:i>0?"none":"",cursor:row.action?"pointer":"default",textAlign:"left"}}>
                    <span style={{fontSize:14,color:C.text}}>{row.label}</span>
                    <span style={{fontSize:13,color:row.action?C.purple:C.textLight}}>{row.val}</span>
                  </button>
                </div>
              ))}
            </div>
          )}
          <div style={{marginTop:16}}>
            <Btn onClick={()=>{onLogout();onClose();}} variant="danger">Sair da conta</Btn>
          </div>
        </div>}

        {tab==="dados"&&<div>
          <div style={{background:C.purpleLight,borderRadius:14,padding:16,marginBottom:16}}>
            <p style={{margin:"0 0 8px",fontSize:13,fontWeight:600,color:C.text}}>Histórico do mês atual</p>
            <p style={{margin:0,fontSize:12,color:C.textMid,lineHeight:1.6}}>Seus dados são salvos automaticamente a cada ação e protegidos por snapshots mensais. Nenhum dado do mês atual é perdido sem confirmação.</p>
          </div>
          <div style={{background:C.greenLight,borderRadius:14,padding:16,marginBottom:16,border:`1px solid ${C.green}44`}}>
            <p style={{margin:"0 0 6px",fontSize:13,fontWeight:600,color:C.green}}>✅ Dados protegidos {profile.cloud?"local + nuvem":"localmente"}</p>
            <p style={{margin:0,fontSize:12,color:C.textMid,lineHeight:1.6}}>Todos os seus {totalMoments} momentos estão seguros{profile.cloud?" no seu dispositivo e na sua conta Google (cifrados).":" no seu dispositivo. Use o Backup para proteger também em caso de troca de celular."}</p>
          </div>
          {/* Backups preservados (regra de ouro: nunca apagamos sem confirmação) */}
          {(()=>{const bkps=listPreservedBackups();if(!bkps.length)return null;return(
            <div style={{background:C.amberLight,borderRadius:14,padding:16,marginBottom:16,border:`1px solid ${C.amber}44`}}>
              <p style={{margin:"0 0 6px",fontSize:13,fontWeight:600,color:C.amber}}>📦 {bkps.length} backup(s) preservado(s) de versões anteriores</p>
              <p style={{margin:"0 0 10px",fontSize:12,color:C.textMid,lineHeight:1.6}}>Toda vez que o app fez uma migração importante (ex.: ativação da nuvem), uma cópia dos dados antigos foi guardada localmente. Estes backups nunca são apagados automaticamente.</p>
              {bkps.slice(0,3).map(b=>(
                <div key={b.key} style={{fontSize:11,color:C.textMid,padding:"4px 0",borderTop:`1px dashed ${C.amber}33`}}>{new Date(b.ts).toLocaleString("pt-BR")} · {b.label} · {b.size} chave(s)</div>
              ))}
            </div>
          );})()}
          <Btn onClick={()=>setShowBackup(true)}>Gerenciar Backup</Btn>
        </div>}

        {tab==="notif"&&<div>
          <div style={{background:C.purpleLight,borderRadius:14,padding:16,marginBottom:16}}>
            <p style={{margin:"0 0 8px",fontSize:13,fontWeight:600,color:C.text}}>Notificações</p>
            <p style={{margin:"0 0 12px",fontSize:12,color:C.textMid,lineHeight:1.6}}>Receba alertas quando alguém compartilhar o dia com você e para seus lembretes.</p>
            <Btn onClick={async()=>{const ok=await requestNotifPermission();addToast?.(ok?"Notificações ativadas! 🔔":"Permissão negada.",ok?"success":"error");}}>🔔 Ativar notificações</Btn>
          </div>
          <Btn onClick={()=>{onSave({...data,reminders:[]});addToast?.("Lembretes limpos.","info");}} variant="outline">Limpar lembretes</Btn>
        </div>}

        {tab==="campos"&&(()=>{
          const ANON_KEY="sb_publishable_eG_eU0eEuya4dOY2Y2OK6w_riRnPpD3";
          const SB_URL="https://rkinwvdbomllztixdtar.supabase.co";
          const hdrs={"apikey":ANON_KEY,"Authorization":"Bearer "+ANON_KEY,"Content-Type":"application/json","Prefer":"return=representation"};
          const handle=(profile.handle||nameToHandle(profile.name)).replace(/^@/,"");

          const [fields,setFields]=useState(null);
          const [showAdd,setShowAdd]=useState(false);
          const [editId,setEditId]=useState(null);
          const [fLabel,setFLabel]=useState("");
          const [fValue,setFValue]=useState("");
          const [fVis,setFVis]=useState("public");
          const [kgSugg,setKgSugg]=useState([]);
          const [kgTimer,setKgTimer]=useState(null);
          const [saving,setSaving]=useState(false);

          useEffect(()=>{
            fetch(`${SB_URL}/rest/v1/profile_fields?handle=eq.${encodeURIComponent(handle)}&order=field_key`,{headers:hdrs})
              .then(r=>r.json()).then(d=>setFields(Array.isArray(d)?d:[])).catch(()=>setFields([]));
          },[]);

          const resetForm=()=>{setShowAdd(false);setEditId(null);setFLabel("");setFValue("");setFVis("public");setKgSugg([]);};

          const handleValueChange=(v)=>{
            setFValue(v);
            if(kgTimer)clearTimeout(kgTimer);
            if(v.length>=3&&window._GOOGLE_KG_KEY){
              const t=setTimeout(()=>{
                fetch(`https://kgsearch.googleapis.com/v1/entities:search?query=${encodeURIComponent(v)}&key=${window._GOOGLE_KG_KEY}&limit=5&indent=True`)
                  .then(r=>r.json()).then(d=>{
                    const names=(d.itemListElement||[]).map(e=>e.result&&e.result.name).filter(Boolean);
                    setKgSugg(names);
                  }).catch(()=>setKgSugg([]));
              },400);
              setKgTimer(t);
            } else {
              setKgSugg([]);
            }
          };

          const saveField=async()=>{
            if(!fLabel.trim()||!fValue.trim())return;
            setSaving(true);
            try{
              if(editId){
                await fetch(`${SB_URL}/rest/v1/profile_fields?id=eq.${editId}`,{method:"PATCH",headers:hdrs,body:JSON.stringify({value:fValue,visibility:fVis})});
                setFields(f=>f.map(x=>x.id===editId?{...x,value:fValue,visibility:fVis}:x));
              } else {
                const key=fLabel.toLowerCase().replace(/\s+/g,"_");
                const res=await fetch(`${SB_URL}/rest/v1/profile_fields`,{method:"POST",headers:hdrs,body:JSON.stringify({handle,field_key:key,label:fLabel,value:fValue,visibility:fVis,user_id:profile.id})});
                const data=await res.json();
                setFields(f=>[...( f||[]),...(Array.isArray(data)?data:[data])]);
              }
              resetForm();
              addToast?.("Campo salvo!","success");
            }catch(e){addToast?.("Erro ao salvar campo.","error");}
            setSaving(false);
          };

          const deleteField=async(id)=>{
            await fetch(`${SB_URL}/rest/v1/profile_fields?id=eq.${id}`,{method:"DELETE",headers:hdrs});
            setFields(f=>f.filter(x=>x.id!==id));
            addToast?.("Campo removido.","info");
          };

          const visLabel=(v)=>v==="public"?"🌐 Público":v==="contacts"?"👥 Contatos":"🔒 Só eu";
          const visBg=(v)=>v==="public"?C.purpleLight:v==="contacts"?C.greenLight:"#f3f3f3";
          const visCol=(v)=>v==="public"?C.purple:v==="contacts"?C.green:C.textMid;

          return(
            <div>
              <p style={{fontSize:13,color:C.textMid,marginBottom:16,lineHeight:1.6}}>Adicione campos ao seu perfil (cidade, profissão, hobby…) visíveis para quem você escolher.</p>
              {fields===null&&<p style={{fontSize:13,color:C.textMid}}>Carregando…</p>}
              {fields!==null&&fields.length===0&&!showAdd&&<p style={{fontSize:13,color:C.textMid,marginBottom:12}}>Nenhum campo ainda.</p>}
              {(fields||[]).map(f=>(
                <div key={f.id} style={{background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:12,padding:"12px 14px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between",gap:8}}>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:11,color:C.textMid,marginBottom:2,fontWeight:600,textTransform:"uppercase",letterSpacing:".3px"}}>{f.label}</div>
                    <div style={{fontSize:14,color:C.text,fontWeight:500,wordBreak:"break-word"}}>{f.value}</div>
                    <span style={{display:"inline-block",marginTop:4,padding:"2px 8px",background:visBg(f.visibility),color:visCol(f.visibility),borderRadius:20,fontSize:10,fontWeight:600}}>{visLabel(f.visibility)}</span>
                  </div>
                  <div style={{display:"flex",gap:6,flexShrink:0}}>
                    <button onClick={()=>{setEditId(f.id);setFLabel(f.label);setFValue(f.value);setFVis(f.visibility);setShowAdd(true);setKgSugg([]);}} style={{padding:"5px 10px",background:C.purpleLight,color:C.purple,border:"none",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600}}>Editar</button>
                    <button onClick={()=>deleteField(f.id)} style={{padding:"5px 10px",background:"#fff0f0",color:"#c0392b",border:"none",borderRadius:8,cursor:"pointer",fontSize:12,fontWeight:600}}>Excluir</button>
                  </div>
                </div>
              ))}
              {showAdd?(
                <div style={{background:C.white,border:`1px solid ${C.purple}44`,borderRadius:14,padding:16,marginTop:8}}>
                  <p style={{margin:"0 0 12px",fontSize:14,fontWeight:700,color:C.text}}>{editId?"Editar campo":"Novo campo"}</p>
                  <label style={{fontSize:12,color:C.textMid,display:"block",marginBottom:4}}>Rótulo (ex.: Cidade, Profissão)</label>
                  <input value={fLabel} onChange={e=>setFLabel(e.target.value)} disabled={!!editId} placeholder="Cidade" style={{width:"100%",marginBottom:12,padding:"9px 12px",borderRadius:10,border:`1px solid ${C.cardBorder}`,fontSize:14,boxSizing:"border-box",opacity:editId?.6:1}}/>
                  <label style={{fontSize:12,color:C.textMid,display:"block",marginBottom:4}}>Valor</label>
                  <div style={{position:"relative",marginBottom:12}}>
                    <input value={fValue} onChange={e=>handleValueChange(e.target.value)} placeholder="São Paulo…" style={{width:"100%",padding:"9px 12px",borderRadius:10,border:`1px solid ${C.cardBorder}`,fontSize:14,boxSizing:"border-box"}}/>
                    {kgSugg.length>0&&(
                      <div style={{position:"absolute",top:"100%",left:0,right:0,background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:10,zIndex:99,boxShadow:"0 4px 16px #0002",overflow:"hidden"}}>
                        {kgSugg.map((s,i)=>(
                          <div key={i} onClick={()=>{setFValue(s);setKgSugg([]);}} style={{padding:"9px 12px",cursor:"pointer",fontSize:13,color:C.text,borderBottom:i<kgSugg.length-1?`1px solid ${C.cardBorder}`:"none"}}
                            onMouseEnter={e=>e.currentTarget.style.background=C.purpleLight}
                            onMouseLeave={e=>e.currentTarget.style.background=""}>{s}</div>
                        ))}
                      </div>
                    )}
                  </div>
                  <label style={{fontSize:12,color:C.textMid,display:"block",marginBottom:4}}>Visibilidade</label>
                  <select value={fVis} onChange={e=>setFVis(e.target.value)} style={{width:"100%",marginBottom:16,padding:"9px 12px",borderRadius:10,border:`1px solid ${C.cardBorder}`,fontSize:14,background:C.white,boxSizing:"border-box"}}>
                    <option value="public">🌐 Público</option>
                    <option value="contacts">👥 Contatos</option>
                    <option value="only_me">🔒 Só eu</option>
                  </select>
                  <div style={{display:"flex",gap:8}}>
                    <Btn onClick={saveField} style={{flex:1}} disabled={saving}>{saving?"Salvando…":"Salvar"}</Btn>
                    <Btn onClick={resetForm} variant="ghost" style={{flex:1}}>Cancelar</Btn>
                  </div>
                </div>
              ):(
                <button onClick={()=>{resetForm();setShowAdd(true);}} style={{width:"100%",padding:"11px 0",marginTop:8,background:C.purpleLight,color:C.purple,border:`1px dashed ${C.purple}66`,borderRadius:12,cursor:"pointer",fontSize:13,fontWeight:600}}>+ Adicionar campo</button>
              )}
            </div>
          );
        })()}

        {tab==="sobre"&&<div>
          <div style={{background:`linear-gradient(135deg,${C.purpleLight},${C.blueLight})`,borderRadius:14,padding:20,textAlign:"center",marginBottom:16}}>
            <p style={{fontFamily:PASSO,fontSize:32,fontWeight:700,color:C.purple,margin:"0 0 4px"}}>Veeda</p>
            <p style={{fontSize:12,color:C.textMid,margin:0}}>v{APP_VERSION} — Dias de Vida</p>
          </div>
          <p style={{fontSize:13,color:C.textMid,lineHeight:1.7,marginBottom:16}}>Veeda nasce da crença de que a vida não cabe em um feed. Viva primeiro, registre, compartilhe depois com quem realmente importa. Seus dados ficam sempre no seu dispositivo.</p>
        </div>}
      </Modal>
    </>
  );
}

function ProfileModal({profile: viewedProfile, myProfile, contacts, receivedDays, onClose, addToast}) {
  const [profileFields,setProfileFields]=useState(null);
  const _pfHandle=(viewedProfile.handle||"").replace(/^@/,"");
  useEffect(()=>{
    if(!_pfHandle)return;
    const ANON_KEY="sb_publishable_eG_eU0eEuya4dOY2Y2OK6w_riRnPpD3";
    const SB_URL="https://rkinwvdbomllztixdtar.supabase.co";
    fetch(`${SB_URL}/rest/v1/profile_fields?handle=eq.${encodeURIComponent(_pfHandle)}&order=field_key`,{headers:{"apikey":ANON_KEY,"Authorization":"Bearer "+ANON_KEY}})
      .then(r=>r.json()).then(d=>setProfileFields(Array.isArray(d)?d:[])).catch(()=>setProfileFields([]));
  },[_pfHandle]);

  // Verificar se o perfil visualizado está no círculo de contatos
  const isInCircle = contacts.some(c => c.handle === viewedProfile.handle || c.id === viewedProfile.id);

  if (!isInCircle) {
    return (
      <Modal title="Perfil Privado" onClose={onClose}>
        <div style={{textAlign: 'center', padding: '40px 20px'}}>
          <div style={{fontSize: '48px', marginBottom: '16px'}}>🔒</div>
          <p style={{margin: '0 0 8px', fontSize: '16px', fontWeight: '600', color: C.text}}>
            Perfil Privado
          </p>
          <p style={{margin: 0, fontSize: '14px', color: C.textMid, lineHeight: 1.5}}>
            Este perfil só pode ser visualizado por pessoas do círculo.
            Adicione {viewedProfile.name} ao seu Meu Círculo para ver o perfil completo.
          </p>
        </div>
        <Btn onClick={onClose} style={{marginTop: '20px'}}>Entendi</Btn>
      </Modal>
    );
  }

  // Calcular estatísticas do perfil
  const totalDaysShared = receivedDays.filter(d => d.handle === viewedProfile.handle).length;
  const totalMoments = receivedDays
    .filter(d => d.handle === viewedProfile.handle)
    .reduce((sum, d) => sum + (d.moments?.length || 0), 0);

  const lastSharedDate = receivedDays
    .filter(d => d.handle === viewedProfile.handle)
    .sort((a, b) => new Date(b.date) - new Date(a.date))[0]?.date;

  return (
    <Modal title={`Perfil de ${viewedProfile.name}`} onClose={onClose} fullHeight>
      <div style={{paddingBottom: '20px'}}>
        {/* Header do perfil */}
        <div style={{
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'center',
          padding: '20px 0',
          borderBottom: `1px solid ${C.headerBorder}`,
          marginBottom: '24px'
        }}>
          <AvatarBubble
            src={viewedProfile.avatarSrc}
            emoji={viewedProfile.emoji || '🌿'}
            color={viewedProfile.avatarColor || C.purpleLight}
            size={80}
            ring
          />
          <h2 style={{
            margin: '16px 0 4px',
            fontSize: '20px',
            fontWeight: '700',
            color: C.text,
            fontFamily: PASSO,
            textAlign: 'center'
          }}>
            {viewedProfile.name}
          </h2>
          <p style={{
            margin: 0,
            fontSize: '14px',
            color: C.purple,
            fontWeight: '500'
          }}>
            @{viewedProfile.handle || nameToHandle(viewedProfile.name)}
          </p>
        </div>

        {/* Campos do perfil */}
        {profileFields&&profileFields.filter(f=>{
          if(f.visibility==="only_me") return viewedProfile.id===myProfile?.id;
          if(f.visibility==="contacts") return isInCircle||viewedProfile.id===myProfile?.id;
          return true;
        }).length>0&&(
          <div style={{marginBottom:24}}>
            <h3 style={{margin:"0 0 12px",fontSize:16,fontWeight:600,color:C.text,fontFamily:PASSO}}>Campos do perfil</h3>
            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              {profileFields.filter(f=>{
                if(f.visibility==="only_me") return viewedProfile.id===myProfile?.id;
                if(f.visibility==="contacts") return isInCircle||viewedProfile.id===myProfile?.id;
                return true;
              }).map(f=>(
                <div key={f.id} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:10}}>
                  <span style={{fontSize:13,color:C.textMid,fontWeight:600}}>{f.label}</span>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:14,color:C.text}}>{f.value}</span>
                    <span style={{fontSize:11,opacity:.6}}>{f.visibility==="public"?"🌐":f.visibility==="contacts"?"👥":"🔒"}</span>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* Estatísticas */}
        <div style={{marginBottom: '24px'}}>
          <h3 style={{
            margin: '0 0 16px',
            fontSize: '16px',
            fontWeight: '600',
            color: C.text,
            fontFamily: PASSO
          }}>
            Estatísticas
          </h3>
          <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px'}}>
            <Card style={{textAlign: 'center', padding: '16px'}}>
              <div style={{fontSize: '24px', marginBottom: '4px'}}>📅</div>
              <div style={{fontSize: '18px', fontWeight: '700', color: C.purple}}>{totalDaysShared}</div>
              <div style={{fontSize: '12px', color: C.textMid}}>Dias compartilhados</div>
            </Card>
            <Card style={{textAlign: 'center', padding: '16px'}}>
              <div style={{fontSize: '24px', marginBottom: '4px'}}>💭</div>
              <div style={{fontSize: '18px', fontWeight: '700', color: C.purple}}>{totalMoments}</div>
              <div style={{fontSize: '12px', color: C.textMid}}>Momentos registrados</div>
            </Card>
          </div>
        </div>

        {/* Última atividade */}
        {lastSharedDate && (
          <div style={{marginBottom: '24px'}}>
            <h3 style={{
              margin: '0 0 12px',
              fontSize: '16px',
              fontWeight: '600',
              color: C.text,
              fontFamily: PASSO
            }}>
              Última atividade
            </h3>
            <Card style={{padding: '16px'}}>
              <div style={{display: 'flex', alignItems: 'center', gap: '12px'}}>
                <div style={{fontSize: '20px'}}>🌱</div>
                <div>
                  <p style={{margin: 0, fontSize: '14px', fontWeight: '500', color: C.text}}>
                    Compartilhou um dia
                  </p>
                  <p style={{margin: '2px 0 0', fontSize: '12px', color: C.textMid}}>
                    {fmtFull(lastSharedDate)}
                  </p>
                </div>
              </div>
            </Card>
          </div>
        )}

        {/* Dias compartilhados recentes */}
        {totalDaysShared > 0 && (
          <div style={{marginBottom: '24px'}}>
            <h3 style={{
              margin: '0 0 12px',

function ScreenPassword({profile,onSuccess,onBack,onForgot}){
  const [pw,setPw]=useState("");const [err,setErr]=useState("");const [loading,setLoading]=useState(false);
  const attempt=async()=>{
    if(!pw.trim())return;setLoading(true);setErr("");
    const hash=await hashPw(pw.trim());
    if(hash!==profile.passwordHash){setErr("Senha incorreta.");setPw("");setLoading(false);return;}
    onSuccess(pw.trim());
    if(window.VeedaSupabase?.isReady()){
      VeedaSupabase.auth.signIn(profile.handle,hash)
        .then(async({error})=>{
          if(error){
            console.warn("[Veeda auth] signIn falhou, tentando signUp:",error.message);
            const su=await VeedaSupabase.auth.signUp(profile.handle,hash);
            if(su?.error)console.error("[Veeda auth] signUp falhou:",su.error.message);

          <span style={{position:"absolute",left:16,top:"50%",transform:"translateY(-50%)",fontSize:15,color:C.purple,fontWeight:700,pointerEvents:"none"}}>@</span>
          <input value={handle} onChange={e=>{setHandleManual(true);setHandle(sanitizeHandle(e.target.value));setHandleErr("");}} placeholder="seuhandle" style={{paddingLeft:30,border:`1.5px solid ${handleErr?C.red:C.cardBorder}`}}/>
        </div>
        {handleErr&&<p style={{fontSize:12,color:C.red,margin:"-16px 0 12px",fontWeight:500}}>{handleErr}</p>}
        {handle&&!handleErr&&<p style={{fontSize:12,color:C.green,margin:"-14px 0 14px"}}>✓ @{handle}</p>}
        <Btn onClick={()=>{
          if(!name.trim()){setErr("Informe seu nome.");return;}
          const h=handle||sanitizeHandle(name);
          if(h.length<3){setHandleErr("Handle muito curto (mín. 3 car.).");return;}
          if(!isHandleAvailable("@"+h,null)){setHandleErr("Este @handle já está em uso.");return;}
          setErr("");setStep(2);
        }}>Continuar</Btn>
        {err&&<p style={{fontSize:13,color:C.red,marginTop:10,textAlign:"center"}}>{err}</p>}
      </div>}

      {step===2&&<div style={{animation:"fadeIn .25s ease"}}>
        <p style={{fontSize:18,fontWeight:700,color:C.text,marginBottom:4,fontFamily:PASSO}}>Seu avatar</p>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          <input ref={photoRef} type="file" accept="image/*" capture="user" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)readFile(f,setAvatarSrc);}}/>
          <input ref={galleryRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)readFile(f,setAvatarSrc);}}/>
          <button onClick={()=>photoRef.current.click()} style={{flex:1,padding:"10px 0",background:C.blueLight,color:C.blue,border:`1px solid ${C.blueMid}`,borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:500}}>📷 Câmera</button>
          <button onClick={()=>galleryRef.current.click()} style={{flex:1,padding:"10px 0",background:C.purpleLight,color:C.purple,border:`1px solid ${C.purpleMid}`,borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:500}}>🖼️ Galeria</button>
        </div>
        {avatarSrc?<div style={{display:"flex",justifyContent:"center",marginBottom:14}}><div style={{position:"relative"}}><AvatarBubble src={avatarSrc} size={80} ring/><button onClick={()=>setAvatarSrc(null)} style={{position:"absolute",top:-4,right:-4,width:22,height:22,borderRadius:"50%",background:C.red,color:"#fff",border:"none",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center"}}>×</button></div></div>
        :<div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:12}}>{AVATAR_EMOJIS.map(e=><button key={e} onClick={()=>setEmoji(e)} style={{fontSize:20,background:emoji===e?C.purpleLight:"#F5F3FB",border:`2px solid ${emoji===e?C.purple:C.cardBorder}`,borderRadius:10,width:44,height:44,cursor:"pointer"}}>{e}</button>)}</div>
          <div style={{display:"flex",gap:8,marginBottom:14}}>{AVATAR_COLORS.map(col=><button key={col} onClick={()=>setAvatarColor(col)} style={{width:36,height:36,borderRadius:"50%",background:col,border:`3px solid ${avatarColor===col?C.purple:C.cardBorder}`,cursor:"pointer"}}/>)}</div>
          <div style={{display:"flex",justifyContent:"center",marginBottom:16}}><AvatarBubble emoji={emoji} color={avatarColor} size={70} ring/></div>
        </div>}
        <Btn onClick={()=>setStep(3)}>Continuar</Btn>
      </div>}

      {step===3&&<div style={{animation:"fadeIn .25s ease"}}>
        <p style={{fontSize:18,fontWeight:700,color:C.text,marginBottom:4,fontFamily:PASSO}}>Crie sua senha</p>
        <p style={{fontSize:13,color:C.textMid,marginBottom:20,lineHeight:1.5}}>Sua senha criptografa todos os seus Dias de Veeda localmente.</p>
        <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr("");}} placeholder="Mínimo 6 caracteres" style={{marginBottom:12}}/>
        <input type="password" value={pw2} onChange={e=>{setPw2(e.target.value);setErr("");}} placeholder="Confirmar senha" style={{border:`1.5px solid ${err?C.red:C.cardBorder}`,marginBottom:err?6:14}}/>
        {err&&<p style={{fontSize:13,color:C.red,margin:"0 0 12px",fontWeight:500}}>{err}</p>}
        <Btn onClick={()=>{if(pw.length<6){setErr("Mínimo 6 caracteres.");return;}if(pw!==pw2){setErr("As senhas não coincidem.");return;}setErr("");setStep(4);}}>Continuar</Btn>
      </div>}

      {step===4&&<div style={{animation:"fadeIn .25s ease"}}>
        <p style={{fontSize:18,fontWeight:700,color:C.text,marginBottom:4,fontFamily:PASSO}}>Código de recuperação</p>
        <p style={{fontSize:13,color:C.textMid,marginBottom:20,lineHeight:1.5}}><strong style={{color:C.text}}>Anote agora.</strong> É o único jeito de recuperar seus dados se esquecer a senha.</p>
        <div style={{background:`linear-gradient(135deg,${C.purpleLight},${C.blueLight})`,border:`2px solid ${C.purpleMid}`,borderRadius:16,padding:"22px",textAlign:"center",marginBottom:14}}>
          <p style={{margin:"0 0 6px",fontSize:10,color:C.textMid,fontWeight:600,letterSpacing:"1px",textTransform:"uppercase"}}>Seu código secreto</p>
          <p style={{margin:0,fontSize:20,fontWeight:700,color:C.purple,letterSpacing:"2px",fontFamily:"monospace"}}>{code}</p>
        </div>
        <button onClick={()=>{navigator.clipboard?.writeText(code);setCopied(true);setTimeout(()=>setCopied(false),2500);}} style={{width:"100%",padding:"11px 0",marginBottom:20,background:copied?"#E8FBF0":"#fff",color:copied?C.green:C.purple,border:`2px solid ${copied?C.green:C.purple}`,borderRadius:12,fontWeight:600,fontSize:14,cursor:"pointer"}}>{copied?"✓ Copiado!":"Copiar código"}</button>
        <CheckboxConfirm checked={confirmed} hasError={!!err&&!confirmed} onChange={v=>{setConfirmed(v);if(v)setErr("");}} label="Anotei meu código de recuperação em um lugar seguro."/>
        {err&&<p style={{fontSize:13,color:C.red,margin:"-10px 0 12px",fontWeight:500}}>{err}</p>}
        <Btn onClick={finish} disabled={loading}>{loading?<><Spinner size={16} color="#fff"/>Criando conta…</>:"Entrar no Veeda 🌿"}</Btn>
      </div>}
    </div>
  );
}

function ScreenForgot({profile,onSuccess,onBack}){
  const [step,setStep]=useState(1);const [code,setCode]=useState("");const [pw,setPw]=useState("");const [pw2,setPw2]=useState("");const [err,setErr]=useState("");const [loading,setLoading]=useState(false);
  const verify=async()=>{setLoading(true);setErr("");const h=await hashPw(code.trim().toUpperCase());if(h!==profile.recoveryHash){setErr("Código incorreto.");setLoading(false);return;}setStep(2);setLoading(false);};
  const reset=async()=>{if(pw.length<6){setErr("Mínimo 6 caracteres.");return;}if(pw!==pw2){setErr("Não coincidem.");return;}setLoading(true);try{const stored=safeLS.raw(`veeda_data_${profile.id}`);let d=EMPTY_DATA();try{const r=await decryptObj(stored,code.trim().toUpperCase());d=r.data;}catch{}const ps=loadProfiles();const idx=ps.findIndex(p=>p.id===profile.id);if(idx>=0){ps[idx].passwordHash=await hashPw(pw);saveProfiles(ps);}const enc=await encryptObj(d,pw);safeLS.rawSet(`veeda_data_${profile.id}`,enc);onSuccess(pw);}catch{setErr("Erro ao redefinir.");setLoading(false);}};
  return(
    <div style={{maxWidth:400,margin:"0 auto",padding:"2.5rem 1.25rem",background:C.bg,minHeight:"100vh"}}>
      <Btn onClick={onBack} variant="ghost" style={{width:"auto",marginBottom:24}}>‹ Voltar</Btn>
      <div style={{textAlign:"center",marginBottom:24}}><AvatarBubble src={profile.avatarSrc} emoji={profile.emoji} color={profile.avatarColor||C.purpleLight} size={64} ring/><p style={{margin:"10px 0 0",fontSize:16,fontWeight:700,color:C.text}}>{profile.name}</p></div>
      <div style={{background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:16,padding:"20px"}}>
        {step===1&&<div><p style={{fontSize:15,fontWeight:600,color:C.text,margin:"0 0 14px"}}>Código de recuperação</p><input value={code} onChange={e=>{setCode(e.target.value);setErr("");}} placeholder="XXXX-XXXX-XXXX-XXXX" style={{fontFamily:"monospace",letterSpacing:"1px",marginBottom:err?6:14}}/>{err&&<p style={{fontSize:13,color:C.red,margin:"0 0 12px",fontWeight:500}}>{err}</p>}<Btn onClick={verify} disabled={loading}>{loading?<><Spinner/>Verificando…</>:"Verificar"}</Btn></div>}
        {step===2&&<div><p style={{fontSize:15,fontWeight:600,color:C.text,margin:"0 0 14px"}}>Nova senha</p><input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr("");}} placeholder="Nova senha" style={{marginBottom:12}}/><input type="password" value={pw2} onChange={e=>{setPw2(e.target.value);setErr("");}} placeholder="Confirmar" style={{marginBottom:err?6:14}}/>{err&&<p style={{fontSize:13,color:C.red,margin:"0 0 12px",fontWeight:500}}>{err}</p>}<Btn onClick={reset} disabled={loading}>{loading?<><Spinner/>Salvando…</>:"Redefinir senha"}</Btn></div>}
      </div>
    </div>
  );
}

// VEEDA MAIN APP — veeda-app.js
// Edite este arquivo para: VeedaApp (componente principal),

// MAIN APP
// ═══════════════════════════════════════════════════
function VeedaApp({profile,password,onLogout,onUpdateProfile}){
  const {addToast,ToastContainer}=useToast();
  const dataKey=`veeda_data_${profile.id}`;

  // ── State ──────────────────────────────────────
  const [data,setData]=useState(null);
  const [hydratedData,setHydratedData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState("hoje");
  const [dayOffset,setDayOffset]=useState(0);
  const [addType,setAddType]=useState("texto");
  const [addContent,setAddContent]=useState("");
  const [addCaption,setAddCaption]=useState("");
  const [addMedia,setAddMedia]=useState(null);
  const [addTags,setAddTags]=useState([]);
  const [addLocation,setAddLocation]=useState(null);
  const [addPrivate,setAddPrivate]=useState(false);
  const [showModal,setShowModal]=useState(false);
  const [showMusicPicker,setShowMusicPicker]=useState(false);
  const [showDrawing,setShowDrawing]=useState(false);
  const [showVoice,setShowVoice]=useState(false);
  const [showEditDay,setShowEditDay]=useState(false);
  const [showFeeling,setShowFeeling]=useState(false);
  const [showAvatar,setShowAvatar]=useState(false);
  const [showInvite,setShowInvite]=useState(false);
  const [showInviteApp,setShowInviteApp]=useState(false);
  const [confirmContactIdx,setConfirmContactIdx]=useState(null);
  const [connRequests,setConnRequests]=useState([]);
  const checkConnRequests=useCallback(()=>{
    const myH=(profile.handle||nameToHandle(profile.name)).replace(/^@/,"");
    const reqs=safeLS.get(`veeda_conn_requests_${myH}`,[]);
    setConnRequests(reqs);
  },[profile]);
  const [pullY,setPullY]=useState(0);
  const [refreshing,setRefreshing]=useState(false);
  const pullRef=useRef({startY:0,active:false});
  const [showGroupName,setShowGroupName]=useState(false);
  const [showShare,setShowShare]=useState(false);
  const [showReminders,setShowReminders]=useState(false);
  const [showEvents,setShowEvents]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [viewRec,setViewRec]=useState(null);
  const [pendingNotif,setPendingNotif]=useState(null);
  const [expandedMoment,setExpandedMoment]=useState(null);
  const [nowPlaying,setNowPlaying]=useState(null);
  // Estado separado para visualização read-only de REGISTROS de PESSOAS DO MEU CÍRCULO
  const [expandedRecMoment,setExpandedRecMoment]=useState(null);
  const [viewProfile,setViewProfile]=useState(null);
  const [newGroup,setNewGroup]=useState("");
  const [lastId,setLastId]=useState(null);
  const [now,setNow]=useState(new Date());
  const [unreadCount,setUnreadCount]=useState(0);
  const [pendingAddCode,setPendingAddCode]=useState(null);
  const [pendingSharedDay,setPendingSharedDay]=useState(null);
  const [showAcceptSharedDay,setShowAcceptSharedDay]=useState(false);

  const sessionKey=useRef(null);
  const sessionSalt=useRef(null);
  const dataRef=useRef(null); // always points to latest data — used by stale callbacks
  const vidRef=useRef(),photoRef=useRef(),galleryRef=useRef(),lastRef=useRef(null),touchX=useRef(null);

  // ── Data load ──────────────────────────────────
  useEffect(()=>{
    (async()=>{
      try{
        // 1) Se temos token Google e este perfil está marcado como cloud,
        //    tenta sincronizar do Drive ANTES de carregar o local.
        const gTok=await cloudSync.tokenOrNull();
        if(gTok&&profile.cloud){
          try{
            const res=await cloudSync.pullOnBoot(profile.id,password,gTok);
            if(res?.used==="remote"){
              addToast?.("Dados sincronizados da nuvem ☁️","success");
            }
          }catch(e){console.warn("pullOnBoot failed",e);}
        }
        const raw=safeLS.raw(dataKey);
        if(raw){
          try{
            const{key,salt,data:d}=await decryptObj(raw,password);
            sessionKey.current=key;sessionSalt.current=salt;
            setData(migrateData(d));
            runBootMigrations(profile.id,raw);
            applyAdminConfig();
          }catch(decErr){
            const snap=await loadLatestSnapshot(profile.id,password);
            if(snap){
              sessionKey.current=snap.key;sessionSalt.current=snap.salt;
              setData(migrateData(snap.data));
              addToast?.("Dados recuperados do snapshot mensal ✅","success");
            } else { throw decErr; }
          }
        } else {
          // Sem dados locais — tenta recuperar snapshot antes de criar vazio
          const snap=await loadLatestSnapshot(profile.id,password);
          if(snap){
            sessionKey.current=snap.key;sessionSalt.current=snap.salt;
            setData(migrateData(snap.data));
            addToast?.("Dados restaurados do backup mensal ✅","success");
          } else {
            // Realmente novo usuário — cria dados vazios (nunca empurra nuvem com vazio)
            const d=EMPTY_DATA();
            const enc=await encryptObj(d,password);
            const{key,salt}=await decryptObj(enc,password);
            sessionKey.current=key;sessionSalt.current=salt;
            setData(d);
            safeLS.rawSet(dataKey,enc);
            saveMonthlySnapshot(profile.id,enc);
            // Só envia para nuvem se for conta nova com dados reais (não vazio)
            if(gTok&&profile.cloud){cloudSync.queuePush(profile.id,enc);}
          }
        }
      }catch(fatalErr){
        console.error("Boot error — tentando recuperar snapshot",fatalErr);
        try{
          const snap=await loadLatestSnapshot(profile.id,password);
          if(snap){
            sessionKey.current=snap.key;sessionSalt.current=snap.salt;
            setData(migrateData(snap.data));
            addToast?.("Dados recuperados do backup mensal ✅","success");
          } else {
            // Só cria dados vazios se realmente não havia nada salvo (novo usuário)
            const rawCheck=safeLS.raw(dataKey);
            if(!rawCheck){setData(EMPTY_DATA());}
            else{setData(EMPTY_DATA());} // dados corrompidos e sem backup — último recurso
          }
        }catch{setData(EMPTY_DATA());}
      }
      setLoading(false);
    })();
    const t=setInterval(()=>setNow(new Date()),30000);
    // Listen for cross-tab inbox updates
    const onStorage=e=>{
      const myH=(profile.handle||nameToHandle(profile.name)).replace(/^@/,"");
      if(e.key===`veeda_inbox_${myH}`||e.key===`veeda_inbox_${profile.id}`){checkInbox();}
    };
    window.addEventListener("storage",onStorage);
    return()=>{clearInterval(t);window.removeEventListener("storage",onStorage);};
  },[]);

  const checkInbox=useCallback(()=>{
    if(!data)return;
    const myH=(profile.handle||nameToHandle(profile.name)).replace(/^@/,"");
    for(const k of[`veeda_inbox_${myH}`,`veeda_inbox_${profile.id}`]){
      const inbox=safeLS.get(k,[]);
      if(inbox.length>0){
        const notif=inbox[0];
        if(!(data.received||[]).find(r=>r.date===notif.date&&r.author===notif.author&&r.importedAt===notif.importedAt)){
          setPendingNotif(notif);
          setUnreadCount(c=>c+1);
          showNativeNotif("Veeda",`${notif.author} compartilhou o dia com você! 🌿`);
          break;
        }
      }
    }
  },[data,profile]);

  useEffect(()=>{if(data&&!loading)checkInbox();},[data,loading]);

  // Keep dataRef always up-to-date so stale interval callbacks read fresh data
  useEffect(()=>{dataRef.current=data;},[data]);

  // ── Supabase: sync cross-device ──────────────────────────
  const sbChannels=useRef([]);

  // ── Auto-heal de sessão Supabase ─────────────────────────
  // Garante que toda vez que o app carrega, há sessão Supabase válida.
  // Sem isso, RLS bloqueia tudo e o cross-device falha silenciosamente.
  useEffect(()=>{
    if(!profile||!window.VeedaSupabase?.isReady())return;
    let cancelled=false;
    (async()=>{
      try{
        const sess=await VeedaSupabase.auth.getSession();
        if(sess&&!cancelled){
          // Sessão existe — garante que perfil está espelhado
          await VeedaSupabase.profiles.register(profile).catch(()=>{});
          return;
        }
        if(!profile.passwordHash){console.warn("[Veeda heal] perfil sem passwordHash, não dá para autenticar");return;}
        console.log("[Veeda heal] sem sessão Supabase, restabelecendo...");
        const ok=await VeedaSupabase.auth.ensureAuth(profile.handle,profile.passwordHash);
        if(!ok){console.warn("[Veeda heal] ensureAuth falhou — RLS vai bloquear sync");return;}
        console.log("[Veeda heal] sessão restabelecida");
        if(!cancelled)await VeedaSupabase.profiles.register(profile).catch(()=>{});
      }catch(e){console.warn("[Veeda heal]",e);}
    })();
    return()=>{cancelled=true;};
  },[profile]);

  const syncFromSupabase=useCallback(async()=>{
    // Use dataRef.current so this stable callback always reads the latest data,
    // even when called from the 30-second interval (which holds a stale closure).
    const currentData=dataRef.current;
    if(!window.VeedaSupabase?.isReady()||!currentData)return;
    const myH=(profile.handle||nameToHandle(profile.name)).replace(/^@/,"");
    const MAX_C=5; // MAX_CONTACTS_BETA
    try{
      // Dias compartilhados recebidos
      const sbDays=await VeedaSupabase.days.getInbox(myH);
      let inboxChanged=false;
      for(const day of sbDays){
        const k=`veeda_inbox_${myH}`;
        const inbox=safeLS.get(k,[]);
        if(!inbox.find(r=>r.date===day.date&&r.author===day.author)&&
           !(currentData.received||[]).find(r=>r.date===day.date&&r.handle===day.handle)){
          inbox.push(day);safeLS.set(k,inbox);inboxChanged=true;
          if(day._sbId)VeedaSupabase.days.markConsumed(day._sbId,day.importedAt);
        }
      }
      if(inboxChanged)checkInbox();
      // Pedidos de conexão
      const sbReqs=await VeedaSupabase.connections.getRequests(myH);
      if(sbReqs.length){
        const lsKey=`veeda_conn_requests_${myH}`;
        const lsReqs=safeLS.get(lsKey,[]);let changed=false;
        for(const req of sbReqs){if(!lsReqs.find(r=>r.fromId===req.fromId)){lsReqs.push(req);changed=true;}}
        if(changed){safeLS.set(lsKey,lsReqs);checkConnRequests();}
      }
      checkConnRequests();
      // Confirmações → vira contato
      const sbConfs=await VeedaSupabase.connections.getConfirmations(myH);
      if(sbConfs.length){
        // Lê dataRef AGORA para ter os dados mais atuais possíveis antes do save
        const latestData=dataRef.current||currentData;
        const newContacts=[];
        for(const conf of sbConfs){
          const dup=(latestData.contacts||[]).find(c=>(c.handle||"").replace(/^@/,"")===(conf.fromHandle||"").replace(/^@/,""));
          if(!dup&&(latestData.contacts||[]).length+newContacts.length<MAX_C){
            newContacts.push({name:conf.fromName,handle:conf.fromHandle,code:conf.fromHandle.replace(/^@/,""),
              emoji:conf.fromEmoji||"🌿",avatarColor:conf.fromAvatarColor||"#D0C4F7",
              avatarSrc:conf.fromAvatarSrc,addedAt:conf.confirmedAt});
            addToast?.(`${conf.fromName} aceitou seu convite! 🤝`,"success");
          }
          if(conf._sbId)VeedaSupabase.connections.markConfirmationConsumed(conf._sbId);
        }
        if(newContacts.length>0){
          // Re-lê uma última vez IMEDIATAMENTE antes do save para capturar qualquer
          // momento ou contato adicionado enquanto as chamadas API estavam em andamento
          const freshest=dataRef.current||latestData;
          await save({...freshest,contacts:[...(freshest.contacts||[]),...newContacts.filter(nc=>!(freshest.contacts||[]).find(c=>(c.handle||"").replace(/^@/,"")===(nc.handle||"").replace(/^@/,"")))]});
        }
      }
    }catch(e){console.warn("[VeedaSupabase sync]",e);}
  },[profile,checkInbox,checkConnRequests,save,addToast]);

  // Setup realtime + sync inicial ao carregar dados
  useEffect(()=>{
    if(loading||!data||!window.VeedaSupabase?.isReady())return;
    const myH=(profile.handle||nameToHandle(profile.name)).replace(/^@/,"");
    syncFromSupabase();
    const inboxSub=VeedaSupabase.realtime.subscribeInbox(myH,day=>{
      const k=`veeda_inbox_${myH}`;const inbox=safeLS.get(k,[]);
      if(!inbox.find(r=>r.date===day.date&&r.author===day.author)){inbox.push(day);safeLS.set(k,inbox);checkInbox();}
    });
    const reqSub=VeedaSupabase.realtime.subscribeRequests(myH,req=>{
      const k=`veeda_conn_requests_${myH}`;const reqs=safeLS.get(k,[]);
      if(!reqs.find(r=>r.fromId===req.fromId)){reqs.push(req);safeLS.set(k,reqs);}
    });
    sbChannels.current=[inboxSub,reqSub].filter(Boolean);
    const syncInterval=setInterval(()=>syncFromSupabase(),30000);
    return()=>{
      clearInterval(syncInterval);
      sbChannels.current.forEach(c=>VeedaSupabase.realtime.removeChannel(c));
      sbChannels.current=[];
    };
  },[loading]); // eslint-disable-line

  // Pull-to-refresh — listener não-passivo para poder chamar preventDefault
  const contentRef=useRef(null);
  useEffect(()=>{
    const el=contentRef.current;if(!el)return;
    const onStart=e=>{if(window.scrollY===0)pullRef.current={startY:e.touches[0].clientY,active:true};};
    const onMove=e=>{
      if(!pullRef.current.active)return;
      const dy=e.touches[0].clientY-pullRef.current.startY;
      if(dy>0){e.preventDefault();setPullY(Math.min(dy*0.5,64));}
    };
    const onEnd=()=>{
      if(pullRef.current.active&&pullY>48){
        setRefreshing(true);setPullY(0);
        syncFromSupabase().finally(()=>setRefreshing(false));
      }else{setPullY(0);}
      pullRef.current.active=false;
    };
    el.addEventListener("touchstart",onStart,{passive:true});
    el.addEventListener("touchmove",onMove,{passive:false});
    el.addEventListener("touchend",onEnd,{passive:true});
    return()=>{el.removeEventListener("touchstart",onStart);el.removeEventListener("touchmove",onMove);el.removeEventListener("touchend",onEnd);};
  },[pullY,syncFromSupabase]);

  // Pending add from invite link (?add=vc2_…)
  useEffect(()=>{
    if(!data||loading)return;
    const pending=sessionStorage.getItem("veeda_pending_add");
    if(pending){

      setPendingAddCode(pending);
      setShowInvite(true);

  // Pending shared day from URL (?day=vd1_…) — cross-device receive
  useEffect(()=>{
    if(!data||loading)return;
    const pendingDay=sessionStorage.getItem("veeda_pending_day");
    if(pendingDay){
      sessionStorage.removeItem("veeda_pending_day");
      const decoded=decodeSharedDay(pendingDay);
      if(decoded){
        // Evita duplicata: mesmo autor + mesma data + sharedAt próximo
        const alreadyReceived=(data.received||[]).find(r=>r.date===decoded.date&&r.handle===decoded.handle&&Math.abs((r.sharedAt||0)-(decoded.sharedAt||0))<60000);
        if(!alreadyReceived){setPendingSharedDay(decoded);setShowAcceptSharedDay(true);}
        else addToast?.("Você já recebeu este dia.","info");
      } else addToast?.("Link de dia inválido ou corrompido.","error");
    }
  },[data,loading]);

  // ── save: persiste dados com proteção contra race conditions ─────────────
  // opts.allowReduce=true: permite salvar com menos registros (exclusões intencionais)
  // Sem allowReduce: após a criptografia (async), mescla com dataRef.current para
  // garantir que saves concorrentes nunca percam momentos ou contatos.
  const save=useCallback(async(d,opts={})=>{
    if(!d)return;
    // Atualiza UI imediatamente — persiste em background
    setData({...d,lastSaved:Date.now()});
    // Produz versão "lightweight": mídia grande vai para IDB, mantém referência
    const lightweight={...d,moments:{},lastSaved:Date.now()};
    Object.keys(d.moments||{}).forEach(day=>{
      lightweight.moments[day]=(d.moments[day]||[]).map(m=>{
        if((m.type==="foto"||m.type==="video"||m.type==="arte")&&m.content?.startsWith("data:")){
          idbSave(`${m.id}`,m.content);
          return{...m,content:"IDB:"+m.id};
        }
        return m;
      });
    });
    // Criptografa (operação async — outros saves podem ocorrer durante este await)
    let enc;
    if(sessionKey.current&&sessionSalt.current){
      enc=await encryptFast(lightweight,sessionKey.current,sessionSalt.current);
    } else {
      enc=await encryptObj(lightweight,password);
    }
    // ── GUARD: após o await, mescla com o estado atual para não perder dados ──
    // Race condition: se outro save aconteceu durante a criptografia e adicionou
    // contatos ou momentos, incorporamos aqui antes de gravar no localStorage.
    let finalD=d;
    let finalLW=lightweight;
    if(!opts.allowReduce&&dataRef.current){
      const cur=dataRef.current;
      // Mescla contatos: pega a união de d.contacts e cur.contacts
      const dC=d.contacts||[];const curC=cur.contacts||[];
      let needsReencrypt=false;
      if(curC.length>dC.length){
        const merged=[...dC];
        for(const c of curC){
          if(!merged.find(x=>(x.handle||"").replace(/^@/,"")===(c.handle||"").replace(/^@/,""))){merged.push(c);}
        }
        if(merged.length>dC.length){finalD={...finalD,contacts:merged};finalLW={...finalLW,contacts:merged};needsReencrypt=true;}
      }
      // Mescla momentos: para cada dia, pega o array com mais registros
      const dM=d.moments||{};const curM=cur.moments||{};
      for(const day of Object.keys(curM)){
        const curDay=curM[day]||[];const dDay=dM[day]||[];
        if(curDay.length>dDay.length){
          // Dia no estado atual tem mais momentos — incorporar os que faltam
          const dIds=new Set(dDay.map(m=>m.id));
          const extra=curDay.filter(m=>!dIds.has(m.id));
          if(extra.length>0){
            const mergedDay=[...dDay,...extra];
            // Reconverte data: para IDB se necessário
            const mergedDayLW=mergedDay.map(m=>{
              if((m.type==="foto"||m.type==="video"||m.type==="arte")&&m.content?.startsWith("data:")){
                idbSave(`${m.id}`,m.content);return{...m,content:"IDB:"+m.id};
              }
              return m;
            });
            finalD={...finalD,moments:{...(finalD.moments||{}),[day]:mergedDay}};
            finalLW={...finalLW,moments:{...(finalLW.moments||{}),[day]:mergedDayLW}};
            needsReencrypt=true;
          }
        }
      }
      if(needsReencrypt){
        finalLW={...finalLW,lastSaved:lightweight.lastSaved};
        if(sessionKey.current&&sessionSalt.current){
          enc=await encryptFast(finalLW,sessionKey.current,sessionSalt.current);
        } else {
          enc=await encryptObj(finalLW,password);
        }
      }
    }
    // Grava: primeiro atualiza estado React, depois persistência
    setData({...finalD,lastSaved:finalLW.lastSaved});
    safeLS.rawSet(dataKey,enc);
    saveMonthlySnapshot(profile.id,enc);
    if(profile.cloud){cloudSync.queuePush(profile.id,enc);}
    // Backup no Supabase — blob já cifrado, enviado de forma assíncrona sem bloquear UI
    try{window.VeedaSupabase?.data?.push(profile.id,enc);}catch(_){}
  },[dataKey,password,profile.id,profile.cloud]);

  // Flush cloud push on tab hide / unload (caso o debounce ainda esteja pendente)
  useEffect(()=>{
    const flush=()=>{if(profile.cloud)cloudSync.flushAll();};

  },[profile.cloud]);

  // Keep a ref to the latest hydratedData so the effect can read it without
  // adding it as a dependency (which would create an infinite loop).
  const hydratedDataRef=useRef(null);
  useEffect(()=>{hydratedDataRef.current=hydratedData;},[hydratedData]);

  // Hydrate IDB media
  useEffect(()=>{
    if(!data)return;

    // ── Immediate sync update ──────────────────────────────────────────────
    // Before the async IDB reads, produce the best possible snapshot right now:
    // • moments that have real content (new saves, text) appear immediately
    // • moments already hydrated in the previous hydratedData are reused (no flicker)
    // • remaining IDB refs stay as-is until the async pass resolves them
    const prev=hydratedDataRef.current;
    const merged={...data,moments:{}};
    for(const day of Object.keys(data.moments||{})){
      merged.moments[day]=(data.moments[day]||[]).map(m=>{
        if(!m.content?.startsWith("IDB:"))return m; // already has real content
        const prevM=(prev?.moments||{})[day]?.find(p=>p.id===m.id&&!p.content?.startsWith("IDB:"));

    save({...cur,moments:{...(cur.moments||{}),[todayStr()]:[...((cur.moments||{})[todayStr()]||[]),m]}});

  },[addType,addMedia,addContent,addCaption,addTags,addLocation,save,resetModal]);

  const delMoment=useCallback((day,id)=>{
    const cur=dataRef.current;
    if(!cur)return;

  },[onUpdateProfile]);

  // Scroll to last added moment
  useEffect(()=>{
    if(lastId&&lastRef.current){setTimeout(()=>lastRef.current?.scrollIntoView({behavior:"smooth",block:"center"}),150);setLastId(null);}
  },[lastId,data]);

  // ── Early return after all hooks ──────────────
  if(loading||!activeData){
    return(
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:C.bg}}>
        <Spinner size={32} color={C.purple}/>
        <p style={{marginTop:16,fontSize:13,color:C.textMid}}>Carregando seus dias…</p>
      </div>
    );
  }

  // ── RENDER ─────────────────────────────────────
  return(
    <div style={{width:"100%",background:`linear-gradient(180deg,${dayColor.bg} 0%,${C.bgGradEnd} 100%)`,minHeight:"100vh",fontFamily:SANS}}>
      <ToastContainer/>
      {pendingNotif&&<ReceivedNotif notif={pendingNotif} onOpen={acceptNotif} onDismiss={dismissNotif}/>}
      {showAcceptSharedDay&&pendingSharedDay&&<AcceptSharedDayModal shared={pendingSharedDay} onClose={()=>{setShowAcceptSharedDay(false);setPendingSharedDay(null);}} onAccept={async()=>{const cur=dataRef.current;if(!cur||!pendingSharedDay)return;await save({...cur,received:[...(cur.received||[]),pendingSharedDay]});setShowAcceptSharedDay(false);setPendingSharedDay(null);setUnreadCount(c=>c+1);setView("recebidos");setViewRec(pendingSharedDay);addToast?.("Dia recebido e salvo! 🌿","success");}}/>}
      {showDrawing&&<DrawingCanvas onClose={()=>setShowDrawing(false)} onSave={dataUrl=>{setShowDrawing(false);const cur=dataRef.current;if(!cur)return;const id=Date.now();const m={id,ts:id,type:"arte",content:dataUrl,caption:addCaption.trim()||undefined,location:addLocation||undefined};save({...cur,moments:{...(cur.moments||{}),[todayStr()]:[...((cur.moments||{})[todayStr()]||[]),m]}});setLastId(id);setAddCaption("");setAddLocation(null);}}/>}
      {expandedMoment&&<MomentDetail m={expandedMoment} onClose={()=>setExpandedMoment(null)} onDelete={()=>{delMoment(curDay,expandedMoment.id);setExpandedMoment(null);}} onPlay={setNowPlaying} onTogglePrivacy={()=>{const cur=dataRef.current;if(!cur)return;const day=Object.keys(cur.moments||{}).find(d=>(cur.moments[d]||[]).find(x=>x.id===expandedMoment.id));if(!day)return;const updated={...cur,moments:{...cur.moments,[day]:(cur.moments[day]||[]).map(x=>x.id===expandedMoment.id?{...x,isPrivate:!x.isPrivate}:x)}};save(updated);setExpandedMoment(m=>({...m,isPrivate:!m.isPrivate}));}}/>}
      {/* Visualização read-only de REGISTRO da PESSOA DO MEU CÍRCULO: sem onDelete */}
      {expandedRecMoment&&<MomentDetail m={expandedRecMoment} onClose={()=>setExpandedRecMoment(null)} onPlay={setNowPlaying}/>}
      <MiniPlayer track={nowPlaying} onClose={()=>setNowPlaying(null)}/>

      {/* ── Header ── */}
      <div style={{background:C.white,borderBottom:`1px solid ${C.headerBorder}`,position:"sticky",top:0,zIndex:100,paddingTop:"env(safe-area-inset-top)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px 6px"}}>
          <span onClick={()=>setView("home")} style={{fontFamily:PASSO,fontSize:18,fontWeight:700,color:C.purple,cursor:"pointer"}}>🌿 Veeda</span>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={()=>setShowInviteApp(true)} style={{background:C.purpleLight,border:"none",borderRadius:20,padding:"5px 12px",fontSize:12,color:C.tabActive,fontWeight:600,cursor:"pointer"}}>+ Convidar</button>
            <button onClick={()=>setShowSettings(true)} style={{background:"none",border:"none",fontSize:20,color:C.textLight,cursor:"pointer",lineHeight:1}}>⚙️</button>
          </div>
        </div>
        {view!=="home"&&<><div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 0 10px",borderBottom:`1px solid ${C.headerBorder}`,cursor:"pointer"}} onClick={()=>view==="hoje"&&setShowAvatar(true)}>
          <AvatarBubble src={profile.avatarSrc} emoji={profile.emoji} color={profile.avatarColor||C.purpleLight} size={64} ring/>
          <p style={{margin:"8px 0 0",fontSize:14,fontWeight:600,color:C.text,fontFamily:PASSO}}>{profile.name}</p>
          <p style={{margin:"2px 0 0",fontSize:12,color:C.purple,fontWeight:600}}>{profile.handle||nameToHandle(profile.name)}</p>
          {feeling&&<div style={{display:"inline-flex",alignItems:"center",gap:4,marginTop:6,background:C.purpleLight,borderRadius:20,padding:"3px 12px"}}><span style={{fontSize:13}}>{feeling.emoji}</span><span style={{fontSize:11,color:C.tabActive,fontWeight:500}}>{feeling.label}</span></div>}
          {view==="hoje"&&<span style={{fontSize:11,color:C.textLight,marginTop:4}}>toque para editar perfil</span>}
        </div>
        <div style={{display:"flex",padding:"0 4px",overflowX:"auto"}}>
          {[["hoje","Hoje"],["grupo",group],["recebidos",unreadCount>0?`Recebidos (${unreadCount})`:"Recebidos"]].map(([v,l])=>(
            <button key={v} onClick={()=>{setView(v);if(v==="recebidos")setUnreadCount(0);}} style={{padding:"10px 14px",fontSize:13,fontWeight:view===v?600:400,background:"none",border:"none",borderBottom:`2.5px solid ${view===v?C.tabActive:"transparent"}`,color:view===v?C.tabActive:C.textMid,cursor:"pointer",whiteSpace:"nowrap"}}>{l}</button>
          ))}
        </div></>}
      </div>

      {/* Pull-to-refresh indicator */}
      {(pullY>0||refreshing)&&<div style={{display:"flex",justifyContent:"center",alignItems:"center",height:pullY||40,transition:pullY?"none":"height .3s ease",overflow:"hidden"}}>
        {refreshing?<Spinner size={20} color={C.purple}/>:<div style={{width:20,height:20,borderRadius:"50%",border:`2.5px solid ${C.purple}`,opacity:Math.min(pullY/48,1)}}/>}
      </div>}

        {/* HOME */}
        {view==="home"&&(()=>{
          const allMoments=Object.entries(activeData.moments||{}).flatMap(([d,ms])=>(ms||[]).map(m=>({...m,day:d})));
          const totalDays=Object.keys(activeData.moments||{}).filter(d=>(activeData.moments[d]||[]).length>0).length;
          const totalMoments=allMoments.length;
          const byDay=Object.entries(activeData.moments||{}).map(([d,ms])=>({d,n:(ms||[]).length})).sort((a,b)=>b.n-a.n);
          const topDays=byDay.slice(0,3);

          {addType==="voz"&&<div style={{marginBottom:12}}>
            {showVoice
              ?<VoiceRecorder onClose={()=>setShowVoice(false)} onSave={(dataUrl,dur)=>{setShowVoice(false);const cur=dataRef.current;if(!cur)return;const id=Date.now();const m={id,ts:id,type:"voz",content:dataUrl,duration:dur,caption:addCaption.trim()||undefined,location:addLocation||undefined};save({...cur,moments:{...(cur.moments||{}),[todayStr()]:[...((cur.moments||{})[todayStr()]||[]),m]}});setLastId(id);resetModal();}}/>

          {(addType==="texto"||addType==="link")&&<textarea value={addContent} onChange={e=>setAddContent(e.target.value)} placeholder={addType==="link"?"Cole o link (YouTube, Vimeo, URL)…":"O que aconteceu? Descreva o momento…"} style={{width:"100%",minHeight:90,marginBottom:12,borderRadius:12,padding:"12px 14px",border:`1px solid ${C.cardBorder}`,fontSize:16,boxSizing:"border-box",fontFamily:SANS}}/>}

            <input value={addCaption} onChange={e=>setAddCaption(e.target.value)} placeholder="Legenda (opcional)" style={{marginBottom:14}}/>

              <span style={{fontSize:13,color:addPrivate?C.red:C.textMid}}>{addPrivate?"🔒 Privado — só você vê":"🌐 Público — visível ao compartilhar"}</span>

            </div>
