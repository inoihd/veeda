<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#7B6FA0"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="Veeda"/>
<meta name="description" content="Seu dia, do seu jeito."/>
<title>Veeda</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#F7F5FC;color:#3A3350;}
input,textarea,select{font-family:inherit;font-size:14px;border:1px solid #DDD8EE;border-radius:8px;padding:9px 12px;color:#3A3350;width:100%;background:#fff;outline:none;}
button{font-family:inherit;cursor:pointer;}
textarea{resize:vertical;}
#root{max-width:480px;margin:0 auto;min-height:100vh;}
@keyframes vPulse{0%{transform:scale(1);opacity:.6}70%{transform:scale(2.4);opacity:0}100%{transform:scale(1);opacity:0}}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef} = React;
const PROFILES_KEY="veeda_profiles";
const C={purple:"#7B6FA0",purpleLight:"#EDE9F6",purpleMid:"#B8AEDD",blue:"#5B7FA6",blueLight:"#E6EEF8",blueMid:"#A8C0DA",cardBorder:"#DDD8EE",bg:"#F7F5FC",text:"#3A3350",textMid:"#7A7090",textLight:"#ADA8C0",white:"#FFFFFF",green:"#1D9E75",red:"#C0392B"};
const DAY_COLORS=[{label:"Lavanda",bg:"#F7F5FC",dot:"#B8AEDD"},{label:"Pêssego",bg:"#FDF5F0",dot:"#E8B89A"},{label:"Menta",bg:"#F0FAF5",dot:"#8FD1B0"},{label:"Céu",bg:"#F0F6FD",dot:"#9ABEDD"},{label:"Rosa",bg:"#FDF0F5",dot:"#DDA8C0"},{label:"Baunilha",bg:"#FDFAF0",dot:"#D4C48A"},{label:"Cinza",bg:"#F5F5F7",dot:"#ACACBC"}];
const FEELINGS=[{emoji:"😊",label:"Feliz"},{emoji:"😌",label:"Tranquilo"},{emoji:"🥰",label:"Grato"},{emoji:"😔",label:"Triste"},{emoji:"😤",label:"Frustrado"},{emoji:"😴",label:"Cansado"},{emoji:"🤩",label:"Animado"},{emoji:"😶",label:"Neutro"}];
const AVATAR_EMOJIS=["🌿","🌸","🌊","🌙","⭐","🦋","🍀","🎵","🌻","🦉","🐾","🌈","🦊","🐬","🌺","🎯","🧩","🪴","🦚","🌵"];
const AVATAR_COLORS=["#EDE9F6","#E6EEF8","#FDF5F0","#F0FAF5","#FDF0F5","#FDFAF0","#F5F5F7"];

const strToKey=async(pw,salt)=>{const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:150000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);};
const encryptObj=async(obj,pw)=>{const salt=crypto.getRandomValues(new Uint8Array(16)),iv=crypto.getRandomValues(new Uint8Array(12)),key=await strToKey(pw,salt),buf=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,new TextEncoder().encode(JSON.stringify(obj)));return btoa(JSON.stringify({salt:Array.from(salt),iv:Array.from(iv),data:Array.from(new Uint8Array(buf))}));};
const decryptObj=async(ct,pw)=>{const{salt,iv,data}=JSON.parse(atob(ct)),key=await strToKey(pw,new Uint8Array(salt)),buf=await crypto.subtle.decrypt({name:"AES-GCM",iv:new Uint8Array(iv)},key,new Uint8Array(data));return JSON.parse(new TextDecoder().decode(buf));};
const hashPw=async pw=>{const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode("veeda:"+pw));return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");};
const genCode=()=>{const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789",rand=crypto.getRandomValues(new Uint8Array(16)),s=Array.from(rand).map(b=>chars[b%chars.length]).join("");return`${s.slice(0,4)}-${s.slice(4,8)}-${s.slice(8,12)}-${s.slice(12,16)}`;};
const getVideoEmbed=url=>{const yt=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);if(yt)return`https://www.youtube.com/embed/${yt[1]}`;const v=url.match(/vimeo\.com\/(\d+)/);if(v)return`https://player.vimeo.com/video/${v[1]}`;return null;};
const isVideoLink=url=>!!getVideoEmbed(url);
const typeIcons={texto:"✏️",foto:"📷",link:"🔗",musica:"🎵",video:"🎬",videolink:"🔗"};
const typeColor=t=>({texto:C.purple,foto:C.blue,link:C.blue,musica:C.purple,video:C.blue,videolink:C.blue}[t]||C.purple);
const typeBg=t=>({texto:C.purpleLight,foto:C.blueLight,link:C.blueLight,musica:C.purpleLight,video:C.blueLight,videolink:C.blueLight}[t]||C.purpleLight);
const fmt=ts=>new Date(ts).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
const todayStr=()=>new Date().toISOString().slice(0,10);
const offsetDay=(d,n)=>{const dt=new Date(d+"T12:00:00");dt.setDate(dt.getDate()+n);return dt.toISOString().slice(0,10);};
const fmtLabel=d=>{const t=todayStr(),y=offsetDay(t,-1);if(d===t)return"hoje";if(d===y)return"ontem";const[yr,m,dy]=d.split("-");return new Date(yr,m-1,dy).toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"});};
const fmtFull=d=>{const[y,m,dy]=d.split("-");return new Date(y,m-1,dy).toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});};
const defaultData=()=>({moments:{},received:[],contacts:[],groupName:"Família & Amigos",dayColors:{},dayFeelings:{}});
const loadProfiles=()=>{try{return JSON.parse(localStorage.getItem(PROFILES_KEY)||"[]");}catch{return[];}};

function AvatarBubble({emoji,color,size=38,ring=false}){return <div style={{width:size,height:size,borderRadius:"50%",background:color||C.purpleLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:size*0.46,border:`${ring?"3px":"1.5px"} solid ${ring?C.purpleMid:C.cardBorder}`,flexShrink:0,boxShadow:ring?`0 0 0 3px ${C.purpleLight}`:undefined}}>{emoji}</div>;}

function Modal({onClose,title,children}){return <div style={{position:"fixed",inset:0,background:"rgba(40,30,60,0.45)",display:"flex",alignItems:"flex-end",zIndex:200}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}><div style={{background:C.white,borderRadius:"18px 18px 0 0",padding:"20px 16px 36px",width:"100%",maxWidth:480,margin:"0 auto",boxSizing:"border-box",maxHeight:"90vh",overflowY:"auto"}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><p style={{margin:0,fontSize:15,fontWeight:500,color:C.text}}>{title}</p><button onClick={onClose} style={{background:"none",border:"none",fontSize:22,color:C.textLight}}>×</button></div>{children}</div></div>;}

function PulsingDot({onClick,color}){const c=color||C.purple,cm=color?color+"99":C.purpleMid;return <div style={{position:"relative",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}} onClick={onClick}><div style={{position:"absolute",width:22,height:22,borderRadius:"50%",background:cm,animation:"vPulse 2s ease-out infinite"}}/><div style={{position:"absolute",width:22,height:22,borderRadius:"50%",background:cm,animation:"vPulse 2s ease-out infinite",animationDelay:"0.7s"}}/><div style={{position:"relative",width:16,height:16,borderRadius:"50%",background:c,border:`3px solid ${C.white}`,zIndex:1}}/></div>;}

function Btn({onClick,children,style={},disabled=false,variant="primary"}){const base={width:"100%",padding:"11px 0",border:"none",borderRadius:10,fontWeight:500,fontSize:14,cursor:disabled?"default":"pointer",opacity:disabled?0.7:1};const vars={primary:{background:C.purple,color:C.white},outline:{background:"transparent",color:C.purple,border:`1.5px solid ${C.purple}`},ghost:{background:"none",border:"none",color:C.textMid,fontSize:13,padding:"8px 0"}};return <button onClick={onClick} disabled={disabled} style={{...base,...vars[variant],...style}}>{children}</button>;}

function ScreenSelect({profiles,onSelect,onNew}){
  return <div style={{maxWidth:420,margin:"0 auto",padding:"3rem 1.25rem",background:C.bg,minHeight:"100vh"}}>
    <div style={{textAlign:"center",marginBottom:36}}><div style={{fontSize:52,marginBottom:10}}>🌿</div><h1 style={{fontSize:28,fontWeight:500,margin:"0 0 6px",color:C.text}}>Veeda</h1><p style={{fontSize:14,color:C.textMid,margin:0}}>Seu dia, do seu jeito.</p></div>
    {profiles.length>0&&<div style={{marginBottom:20}}><p style={{fontSize:13,color:C.textMid,marginBottom:12,textAlign:"center"}}>Quem é você?</p>{profiles.map(p=><button key={p.id} onClick={()=>onSelect(p)} style={{width:"100%",background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:14,padding:"14px 16px",marginBottom:10,display:"flex",alignItems:"center",gap:14,cursor:"pointer",textAlign:"left"}}><AvatarBubble emoji={p.emoji} color={p.avatarColor||C.purpleLight} size={46} ring/><div style={{flex:1}}><p style={{margin:0,fontSize:15,fontWeight:500,color:C.text}}>{p.name}</p><p style={{margin:0,fontSize:12,color:C.textLight}}>toque para entrar</p></div><span style={{fontSize:20,color:C.textLight}}>›</span></button>)}</div>}
    <Btn onClick={onNew} variant={profiles.length===0?"primary":"outline"}>{profiles.length===0?"Criar meu perfil":"+ Adicionar perfil"}</Btn>
  </div>;
}

function ScreenPassword({profile,onSuccess,onBack,onForgot}){
  const[pw,setPw]=useState(""),[ err,setErr]=useState(""),[ loading,setLoading]=useState(false);
  const attempt=async()=>{if(!pw.trim())return;setLoading(true);setErr("");const hash=await hashPw(pw.trim());if(hash!==profile.passwordHash){setErr("Senha incorreta.");setPw("");setLoading(false);return;}onSuccess(pw.trim());};
  return <div style={{maxWidth:400,margin:"0 auto",padding:"3rem 1.25rem",background:C.bg,minHeight:"100vh"}}>
    <Btn onClick={onBack} variant="ghost" style={{width:"auto",marginBottom:24}}>‹ Voltar</Btn>
    <div style={{textAlign:"center",marginBottom:28}}><AvatarBubble emoji={profile.emoji} color={profile.avatarColor||C.purpleLight} size={72} ring/><p style={{margin:"12px 0 4px",fontSize:17,fontWeight:500,color:C.text}}>{profile.name}</p><p style={{margin:0,fontSize:13,color:C.textLight}}>Digite sua senha para entrar</p></div>
    <div style={{background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:14,padding:"1.25rem"}}>
      <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&attempt()} placeholder="Senha" autoFocus style={{border:`1px solid ${err?C.red:C.cardBorder}`,marginBottom:err?6:14}}/>
      {err&&<p style={{fontSize:12,color:C.red,margin:"0 0 12px"}}>{err}</p>}
      <Btn onClick={attempt} disabled={loading}>{loading?"Verificando...":"Entrar"}</Btn>
      <Btn onClick={onForgot} variant="ghost">Esqueci minha senha</Btn>
    </div>
  </div>;
}

function ScreenCreate({onDone,onBack}){
  const[step,setStep]=useState(1);
  const[name,setName]=useState(""),[ emoji,setEmoji]=useState("🌿"),[ avatarColor,setAvatarColor]=useState(C.purpleLight);
  const[pw,setPw]=useState(""),[ pw2,setPw2]=useState(""),[ err,setErr]=useState("");
  const[code]=useState(genCode);
  const[copied,setCopied]=useState(false),[ confirmed,setConfirmed]=useState(false),[ loading,setLoading]=useState(false);
  const finish=async()=>{if(!confirmed){setErr("Confirme que anotou o código.");return;}setLoading(true);try{const passwordHash=await hashPw(pw),recoveryHash=await hashPw(code),id=Date.now().toString(),profile={id,name,emoji,avatarColor,passwordHash,recoveryHash},encData=await encryptObj(defaultData(),pw),ps=loadProfiles();ps.push(profile);localStorage.setItem(PROFILES_KEY,JSON.stringify(ps));localStorage.setItem(`veeda_data_${id}`,encData);onDone(profile,pw);}catch{setErr("Erro ao criar perfil.");setLoading(false);}};
  return <div style={{maxWidth:400,margin:"0 auto",padding:"2rem 1.25rem",background:C.bg,minHeight:"100vh"}}>
    <Btn onClick={step===1?onBack:()=>setStep(s=>s-1)} variant="ghost" style={{width:"auto",marginBottom:20}}>‹ Voltar</Btn>
    <div style={{display:"flex",gap:6,marginBottom:24}}>{[1,2,3].map(n=><div key={n} style={{flex:1,height:3,borderRadius:3,background:step>=n?C.purple:C.cardBorder}}/>)}</div>
    {step===1&&<div>
      <p style={{fontSize:16,fontWeight:500,color:C.text,marginBottom:20}}>Como você quer aparecer?</p>
      <label style={{fontSize:13,color:C.textMid,display:"block",marginBottom:6}}>Seu nome</label>
      <input value={name} onChange={e=>setName(e.target.value)} placeholder="Nome" style={{marginBottom:20}}/>
      <label style={{fontSize:13,color:C.textMid,display:"block",marginBottom:8}}>Avatar</label>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>{AVATAR_EMOJIS.map(e=><button key={e} onClick={()=>setEmoji(e)} style={{fontSize:20,background:emoji===e?C.purpleLight:"#F5F3FB",border:`1.5px solid ${emoji===e?C.purple:C.cardBorder}`,borderRadius:10,width:42,height:42,cursor:"pointer"}}>{e}</button>)}</div>
      <label style={{fontSize:13,color:C.textMid,display:"block",marginBottom:8}}>Cor do avatar</label>
      <div style={{display:"flex",gap:8,marginBottom:24}}>{AVATAR_COLORS.map(col=><button key={col} onClick={()=>setAvatarColor(col)} style={{width:34,height:34,borderRadius:"50%",background:col,border:`2px solid ${avatarColor===col?C.purple:C.cardBorder}`,cursor:"pointer"}}/>)}</div>
      <div style={{display:"flex",justifyContent:"center",marginBottom:24}}><AvatarBubble emoji={emoji} color={avatarColor} size={64} ring/></div>
      <Btn onClick={()=>{if(name.trim())setStep(2);}}>Continuar</Btn>
    </div>}
    {step===2&&<div>
      <p style={{fontSize:16,fontWeight:500,color:C.text,marginBottom:6}}>Crie sua senha</p>
      <p style={{fontSize:13,color:C.textMid,marginBottom:20,lineHeight:1.5}}>Sua senha protege todos os seus dados.</p>
      <label style={{fontSize:13,color:C.textMid,display:"block",marginBottom:6}}>Senha</label>
      <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr("");}} placeholder="Mínimo 6 caracteres" style={{marginBottom:14}}/>
      <label style={{fontSize:13,color:C.textMid,display:"block",marginBottom:6}}>Confirmar senha</label>
      <input type="password" value={pw2} onChange={e=>{setPw2(e.target.value);setErr("");}} placeholder="Repita a senha" style={{border:`1px solid ${err?C.red:C.cardBorder}`,marginBottom:err?6:14}}/>
      {err&&<p style={{fontSize:12,color:C.red,margin:"0 0 10px"}}>{err}</p>}
      <Btn onClick={()=>{if(pw.length<6){setErr("Mínimo 6 caracteres.");return;}if(pw!==pw2){setErr("As senhas não coincidem.");return;}setErr("");setStep(3);}}>Continuar</Btn>
    </div>}
    {step===3&&<div>
      <p style={{fontSize:16,fontWeight:500,color:C.text,marginBottom:6}}>Código de recuperação</p>
      <p style={{fontSize:13,color:C.textMid,marginBottom:20,lineHeight:1.5}}><strong style={{color:C.text}}>Anote agora em lugar seguro.</strong> Este é o único modo de recuperar seus dados se esquecer a senha.</p>
      <div style={{background:C.purpleLight,border:`1px solid ${C.purpleMid}`,borderRadius:12,padding:"18px",textAlign:"center",marginBottom:12}}><p style={{margin:0,fontSize:20,fontWeight:500,color:C.purple,letterSpacing:"2px",fontFamily:"monospace"}}>{code}</p></div>
      <Btn onClick={()=>{navigator.clipboard&&navigator.clipboard.writeText(code);setCopied(true);setTimeout(()=>setCopied(false),2000);}} variant="outline" style={{marginBottom:20,color:copied?C.green:C.purple,borderColor:copied?C.green:C.purple}}>{copied?"✓ Copiado!":"Copiar código"}</Btn>
      <label style={{display:"flex",alignItems:"flex-start",gap:10,cursor:"pointer",marginBottom:20}}><input type="checkbox" checked={confirmed} onChange={e=>setConfirmed(e.target.checked)} style={{width:16,height:16,marginTop:2,accentColor:C.purple}}/><span style={{fontSize:13,color:C.textMid,lineHeight:1.5}}>Anotei meu código de recuperação em lugar seguro.</span></label>
      {err&&<p style={{fontSize:12,color:C.red,margin:"0 0 10px"}}>{err}</p>}
      <Btn onClick={finish} disabled={loading}>{loading?"Criando perfil...":"Entrar no Veeda"}</Btn>
    </div>}
  </div>;
}

function ScreenForgot({profile,onSuccess,onBack}){
  const[step,setStep]=useState(1);
  const[code,setCode]=useState(""),[ pw,setPw]=useState(""),[ pw2,setPw2]=useState(""),[ err,setErr]=useState(""),[ loading,setLoading]=useState(false);
  const verifyCode=async()=>{setLoading(true);setErr("");const h=await hashPw(code.trim().toUpperCase());if(h!==profile.recoveryHash){setErr("Código incorreto.");setLoading(false);return;}setStep(2);setLoading(false);};
  const resetPw=async()=>{if(pw.length<6){setErr("Mínimo 6 caracteres.");return;}if(pw!==pw2){setErr("As senhas não coincidem.");return;}setLoading(true);try{const stored=localStorage.getItem(`veeda_data_${profile.id}`);let data=defaultData();try{data=await decryptObj(stored,code.trim().toUpperCase());}catch{}const newHash=await hashPw(pw),newEnc=await encryptObj(data,pw),ps=loadProfiles(),idx=ps.findIndex(p=>p.id===profile.id);if(idx>=0){ps[idx].passwordHash=newHash;localStorage.setItem(PROFILES_KEY,JSON.stringify(ps));}localStorage.setItem(`veeda_data_${profile.id}`,newEnc);onSuccess(pw);}catch{setErr("Erro.");setLoading(false);}};
  return <div style={{maxWidth:400,margin:"0 auto",padding:"2.5rem 1.25rem",background:C.bg,minHeight:"100vh"}}>
    <Btn onClick={onBack} variant="ghost" style={{width:"auto",marginBottom:24}}>‹ Voltar</Btn>
    <div style={{textAlign:"center",marginBottom:24}}><AvatarBubble emoji={profile.emoji} color={profile.avatarColor||C.purpleLight} size={56} ring/><p style={{margin:"10px 0 0",fontSize:15,fontWeight:500,color:C.text}}>{profile.name}</p></div>
    <div style={{background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:14,padding:"1.25rem"}}>
      {step===1&&<div>
        <p style={{fontSize:14,fontWeight:500,color:C.text,margin:"0 0 14px"}}>Código de recuperação</p>
        <input value={code} onChange={e=>{setCode(e.target.value);setErr("");}} placeholder="XXXX-XXXX-XXXX-XXXX" style={{border:`1px solid ${err?C.red:C.cardBorder}`,fontFamily:"monospace",letterSpacing:"1px",marginBottom:err?6:14}}/>
        {err&&<p style={{fontSize:12,color:C.red,margin:"0 0 12px"}}>{err}</p>}
        <Btn onClick={verifyCode} disabled={loading}>{loading?"Verificando...":"Verificar"}</Btn>
      </div>}
      {step===2&&<div>
        <p style={{fontSize:14,fontWeight:500,color:C.text,margin:"0 0 14px"}}>Nova senha</p>
        <input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr("");}} placeholder="Nova senha" style={{marginBottom:12}}/>
        <input type="password" value={pw2} onChange={e=>{setPw2(e.target.value);setErr("");}} placeholder="Confirmar" style={{border:`1px solid ${err?C.red:C.cardBorder}`,marginBottom:err?6:14}}/>
        {err&&<p style={{fontSize:12,color:C.red,margin:"0 0 12px"}}>{err}</p>}
        <Btn onClick={resetPw} disabled={loading}>{loading?"Salvando...":"Redefinir senha"}</Btn>
      </div>}
    </div>
  </div>;
}

function VeedaApp({profile,password,onLogout,onUpdateProfile}){
  const dataKey=`veeda_data_${profile.id}`;
  const[data,setData]=useState(null);
  const[view,setView]=useState("hoje");
  const[dayOffset,setDayOffset]=useState(0);
  const[addType,setAddType]=useState("texto");
  const[addContent,setAddContent]=useState("");
  const[addCaption,setAddCaption]=useState("");
  const[addMedia,setAddMedia]=useState(null);
  const[showModal,setShowModal]=useState(false);
  const[showEditDay,setShowEditDay]=useState(false);
  const[showFeeling,setShowFeeling]=useState(false);
  const[showAvatar,setShowAvatar]=useState(false);
  const[showInvite,setShowInvite]=useState(false);
  const[showGroupName,setShowGroupName]=useState(false);
  const[exportKey,setExportKey]=useState("");
  const[exportMsg,setExportMsg]=useState("");
  const[exportDay,setExportDay]=useState(todayStr());
  const[exportSel,setExportSel]=useState(null);
  const[importKey,setImportKey]=useState("");
  const[importFile,setImportFile]=useState(null);
  const[importMsg,setImportMsg]=useState("");
  const[viewRec,setViewRec]=useState(null);
  const[now,setNow]=useState(new Date());
  const[invCode,setInvCode]=useState("");
  const[invName,setInvName]=useState("");
  const[newGroup,setNewGroup]=useState("");
  const[lastId,setLastId]=useState(null);
  const fileRef=useRef(),vidRef=useRef(),touchX=useRef(null),lastRef=useRef(null);

  useEffect(()=>{(async()=>{try{const enc=localStorage.getItem(dataKey);setData(enc?await decryptObj(enc,password):defaultData());}catch{setData(defaultData());}})();const t=setInterval(()=>setNow(new Date()),30000);return()=>clearInterval(t);},[]);
  useEffect(()=>{if(lastId&&lastRef.current){setTimeout(()=>lastRef.current&&lastRef.current.scrollIntoView({behavior:"smooth",block:"center"}),120);setLastId(null);}},[lastId,data]);

  const save=async d=>{setData(d);localStorage.setItem(dataKey,await encryptObj(d,password));};
  const resetModal=()=>{setAddContent("");setAddCaption("");setAddMedia(null);setShowModal(false);};
  const readFile=(f,cb)=>{const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsDataURL(f);};

  if(!data)return <div style={{padding:32,textAlign:"center",color:C.textMid,fontSize:32}}>🌿</div>;

  const curDay=offsetDay(todayStr(),-dayOffset),isToday=dayOffset===0;

  const allDays=Object.keys(data.moments).filter(d=>(data.moments[d]||[]).length>0).sort((a,b)=>b.localeCompare(a));
  const nowKey=`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
  const dayColor=DAY_COLORS.find(c=>c.label===(data.dayColors||{})[curDay])||DAY_COLORS[0];

  const lastMId=moments.length>0?moments[moments.length-1].id:null;

  const addMoment=()=>{const isMedia=addType==="foto"||addType==="video";if(isMedia&&!addMedia)return;if(!isMedia&&!addContent.trim())return;let type=addType,content=isMedia?addMedia:addContent.trim();if(type==="link"&&isVideoLink(content))type="videolink";const id=Date.now();save({...data,moments:{...data.moments,[todayStr()]:[...(data.moments[todayStr()]||[]),{id,ts:id,type,content,caption:addCaption.trim()}]}});resetModal();setLastId(id);};
  const delMoment=(day,id)=>save({...data,moments:{...data.moments,[day]:(data.moments[day]||[]).filter(m=>m.id!==id)}});
  const toggleSel=id=>setExportSel(p=>p?(p.includes(id)?p.filter(x=>x!==id):[...p,id]):p);

  const renderContent=(m,full=false)=>{
    if(m.type==="foto")return <img src={m.content} alt="" style={{width:"100%",borderRadius:8,display:"block"}}/>;

    if(m.type==="videolink"){const e=getVideoEmbed(m.content);return e?<div style={{position:"relative",paddingBottom:"56.25%",height:0,borderRadius:8,overflow:"hidden"}}><iframe src={e} style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",border:"none"}} allowFullScreen title="v"/></div>:<a href={m.content} target="_blank" rel="noopener noreferrer" style={{color:C.blue,fontSize:13,wordBreak:"break-all"}}>{m.content}</a>;}
    if(m.type==="link")return <a href={m.content} target="_blank" rel="noopener noreferrer" style={{color:C.blue,fontSize:13,wordBreak:"break-all"}}>{m.content}</a>;

  };

  const MiniCard=({m,isNew})=><div ref={isNew?lastRef:null} style={{background:C.white,border:`1px solid ${isNew?C.purpleMid:C.cardBorder}`,borderRadius:10,padding:"8px 10px",maxWidth:155,marginBottom:4}}><div style={{display:"flex",alignItems:"center",gap:5,marginBottom:5}}><span style={{width:20,height:20,borderRadius:"50%",background:typeBg(m.type),display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,flexShrink:0}}>{typeIcons[m.type]||"🔗"}</span><span style={{fontSize:11,color:C.textLight}}>{fmt(m.ts)}</span></div>{(m.type==="foto"||m.type==="video")?renderContent(m,false):<p style={{margin:0,fontSize:12,color:C.text,lineHeight:1.4,overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{m.content}</p>}</div>;

  const FullCard=({m,onDelete,selectable,selected,onToggle,isNew})=><div ref={isNew?lastRef:null} style={{background:C.white,border:`1.5px solid ${selected?C.purple:isNew?C.purpleMid:C.cardBorder}`,borderRadius:12,padding:"12px 14px",marginBottom:10,position:"relative"}} onClick={selectable?onToggle:undefined}>{selectable&&<div style={{position:"absolute",top:10,right:10,width:20,height:20,borderRadius:"50%",border:`2px solid ${selected?C.purple:C.cardBorder}`,background:selected?C.purple:"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,color:C.white}}>{selected?"✓":""}</div>}<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><span style={{width:26,height:26,borderRadius:"50%",background:typeBg(m.type),display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>{typeIcons[m.type]||"🔗"}</span><span style={{fontSize:12,color:C.textLight}}>{fmt(m.ts)}</span>{onDelete&&<button onClick={e=>{e.stopPropagation();onDelete();}} style={{marginLeft:"auto",fontSize:12,color:C.textLight,background:"none",border:"none",cursor:"pointer"}}>remover</button>}</div>{renderContent(m,true)}{m.caption&&<p style={{margin:"8px 0 0",fontSize:12,color:C.textMid}}>{m.caption}</p>}</div>;

  const buildSlots=()=>{const byTime={};moments.forEach(m=>{const k=fmt(m.ts);if(!byTime[k])byTime[k]=[];byTime[k].push(m);});const times=new Set(Object.keys(byTime));if(isToday)times.add(nowKey);return Array.from(times).sort().map(time=>({time,moments:byTime[time]||[],isNow:isToday&&time===nowKey}));};
  const slots=buildSlots();

  return <div style={{maxWidth:480,margin:"0 auto",background:dayColor.bg,minHeight:"100vh",transition:"background 0.4s"}}>
    <div style={{background:C.white,borderBottom:`1px solid ${C.cardBorder}`}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px 6px"}}><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:17}}>🌿</span><span style={{fontSize:15,fontWeight:500,color:C.textMid}}>veeda</span></div><button onClick={onLogout} style={{fontSize:12,color:C.textLight,background:"none",border:"none"}}>sair</button></div>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 0 14px",borderBottom:`1px solid ${C.cardBorder}`,cursor:"pointer"}} onClick={()=>view==="hoje"&&setShowAvatar(true)}><AvatarBubble emoji={profile.emoji} color={profile.avatarColor||C.purpleLight} size={64} ring/><p style={{margin:"8px 0 0",fontSize:14,fontWeight:500,color:C.text}}>{profile.name}</p>{feeling&&<div style={{display:"inline-flex",alignItems:"center",gap:4,marginTop:4,background:C.purpleLight,borderRadius:20,padding:"3px 10px"}}><span style={{fontSize:13}}>{feeling.emoji}</span><span style={{fontSize:11,color:C.purple}}>{feeling.label}</span></div>}{view==="hoje"&&<span style={{fontSize:11,color:C.textLight,marginTop:4}}>editar perfil</span>}</div>
      <div style={{display:"flex",padding:"0 8px",overflowX:"auto"}}>{[["hoje","Hoje"],["grupo",group],["compartilhar","Compartilhar"],["recebidos","Recebidos"]].map(([v,label])=><button key={v} onClick={()=>setView(v)} style={{padding:"10px 14px",fontSize:13,fontWeight:view===v?500:400,background:"none",border:"none",borderBottom:`2px solid ${view===v?C.purple:"transparent"}`,color:view===v?C.purple:C.textMid,cursor:"pointer",whiteSpace:"nowrap"}}>{label}</button>)}</div>
    </div>

    <div style={{paddingBottom:80}}>
      {view==="hoje"&&<div onTouchStart={e=>{touchX.current=e.touches[0].clientX;}} onTouchEnd={e=>{if(touchX.current===null)return;const dx=touchX.current-e.changedTouches[0].clientX;if(Math.abs(dx)>50){if(dx>0)setDayOffset(o=>o+1);else setDayOffset(o=>Math.max(0,o-1));}touchX.current=null;}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 8px 2px"}}><button onClick={()=>setDayOffset(o=>o+1)} style={{background:"none",border:"none",fontSize:22,color:C.textMid,cursor:"pointer",padding:"4px 10px"}}>‹</button><p style={{margin:0,fontSize:12,color:C.textLight}}>{fmtFull(curDay).split(",").slice(1).join(",").trim()}</p><button onClick={()=>setDayOffset(o=>Math.max(0,o-1))} style={{background:"none",border:"none",fontSize:22,color:dayOffset===0?"transparent":C.textMid,cursor:dayOffset===0?"default":"pointer",padding:"4px 10px",pointerEvents:dayOffset===0?"none":"auto"}}>›</button></div>
        <div style={{display:"flex",gap:8,padding:"6px 16px 8px",justifyContent:"center",flexWrap:"wrap"}}><button onClick={()=>setShowEditDay(true)} style={{fontSize:12,padding:"4px 12px",background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:20,color:C.textMid,cursor:"pointer"}}>🎨 cor do dia</button><button onClick={()=>setShowFeeling(true)} style={{fontSize:12,padding:"4px 12px",background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:20,color:C.textMid,cursor:"pointer"}}>{feeling?`${feeling.emoji} ${feeling.label}`:"😊 sentimento"}</button>{isToday&&<button onClick={()=>setShowModal(true)} style={{fontSize:12,padding:"4px 12px",background:C.purpleLight,border:`1px solid ${C.purpleMid}`,borderRadius:20,color:C.purple,cursor:"pointer",fontWeight:500}}>+ registrar</button>}</div>
        {isToday&&<p style={{textAlign:"center",fontSize:11,color:C.textLight,margin:"0 0 4px"}}>← deslize para dias anteriores</p>}
        <div style={{position:"relative",padding:"16px 0 24px"}}>
          {slots.length>0&&<div style={{position:"absolute",left:"50%",top:0,bottom:0,width:3,borderRadius:3,background:`linear-gradient(to bottom,${dayColor.dot}44,${dayColor.dot} 30%,${C.blueMid} 70%,${C.blueLight})`,transform:"translateX(-50%)",zIndex:0}}/>}
          {slots.length===0&&<div style={{textAlign:"center",padding:"3rem 2rem"}}><p style={{fontSize:14,color:C.textLight,margin:0}}>{isToday?"Nenhum momento ainda.":"Nenhum momento neste dia."}</p></div>}
          {slots.map((slot,i)=>{const isLeft=i%2===0;return <div key={slot.time} style={{position:"relative",display:"flex",alignItems:"flex-start",marginBottom:28,zIndex:1}}>
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"flex-end",paddingRight:20,paddingLeft:12}}>{isLeft&&(slot.isNow?<button onClick={()=>setShowModal(true)} style={{background:C.white,border:`1.5px solid ${dayColor.dot}`,borderRadius:20,padding:"9px 16px",fontSize:13,color:C.purple,cursor:"pointer",fontWeight:500,lineHeight:1.4,textAlign:"center"}}>registrar<br/>acontecimento</button>:slot.moments.map(m=><MiniCard key={m.id} m={m} isNew={m.id===lastMId&&lastId===null}/>))}</div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0,position:"relative",zIndex:2}}>{slot.isNow?<PulsingDot onClick={()=>setShowModal(true)} color={dayColor.dot}/>:<div style={{width:14,height:14,borderRadius:"50%",background:typeColor(slot.moments[0]&&slot.moments[0].type),border:`2.5px solid ${C.white}`,outline:`2px solid ${typeBg(slot.moments[0]&&slot.moments[0].type)}`}}/>}<span style={{fontSize:10,color:C.textLight,marginTop:4,whiteSpace:"nowrap"}}>{slot.time}</span></div>
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"flex-start",paddingLeft:20,paddingRight:12}}>{!isLeft&&(slot.isNow?<button onClick={()=>setShowModal(true)} style={{background:C.white,border:`1.5px solid ${dayColor.dot}`,borderRadius:20,padding:"9px 16px",fontSize:13,color:C.purple,cursor:"pointer",fontWeight:500,lineHeight:1.4,textAlign:"center"}}>registrar<br/>acontecimento</button>:slot.moments.map(m=><MiniCard key={m.id} m={m} isNew={m.id===lastMId&&lastId===null}/>))}</div>
          </div>;})}
        </div>
        {moments.length>0&&<div style={{padding:"0 16px 16px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}><p style={{margin:0,fontSize:13,fontWeight:500,color:C.textMid}}>Momentos do dia</p>{isToday&&!exportSel&&<button onClick={()=>setExportSel(moments.map(m=>m.id))} style={{fontSize:12,color:C.purple,background:"none",border:"none",cursor:"pointer"}}>selecionar para compartilhar</button>}</div>
          {exportSel?<div><p style={{fontSize:12,color:C.textMid,margin:"0 0 10px"}}>Toque para incluir/excluir:</p>{moments.map(m=><FullCard key={m.id} m={m} selectable selected={exportSel.includes(m.id)} onToggle={()=>toggleSel(m.id)}/>)}<div style={{display:"flex",gap:8,marginTop:4}}><button onClick={()=>setExportSel(null)} style={{flex:1,padding:"9px 0",background:"#F5F3FB",border:`1px solid ${C.cardBorder}`,borderRadius:8,color:C.textMid,cursor:"pointer"}}>Cancelar</button><button onClick={()=>setView("compartilhar")} style={{flex:1,padding:"9px 0",background:C.purple,border:"none",borderRadius:8,color:C.white,fontWeight:500,cursor:"pointer"}}>Exportar</button></div></div>
          :moments.map(m=><FullCard key={m.id} m={m} onDelete={()=>delMoment(curDay,m.id)} isNew={m.id===lastMId&&lastId===null}/>)}
        </div>}
      </div>}

      {view==="grupo"&&<div style={{padding:"20px 16px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}><p style={{margin:0,fontSize:16,fontWeight:500,color:C.text}}>{group}</p><button onClick={()=>{setNewGroup(group);setShowGroupName(true);}} style={{fontSize:12,color:C.purple,background:"none",border:"none",cursor:"pointer"}}>renomear</button></div>
        <Btn onClick={()=>setShowInvite(true)} style={{marginBottom:20}}>+ Convidar pessoa</Btn>
        {(!data.contacts||data.contacts.length===0)?<p style={{fontSize:14,color:C.textLight,textAlign:"center",marginTop:24}}>Nenhum contato ainda.</p>:data.contacts.map((c,i)=><div key={i} style={{background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:12,padding:"12px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:12}}><AvatarBubble emoji={c.emoji||"🌿"} color={c.color||C.purpleLight} size={38}/><div style={{flex:1}}><p style={{margin:0,fontSize:14,fontWeight:500,color:C.text}}>{c.name}</p><p style={{margin:0,fontSize:12,color:C.textMid}}>Código: <span style={{fontFamily:"monospace",color:C.purple}}>{c.code}</span></p></div><button onClick={()=>{const nc=[...data.contacts];nc.splice(i,1);save({...data,contacts:nc});}} style={{fontSize:12,color:C.textLight,background:"none",border:"none",cursor:"pointer"}}>remover</button></div>)}
        <div style={{background:C.purpleLight,border:`1px solid ${C.purpleMid}`,borderRadius:10,padding:"12px 14px",marginTop:8}}><p style={{fontSize:13,color:C.purple,margin:0}}>💡 Compartilhe o código com a pessoa.</p></div>
      </div>}

      {view==="compartilhar"&&<div style={{padding:"20px 16px"}}>
        <p style={{fontSize:14,color:C.textMid,lineHeight:1.6,marginTop:0}}>Exporte um dia como arquivo <strong style={{color:C.text}}>.veeda</strong> criptografado.</p>
        <div style={{background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:12,padding:"1.25rem",marginBottom:14}}>
          <label style={{fontSize:13,color:C.textMid,display:"block",marginBottom:6}}>Dia para exportar</label>
          <select value={exportDay} onChange={e=>setExportDay(e.target.value)} style={{marginBottom:16}}>{allDays.map(d=><option key={d} value={d}>{fmtFull(d)}</option>)}</select>
          <label style={{fontSize:13,color:C.textMid,display:"block",marginBottom:6}}>Chave de criptografia</label>
          <input value={exportKey} onChange={e=>setExportKey(e.target.value)} placeholder="Ex: sol-lua-7" style={{marginBottom:16}}/>
          <Btn onClick={async()=>{const allM=data.moments[exportDay]||[],toEx=exportSel?allM.filter(m=>exportSel.includes(m.id)):allM;if(!toEx.length){setExportMsg("Nenhum momento.");return;}if(!exportKey.trim()){setExportMsg("Digite uma chave.");return;}try{const enc=await encryptObj({date:exportDay,author:profile.name,emoji:profile.emoji,avatarColor:profile.avatarColor,moments:toEx,feeling:(data.dayFeelings||{})[exportDay]},exportKey.trim()),a=document.createElement("a");a.href=URL.createObjectURL(new Blob([enc],{type:"text/plain"}));a.download=`veeda-${exportDay}.veeda`;a.click();setExportMsg("Exportado!");setExportSel(null);}catch{setExportMsg("Erro.");}}}>Exportar .veeda</Btn>
          {exportMsg&&<p style={{fontSize:13,color:C.green,marginTop:10,marginBottom:0}}>{exportMsg}</p>}
        </div>
        <div style={{background:C.purpleLight,border:`1px solid ${C.purpleMid}`,borderRadius:10,padding:"12px 14px"}}><p style={{fontSize:13,color:C.purple,margin:0}}>🔒 Envie a chave por canal separado.</p></div>
      </div>}

      {view==="recebidos"&&!viewRec&&<div style={{padding:"20px 16px"}}>
        <div style={{background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:12,padding:"1.25rem",marginBottom:20}}>
          <p style={{fontSize:14,fontWeight:500,color:C.text,margin:"0 0 14px"}}>Importar um dia recebido</p>
          <input ref={fileRef} type="file" accept=".veeda" style={{display:"none"}} onChange={e=>setImportFile(e.target.files[0])}/>
          <button onClick={()=>fileRef.current.click()} style={{width:"100%",marginBottom:10,padding:"9px 0",background:C.blueLight,color:C.blue,border:`1px solid ${C.blueMid}`,borderRadius:8,cursor:"pointer",fontSize:13}}>{importFile?`📄 ${importFile.name}`:"Selecionar arquivo .veeda"}</button>
          <input value={importKey} onChange={e=>setImportKey(e.target.value)} placeholder="Chave fornecida pelo remetente" style={{marginBottom:12}}/>
          <Btn onClick={async()=>{if(!importFile||!importKey.trim()){setImportMsg("Selecione o arquivo e informe a chave.");return;}try{const payload=await decryptObj(await importFile.text(),importKey.trim());if(data.received.find(r=>r.date===payload.date&&r.author===payload.author)){setImportMsg("Já importado.");return;}save({...data,received:[...data.received,{...payload,importedAt:Date.now()}]});setImportMsg(`Dia de ${payload.author} importado!`);setImportFile(null);setImportKey("");}catch{setImportMsg("Chave incorreta ou arquivo inválido.");}}}>Importar</Btn>
          {importMsg&&<p style={{fontSize:13,color:C.green,marginTop:10,marginBottom:0}}>{importMsg}</p>}
        </div>
        {data.received.length===0?<p style={{fontSize:14,color:C.textLight,textAlign:"center",marginTop:32}}>Nenhum dia recebido ainda.</p>:data.received.slice().sort((a,b)=>b.importedAt-a.importedAt).map((r,i)=><div key={i} onClick={()=>setViewRec(r)} style={{background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:12,padding:"12px 14px",marginBottom:10,cursor:"pointer",display:"flex",alignItems:"center",gap:12}}><AvatarBubble emoji={r.emoji||"🌿"} color={r.avatarColor||C.purpleLight} size={42} ring/><div style={{flex:1}}><p style={{margin:0,fontSize:14,fontWeight:500,color:C.text}}>{r.author}</p><p style={{margin:0,fontSize:12,color:C.textMid}}>{fmtLabel(r.date)} · {r.moments.length} momento{r.moments.length!==1?"s":""}{r.feeling?` · ${r.feeling.emoji}`:""}</p></div><span style={{color:C.textLight,fontSize:18}}>›</span></div>)}
      </div>}
      {view==="recebidos"&&viewRec&&<div style={{padding:"0 0 20px"}}>
        <div style={{background:C.white,borderBottom:`1px solid ${C.cardBorder}`,display:"flex",flexDirection:"column",alignItems:"center",padding:"16px 0 14px"}}><AvatarBubble emoji={viewRec.emoji||"🌿"} color={viewRec.avatarColor||C.purpleLight} size={64} ring/><p style={{margin:"8px 0 2px",fontSize:15,fontWeight:500,color:C.text}}>{viewRec.author}</p><p style={{margin:0,fontSize:12,color:C.textLight}}>{fmtFull(viewRec.date)}</p>{viewRec.feeling&&<div style={{display:"inline-flex",alignItems:"center",gap:4,marginTop:8,background:C.purpleLight,borderRadius:20,padding:"3px 10px"}}><span style={{fontSize:13}}>{viewRec.feeling.emoji}</span><span style={{fontSize:11,color:C.purple}}>{viewRec.feeling.label}</span></div>}<button onClick={()=>setViewRec(null)} style={{marginTop:10,fontSize:13,color:C.textMid,background:"none",border:`1px solid ${C.cardBorder}`,borderRadius:20,padding:"4px 14px",cursor:"pointer"}}>‹ Voltar</button></div>
        <div style={{padding:"16px 16px 0"}}>{viewRec.moments.slice().sort((a,b)=>a.ts-b.ts).map(m=><div key={m.id} style={{background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:12,padding:"12px 14px",marginBottom:10}}><div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8}}><span style={{width:26,height:26,borderRadius:"50%",background:typeBg(m.type),display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>{typeIcons[m.type]||"🔗"}</span><span style={{fontSize:12,color:C.textLight}}>{fmt(m.ts)}</span></div>{renderContent(m,true)}{m.caption&&<p style={{margin:"8px 0 0",fontSize:12,color:C.textMid}}>{m.caption}</p>}</div>)}</div>
      </div>}
    </div>

    {showModal&&<Modal title="Registrar acontecimento" onClose={resetModal}>
      <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>{[["texto","✏️","texto"],["foto","📷","foto"],["video","🎬","vídeo"],["link","🔗","link"],["musica","🎵","música"]].map(([t,icon,label])=><button key={t} onClick={()=>{setAddType(t);setAddMedia(null);setAddContent("");}} style={{padding:"5px 12px",fontSize:13,background:addType===t?typeBg(t):"#F5F3FB",border:`1px solid ${addType===t?typeColor(t):C.cardBorder}`,borderRadius:20,cursor:"pointer",color:addType===t?typeColor(t):C.textMid}}>{icon} {label}</button>)}</div>
      {addType==="foto"&&(!addMedia?<div style={{display:"flex",gap:8,marginBottom:10}}><input ref={fileRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)readFile(f,setAddMedia);}}/><input type="file" accept="image/*" style={{display:"none"}} id="gfoto" onChange={e=>{const f=e.target.files[0];if(f)readFile(f,setAddMedia);}}/><button onClick={()=>fileRef.current.click()} style={{flex:1,padding:"10px 0",background:C.blueLight,color:C.blue,border:`1px solid ${C.blueMid}`,borderRadius:8,cursor:"pointer",fontSize:13}}>📷 Câmera</button><button onClick={()=>document.getElementById("gfoto").click()} style={{flex:1,padding:"10px 0",background:C.purpleLight,color:C.purple,border:`1px solid ${C.purpleMid}`,borderRadius:8,cursor:"pointer",fontSize:13}}>🖼️ Galeria</button></div>:<div style={{marginBottom:10,position:"relative"}}><img src={addMedia} alt="" style={{width:"100%",borderRadius:8}}/><button onClick={()=>setAddMedia(null)} style={{position:"absolute",top:6,right:6,background:"rgba(0,0,0,0.45)",border:"none",borderRadius:"50%",width:28,height:28,color:C.white,cursor:"pointer",fontSize:14}}>×</button></div>)}
      {addType==="video"&&(!addMedia?<div style={{display:"flex",gap:8,marginBottom:10}}><input ref={vidRef} type="file" accept="video/*" capture="environment" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)readFile(f,setAddMedia);}}/><input type="file" accept="video/*" style={{display:"none"}} id="gvideo" onChange={e=>{const f=e.target.files[0];if(f)readFile(f,setAddMedia);}}/><button onClick={()=>vidRef.current.click()} style={{flex:1,padding:"10px 0",background:C.blueLight,color:C.blue,border:`1px solid ${C.blueMid}`,borderRadius:8,cursor:"pointer",fontSize:13}}>🎥 Gravar</button><button onClick={()=>document.getElementById("gvideo").click()} style={{flex:1,padding:"10px 0",background:C.purpleLight,color:C.purple,border:`1px solid ${C.purpleMid}`,borderRadius:8,cursor:"pointer",fontSize:13}}>📁 Galeria</button></div>:<div style={{marginBottom:10,position:"relative"}}><video src={addMedia} controls style={{width:"100%",borderRadius:8,maxHeight:240}}/><button onClick={()=>setAddMedia(null)} style={{position:"absolute",top:6,right:6,background:"rgba(0,0,0,0.45)",border:"none",borderRadius:"50%",width:28,height:28,color:C.white,cursor:"pointer",fontSize:14}}>×</button></div>)}
      {(addType==="texto"||addType==="link"||addType==="musica")&&<textarea value={addContent} onChange={e=>setAddContent(e.target.value)} placeholder={addType==="link"?"Cole o link...":addType==="musica"?"Música e artista...":"O que aconteceu?"} style={{width:"100%",minHeight:80,marginBottom:10}}/>}
      <input value={addCaption} onChange={e=>setAddCaption(e.target.value)} placeholder="Legenda (opcional)" style={{marginBottom:14}}/>
      <Btn onClick={addMoment}>Adicionar</Btn>
    </Modal>}
    {showEditDay&&<Modal title="Cor do dia" onClose={()=>setShowEditDay(false)}><div style={{display:"flex",gap:10,flexWrap:"wrap",justifyContent:"center",padding:"8px 0"}}>{DAY_COLORS.map(col=><button key={col.label} onClick={()=>{save({...data,dayColors:{...(data.dayColors||{}),[curDay]:col.label}});setShowEditDay(false);}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,background:"none",border:"none",cursor:"pointer",padding:8}}><div style={{width:44,height:44,borderRadius:"50%",background:col.bg,border:`2.5px solid ${col.dot}`,outline:dayColor.label===col.label?`2px solid ${C.purple}`:"none",outlineOffset:2}}/><span style={{fontSize:11,color:C.textMid}}>{col.label}</span></button>)}</div></Modal>}
    {showFeeling&&<Modal title="Como foi esse dia?" onClose={()=>setShowFeeling(false)}><div style={{display:"flex",gap:10,flexWrap:"wrap",justifyContent:"center",padding:"8px 0"}}>{FEELINGS.map(f=><button key={f.label} onClick={()=>{save({...data,dayFeelings:{...(data.dayFeelings||{}),[curDay]:f}});setShowFeeling(false);}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,background:feeling&&feeling.label===f.label?C.purpleLight:"#F5F3FB",border:`1.5px solid ${feeling&&feeling.label===f.label?C.purple:C.cardBorder}`,borderRadius:12,padding:"10px 14px",cursor:"pointer",minWidth:64}}><span style={{fontSize:26}}>{f.emoji}</span><span style={{fontSize:11,color:C.textMid}}>{f.label}</span></button>)}</div></Modal>}
    {showAvatar&&<Modal title="Personalizar perfil" onClose={()=>setShowAvatar(false)}>
      <p style={{fontSize:13,color:C.textMid,marginBottom:10}}>Avatar</p>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:20}}>{AVATAR_EMOJIS.map(e=><button key={e} onClick={()=>onUpdateProfile({...profile,emoji:e})} style={{fontSize:20,background:profile.emoji===e?C.purpleLight:"#F5F3FB",border:`1.5px solid ${profile.emoji===e?C.purple:C.cardBorder}`,borderRadius:10,width:42,height:42,cursor:"pointer"}}>{e}</button>)}</div>
      <p style={{fontSize:13,color:C.textMid,marginBottom:10}}>Cor do avatar</p>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:20}}>{AVATAR_COLORS.map(col=><button key={col} onClick={()=>onUpdateProfile({...profile,avatarColor:col})} style={{width:36,height:36,borderRadius:"50%",background:col,border:`2px solid ${profile.avatarColor===col?C.purple:C.cardBorder}`,cursor:"pointer"}}/>)}</div>
      <div style={{display:"flex",justifyContent:"center",marginBottom:20}}><AvatarBubble emoji={profile.emoji} color={profile.avatarColor||C.purpleLight} size={56} ring/></div>
      <Btn onClick={()=>setShowAvatar(false)}>Salvar</Btn>
    </Modal>}
    {showInvite&&<Modal title="Convidar pessoa" onClose={()=>setShowInvite(false)}>
      <label style={{fontSize:13,color:C.textMid,display:"block",marginBottom:6}}>Nome da pessoa</label>
      <input value={invName} onChange={e=>setInvName(e.target.value)} placeholder="Ex: Mamãe" style={{marginBottom:14}}/>
      <label style={{fontSize:13,color:C.textMid,display:"block",marginBottom:6}}>Código do convite</label>
      <div style={{display:"flex",gap:8,marginBottom:16}}><input value={invCode} onChange={e=>setInvCode(e.target.value)} placeholder="Ex: sol-lua-7" style={{flex:1,width:"auto"}}/><button onClick={()=>{const w=["sol","lua","rio","mar","flor","paz","luz","céu","vale","nuvem"];setInvCode(`${w[Math.floor(Math.random()*w.length)]}-${Math.floor(100+Math.random()*900)}`);}} style={{padding:"0 12px",background:C.purpleLight,border:`1px solid ${C.purpleMid}`,borderRadius:8,color:C.purple,cursor:"pointer",fontSize:13,whiteSpace:"nowrap"}}>gerar</button></div>
      <Btn onClick={()=>{if(!invName.trim()||!invCode.trim())return;save({...data,contacts:[...(data.contacts||[]),{name:invName.trim(),code:invCode.trim(),emoji:"🌿",addedAt:Date.now()}]});setInvName("");setInvCode("");setShowInvite(false);}}>Adicionar ao grupo</Btn>
    </Modal>}
    {showGroupName&&<Modal title="Renomear grupo" onClose={()=>setShowGroupName(false)}>
      <input value={newGroup} onChange={e=>setNewGroup(e.target.value)} placeholder="Nome do grupo" style={{marginBottom:14}}/>
      <Btn onClick={()=>{if(newGroup.trim()){save({...data,groupName:newGroup.trim()});setShowGroupName(false);}}}>Salvar</Btn>
    </Modal>}
  </div>;
}

function Veeda(){
  const[screen,setScreen]=useState("loading");
  const[profiles,setProfiles]=useState([]);
  const[selProfile,setSelProfile]=useState(null);
  const[activeProfile,setActiveProfile]=useState(null);
  const[activePw,setActivePw]=useState(null);
  const[forgotProfile,setForgotProfile]=useState(null);

  useEffect(()=>{const ps=loadProfiles();setProfiles(ps);setScreen(ps.length===0?"create":"select");},[]);
  const refresh=()=>{const ps=loadProfiles();setProfiles(ps);return ps;};
  const updateProfile=updated=>{const ps=loadProfiles(),idx=ps.findIndex(p=>p.id===updated.id);if(idx>=0){ps[idx]={...ps[idx],emoji:updated.emoji,avatarColor:updated.avatarColor};localStorage.setItem(PROFILES_KEY,JSON.stringify(ps));setActiveProfile(updated);}};

  if(screen==="loading")return <div style={{padding:32,textAlign:"center",fontSize:32}}>🌿</div>;
  if(screen==="app"&&activeProfile&&activePw)return <VeedaApp profile={activeProfile} password={activePw} onLogout={()=>{setActiveProfile(null);setActivePw(null);const ps=refresh();setScreen(ps.length===0?"create":"select");}} onUpdateProfile={updateProfile}/>;
  if(screen==="forgot"&&forgotProfile)return <ScreenForgot profile={forgotProfile} onBack={()=>setScreen("password")} onSuccess={pw=>{const ps=loadProfiles(),p=ps.find(x=>x.id===forgotProfile.id);setActiveProfile(p);setActivePw(pw);setForgotProfile(null);setScreen("app");}}/>;
  if(screen==="password"&&selProfile)return <ScreenPassword profile={selProfile} onBack={()=>setScreen("select")} onForgot={()=>{setForgotProfile(selProfile);setScreen("forgot");}} onSuccess={pw=>{setActiveProfile(selProfile);setActivePw(pw);setScreen("app");}}/>;
  if(screen==="create")return <ScreenCreate onBack={()=>setScreen(profiles.length>0?"select":"create")} onDone={(profile,pw)=>{refresh();setActiveProfile(profile);setActivePw(pw);setScreen("app");}}/>;
  return <ScreenSelect profiles={profiles} onSelect={p=>{setSelProfile(p);setScreen("password");}} onNew={()=>setScreen("create")}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Veeda/>);

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    const sw=`const CACHE="veeda-v2",FILES=["./index.html"];self.addEventListener("install",e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(FILES))));self.addEventListener("fetch",e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
    const blob=new Blob([sw],{type:"application/javascript"});
    navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  });
}
</script>
