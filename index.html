          </div>}

          {showHandle?(
            <div style={{marginBottom:14}}>
              <label style={{fontSize:12,color:C.textMid,display:"block",marginBottom:6}}>Novo @handle</label>
              <div style={{position:"relative",marginBottom:handleErr?6:12}}>
                <span style={{position:"absolute",left:16,top:"50%",transform:"translateY(-50%)",color:C.purple,fontWeight:700,pointerEvents:"none"}}>@</span>
                <input value={handleInput} onChange={e=>{setHandleInput(sanitizeHandle(e.target.value));setHandleErr("");}} style={{paddingLeft:28}} autoFocus/>
              </div>
              {handleErr&&<p style={{fontSize:12,color:C.red,margin:"0 0 10px"}}>{handleErr}</p>}
              <div style={{display:"flex",gap:8}}>
                <Btn onClick={saveHandle} style={{flex:1,fontSize:13,padding:"10px 0"}}>Salvar</Btn>
                <Btn onClick={()=>setShowHandle(false)} variant="ghost" style={{flex:1}}>Cancelar</Btn>
              </div>
            </div>
          ):(
            <div>
              {[{label:"@handle",val:profile.handle||nameToHandle(profile.name),action:()=>setShowHandle(true)},{label:"E-mail",val:profile.email||"—"},{label:"Código de Conexão",val:"Compartilhar",action:()=>setShowCode(true)},{label:"Backup / Restaurar",val:"→",action:()=>setShowBackup(true)}].map((row,i,arr)=>(
                <div key={row.label}>
                  <button onClick={row.action} style={{width:"100%",display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 16px",background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:i===0?"14px 14px 0 0":i===arr.length-1?"0 0 14px 14px":"0",borderTop:i>0?"none":"",cursor:row.action?"pointer":"default",textAlign:"left"}}>
                    <span style={{fontSize:14,color:C.text}}>{row.label}</span>
                    <span style={{fontSize:13,color:row.action?C.purple:C.textLight}}>{row.val}</span>
                  </button>
                </div>
              ))}
            </div>
          )}
          <div style={{marginTop:16}}>
            <Btn onClick={()=>{onLogout();onClose();}} variant="danger">Sair da conta</Btn>
          </div>
        </div>}

        {tab==="dados"&&<div>
          <div style={{background:C.purpleLight,borderRadius:14,padding:16,marginBottom:16}}>
            <p style={{margin:"0 0 8px",fontSize:13,fontWeight:600,color:C.text}}>Histórico do mês atual</p>
            <p style={{margin:0,fontSize:12,color:C.textMid,lineHeight:1.6}}>Seus dados são salvos automaticamente a cada ação e protegidos por snapshots mensais. Nenhum dado do mês atual é perdido sem confirmação.</p>
          </div>
          <div style={{background:C.greenLight,borderRadius:14,padding:16,marginBottom:16,border:`1px solid ${C.green}44`}}>
            <p style={{margin:"0 0 6px",fontSize:13,fontWeight:600,color:C.green}}>✅ Dados protegidos {profile.cloud?"local + nuvem":"localmente"}</p>
            <p style={{margin:0,fontSize:12,color:C.textMid,lineHeight:1.6}}>Todos os seus {totalMoments} momentos estão seguros{profile.cloud?" no seu dispositivo e na sua conta Google (cifrados).":" no seu dispositivo. Use o Backup para proteger também em caso de troca de celular."}</p>
          </div>
          {/* Backups preservados (regra de ouro: nunca apagamos sem confirmação) */}
          {(()=>{const bkps=listPreservedBackups();if(!bkps.length)return null;return(
            <div style={{background:C.amberLight,borderRadius:14,padding:16,marginBottom:16,border:`1px solid ${C.amber}44`}}>
              <p style={{margin:"0 0 6px",fontSize:13,fontWeight:600,color:C.amber}}>📦 {bkps.length} backup(s) preservado(s) de versões anteriores</p>
              <p style={{margin:"0 0 10px",fontSize:12,color:C.textMid,lineHeight:1.6}}>Toda vez que o app fez uma migração importante (ex.: ativação da nuvem), uma cópia dos dados antigos foi guardada localmente. Estes backups nunca são apagados automaticamente.</p>
              {bkps.slice(0,3).map(b=>(
                <div key={b.key} style={{fontSize:11,color:C.textMid,padding:"4px 0",borderTop:`1px dashed ${C.amber}33`}}>{new Date(b.ts).toLocaleString("pt-BR")} · {b.label} · {b.size} chave(s)</div>
              ))}
            </div>
          );})()}
          <Btn onClick={()=>setShowBackup(true)}>Gerenciar Backup</Btn>
        </div>}

        {tab==="notif"&&<div>
          <div style={{background:C.purpleLight,borderRadius:14,padding:16,marginBottom:16}}>
            <p style={{margin:"0 0 8px",fontSize:13,fontWeight:600,color:C.text}}>Notificações</p>
            <p style={{margin:"0 0 12px",fontSize:12,color:C.textMid,lineHeight:1.6}}>Receba alertas quando alguém compartilhar o dia com você e para seus lembretes.</p>
            <Btn onClick={async()=>{const ok=await requestNotifPermission();addToast?.(ok?"Notificações ativadas! 🔔":"Permissão negada.",ok?"success":"error");}}>🔔 Ativar notificações</Btn>
          </div>
          <Btn onClick={()=>{onSave({...data,reminders:[]});addToast?.("Lembretes limpos.","info");}} variant="outline">Limpar lembretes</Btn>
        </div>}

        {tab==="sobre"&&<div>
          <div style={{background:`linear-gradient(135deg,${C.purpleLight},${C.blueLight})`,borderRadius:14,padding:20,textAlign:"center",marginBottom:16}}>
            <p style={{fontFamily:PASSO,fontSize:32,fontWeight:700,color:C.purple,margin:"0 0 4px"}}>Veeda</p>
            <p style={{fontSize:12,color:C.textMid,margin:0}}>v{APP_VERSION} — Dias de Vida</p>
          </div>
          <p style={{fontSize:13,color:C.textMid,lineHeight:1.7,marginBottom:16}}>Veeda nasce da crença de que a vida não cabe em um feed. Viva primeiro, registre, compartilhe depois com quem realmente importa. Seus dados ficam sempre no seu dispositivo.</p>
        </div>}
      </Modal>
    </>
  );
}

function ProfileModal({profile: viewedProfile, myProfile, contacts, receivedDays, onClose, addToast}) {
  // Verificar se o perfil visualizado está no círculo de contatos
  const isInCircle = contacts.some(c => c.handle === viewedProfile.handle || c.id === viewedProfile.id);

  if (!isInCircle) {
    return (
      <Modal title="Perfil Privado" onClose={onClose}>
        <div style={{textAlign: 'center', padding: '40px 20px'}}>
          <div style={{fontSize: '48px', marginBottom: '16px'}}>🔒</div>
          <p style={{margin: '0 0 8px', fontSize: '16px', fontWeight: '600', color: C.text}}>
            Perfil Privado
          </p>
          <p style={{margin: 0, fontSize: '14px', color: C.textMid, lineHeight: 1.5}}>
            Este perfil só pode ser visualizado por pessoas do círculo.
            Adicione {viewedProfile.name} ao seu Meu Círculo para ver o perfil completo.
          </p>
        </div>
        <Btn onClick={onClose} style={{marginTop: '20px'}}>Entendi</Btn>
      </Modal>
    );
  }

  // Calcular estatísticas do perfil
  const totalDaysShared = receivedDays.filter(d => d.handle === viewedProfile.handle).length;
  const totalMoments = receivedDays
    .filter(d => d.handle === viewedProfile.handle)
    .reduce((sum, d) => sum + (d.moments?.length || 0), 0);

  const lastSharedDate = receivedDays
    .filter(d => d.handle === viewedProfile.handle)
    .sort((a, b) => new Date(b.date) - new Date(a.date))[0]?.date;

  return (
    <Modal title={`Perfil de ${viewedProfile.name}`} onClose={onClose} fullHeight>
      <div style={{paddingBottom: '20px'}}>
        {/* Header do perfil */}
        <div style={{
          display: 'flex',
          flexDirection: 'column',
          alignItems: 'center',
          padding: '20px 0',
          borderBottom: `1px solid ${C.headerBorder}`,
          marginBottom: '24px'
        }}>
          <AvatarBubble
            src={viewedProfile.avatarSrc}
            emoji={viewedProfile.emoji || '🌿'}
            color={viewedProfile.avatarColor || C.purpleLight}
            size={80}
            ring
          />
          <h2 style={{
            margin: '16px 0 4px',
            fontSize: '20px',
            fontWeight: '700',
            color: C.text,
            fontFamily: PASSO,
            textAlign: 'center'
          }}>
            {viewedProfile.name}
          </h2>
          <p style={{
            margin: 0,
            fontSize: '14px',
            color: C.purple,
            fontWeight: '500'
          }}>
            @{viewedProfile.handle || nameToHandle(viewedProfile.name)}
          </p>
        </div>

        {/* Estatísticas */}
        <div style={{marginBottom: '24px'}}>
          <h3 style={{
            margin: '0 0 16px',
            fontSize: '16px',
            fontWeight: '600',
            color: C.text,
            fontFamily: PASSO
          }}>
            Estatísticas
          </h3>
          <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px'}}>
            <Card style={{textAlign: 'center', padding: '16px'}}>
              <div style={{fontSize: '24px', marginBottom: '4px'}}>📅</div>
              <div style={{fontSize: '18px', fontWeight: '700', color: C.purple}}>{totalDaysShared}</div>
              <div style={{fontSize: '12px', color: C.textMid}}>Dias compartilhados</div>
            </Card>
            <Card style={{textAlign: 'center', padding: '16px'}}>
              <div style={{fontSize: '24px', marginBottom: '4px'}}>💭</div>
              <div style={{fontSize: '18px', fontWeight: '700', color: C.purple}}>{totalMoments}</div>
              <div style={{fontSize: '12px', color: C.textMid}}>Momentos registrados</div>
            </Card>
          </div>
        </div>

        {/* Última atividade */}
        {lastSharedDate && (
          <div style={{marginBottom: '24px'}}>
            <h3 style={{
              margin: '0 0 12px',
              fontSize: '16px',
              fontWeight: '600',
              color: C.text,
              fontFamily: PASSO
            }}>
              Última atividade
            </h3>
            <Card style={{padding: '16px'}}>
              <div style={{display: 'flex', alignItems: 'center', gap: '12px'}}>
                <div style={{fontSize: '20px'}}>🌱</div>
                <div>
                  <p style={{margin: 0, fontSize: '14px', fontWeight: '500', color: C.text}}>
                    Compartilhou um dia
                  </p>
                  <p style={{margin: '2px 0 0', fontSize: '12px', color: C.textMid}}>
                    {fmtFull(lastSharedDate)}
                  </p>
                </div>
              </div>
            </Card>
          </div>
        )}

        {/* Dias compartilhados recentes */}
        {totalDaysShared > 0 && (
          <div style={{marginBottom: '24px'}}>
            <h3 style={{
              margin: '0 0 12px',
              fontSize: '16px',
              fontWeight: '600',
              color: C.text,
              fontFamily: PASSO
            }}>
              Dias compartilhados
            </h3>
            <div style={{display: 'flex', flexDirection: 'column', gap: '8px'}}>
              {receivedDays
                .filter(d => d.handle === viewedProfile.handle)
                .sort((a, b) => new Date(b.date) - new Date(a.date))
                .slice(0, 5)
                .map((day, index) => (
                  <Card key={index} style={{padding: '12px'}}>
                    <div style={{display: 'flex', alignItems: 'center', gap: '12px'}}>
                      <AvatarBubble
                        emoji={day.emoji || '🌿'}
                        color={day.avatarColor || C.purpleLight}
                        size={32}
                      />
                      <div style={{flex: 1}}>
                        <p style={{margin: 0, fontSize: '14px', fontWeight: '500', color: C.text}}>
                          {fmtLabel(day.date)}
                        </p>
                        <p style={{margin: '2px 0 0', fontSize: '12px', color: C.textMid}}>
                          {day.moments?.length || 0} momento{day.moments?.length !== 1 ? 's' : ''}
                          {day.feeling && ` · ${day.feeling.emoji}`}
                        </p>
                      </div>
                    </div>
                  </Card>
                ))}
            </div>
          </div>
        )}

        {/* Ações */}
        <div style={{
          paddingTop: '20px',
          borderTop: `1px solid ${C.headerBorder}`,
          display: 'flex',
          gap: '12px'
        }}>
          <Btn
            variant="outline"
            style={{flex: 1}}
            onClick={() => {
              // Implementar compartilhamento do perfil
              addToast?.('Funcionalidade em breve! 🌱', 'info');
            }}
          >
            Compartilhar perfil
          </Btn>
          <Btn
            variant="ghost"
            style={{flex: 1}}
            onClick={onClose}
          >
            Fechar
          </Btn>
        </div>
      </div>
    </Modal>
  );
}

// IMPORT LOCAL — migra perfis locais pro Drive
// ═══════════════════════════════════════════════════
function ScreenGoogleImport({localProfiles,onCancel,onImport,importing,result}){
  const [selected,setSelected]=useState(localProfiles.map(p=>p.id));
  const toggle=id=>setSelected(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]);
  return(
    <div style={{maxWidth:420,margin:"0 auto",padding:"2rem 1.25rem",background:C.bg,minHeight:"100vh"}}>
      <Btn onClick={onCancel} variant="ghost" style={{width:"auto",marginBottom:16}}>‹ Voltar</Btn>
      <p style={{fontSize:20,fontWeight:700,color:C.text,marginBottom:4,fontFamily:PASSO}}>Importar conta local</p>
      <p style={{fontSize:13,color:C.textMid,lineHeight:1.6,marginBottom:18}}>Encontramos {localProfiles.length} perfil(is) salvo(s) neste dispositivo. Escolha quais enviar pra sua conta Google. Uma cópia de segurança dos dados originais será mantida neste navegador.</p>
      {localProfiles.map(p=>(
        <label key={p.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",background:selected.includes(p.id)?"#E8FBF0":C.white,border:`1.5px solid ${selected.includes(p.id)?C.green:C.cardBorder}`,borderRadius:14,marginBottom:10,cursor:"pointer"}}>
          <input type="checkbox" checked={selected.includes(p.id)} onChange={()=>toggle(p.id)} style={{width:18,height:18}}/>
          <AvatarBubble src={p.avatarSrc} emoji={p.emoji||"🌿"} color={p.avatarColor||C.purpleLight} size={38}/>
          <div style={{flex:1}}>
            <p style={{margin:0,fontSize:14,fontWeight:600,color:C.text}}>{p.name||"(sem nome)"}</p>
            <p style={{margin:0,fontSize:12,color:C.textLight}}>{p.handle||p.email||"perfil local"}</p>
          </div>
        </label>
      ))}
      {result&&(
        <div style={{background:result.ok?C.greenLight:C.redLight,border:`1px solid ${result.ok?C.green:C.red}44`,borderRadius:10,padding:"10px 12px",marginTop:10}}>
          <p style={{margin:0,fontSize:13,color:result.ok?C.green:C.red}}>{result.msg}</p>
        </div>
      )}
      <Btn onClick={()=>onImport(selected)} disabled={importing||selected.length===0} style={{marginTop:16}}>
        {importing?<><Spinner size={16} color="#fff"/>Enviando {selected.length} perfil(is)…</>:`Importar ${selected.length} perfil(is)`}
      </Btn>
    </div>
  );
}

function InstallGuide({onClose}){
  const [tab,setTab]=useState("ios");
  const steps={ios:[["Safari","Acesse o Veeda no Safari do iPhone."],["Compartilhar ↑","Ícone na barra inferior do Safari."],["Adicionar à Tela de Início","Role a lista e toque."],["Confirme","Toque em Adicionar — pronto!"]],android:[["Chrome","Acesse no Google Chrome."],["Menu ⋮","Três pontos no canto superior."],["Instalar app","'Adicionar à tela inicial' ou 'Instalar'."],["Confirme","Toque em Adicionar."]]};
  return(
    <Modal title="Instalar o Veeda" onClose={onClose}>

function ScreenPassword({profile,onSuccess,onBack,onForgot}){

    if(!pw.trim())return;setLoading(true);setErr("");
    const hash=await hashPw(pw.trim());

    <div style={{maxWidth:400,margin:"0 auto",padding:"3rem 21px",background:`linear-gradient(180deg,${C.splashBg} 0%,${C.bg} 40%,${C.bgGradEnd} 100%)`,minHeight:"100vh",display:"flex",flexDirection:"column"}}>

  const [step,setStep]=useState(1);
  const [name,setName]=useState(gName);
  const [handle,setHandle]=useState(sanitizeHandle(gName||gEmail.split("@")[0]||""));

  const [emoji,setEmoji]=useState("🌿");const [avatarColor,setAvatarColor]=useState(C.purpleLight);
  const [avatarSrc,setAvatarSrc]=useState(googleUser?.picture||null);

      const ps=loadProfiles();ps.push(profile);saveProfiles(ps);

function ScreenForgot({profile,onSuccess,onBack}){
  const [step,setStep]=useState(1);const [code,setCode]=useState("");const [pw,setPw]=useState("");const [pw2,setPw2]=useState("");const [err,setErr]=useState("");const [loading,setLoading]=useState(false);
  const verify=async()=>{setLoading(true);setErr("");const h=await hashPw(code.trim().toUpperCase());if(h!==profile.recoveryHash){setErr("Código incorreto.");setLoading(false);return;}setStep(2);setLoading(false);};
  const reset=async()=>{if(pw.length<6){setErr("Mínimo 6 caracteres.");return;}if(pw!==pw2){setErr("Não coincidem.");return;}setLoading(true);try{const stored=safeLS.raw(`veeda_data_${profile.id}`);let d=EMPTY_DATA();try{const r=await decryptObj(stored,code.trim().toUpperCase());d=r.data;}catch{}const ps=loadProfiles();const idx=ps.findIndex(p=>p.id===profile.id);if(idx>=0){ps[idx].passwordHash=await hashPw(pw);saveProfiles(ps);}const enc=await encryptObj(d,pw);safeLS.rawSet(`veeda_data_${profile.id}`,enc);onSuccess(pw);}catch{setErr("Erro ao redefinir.");setLoading(false);}};
  return(
    <div style={{maxWidth:400,margin:"0 auto",padding:"2.5rem 1.25rem",background:C.bg,minHeight:"100vh"}}>
      <Btn onClick={onBack} variant="ghost" style={{width:"auto",marginBottom:24}}>‹ Voltar</Btn>
      <div style={{textAlign:"center",marginBottom:24}}><AvatarBubble src={profile.avatarSrc} emoji={profile.emoji} color={profile.avatarColor||C.purpleLight} size={64} ring/><p style={{margin:"10px 0 0",fontSize:16,fontWeight:700,color:C.text}}>{profile.name}</p></div>
      <div style={{background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:16,padding:"20px"}}>
        {step===1&&<div><p style={{fontSize:15,fontWeight:600,color:C.text,margin:"0 0 14px"}}>Código de recuperação</p><input value={code} onChange={e=>{setCode(e.target.value);setErr("");}} placeholder="XXXX-XXXX-XXXX-XXXX" style={{fontFamily:"monospace",letterSpacing:"1px",marginBottom:err?6:14}}/>{err&&<p style={{fontSize:13,color:C.red,margin:"0 0 12px",fontWeight:500}}>{err}</p>}<Btn onClick={verify} disabled={loading}>{loading?<><Spinner/>Verificando…</>:"Verificar"}</Btn></div>}
        {step===2&&<div><p style={{fontSize:15,fontWeight:600,color:C.text,margin:"0 0 14px"}}>Nova senha</p><input type="password" value={pw} onChange={e=>{setPw(e.target.value);setErr("");}} placeholder="Nova senha" style={{marginBottom:12}}/><input type="password" value={pw2} onChange={e=>{setPw2(e.target.value);setErr("");}} placeholder="Confirmar" style={{marginBottom:err?6:14}}/>{err&&<p style={{fontSize:13,color:C.red,margin:"0 0 12px",fontWeight:500}}>{err}</p>}<Btn onClick={reset} disabled={loading}>{loading?<><Spinner/>Salvando…</>:"Redefinir senha"}</Btn></div>}
      </div>
    </div>
  );
}

function VeedaApp({profile,password,onLogout,onUpdateProfile}){
  const {addToast,ToastContainer}=useToast();
  const dataKey=`veeda_data_${profile.id}`;

  // ── State ──────────────────────────────────────
  const [data,setData]=useState(null);
  const [hydratedData,setHydratedData]=useState(null);
  const [loading,setLoading]=useState(true);
  const [view,setView]=useState("hoje");
  const [dayOffset,setDayOffset]=useState(0);
  const [addType,setAddType]=useState("texto");
  const [addContent,setAddContent]=useState("");
  const [addCaption,setAddCaption]=useState("");
  const [addMedia,setAddMedia]=useState(null);
  const [addTags,setAddTags]=useState([]);
  const [addLocation,setAddLocation]=useState(null);
  const [showModal,setShowModal]=useState(false);
  const [showMusicPicker,setShowMusicPicker]=useState(false);
  const [showDrawing,setShowDrawing]=useState(false);
  const [showVoice,setShowVoice]=useState(false);
  const [showEditDay,setShowEditDay]=useState(false);
  const [showFeeling,setShowFeeling]=useState(false);
  const [showAvatar,setShowAvatar]=useState(false);
  const [showInvite,setShowInvite]=useState(false);
  const [showInviteApp,setShowInviteApp]=useState(false);
  const [showGroupName,setShowGroupName]=useState(false);
  const [showShare,setShowShare]=useState(false);
  const [showReminders,setShowReminders]=useState(false);
  const [showEvents,setShowEvents]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [viewRec,setViewRec]=useState(null);
  const [pendingNotif,setPendingNotif]=useState(null);
  const [expandedMoment,setExpandedMoment]=useState(null);
  const [viewProfile,setViewProfile]=useState(null);
  const [newGroup,setNewGroup]=useState("");
  const [lastId,setLastId]=useState(null);
  const [now,setNow]=useState(new Date());
  const [unreadCount,setUnreadCount]=useState(0);
  const [pendingAddCode,setPendingAddCode]=useState(null);
  const [pendingSharedDay,setPendingSharedDay]=useState(null);
  const [showAcceptSharedDay,setShowAcceptSharedDay]=useState(false);

  const sessionKey=useRef(null);
  const sessionSalt=useRef(null);
  const vidRef=useRef(),photoRef=useRef(),galleryRef=useRef(),lastRef=useRef(null),touchX=useRef(null);

  // ── Data load ──────────────────────────────────
  useEffect(()=>{
    (async()=>{
      try{
        // 1) Se temos token Google e este perfil está marcado como cloud,
        //    tenta sincronizar do Drive ANTES de carregar o local.
        const gTok=await cloudSync.tokenOrNull();
        if(gTok&&profile.cloud){
          try{
            const res=await cloudSync.pullOnBoot(profile.id,password,gTok);
            if(res?.used==="remote"){
              addToast?.("Dados sincronizados da nuvem ☁️","success");
            }
          }catch(e){console.warn("pullOnBoot failed",e);}
        }
        const raw=safeLS.raw(dataKey);
        if(raw){
          try{
            const{key,salt,data:d}=await decryptObj(raw,password);
            sessionKey.current=key;sessionSalt.current=salt;
            setData(migrateData(d));
          }catch(decErr){
            const snap=await loadLatestSnapshot(profile.id,password);
            if(snap){
              sessionKey.current=snap.key;sessionSalt.current=snap.salt;
              setData(migrateData(snap.data));
              addToast?.("Dados recuperados do snapshot mensal ✅","success");
            } else { throw decErr; }
          }
        } else {
          const d=EMPTY_DATA();
          const enc=await encryptObj(d,password);
          const{key,salt}=await decryptObj(enc,password);
          sessionKey.current=key;sessionSalt.current=salt;
          setData(d);
          safeLS.rawSet(dataKey,enc);
          saveMonthlySnapshot(profile.id,enc);
          // Primeiro save na nuvem (se conectado)
          if(gTok&&profile.cloud){cloudSync.queuePush(profile.id,enc);}
        }
      }catch{setData(EMPTY_DATA());}
      setLoading(false);
    })();
    const t=setInterval(()=>setNow(new Date()),30000);
    // Listen for cross-tab inbox updates
    const onStorage=e=>{
      const myH=(profile.handle||nameToHandle(profile.name)).replace(/^@/,"");
      if(e.key===`veeda_inbox_${myH}`||e.key===`veeda_inbox_${profile.id}`){checkInbox();}
    };
    window.addEventListener("storage",onStorage);
    return()=>{clearInterval(t);window.removeEventListener("storage",onStorage);};
  },[]);

  const checkInbox=useCallback(()=>{
    if(!data)return;
    const myH=(profile.handle||nameToHandle(profile.name)).replace(/^@/,"");
    for(const k of[`veeda_inbox_${myH}`,`veeda_inbox_${profile.id}`]){
      const inbox=safeLS.get(k,[]);
      if(inbox.length>0){
        const notif=inbox[0];
        if(!(data.received||[]).find(r=>r.date===notif.date&&r.author===notif.author&&r.importedAt===notif.importedAt)){
          setPendingNotif(notif);
          setUnreadCount(c=>c+1);
          showNativeNotif("Veeda",`${notif.author} compartilhou o dia com você! 🌿`);
          break;
        }
      }
    }
  },[data,profile]);

  useEffect(()=>{if(data&&!loading)checkInbox();},[data,loading]);

  // Pending add from invite link (?add=vc2_…)
  useEffect(()=>{
    if(!data||loading)return;
    const pending=sessionStorage.getItem("veeda_pending_add");
    if(pending){
      sessionStorage.removeItem("veeda_pending_add");
      setPendingAddCode(pending);
      setShowInvite(true);
    }
  },[data,loading]);

  // Pending shared day from URL (?day=vd1_…) — cross-device receive
  useEffect(()=>{
    if(!data||loading)return;
    const pendingDay=sessionStorage.getItem("veeda_pending_day");
    if(pendingDay){
      sessionStorage.removeItem("veeda_pending_day");
      const decoded=decodeSharedDay(pendingDay);
      if(decoded){
        // Evita duplicata: mesmo autor + mesma data + sharedAt próximo
        const alreadyReceived=(data.received||[]).find(r=>r.date===decoded.date&&r.handle===decoded.handle&&Math.abs((r.sharedAt||0)-(decoded.sharedAt||0))<60000);
        if(!alreadyReceived){setPendingSharedDay(decoded);setShowAcceptSharedDay(true);}
        else addToast?.("Você já recebeu este dia.","info");
      } else addToast?.("Link de dia inválido ou corrompido.","error");
    }
  },[data,loading]);

  // Monthly snapshot on every save + queue cloud push
  const save=useCallback(async d=>{
    const lightweight={...d,moments:{},lastSaved:Date.now()};
    Object.keys(d.moments||{}).forEach(day=>{
      lightweight.moments[day]=(d.moments[day]||[]).map(m=>{
        if((m.type==="foto"||m.type==="video"||m.type==="arte")&&m.content?.startsWith("data:")){
          idbSave(`${m.id}`,m.content);
          return{...m,content:"IDB:"+m.id};
        }
        return m;
      });
    });
    setData({...d,lastSaved:lightweight.lastSaved});
    let enc;
    if(sessionKey.current&&sessionSalt.current){
      enc=await encryptFast(lightweight,sessionKey.current,sessionSalt.current);
    } else {
      enc=await encryptObj(lightweight,password);
    }
    safeLS.rawSet(dataKey,enc);
    saveMonthlySnapshot(profile.id,enc);
    // Cloud push (debounced): só se o perfil é cloud-enabled
    if(profile.cloud){cloudSync.queuePush(profile.id,enc);}
  },[dataKey,password,profile.id,profile.cloud]);

  // Flush cloud push on tab hide / unload (caso o debounce ainda esteja pendente)
  useEffect(()=>{
    const flush=()=>{if(profile.cloud)cloudSync.flushAll();};
    window.addEventListener("pagehide",flush);
    window.addEventListener("beforeunload",flush);
    return()=>{window.removeEventListener("pagehide",flush);window.removeEventListener("beforeunload",flush);};
  },[profile.cloud]);

  // Hydrate IDB media
  useEffect(()=>{
    if(!data)return;
    let cancelled=false;
    (async()=>{
      const hd={...data,moments:{}};
      for(const day of Object.keys(data.moments||{})){
        hd.moments[day]=await Promise.all((data.moments[day]||[]).map(async m=>{
          if(m.content?.startsWith("IDB:")){const u=await idbLoad(m.content.slice(4));return u?{...m,content:u}:m;}
          return m;
        }));
      }
      if(!cancelled)setHydratedData(hd);
    })();
    return()=>{cancelled=true;};
  },[data]);

  const activeData=hydratedData||data;

  // ── ALL hooks before any early return ──────────
  const curDay=useMemo(()=>offsetDay(todayStr(),-dayOffset),[dayOffset]);
  const isToday=dayOffset===0;
  const nowKey=useMemo(()=>`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`,[now]);

  const moments=useMemo(()=>{
    if(!activeData)return[];
    return((activeData.moments||{})[curDay]||[]).slice().sort((a,b)=>a.ts-b.ts);
  },[activeData,curDay]);

  const upcoming=useMemo(()=>{
    if(!activeData)return[];
    return(activeData.events||[]).filter(e=>e.date>=todayStr()).sort((a,b)=>a.date.localeCompare(b.date));
  },[activeData]);

  const slots=useMemo(()=>{
    const by={};
    moments.forEach(m=>{const k=fmt(m.ts);if(!by[k])by[k]=[];by[k].push(m);});
    const times=new Set(Object.keys(by));
    if(isToday)times.add(nowKey);
    return Array.from(times).sort().map(t=>({time:t,moments:by[t]||[],isNow:isToday&&t===nowKey}));
  },[moments,isToday,nowKey]);

  const dayColor=useMemo(()=>DAY_COLORS.find(c=>c.label===(activeData?.dayColors||{})[curDay])||DAY_COLORS[0],[activeData,curDay]);
  const feeling=useMemo(()=>(activeData?.dayFeelings||{})[curDay],[activeData,curDay]);
  const group=activeData?.groupName||"Meu Círculo";
  const lastMId=moments.length>0?moments[moments.length-1].id:null;

  const resetModal=useCallback(()=>{setAddContent("");setAddCaption("");setAddMedia(null);setAddTags([]);setAddLocation(null);setShowModal(false);setShowMusicPicker(false);},[]);
  const readFile=(f,cb)=>{const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsDataURL(f);};

  const clearInbox=useCallback(notif=>{
    const myH=(profile.handle||nameToHandle(profile.name)).replace(/^@/,"");
    [`veeda_inbox_${myH}`,`veeda_inbox_${profile.id}`].forEach(k=>{
      const inbox=safeLS.get(k,[]);
      safeLS.set(k,inbox.filter(x=>!(x.date===notif.date&&x.author===notif.author&&x.importedAt===notif.importedAt)));
    });
  },[profile]);

  const acceptNotif=useCallback(async()=>{
    if(!pendingNotif||!data)return;
    clearInbox(pendingNotif);
    await save({...data,received:[...(data.received||[]),pendingNotif]});
    setPendingNotif(null);setUnreadCount(0);
    setView("recebidos");setViewRec(pendingNotif);
  },[pendingNotif,data,clearInbox,save]);

  const dismissNotif=useCallback(()=>{if(!pendingNotif)return;clearInbox(pendingNotif);setPendingNotif(null);},[pendingNotif,clearInbox]);

  const addMoment=useCallback((extra={})=>{
    if(!data)return;
    const isMedia=addType==="foto"||addType==="video";
    if(isMedia&&!addMedia)return;
    if(addType==="musica"&&!extra.trackTitle&&!addContent.trim())return;
    if(!isMedia&&addType!=="musica"&&addType!=="arte"&&addType!=="voz"&&!addContent.trim())return;
    let type=addType,content=isMedia?addMedia:addContent.trim();
    if(type==="link"&&isVideoLink(content))type="videolink";
    const id=Date.now();
    const m={id,ts:id,type,content,caption:addCaption.trim()||undefined,tags:addTags.length?addTags:undefined,location:addLocation||undefined,...extra};
    save({...data,moments:{...(data.moments||{}),[todayStr()]:[...((data.moments||{})[todayStr()]||[]),m]}});
    resetModal();setLastId(id);
  },[addType,addMedia,addContent,addCaption,addTags,addLocation,data,save,resetModal]);

  const delMoment=useCallback((day,id)=>{
    if(!data)return;
    save({...data,moments:{...(data.moments||{}),[day]:((data.moments||{})[day]||[]).filter(m=>m.id!==id)}});
  },[data,save]);

  const updateAv=useCallback(updated=>{
    const ps=loadProfiles();const idx=ps.findIndex(p=>p.id===updated.id);
    if(idx>=0){ps[idx]={...ps[idx],...updated};saveProfiles(ps);registryUpdate(ps[idx]);onUpdateProfile(updated);}
  },[onUpdateProfile]);

  // Scroll to last added moment
  useEffect(()=>{
    if(lastId&&lastRef.current){setTimeout(()=>lastRef.current?.scrollIntoView({behavior:"smooth",block:"center"}),150);setLastId(null);}
  },[lastId,data]);

  // ── Early return after all hooks ──────────────
  if(loading||!activeData){
    return(
      <div style={{minHeight:"100vh",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",background:C.bg}}>
        <Spinner size={32} color={C.purple}/>
        <p style={{marginTop:16,fontSize:13,color:C.textMid}}>Carregando seus dias…</p>
      </div>
    );
  }

  // ── RENDER ─────────────────────────────────────
  return(
    <div style={{maxWidth:480,margin:"0 auto",background:`linear-gradient(180deg,${dayColor.bg} 0%,${C.bgGradEnd} 100%)`,minHeight:"100vh",fontFamily:SANS}}>
      <ToastContainer/>
      {pendingNotif&&<ReceivedNotif notif={pendingNotif} onOpen={acceptNotif} onDismiss={dismissNotif}/>}
      {showAcceptSharedDay&&pendingSharedDay&&<AcceptSharedDayModal shared={pendingSharedDay} onClose={()=>{setShowAcceptSharedDay(false);setPendingSharedDay(null);}} onAccept={async()=>{if(!data||!pendingSharedDay)return;await save({...data,received:[...(data.received||[]),pendingSharedDay]});setShowAcceptSharedDay(false);setPendingSharedDay(null);setUnreadCount(c=>c+1);setView("recebidos");setViewRec(pendingSharedDay);addToast?.("Dia recebido e salvo! 🌿","success");}}/>}
      {showDrawing&&<DrawingCanvas onClose={()=>setShowDrawing(false)} onSave={dataUrl=>{setShowDrawing(false);const id=Date.now();const m={id,ts:id,type:"arte",content:dataUrl,caption:addCaption.trim()||undefined,location:addLocation||undefined};save({...data,moments:{...(data.moments||{}),[todayStr()]:[...((data.moments||{})[todayStr()]||[]),m]}});setLastId(id);setAddCaption("");setAddLocation(null);}}/>}
      {expandedMoment&&<MomentDetail m={expandedMoment} onClose={()=>setExpandedMoment(null)} onDelete={()=>{delMoment(curDay,expandedMoment.id);setExpandedMoment(null);}}/>}

      {/* ── Header ── */}
      <div style={{background:C.white,borderBottom:`1px solid ${C.headerBorder}`,position:"sticky",top:0,zIndex:100,paddingTop:"env(safe-area-inset-top)"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px 6px"}}>
          <span style={{fontFamily:PASSO,fontSize:18,fontWeight:700,color:C.purple}}>🌿 Veeda</span>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            <button onClick={()=>setShowInviteApp(true)} style={{background:C.purpleLight,border:"none",borderRadius:20,padding:"5px 12px",fontSize:12,color:C.tabActive,fontWeight:600,cursor:"pointer"}}>+ Convidar</button>
            <button onClick={()=>setShowSettings(true)} style={{background:"none",border:"none",fontSize:20,color:C.textLight,cursor:"pointer",lineHeight:1}}>⚙️</button>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 0 10px",borderBottom:`1px solid ${C.headerBorder}`,cursor:"pointer"}} onClick={()=>view==="hoje"&&setShowAvatar(true)}>
          <AvatarBubble src={profile.avatarSrc} emoji={profile.emoji} color={profile.avatarColor||C.purpleLight} size={64} ring/>
          <p style={{margin:"8px 0 0",fontSize:14,fontWeight:600,color:C.text,fontFamily:PASSO}}>{profile.name}</p>
          <p style={{margin:"2px 0 0",fontSize:12,color:C.purple,fontWeight:600}}>{profile.handle||nameToHandle(profile.name)}</p>
          {feeling&&<div style={{display:"inline-flex",alignItems:"center",gap:4,marginTop:6,background:C.purpleLight,borderRadius:20,padding:"3px 12px"}}><span style={{fontSize:13}}>{feeling.emoji}</span><span style={{fontSize:11,color:C.tabActive,fontWeight:500}}>{feeling.label}</span></div>}
          {view==="hoje"&&<span style={{fontSize:11,color:C.textLight,marginTop:4}}>toque para editar perfil</span>}
        </div>
        <div style={{display:"flex",padding:"0 4px",overflowX:"auto"}}>
          {[["hoje","Hoje"],["grupo",group],["recebidos",unreadCount>0?`Recebidos (${unreadCount})`:"Recebidos"]].map(([v,l])=>(
            <button key={v} onClick={()=>{setView(v);if(v==="recebidos")setUnreadCount(0);}} style={{padding:"10px 14px",fontSize:13,fontWeight:view===v?600:400,background:"none",border:"none",borderBottom:`2.5px solid ${view===v?C.tabActive:"transparent"}`,color:view===v?C.tabActive:C.textMid,cursor:"pointer",whiteSpace:"nowrap"}}>{l}</button>
          ))}
        </div>
      </div>

      {/* ── Content ── */}
      <div style={{paddingBottom:120}}>
        {/* HOJE */}
        {view==="hoje"&&(
          <div onTouchStart={e=>{touchX.current=e.touches[0].clientX;}} onTouchEnd={e=>{if(touchX.current==null)return;const dx=touchX.current-e.changedTouches[0].clientX;if(Math.abs(dx)>55){dx>0?setDayOffset(o=>o+1):setDayOffset(o=>Math.max(0,o-1));}touchX.current=null;}}>
            {/* Day nav */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 4px 2px"}}>
              <button onClick={()=>setDayOffset(o=>o+1)} style={{background:"none",border:"none",fontSize:24,color:C.textMid,cursor:"pointer",padding:"4px 12px",fontFamily:PASSO}}>‹</button>
              <p style={{margin:0,fontSize:12,color:C.textLight,textAlign:"center"}}>{fmtFull(curDay)}</p>
              <button onClick={()=>setDayOffset(o=>Math.max(0,o-1))} style={{background:"none",border:"none",fontSize:24,color:dayOffset===0?"transparent":C.textMid,cursor:dayOffset===0?"default":"pointer",padding:"4px 12px",pointerEvents:dayOffset===0?"none":"auto",fontFamily:PASSO}}>›</button>
            </div>
            {/* Day pills */}
            <div style={{display:"flex",gap:6,padding:"6px 16px 10px",justifyContent:"center",flexWrap:"wrap"}}>
              {[["🎨 cor",()=>setShowEditDay(true),""],["",()=>setShowFeeling(true),feeling?`${feeling.emoji} ${feeling.label}`:"😊 sentimento"],["🔔",()=>setShowReminders(true),""],["📅",()=>setShowEvents(true),upcoming.length>0?`📅 (${upcoming.length})`:"📅"]].map(([icon,action,label],i)=>(
                <button key={i} onClick={action} style={{fontSize:12,padding:"4px 12px",background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:20,color:C.textMid,cursor:"pointer",fontFamily:SANS}}>{label||icon}</button>
              ))}
            </div>
            {isToday&&<p style={{textAlign:"center",fontSize:11,color:C.textLight,margin:"0 0 4px"}}>← deslize para dias anteriores</p>}
            {isToday&&upcoming[0]&&<div style={{margin:"0 16px 10px",background:C.amberLight,border:`1px solid ${C.amber}44`,borderRadius:12,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:18}}>{EVENT_TYPES.find(t=>t.id===upcoming[0].type)?.emoji||"📅"}</span>
              <div><p style={{margin:0,fontSize:13,fontWeight:600,color:C.amber}}>{upcoming[0].title}</p><p style={{margin:0,fontSize:11,color:C.textMid}}>{fmtLabel(upcoming[0].date)}{upcoming[0].time?` às ${upcoming[0].time}`:""}</p></div>
            </div>}

            {/* TIMELINE */}
            <div style={{position:"relative",padding:"16px 0 24px"}}>
              {slots.length>0&&<div style={{position:"absolute",left:"50%",top:0,bottom:0,width:3,borderRadius:3,background:`linear-gradient(to bottom,${dayColor.dot}44,${dayColor.dot} 30%,${C.blueMid} 70%,${C.blueLight})`,transform:"translateX(-50%)",zIndex:0}}/>}
              {slots.length===0&&<div style={{textAlign:"center",padding:"3rem 1.5rem"}}><div style={{fontSize:48,marginBottom:12}}>🌿</div><p style={{fontSize:14,color:C.textLight,margin:0}}>{isToday?"Registre o primeiro momento do seu dia.":"Nenhum momento registrado neste dia."}</p></div>}
              {slots.map((slot,i)=>{
                const isLeft=i%2===0;
                return(
                  <div key={slot.time} style={{position:"relative",display:"flex",alignItems:"flex-start",marginBottom:30,zIndex:1}}>
                    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"flex-end",paddingRight:20,paddingLeft:10,gap:6}}>
                      {isLeft&&(slot.isNow
                        ?<button onClick={()=>setShowModal(true)} style={{background:C.white,border:`2px solid ${dayColor.dot}`,borderRadius:20,padding:"10px 16px",fontSize:12,color:C.purple,cursor:"pointer",fontWeight:600,lineHeight:1.45,textAlign:"center",maxWidth:148}}>registrar<br/>acontecimento</button>
                        :slot.moments.map(m=><div key={m.id} ref={m.id===lastMId&&lastId===null?lastRef:null}><MomentCircle m={m} isNew={m.id===lastMId&&lastId===null} onTap={()=>setExpandedMoment(m)}/><span style={{display:"block",textAlign:"right",fontSize:10,color:C.textLight,marginTop:2}}>{fmt(m.ts)}</span></div>)
                      )}
                    </div>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0,zIndex:2}}>
                      {slot.isNow?<PulsingDot onClick={()=>setShowModal(true)} color={dayColor.dot}/>:<div style={{width:12,height:12,borderRadius:"50%",background:dayColor.dot,border:`2.5px solid ${C.white}`,boxShadow:"0 1px 4px rgba(0,0,0,.1)"}}/>}
                      <span style={{fontSize:9,color:C.textLight,marginTop:3,whiteSpace:"nowrap"}}>{slot.time}</span>
                    </div>
                    <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"flex-start",paddingLeft:20,paddingRight:10,gap:6}}>
                      {!isLeft&&(slot.isNow
                        ?<button onClick={()=>setShowModal(true)} style={{background:C.white,border:`2px solid ${dayColor.dot}`,borderRadius:20,padding:"10px 16px",fontSize:12,color:C.purple,cursor:"pointer",fontWeight:600,lineHeight:1.45,textAlign:"center",maxWidth:148}}>registrar<br/>acontecimento</button>
                        :slot.moments.map(m=><div key={m.id} ref={m.id===lastMId&&lastId===null?lastRef:null}><MomentCircle m={m} isNew={m.id===lastMId&&lastId===null} onTap={()=>setExpandedMoment(m)}/><span style={{display:"block",fontSize:10,color:C.textLight,marginTop:2}}>{fmt(m.ts)}</span></div>)
                      )}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* MEU CÍRCULO */}
        {view==="grupo"&&<div style={{padding:"20px 16px"}}>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
            <p style={{margin:0,fontSize:16,fontWeight:700,color:C.text,fontFamily:PASSO}}>{group}</p>
            <button onClick={()=>{setNewGroup(group);setShowGroupName(true);}} style={{fontSize:12,color:C.purple,background:"none",border:"none",cursor:"pointer"}}>renomear</button>
          </div>
          <Btn onClick={()=>setShowInvite(true)} style={{marginBottom:20}}>+ Adicionar ao Círculo</Btn>
          {(!activeData.contacts||activeData.contacts.length===0)
            ?<div style={{textAlign:"center",padding:"2rem 0"}}><div style={{fontSize:52,marginBottom:12}}>👥</div><p style={{fontSize:14,color:C.textLight,marginBottom:16}}>Nenhum contato ainda.</p><button onClick={()=>setShowInviteApp(true)} style={{background:"none",border:`1.5px solid ${C.purple}`,borderRadius:20,padding:"9px 20px",color:C.purple,cursor:"pointer",fontSize:13,fontWeight:600}}>Convidar para o Veeda</button></div>
            :activeData.contacts.map((c,i)=>(
              <div key={i} style={{background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:14,padding:"14px",marginBottom:10,display:"flex",alignItems:"center",gap:12}}>
                <AvatarBubble src={c.avatarSrc} emoji={c.emoji||"🌿"} color={c.avatarColor||C.purpleLight} size={44}/>
                <div style={{flex:1}}><p style={{margin:0,fontSize:14,fontWeight:600,color:C.text}}>{c.name}</p><p style={{margin:0,fontSize:12,color:C.purple,fontWeight:500}}>{c.handle}</p></div>
                <button onClick={()=>{const nc=[...activeData.contacts];nc.splice(i,1);save({...data,contacts:nc});}} style={{fontSize:12,color:C.textLight,background:"none",border:"none",cursor:"pointer",padding:"6px"}}>remover</button>
              </div>
            ))
          }
        </div>}

        {/* RECEBIDOS */}
        {view==="recebidos"&&!viewRec&&<div style={{padding:"20px 16px"}}>
          <p style={{fontSize:16,fontWeight:700,color:C.text,marginBottom:16,fontFamily:PASSO}}>Dias recebidos</p>
          {(activeData.received||[]).length===0
            ?<div style={{textAlign:"center",padding:"2rem 0"}}><div style={{fontSize:52,marginBottom:12}}>💌</div><p style={{fontSize:14,color:C.textLight}}>Nenhum Dia de Veeda recebido ainda.</p></div>
            :(activeData.received||[]).slice().sort((a,b)=>b.importedAt-a.importedAt).map((r,i)=>(
              <div key={i} style={{background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:14,padding:"14px",marginBottom:10,display:"flex",alignItems:"center",gap:12}}>
                <AvatarBubble src={r.avatarSrc} emoji={r.emoji||"🌿"} color={r.avatarColor||C.purpleLight} size={44} ring/>
                <div style={{flex:1}}>
                  <p
                    style={{margin:0,fontSize:14,fontWeight:600,color:C.text,cursor:"pointer"}}
                    onClick={() => setViewProfile({
                      name: r.author,
                      handle: r.handle,
                      emoji: r.emoji,
                      avatarColor: r.avatarColor,
                      avatarSrc: r.avatarSrc,
                      id: r.handle || r.author // fallback para identificação
                    })}
                  >
                    {r.author}
                  </p>
                  <p style={{margin:0,fontSize:12,color:C.textMid}}>{fmtLabel(r.date)} · {r.moments.length} momento{r.moments.length!==1?"s":""}{r.feeling?` · ${r.feeling.emoji}`:""}</p>
                </div>
                <button
                  onClick={()=>setViewRec(r)}
                  style={{background:"none",border:"none",cursor:"pointer",padding:"4px",color:C.textLight,fontSize:22}}
                >
                  ›
                </button>
              </div>
            ))
          }
        </div>}

        {view==="recebidos"&&viewRec&&(
          <div style={{paddingBottom:20}}>
            <div style={{background:C.white,borderBottom:`1px solid ${C.headerBorder}`,display:"flex",flexDirection:"column",alignItems:"center",padding:"18px 16px 14px"}}>
              <AvatarBubble src={viewRec.avatarSrc} emoji={viewRec.emoji||"🌿"} color={viewRec.avatarColor||C.purpleLight} size={70} ring/>
              <p style={{margin:"10px 0 2px",fontSize:16,fontWeight:700,color:C.text,fontFamily:PASSO}}>{viewRec.author}</p>
              <p style={{margin:0,fontSize:12,color:C.textLight}}>Dia de Veeda · {fmtFull(viewRec.date)}</p>

// ═══════════════════════════════════════════════════
// ROOT COMPONENT — v1.4: Google é o caminho principal
// ═══════════════════════════════════════════════════
function Veeda(){
  const [screen,setScreen]=useState("loading");
  const [profiles,setProfiles]=useState([]);        // perfis locais
  const [cloudProfiles,setCloudProfiles]=useState([]); // perfis do Drive (lista índice)
  const [selProfile,setSelProfile]=useState(null);
  const [activeProfile,setActiveProfile]=useState(null);
  const [activePw,setActivePw]=useState(null);
  const [forgotProfile,setForgotProfile]=useState(null);
  const [showGuide,setShowGuide]=useState(false);
  const [googleUser,setGoogleUser]=useState(null);
  const [googleLoading,setGoogleLoading]=useState(false);
  const [googleError,setGoogleError]=useState(null);
  const [importResult,setImportResult]=useState(null);
  const [importing,setImporting]=useState(false);
  const [hasLocal,setHasLocal]=useState(false);

  // ── Boot: URL intents + OAuth redirect callback + sessão persistente ────
  useEffect(()=>{
    // 1. Parse URL params — salva intents no sessionStorage antes de qualquer redirect
    const params=new URLSearchParams(window.location.search);
    const addCode=params.get("add");
    if(addCode)sessionStorage.setItem("veeda_pending_add",addCode);
    const dayCode=params.get("day");
    if(dayCode)sessionStorage.setItem("veeda_pending_day",dayCode);
    if(addCode||dayCode)window.history.replaceState({},"",window.location.pathname);

    // 2. Verifica se estamos voltando de um redirect OAuth (token no hash da URL)
    const hash=window.location.hash;
    if(hash&&hash.includes("access_token")){
      const hp=new URLSearchParams(hash.slice(1));
      const at=hp.get("access_token");
      if(at){
        const token={access_token:at,expires_in:parseInt(hp.get("expires_in")||"3600",10),scope:hp.get("scope"),ts:Date.now()};
        safeLS.set(GDRIVE_KEY,token);
        // Limpa o hash da URL sem recarregar
        window.history.replaceState({},"",window.location.pathname+window.location.search);
        // Continua o fluxo Google Login com o token recém-obtido
        setGoogleLoading(true);
        setProfiles(loadProfiles());
        setHasLocal(hasLocalAccounts());
        (async()=>{
          try{
            const u=await gdriveUserInfo(at);
            if(!u)throw new Error("Não foi possível obter informações da conta Google.");
            setGoogleUser(u);
            const acc=await cloudAccount.load(at);
            let redirectList=acc?.profiles||[];
            // Fallback: índice cloud indisponível — usa perfis locais desta conta
            if(redirectList.length===0&&u?.sub){
              const localCloud=loadProfiles().filter(p=>p.cloud&&(p.googleSub===u.sub||p.email===u.email));
              if(localCloud.length>0)redirectList=localCloud;
            }
            setCloudProfiles(redirectList);
            if(redirectList.length===1){
              const rProfile={...redirectList[0],cloud:true};
              setSelProfile(rProfile);
              const rSession=loadSession();
              if(rSession?.profileId===rProfile.id&&rSession?.pw&&rProfile.passwordHash){
                const rHash=await hashPw(rSession.pw);
                if(rHash===rProfile.passwordHash){
                  await doEnterProfile(rProfile,rSession.pw);
                }else{
                  setScreen("password");
                }
              }else{
                setScreen("password");
              }
            }else{
              setScreen("google_select");
            }
          }catch(e){console.warn("OAuth redirect flow failed",e);setScreen("splash");}
          finally{setGoogleLoading(false);}
        })();
        return; // não executa o boot normal
      }
    }

    // 3. Boot normal
    (async()=>{
      const ps=loadProfiles();
      setProfiles(ps);
      setHasLocal(hasLocalAccounts());
      const cachedU=getCachedUser();
      if(cachedU)setGoogleUser(cachedU);
      const session=loadSession();
      if(session?.profileId&&session?.pw){
        const p=ps.find(x=>x.id===session.profileId);
        if(p){
          if(p.cloud&&!(await cloudSync.tokenOrNull())){setScreen("splash");return;}
          setActiveProfile(p);setActivePw(session.pw);setScreen("app");
          return;
        }
      }
      setScreen("splash");
    })();
  },[]);

  const refresh=()=>{const ps=loadProfiles();setProfiles(ps);setHasLocal(hasLocalAccounts());return ps;};

  // ── Entrada no app com perfil + senha (comum a todos os fluxos de login) ────
  // Garante perfil local, puxa blob do Drive se necessário, salva sessão e navega.
  const doEnterProfile=useCallback(async(profile,pw)=>{
    if(profile.cloud){
      const localPs=loadProfiles();
      if(!localPs.find(p=>p.id===profile.id)){localPs.push(profile);saveProfiles(localPs);}
      registryAdd(profile);
      // Puxa blob cifrado do Drive se ainda não existe localmente (cross-device / primeiro acesso)
      const t=await cloudSync.tokenOrNull();
      if(t){
        try{
          const remote=await cloudData.load(profile.id,t);
          if(remote&&!safeLS.raw(`veeda_data_${profile.id}`)){
            safeLS.rawSet(`veeda_data_${profile.id}`,remote.content);
          }
        }catch(e){console.warn("pull on login failed",e);}
      }
    }
    saveSession(profile.id,pw);
    setActiveProfile(profile);setActivePw(pw);setScreen("app");
  },[]);

  const updateProfile=updated=>{
    const ps=loadProfiles(),idx=ps.findIndex(p=>p.id===updated.id);
    if(idx>=0){
      ps[idx]={...ps[idx],...updated};
      saveProfiles(ps);
      registryUpdate(ps[idx]);
      setActiveProfile(prev=>({...prev,...updated}));
      // Se cloud, propaga alterações de perfil no índice da nuvem
      (async()=>{
        const t=await cloudSync.tokenOrNull();
        if(t&&ps[idx].cloud){
          try{
            const acc=(await cloudAccount.load(t))||cloudAccount.empty(googleUser||{});
            cloudAccount.mergeProfile(acc,ps[idx]);
            await cloudAccount.save(acc,t);
          }catch(e){console.warn("cloudAccount update failed",e);}
        }
      })();
    }
  };

  // ── Google login: abre popup → pega token → user info → lista perfis cloud
  const doGoogleLogin=useCallback(async()=>{
    setGoogleLoading(true);setGoogleError(null);
    try{
      const freshToken=await gdriveAuth();
      const t=freshToken||getCachedToken();
      if(!t)throw new Error("Token não obtido. Tente novamente.");
      const u=await gdriveUserInfo(t);
      if(!u)throw new Error("Não foi possível obter informações da conta Google.");
      setGoogleUser(u);
      const acc=await cloudAccount.load(t);
      let list=acc?.profiles||[];
      // Fallback: se o índice cloud não carregou (falha de rede, arquivo não existe),
      // usa perfis locais que já foram sincronizados com esta conta Google
      if(list.length===0&&u?.sub){
        const localCloud=loadProfiles().filter(p=>p.cloud&&(p.googleSub===u.sub||p.email===u.email));
        if(localCloud.length>0)list=localCloud;
      }
      setCloudProfiles(list);
      const session=loadSession();
      if(list.length===1){
        const profile={...list[0],cloud:true};
        setSelProfile(profile);
        // Se há sessão salva, verifica a senha antes de pular a tela de senha
        if(session?.profileId===profile.id&&session?.pw&&profile.passwordHash){
          const sessionHash=await hashPw(session.pw);
          if(sessionHash===profile.passwordHash){
            await doEnterProfile(profile,session.pw);
          }else{
            setScreen("password"); // Senha mudou em outro dispositivo
          }
        }else{
          setScreen("password");
        }
      }else{
        setScreen("google_select");
      }
    }catch(e){
      console.warn("Google login cancelado",e);
      if(e?.message!=="Janela fechada.")setGoogleError("Erro ao conectar com o Google. Tente novamente.");
    }finally{setGoogleLoading(false);}
  },[doEnterProfile]);

  // ── Refresh cloud profile list sem re-login
  const refreshCloudProfiles=useCallback(async()=>{
    const t=await cloudSync.tokenOrNull();
    if(!t)return[];
    const acc=await cloudAccount.load(t);
    const list=acc?.profiles||[];
    setCloudProfiles(list);
    return list;
  },[]);

  // ── Import de perfis locais para a nuvem
  const doImport=useCallback(async(ids)=>{
    setImporting(true);setImportResult(null);
    try{
      const t=await cloudSync.tokenOrNull();
      if(!t){setImportResult({ok:false,msg:"Sessão Google expirou. Faça login novamente."});setImporting(false);return;}
      // 1) Cria um backup read-only ANTES de qualquer alteração
      preserveBeforeMigration("pre_google_import");
      const ps=loadProfiles();
      const acc=(await cloudAccount.load(t))||cloudAccount.empty(googleUser||{});
      let sent=0;
      for(const id of ids){
        const p=ps.find(x=>x.id===id);
        if(!p)continue;
        // Marca como cloud (preservando todos os outros campos)
        p.cloud=true;p.googleSub=googleUser?.sub||p.googleSub||null;p.email=p.email||googleUser?.email||"";
        // Envia o blob cifrado atual (se existir)
        const enc=safeLS.raw(`veeda_data_${id}`);
        if(enc){await cloudData.save(id,enc,t);}
        // Atualiza índice
        cloudAccount.mergeProfile(acc,p);
        sent++;
      }
      await cloudAccount.save(acc,t);
      // Persiste a atualização `cloud:true` nos perfis locais
      saveProfiles(ps);
      setMigrationState({status:"imported",count:sent});
      setImportResult({ok:true,msg:`${sent} perfil(is) importado(s) com sucesso. Seu backup local foi preservado.`});
      setCloudProfiles(acc.profiles||[]);
      // Depois de 1.2s, volta pra tela de seleção
      setTimeout(()=>{setImportResult(null);setScreen("google_select");},1200);
    }catch(e){
      console.warn("import failed",e);
      setImportResult({ok:false,msg:"Falha ao importar. Seus dados locais permanecem intactos."});
    }finally{setImporting(false);}
  },[googleUser]);

  // ── Logout: limpa sessão + Google (preserva dados locais!)
  const doLogoutApp=useCallback(()=>{
    clearSession();
    setActiveProfile(null);setActivePw(null);
    setScreen("splash");
  },[]);
  const doLogoutGoogle=useCallback(()=>{
    clearGoogleAuth();
    setGoogleUser(null);setCloudProfiles([]);setSelProfile(null);
    setScreen("splash");
  },[]);

  if(screen==="loading")return<div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.splashBg}}><Spinner size={36} color={C.purple}/></div>;

  if(screen==="app"&&activeProfile&&activePw)return(
    <VeedaApp
      profile={activeProfile}
      password={activePw}
      onLogout={doLogoutApp}
      onUpdateProfile={updateProfile}
    />
  );
  if(screen==="forgot"&&forgotProfile)return<ScreenForgot profile={forgotProfile} onBack={()=>setScreen("password")} onSuccess={pw=>{const ps=loadProfiles();const p=ps.find(x=>x.id===forgotProfile.id);saveSession(p.id,pw);setActiveProfile(p);setActivePw(pw);setForgotProfile(null);setScreen("app");}}/>;
  if(screen==="password"&&selProfile)return<ScreenPassword profile={selProfile} onBack={()=>setScreen(selProfile.cloud?"google_select":"select")} onForgot={()=>{setForgotProfile(selProfile);setScreen("forgot");}} onSuccess={async pw=>{await doEnterProfile(selProfile,pw);}}/>;
  if(screen==="google_create")return<ScreenCreate
    googleUser={googleUser}
    onBack={()=>setScreen("google_select")}
    onDone={async(profile,pw)=>{
      // Upload inicial pra nuvem
      try{
        const t=await cloudSync.tokenOrNull();
        if(t){
          const acc=(await cloudAccount.load(t))||cloudAccount.empty(googleUser||{});
          cloudAccount.mergeProfile(acc,profile);
          await cloudAccount.save(acc,t);
          const enc=safeLS.raw(`veeda_data_${profile.id}`);
          if(enc)await cloudData.save(profile.id,enc,t);
        }
      }catch(e){console.warn("initial cloud save failed",e);}
      refresh();
      saveSession(profile.id,pw);
      setActiveProfile(profile);setActivePw(pw);setScreen("app");
    }}
  />;
  if(screen==="google_import")return<ScreenGoogleImport
    localProfiles={profiles}
    importing={importing}
    result={importResult}
    onCancel={()=>setScreen("google_select")}
    onImport={doImport}
  />;
  if(screen==="google_select")return<ScreenGoogleSelect
    googleUser={googleUser}
    profiles={cloudProfiles}
    hasLocal={hasLocal}
    onSelect={async p=>{const sp={...p,cloud:true};setSelProfile(sp);const ss=loadSession();if(ss?.profileId===sp.id&&ss?.pw&&sp.passwordHash){const h=await hashPw(ss.pw);if(h===sp.passwordHash){await doEnterProfile(sp,ss.pw);return;}}setScreen("password");}}
    onCreateNew={()=>setScreen("google_create")}
    onImportLocal={()=>setScreen("google_import")}
    onLogout={doLogoutGoogle}
  />;
  if(screen==="create")return<ScreenCreate onBack={()=>setScreen("splash")} onDone={(profile,pw)=>{refresh();saveSession(profile.id,pw);setActiveProfile(profile);setActivePw(pw);setScreen("app");}}/>;
  if(screen==="select")return<ScreenSelect profiles={profiles} onSelect={p=>{setSelProfile(p);setScreen("password");}} onNew={()=>setScreen("create")} onBack={()=>setScreen("splash")}/>;

  return(
    <>
      {showGuide&&<InstallGuide onClose={()=>setShowGuide(false)}/>}
      <SplashScreen
        onGoogle={doGoogleLogin}
        onRecover={()=>setScreen("select")}
        onGuide={()=>setShowGuide(true)}
        loading={googleLoading}
        hasLocal={hasLocal}
        error={googleError}
      />
    </>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Veeda/>);

// ═══════════════════════════════════════════════════
// SERVICE WORKER (for PWA offline support)
// ═══════════════════════════════════════════════════
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    const swCode=`
const CACHE_NAME = "veeda-v13";
const URLS_TO_CACHE = ["./", "./index.html", "./manifest.json"];

self.addEventListener("install", e => {
  e.waitUntil(
    caches.open(CACHE_NAME).then(c => c.addAll(URLS_TO_CACHE)).then(() => self.skipWaiting())
  );
});
self.addEventListener("activate", e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k)))
    ).then(() => self.clients.claim())
  );
});
self.addEventListener("message", e => {
  if (e.data === "SKIP_WAITING") self.skipWaiting();
});
self.addEventListener("fetch", e => {
  if(e.request.method !== "GET") return;
  const isNav = e.request.mode === "navigate" ||
                (e.request.destination === "document") ||
                (e.request.headers.get("accept") || "").includes("text/html");
  if(isNav){
    e.respondWith(
      fetch(e.request).then(resp => {
        if(resp && resp.status === 200 && resp.type === "basic"){
          const clone = resp.clone();
          caches.open(CACHE_NAME).then(c => c.put(e.request, clone));
        }
        return resp;
      }).catch(() => caches.match(e.request).then(c => c || caches.match("./index.html")))
    );
    return;
  }
  e.respondWith(
    caches.match(e.request).then(cached => {
      const fetchPromise = fetch(e.request).then(resp => {
        if(resp && resp.status === 200 && resp.type === "basic") {
          const clone = resp.clone();
          caches.open(CACHE_NAME).then(c => c.put(e.request, clone));
        }
        return resp;
      }).catch(() => cached);
      return cached || fetchPromise;
    })
  );
});
self.addEventListener("push", e => {
  const data = e.data ? e.data.json() : {};
  e.waitUntil(self.registration.showNotification(data.title || "Veeda", {
    body: data.body || "Você tem uma nova mensagem.",
    icon: "./icon-192.png",
    badge: "./icon-192.png",
  }));
});
    `.trim();
    const blob=new Blob([swCode],{type:"application/javascript"});
    const url=URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).catch(()=>{});
  });
}
</script>
