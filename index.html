/* ═══════════════════════════════════════════════════════════
   VEEDA ADVANCED STYLES — v2.0
   Responsividade, gradientes, glassmorphism, animações
   ═══════════════════════════════════════════════════════════ */

:root {
  /* Gradientes modernos */
  --gradient-primary: linear-gradient(135deg, #9000FF 0%, #7B6FA0 50%, #22FCB7 100%);
  --gradient-secondary: linear-gradient(135deg, #EAFFF8 0%, #F0F6FD 50%, #FDF5F0 100%);
  --gradient-accent: linear-gradient(135deg, #22FCB7 0%, #0097A7 100%);
  --gradient-glass: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);

  /* Sombras avançadas */
  --shadow-soft: 0 2px 8px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
  --shadow-medium: 0 4px 16px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.08);
  --shadow-strong: 0 8px 32px rgba(0,0,0,0.16), 0 4px 12px rgba(0,0,0,0.08);
  --shadow-glow: 0 0 20px rgba(144, 0, 255, 0.3);

  /* Bordas e raios */
  --border-radius-sm: 8px;
  --border-radius-md: 14px;
  --border-radius-lg: 20px;
  --border-radius-xl: 50px;

  /* Espaçamentos responsivos */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 16px;
  --spacing-lg: 20px;
  --spacing-xl: 24px;
  --spacing-2xl: 32px;
}

/* Reset e base */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
[style*="overflow"]{scroll-behavior:smooth;-webkit-overflow-scrolling:touch;}

html{
  height:100%;
  margin:0;
  padding:0;
  width:100%;
  min-height:100dvh;
  overflow-x:hidden;
  overscroll-behavior:none;
  scroll-behavior:smooth;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background: var(--gradient-secondary);
  background-attachment: fixed;
  color:#3A3350;
  -webkit-text-size-adjust:100%;
  margin:0;
  padding:0;
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
  width:100%;
  min-height:100dvh;
  position:relative;
}

/* Container principal */
#root{
  width:100%;
  min-height:100dvh;
  margin:0;
  padding:0;
  position:relative;
  z-index:1;
}

/* Inputs e form controls aprimorados */
input,textarea,select{
  font-family:inherit;
  font-size:16px;
  border:2px solid rgba(203, 192, 211, 0.6);
  border-radius:var(--border-radius-xl);
  padding: var(--spacing-lg) var(--spacing-xl);
  color:#3A3350;
  width:100%;
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  outline:none;
  -webkit-appearance:none;
  transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: var(--shadow-soft);
}

input:focus,textarea:focus{
  border-color:#9000FF;
  border-width:2px;
  background: rgba(255, 255, 255, 0.95);
  box-shadow: var(--shadow-glow), var(--shadow-medium);
  transform: translateY(-1px);
}

textarea{
  border-radius:var(--border-radius-lg);
  padding: var(--spacing-md) var(--spacing-lg);
  resize:none;
  min-height: 80px;
}

/* Botões aprimorados */
button{
  font-family:inherit;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  position:relative;
  overflow:hidden;
}

button:before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  background: rgba(255, 255, 255, 0.3);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width 0.6s, height 0.6s;
}

button:active:before {
  width: 300px;
  height: 300px;
}

/* Animações aprimoradas */
@keyframes vPulse{
  0%{transform:scale(1);opacity:.6}
  70%{transform:scale(2.4);opacity:0}
  100%{opacity:0}
}

@keyframes slideUp{
  from{transform:translateY(60px);opacity:0}
  to{transform:translateY(0);opacity:1}
}

@keyframes notifDrop{
  from{transform:translateY(-60px) translateX(-50%);opacity:0}
  to{transform:translateY(0) translateX(-50%);opacity:1}
}

@keyframes spin{to{transform:rotate(360deg)}}

@keyframes momentPop{
  0%{transform:scale(0.4) rotate(-8deg);opacity:0}
  70%{transform:scale(1.1) rotate(2deg)}
  100%{transform:scale(1) rotate(0);opacity:1}
}

@keyframes shimmer{
  0%{background-position:-300px 0}
  100%{background-position:300px 0}
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

@keyframes pulse{
  0%,100%{opacity:.5}
  50%{opacity:1}
}

@keyframes bounceIn{
  0%{transform:scale(0.3);opacity:0}
  50%{transform:scale(1.05)}
  70%{transform:scale(0.9)}
  100%{transform:scale(1);opacity:1}
}

@keyframes slideInRight{
  from{transform:translateX(100%);opacity:0}
  to{transform:translateX(0);opacity:1}
}

@keyframes slideInLeft{
  from{transform:translateX(-100%);opacity:0}
  to{transform:translateX(0);opacity:1}
}

@keyframes glow{
  0%,100%{box-shadow: var(--shadow-soft)}
  50%{box-shadow: var(--shadow-glow)}
}

/* Classes utilitárias */
.shimmer{
  background:linear-gradient(90deg,#f0edf8 25%,#e8e4f4 50%,#f0edf8 75%);
  background-size:600px 100%;
  animation:shimmer 1.4s infinite linear;
}

.glass{
  background: var(--gradient-glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.gradient-bg{
  background: var(--gradient-primary);
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.animate-bounce-in{animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55)}
.animate-slide-up{animation: slideUp 0.4s cubic-bezier(0.22, 1, 0.36, 1)}
.animate-fade-in{animation: fadeIn 0.3s ease-out}
.animate-glow{animation: glow 2s ease-in-out infinite}

/* Scrollbar customizada */
::-webkit-scrollbar{
  width: 6px;
  height: 6px;
}

::-webkit-scrollbar-track{
  background: rgba(203, 192, 211, 0.1);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb{
  background: rgba(144, 0, 255, 0.3);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover{
  background: rgba(144, 0, 255, 0.5);
}

/* Selection customizada */
::selection{
  background: rgba(144, 0, 255, 0.2);
  color: #3A3350;
}

/* Focus visible aprimorado */
*:focus-visible{
  outline: 2px solid #9000FF;
  outline-offset: 2px;
  border-radius: var(--border-radius-md);
}

/* Safe area para dispositivos modernos */
@supports (padding: max(0px)) {
  body {
    padding-bottom: max(var(--spacing-md), env(safe-area-inset-bottom));
    padding-left: max(var(--spacing-md), env(safe-area-inset-left));
    padding-right: max(var(--spacing-md), env(safe-area-inset-right));
  }
}

/* High contrast mode support */
@media (prefers-contrast: high) {
  :root {
    --shadow-soft: 0 2px 4px rgba(0,0,0,0.3);
    --shadow-medium: 0 4px 8px rgba(0,0,0,0.4);
    --shadow-strong: 0 6px 12px rgba(0,0,0,0.5);
  }
}

/* Reduced motion support */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>

<!-- ═══ Pre-render version sentinel ═══
     Verifica version.json (sem cache HTTP) ANTES de carregar React.
     Se versão diverge, limpa caches+SW e recarrega — usuário sempre vê
     a versão mais recente sem precisar limpar nada manualmente. -->
<script>
(function(){
  // Versão embutida nesta cópia do index.html. Deve casar com version.json.
  var EMBEDDED_VERSION = "2.3.3";
  var KEY_LAST_RELOAD = "veeda_last_force_reload";

  function showOverlay(msg){
    var o = document.createElement("div");
    o.id = "veeda-update-overlay";
    o.style.cssText = "position:fixed;inset:0;background:linear-gradient(180deg,#22FCB7 0%,#EAFFF8 60%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99999;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#3A3350;";
    o.innerHTML = '<div style="font-size:48px;margin-bottom:14px">🌿</div><div style="font-size:16px;font-weight:600;margin-bottom:8px">Atualizando Veeda…</div><div style="font-size:13px;color:#7A7090">' + msg + '</div>';
    document.body.appendChild(o);
  }

  async function clearEverythingAndReload(reason){
    // Anti-loop: se já forçamos reload nos últimos 30s, não faz de novo
    try{
      var last = parseInt(localStorage.getItem(KEY_LAST_RELOAD)||"0",10);
      if(Date.now() - last < 30000){
        console.warn("[Veeda update] reload recente, abortando para evitar loop");
        return;
      }
      localStorage.setItem(KEY_LAST_RELOAD, String(Date.now()));
    }catch(e){}

    showOverlay("Versão nova encontrada — recarregando…");
    console.log("[Veeda update]", reason);

    try {
      if ("serviceWorker" in navigator) {
        var regs = await navigator.serviceWorker.getRegistrations();
        await Promise.all(regs.map(function(r){ return r.unregister(); }));
      }
    } catch(e){}
    try {
      if ("caches" in window) {
        var keys = await caches.keys();
        await Promise.all(keys.map(function(k){ return caches.delete(k); }));
      }
    } catch(e){}

    // Hard reload — bypass HTTP cache
    setTimeout(function(){
      // location.reload(true) é deprecated mas ainda funciona; combinado com bust
      location.replace(location.pathname + "?_v=" + Date.now());
    }, 600);
  }

  // Roda em background — não bloqueia o boot. Se app já carregou antes da
  // resposta chegar, recarrega só se houver mismatch real.
  if ("fetch" in window) {
    fetch("version.json?_=" + Date.now(), { cache: "no-store" })
      .then(function(r){ return r.ok ? r.json() : null; })
      .then(function(j){
        if (!j || !j.version) return;
        if (j.version !== EMBEDDED_VERSION) {
          clearEverythingAndReload("server="+j.version+" embedded="+EMBEDDED_VERSION);
        } else {
          console.log("[Veeda] versão atual:", EMBEDDED_VERSION);
        }
      })
      .catch(function(){ /* offline — segue com a versão local */ });
  }
})();
</script>

<script>

// ── Veeda Debug — diagnóstico cross-device ──
// Uso no console: veedaDebug.diag()  ou  veedaDebug.testShare("@handleDoOutroUser")
window.veedaDebug = {
  async session(){
    const s = await VeedaSupabase.auth.getSession();
    console.log("Session:", s);
    return s;
  },
  async whoami(){
    if(!VeedaSupabase.isReady()){console.log("❌ Supabase OFFLINE");return null;}
    const s = await VeedaSupabase.auth.getSession();
    if(!s){console.log("❌ Sem sessão Supabase. Faça logout/login do app.");return null;}
    const email = s.user?.email;
    const handle = email?.split("@")[0];
    console.log("✅ Logado como:", { email, handle, userId: s.user?.id });
    return { email, handle };
  },
  async diag(){
    console.log("═══ VEEDA DIAG ═══");
    console.log("1. Supabase ready:", VeedaSupabase.isReady());
    const me = await this.whoami();
    if(!me) return;
    const inbox = await VeedaSupabase.days.getInbox(me.handle);
    console.log("2. Inbox (shared_days p/ mim):", inbox.length, "itens", inbox);
    const reqs = await VeedaSupabase.connections.getRequests(me.handle);
    console.log("3. Pedidos de conexão pendentes:", reqs.length, reqs);
    const confs = await VeedaSupabase.connections.getConfirmations(me.handle);
    console.log("4. Confirmações não consumidas:", confs.length, confs);
    console.log("═════════════════");
    return { inbox, reqs, confs };
  },
  async testShare(toHandle){
    if(!VeedaSupabase.isReady()){console.log("❌ Supabase OFFLINE");return;}
    const me = await this.whoami(); if(!me) return;
    // pega perfil local
    const psRaw = localStorage.getItem("veeda_profiles_v2");
    const ps = psRaw ? JSON.parse(psRaw) : [];
    const myProfile = ps.find(p => (p.handle||"").replace(/^@/,"") === me.handle);
    if(!myProfile){console.log("❌ Perfil local não encontrado para",me.handle);return;}
    const cleanTo = toHandle.replace(/^@/,"");
    const today = new Date().toISOString().slice(0,10);
    const payload = { date: today, feeling:null, message:"DIAG TEST "+Date.now(), moments:[] };
    console.log("→ Enviando teste para", cleanTo, "...");
    const ok = await VeedaSupabase.days.share(myProfile, [cleanTo], payload);
    console.log(ok ? "✅ Insert no Supabase OK" : "❌ Insert FALHOU — abra Network e veja o erro RLS");
    return ok;
  },
  // ── REPARO DE SESSÃO ──
  // Tenta restabelecer sessão Supabase a partir do perfil/passwordHash locais.
  // Útil quando: o usuário criou a conta antes do Supabase existir,
  // ou quando a sessão expirou silenciosamente.
  async fixAuth(){
    if(!VeedaSupabase.isReady()){console.log("❌ Supabase OFFLINE");return false;}
    const psRaw = localStorage.getItem("veeda_profiles_v2");
    const ps = psRaw ? JSON.parse(psRaw) : [];
    if(!ps.length){console.log("❌ Nenhum perfil local");return false;}
    // Tenta o perfil mais recente. Se há vários, usa a sessão local atual como dica.
    const sessRaw = localStorage.getItem("veeda_session");
    let target = ps[ps.length-1];
    if(sessRaw){
      try{
        const s = JSON.parse(sessRaw);
        const found = ps.find(p => p.id === s.profileId);
        if(found) target = found;
      }catch{}
    }
    console.log("→ Reparando auth para", target.handle, "(", target.name, ")");
    if(!target.passwordHash){console.log("❌ Perfil sem passwordHash — não dá para autenticar");return false;}
    const ok = await VeedaSupabase.auth.ensureAuth(target.handle, target.passwordHash);
    if(ok){
      console.log("✅ Sessão Supabase estabelecida.");
      await VeedaSupabase.profiles.register(target);
      console.log("✅ Perfil registrado/atualizado no Supabase.");
      const sess = await VeedaSupabase.auth.getSession();
      console.log("Session:", sess);
      return true;
    }else{
      console.log("❌ ensureAuth falhou. Verifique se 'Confirm email' está DESATIVADO em Supabase Auth Settings.");
      return false;
    }
  }
};
console.log("[Veeda] Debug disponível: veedaDebug.diag() / veedaDebug.testShare('@handle')");

    }
  },1500);
});
</script>

// ── Crypto (PBKDF2 key caching) ────────────────────────────
const _keyCache=new Map();
const _deriveKey=async(pw,salt)=>{
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:150000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);
};
const _getCachedKey=async(pw,salt)=>{
  const k=pw+"|"+Array.from(salt.slice(0,4)).join("-");
  if(_keyCache.has(k))return _keyCache.get(k);
  const key=await _deriveKey(pw,salt);
  _keyCache.set(k,key);
  return key;
};
const encryptFast=async(obj,key,salt)=>{
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const buf=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,new TextEncoder().encode(JSON.stringify(obj)));
  return btoa(JSON.stringify({v:2,salt:Array.from(salt),iv:Array.from(iv),data:Array.from(new Uint8Array(buf))}));
};
const encryptObj=async(obj,pw)=>{
  const salt=crypto.getRandomValues(new Uint8Array(16));
  const key=await _getCachedKey(pw,salt);
  return encryptFast(obj,key,salt);
};
const decryptObj=async(ct,pw)=>{
  const {salt,iv,data}=JSON.parse(atob(ct));
  const saltArr=new Uint8Array(salt);
  const key=await _getCachedKey(pw,saltArr);
  const buf=await crypto.subtle.decrypt({name:"AES-GCM",iv:new Uint8Array(iv)},key,new Uint8Array(data));
  return {key,salt:saltArr,data:JSON.parse(new TextDecoder().decode(buf))};
};
const hashPw=async pw=>{
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode("veeda:"+pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
};
const genCode=()=>{
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  const rand=crypto.getRandomValues(new Uint8Array(16));
  const s=Array.from(rand).map(b=>chars[b%chars.length]).join("");
  return `${s.slice(0,4)}-${s.slice(4,8)}-${s.slice(8,12)}-${s.slice(12,16)}`;
};

// ── Safe localStorage wrapper ──────────────────────────────
const safeLS={
  get:(k,fb=null)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));return true;}catch{return false;}},
  raw:(k)=>{try{return localStorage.getItem(k);}catch{return null;}},

// CRÍTICO: ler CONSTITUTION.md Art 6 antes de modificar qualquer coisa aqui.
// A regra é: NUNCA apagar perfil existente, NUNCA sobrescrever sem merge aditivo.

const loadProfiles=()=>safeLS.get(PROFILES_KEY,[]);

// ── Backup rolling do registro de perfis (Art 6.3) ─────────
// Antes de QUALQUER escrita em PROFILES_KEY, tira snapshot. Mantém os 5 mais recentes.
const PROFILES_BACKUP_PREFIX="veeda_backup_profiles_";
const PROFILES_BACKUP_KEEP=5;
const createProfilesBackup=()=>{
  try{
    const cur=safeLS.raw(PROFILES_KEY);
    if(!cur||cur==="[]"||cur==="null")return; // não cria backup vazio
    const k=`${PROFILES_BACKUP_PREFIX}${Date.now()}`;
    safeLS.rawSet(k,cur);
    // Rotação: mantém apenas os N mais recentes
    const all=[];
    for(let i=0;i<localStorage.length;i++){
      const key=localStorage.key(i);
      if(key&&key.startsWith(PROFILES_BACKUP_PREFIX))all.push(key);
    }
    all.sort();
    while(all.length>PROFILES_BACKUP_KEEP){
      const old=all.shift();
      try{localStorage.removeItem(old);}catch{}
    }
  }catch(e){console.warn("[Veeda backup] falha:",e);}
};
const listProfilesBackups=()=>{
  const out=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith(PROFILES_BACKUP_PREFIX)){
      out.push({key:k,ts:parseInt(k.replace(PROFILES_BACKUP_PREFIX,""),10)||0});
    }
  }
  return out.sort((a,b)=>b.ts-a.ts);
};

// safeMergeProfile(updated) — única porta de entrada permitida (Art 6.2)
// - Encontra perfil pelo id; se não existe, append
// - Faz merge aditivo (campos existentes preservados se 'updated' não os trouxer)
// - PROIBIDO sobrescrever id, handle, passwordHash com vazio (Art 6.6)
const safeMergeProfile=(updated)=>{
  if(!updated||!updated.id){console.error("[safeMergeProfile] perfil sem id, abortando:",updated);return false;}
  const ps=loadProfiles();
  const idx=ps.findIndex(p=>p.id===updated.id);
  if(idx<0){
    // Append novo perfil
    if(!updated.handle||!updated.passwordHash){console.error("[safeMergeProfile] perfil novo sem handle/passwordHash, abortando");return false;}
    createProfilesBackup();
    ps.push(updated);
    safeLS.set(PROFILES_KEY,ps);
    return true;
  }
  const cur=ps[idx];
  // Validações de invariantes (Art 2 + 6)
  if(updated.handle&&updated.handle!==cur.handle){
    console.error("[safeMergeProfile] tentativa de mudar @handle (Art 2.1) — bloqueada. id=",cur.id);
    return false;
  }
  if(Object.prototype.hasOwnProperty.call(updated,"passwordHash")&&!updated.passwordHash){
    console.error("[safeMergeProfile] tentativa de gravar passwordHash vazio (Art 6.6) — bloqueada.");
    return false;
  }
  // Merge aditivo
  const merged={...cur,...updated};
  // Garante que campos críticos do existente nunca somem
  merged.id=cur.id;
  merged.handle=cur.handle;
  if(!merged.passwordHash)merged.passwordHash=cur.passwordHash;
  if(!merged.recoveryHash&&cur.recoveryHash)merged.recoveryHash=cur.recoveryHash;
  if(!merged.createdAt&&cur.createdAt)merged.createdAt=cur.createdAt;
  createProfilesBackup();
  ps[idx]=merged;
  safeLS.set(PROFILES_KEY,ps);
  return true;
};

// saveProfiles substitui o array INTEIRO. Mantém retrocompat, mas com backup obrigatório.
// Code paths novos devem preferir safeMergeProfile.
const saveProfiles=ps=>{
  if(!Array.isArray(ps)){console.error("[saveProfiles] arg inválido");return;}
  // Detector de regressão: nunca permitir cair pra zero perfis se havia perfis antes
  const prev=loadProfiles();
  if(prev.length>0&&ps.length===0){
    console.error("[saveProfiles] BLOCKED: tentativa de zerar perfis quando havia",prev.length,"— ABORTADO (Art 6.1)");
    return;
  }
  createProfilesBackup();
  safeLS.set(PROFILES_KEY,ps);
};

// Boot recovery (Art 6.4) — chamado uma vez no carregamento.
// Se PROFILES_KEY vier vazio/corrompido E houver backup com perfis válidos, restaura.
const bootRecoverProfiles=()=>{
  try{
    const cur=loadProfiles();
    if(cur&&cur.length>0)return{recovered:false,reason:"profiles ok"};
    const backups=listProfilesBackups();
    for(const b of backups){
      try{
        const raw=safeLS.raw(b.key);
        if(!raw)continue;
        const parsed=JSON.parse(raw);
        if(Array.isArray(parsed)&&parsed.length>0&&parsed.every(p=>p.id&&p.handle)){
          safeLS.rawSet(PROFILES_KEY,raw);
          console.warn("[Veeda] PERFIS RESTAURADOS do backup",b.key,"—",parsed.length,"perfis (Art 6.4)");
          window._veedaProfilesRecovered={count:parsed.length,from:b.key,ts:b.ts};
          return{recovered:true,count:parsed.length,from:b.key};
        }
      }catch{continue;}
    }
    return{recovered:false,reason:"no valid backup"};
  }catch(e){console.error("[bootRecoverProfiles]",e);return{recovered:false,error:String(e)};}
};
// Executa imediatamente — antes de qualquer leitura subsequente

// ── Monthly snapshot ──────────────────────────────────────
// Sobrescreve o snapshot do mês corrente a cada save (para refletir o estado
// mais recente), mas NUNCA toca em snapshots de meses anteriores — assim
// o usuário nunca perde o histórico do mês atual até fazer backup, e nada
// do passado é apagado.
const saveMonthlySnapshot=(profileId,encBlob)=>{
  const ym=new Date().toISOString().slice(0,7);
  const k=`veeda_snap_${profileId}_${ym}`;
  safeLS.rawSet(k,encBlob);
};
const getMonthlySnapshots=(profileId)=>{
  const out=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith(`veeda_snap_${profileId}_`)){out.push({key:k,ym:k.split("_").pop()});}
  }
  return out.sort((a,b)=>b.ym.localeCompare(a.ym));
};
// Recovery: tenta decifrar snapshots (mais recentes primeiro) até achar um válido
const loadLatestSnapshot=async(profileId,password)=>{
  const snaps=getMonthlySnapshots(profileId);
  for(const s of snaps){
    try{
      const raw=safeLS.raw(s.key);
      if(!raw)continue;
      const{key,salt,data}=await decryptObj(raw,password);
      return{key,salt,data,ym:s.ym};
    }catch(e){continue;}
  }
  return null;
};

// ── Shared Day URL encoding (cross-device sharing) ────────
// Serializa um dia para URL — fotos/vídeos viram placeholder de texto.
// O receptor abre o link, o app decodifica e oferece "Aceitar dia".
const encodeSharedDay=(profile,moments,curDay,feeling,message)=>{
  const safeMoments=(moments||[]).map(m=>{
    // Blobs binários não cabem em URL — substituímos por placeholder
    if((m.type==="foto"||m.type==="video"||m.type==="arte")&&
       (m.content?.startsWith("data:")||m.content?.startsWith("IDB:"))){
      return{...m,content:null,_hasMedia:true};
    }
    if(m.type==="voz"){return{...m,content:null,_hasMedia:true};}
    return m;
  });
  const payload={
    v:1,
    date:curDay,
    author:profile.name,
    handle:profile.handle||nameToHandle(profile.name),
    emoji:profile.emoji||"🌿",
    avatarColor:profile.avatarColor||C.purpleLight,
    feeling:feeling||null,
    moments:safeMoments,
    message:(message||"").trim(),
    sharedAt:Date.now(),
  };
  try{return"vd1_"+btoa(unescape(encodeURIComponent(JSON.stringify(payload))));}
  catch{return null;}
};
const decodeSharedDay=(encoded)=>{
  try{
    if(!encoded||!encoded.startsWith("vd1_"))return null;
    const d=JSON.parse(decodeURIComponent(escape(atob(encoded.slice(4)))));
    if(!d.date||!d.author||!d.handle)return null;
    return{...d,importedAt:Date.now()};
  }catch{return null;}
};

// ── Google Auth / Drive ────────────────────────────────────
// Fluxo OAuth2 implicit.
// Modo popup: para browsers normais (desktop/mobile browser aberto).
// Modo redirect: para PWA standalone (iOS bloqueia popups em apps instalados)
//   ou quando o popup é bloqueado. A página navega para o Google e retorna com
//   o token no hash — o boot handler em Veeda() faz o parse.
const _buildOAuthUrl=()=>{
  const params=new URLSearchParams({
    client_id:GOOGLE_CLIENT_ID,
    redirect_uri:window.location.origin+window.location.pathname,
    response_type:"token",
    scope:GDRIVE_SCOPE,
    include_granted_scopes:"true",
    prompt:"select_account",
    state:Math.random().toString(36).slice(2),
  });
  return`https://accounts.google.com/o/oauth2/v2/auth?${params}`;
};
const _isPWAStandalone=()=>
  (window.matchMedia?.("(display-mode: standalone)").matches)||
  (window.navigator.standalone===true);

const gdriveAuth=()=>new Promise((res,rej)=>{
  const authUrl=_buildOAuthUrl();
  if(_isPWAStandalone()){
    window.location.href=authUrl;
    return;
  }
  const popup=window.open(authUrl,"gauth","width=500,height=620");
  if(!popup||popup.closed){
    window.location.href=authUrl;
    return;
  }
  let done=false;
  const finish=token=>{
    if(done)return;done=true;
    clearInterval(poll);
    window.removeEventListener("message",onMsg);
    safeLS.set(GDRIVE_KEY,token);
    res(token.access_token);
  };
  // Primary: postMessage from popup (popup detects token and signals us)
  const onMsg=e=>{
    if(e.origin!==window.location.origin)return;
    if(e.data?.type==="veeda_oauth"&&e.data.access_token){
      try{popup.close();}catch{}
      finish({access_token:e.data.access_token,expires_in:parseInt(e.data.expires_in||"3600",10),scope:e.data.scope||"",ts:Date.now()});
    }
  };
  window.addEventListener("message",onMsg);
  // Fallback: poll for hash in case postMessage fails (old cached popup)
  const poll=setInterval(()=>{
    try{
      if(!popup||popup.closed){
        clearInterval(poll);window.removeEventListener("message",onMsg);
        if(!done)rej(new Error("Janela fechada."));return;
      }
      const hash=popup.location.hash;
      if(hash&&hash.includes("access_token")){
        clearInterval(poll);
        const p=new URLSearchParams(hash.slice(1));
        try{popup.close();}catch{}
        finish({access_token:p.get("access_token"),expires_in:parseInt(p.get("expires_in")||"3600",10),scope:p.get("scope")||"",ts:Date.now()});
      }
    }catch{}
  },500);
});

const _driveFind=async(name,t)=>{

  if(!r.ok)throw new Error("drive_find_failed");
  const d=await r.json();

};
const driveUpload=async(name,content,t,mime="text/plain")=>{
  const found=await _driveFind(name,t);
  const id=found?.id;
  const meta=JSON.stringify({name,parents:["appDataFolder"]});
  const b="vb_"+Math.random().toString(36).slice(2,10);
  const body=`--${b}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${b}\r\nContent-Type: ${mime}\r\n\r\n${content}\r\n--${b}--`;
  const url=id?`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=multipart&fields=id,modifiedTime`:`https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,modifiedTime`;
  const r=await fetch(url,{method:id?"PATCH":"POST",headers:{Authorization:`Bearer ${t}`,"Content-Type":`multipart/related; boundary=${b}`},body});
  if(!r.ok)throw new Error("drive_upload_failed");
  return r.json();
};
const driveDownload=async(name,t)=>{
  const found=await _driveFind(name,t);

// ── Camada cloudAccount / cloudData / cloudSync ────────────
// cloudAccount: metadata plain-text no Drive (lista de perfis, sem dados sensíveis)
//   { v:1, owner:{sub,email}, profiles:[{id,name,handle,emoji,avatarColor,avatarSrc,handleLower,createdAt,updatedAt}], updatedAt }
// cloudData(id): blob cifrado com a senha do usuário, mesma estrutura do veeda_data_<id> local
// cloudSnap(id,ym): snapshot mensal cifrado

const cloudAccount={
  async load(t){
    try{
      const r=await driveDownload(CLOUD_INDEX,t);
      if(!r)return null;
      return JSON.parse(r.content);
    }catch(e){console.warn("cloudAccount.load failed",e);return null;}
  },
  async save(acc,t){
    acc.updatedAt=Date.now();
    await driveUpload(CLOUD_INDEX,JSON.stringify(acc),t,"application/json");
  },
  empty:(owner)=>({v:1,owner,profiles:[],updatedAt:0}),
  mergeProfile(acc,profile){
    const idx=(acc.profiles||[]).findIndex(p=>p.id===profile.id);
    // Incluímos passwordHash e recoveryHash pois são hashes SHA-256 de senhas
    // (não dá pra reverter) — necessários para login cross-device. O blob de
    // dados real já está cifrado com chave derivada da senha via PBKDF2 150k
    // iterações, então ter os hashes aqui não enfraquece a segurança.
    const slim={
      id:profile.id,name:profile.name,handle:profile.handle,
      handleLower:(profile.handle||"").replace(/^@/,"").toLowerCase(),
      emoji:profile.emoji,avatarColor:profile.avatarColor,avatarSrc:profile.avatarSrc||null,
      passwordHash:profile.passwordHash,recoveryHash:profile.recoveryHash,
      email:profile.email||"",googleSub:profile.googleSub||null,
      cloud:true,
      createdAt:profile.createdAt,updatedAt:Date.now(),
    };
    if(idx>=0)acc.profiles[idx]={...acc.profiles[idx],...slim};
    else acc.profiles.push(slim);
    return acc;
  },
};

const cloudData={
  async load(profileId,t){
    const r=await driveDownload(CLOUD_DATA(profileId),t);
    if(!r)return null;
    return{content:r.content,modifiedTime:r.modifiedTime};
  },
  async save(profileId,encBlob,t){
    return driveUpload(CLOUD_DATA(profileId),encBlob,t);
  },
  async saveSnap(profileId,ym,encBlob,t){
    return driveUpload(CLOUD_SNAP(profileId,ym),encBlob,t);
  },
};

// cloudSync.pushDebounced — empurra o blob ao Drive sem bloquear a UI.
// - Coalesce: só o último valor por profileId é enviado após PUSH_DEBOUNCE_MS.
// - Retry off-line: se falhar, marca pendente para retry no próximo save/foco.
const PUSH_DEBOUNCE_MS=2000;
const _pushTimers=new Map();      // profileId -> timeoutId
const _pendingBlobs=new Map();    // profileId -> enc blob

const cloudSync={
  async tokenOrNull(){return getCachedToken();},
  queuePush(profileId,encBlob){
    _pendingBlobs.set(profileId,encBlob);
    clearTimeout(_pushTimers.get(profileId));
    const tid=setTimeout(()=>cloudSync.flushPush(profileId),PUSH_DEBOUNCE_MS);
    _pushTimers.set(profileId,tid);
  },
  async flushPush(profileId){
    const blob=_pendingBlobs.get(profileId);
    if(!blob)return;
    const t=await cloudSync.tokenOrNull();
    if(!t)return; // offline ou sem sessão Google; tenta no próximo save
    try{
      await cloudData.save(profileId,blob,t);
      _pendingBlobs.delete(profileId);
    }catch(e){console.warn("cloud push failed",e);}
  },
  async flushAll(){for(const id of[..._pendingBlobs.keys()])await cloudSync.flushPush(id);},
  // pullOnBoot: compara Drive vs local; usa o remoto somente se for mais recente
  // E tiver pelo menos tantos registros quanto o local — nunca apaga histórico.
  async pullOnBoot(profileId,password,t){
    try{
      const localRaw=safeLS.raw(`veeda_data_${profileId}`);
      // Coleta candidatos: Drive + Supabase
      const[driveResult,sbRaw]=await Promise.allSettled([
        t?cloudData.load(profileId,t):Promise.resolve(null),
        window.VeedaSupabase?.data?.pull(profileId)||Promise.resolve(null)
      ]);
      const driveBlob=driveResult.status==="fulfilled"?driveResult.value?.content:null;
      const sbBlob=sbRaw.status==="fulfilled"?sbRaw.value:null;
      // Sem local e sem remoto
      if(!localRaw&&!driveBlob&&!sbBlob)return{used:"local"};
      // Sem local — usa o melhor remoto disponível
      if(!localRaw){
        const best=driveBlob||sbBlob;
        safeLS.rawSet(`veeda_data_${profileId}`,best);
        return{used:"remote",reason:"no_local",source:driveBlob?"drive":"supabase"};
      }
      // Decifra todos os candidatos disponíveis para comparar lastSaved
      const candidates=[[localRaw,"local"],[driveBlob,"drive"],[sbBlob,"supabase"]]
        .filter(([b])=>b&&b!==localRaw);
      if(!candidates.length)return{used:"local"};
      const countM=d=>Object.values(d?.moments||{}).reduce((s,a)=>s+(a||[]).length,0);
      const countC=d=>(d?.contacts||[]).length;
      try{
        const[{data:dl},...remotes]=await Promise.all([
          decryptObj(localRaw,password),
          ...candidates.map(([b])=>decryptObj(b,password))
        ]);
        const ll=dl?.lastSaved||0,lm=countM(dl),lc=countC(dl);
        let bestBlob=localRaw,bestData=dl,bestTs=ll,bestSrc="local";
        remotes.forEach(({data:dr},i)=>{
          const rr=dr?.lastSaved||0;
          if(rr>bestTs&&countM(dr)>=lm&&countC(dr)>=lc){bestTs=rr;bestBlob=candidates[i][0];bestData=dr;bestSrc=candidates[i][1];}
        });
        if(bestSrc!=="local"){
          safeLS.rawSet(`veeda_data_${profileId}`,bestBlob);
          return{used:"remote",reason:"newer",source:bestSrc};
        }
        return{used:"local",reason:"local_has_more_or_equal"};
      }catch(e){return{used:"local",reason:"decrypt_failed"};}
    }catch(e){console.warn("cloudSync.pullOnBoot failed",e);return{used:"local",reason:"error"};}
  },
};

// ── Preservação de dados (regra de ouro do app) ────────────
// preserveBeforeMigration: cópia read-only dos dados antigos com carimbo de tempo.
// Estas chaves nunca são apagadas automaticamente — só o usuário pode limpá-las.
const preserveBeforeMigration=(label)=>{
  const ts=Date.now();
  const bkpKey=`${PRESERVE_PREFIX}${label}_${ts}`;
  const payload={ts,label,snapshot:{}};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(!k||k.startsWith(PRESERVE_PREFIX))continue;
    if(k.startsWith("veeda_"))payload.snapshot[k]=localStorage.getItem(k);
  }
  try{safeLS.rawSet(bkpKey,JSON.stringify(payload));return bkpKey;}
  catch(e){console.warn("preserve failed",e);return null;}
};
const listPreservedBackups=()=>{
  const out=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith(PRESERVE_PREFIX)){
      try{const p=JSON.parse(localStorage.getItem(k));out.push({key:k,ts:p.ts,label:p.label,size:Object.keys(p.snapshot||{}).length});}catch{}
    }
  }
  return out.sort((a,b)=>b.ts-a.ts);
};
const restorePreservedBackup=(key)=>{
  try{
    const p=JSON.parse(localStorage.getItem(key));
    if(!p?.snapshot)return false;
    for(const[k,v]of Object.entries(p.snapshot)){localStorage.setItem(k,v);}
    return true;
  }catch{return false;}
};

// Detectar se há conta local existente (para oferecer migração)
const hasLocalAccounts=()=>{
  // Conta apenas perfis locais (não cloud) para evitar mostrar "Importar conta local" quando o usuário já tem conta Google
  const profiles=loadProfiles().filter(p=>!p.cloud);
  if(profiles.length>0)return true;
  // Órfãos: veeda_data_* sem entrada em profiles (excluindo blobs de perfis cloud)
  const cloudIds=new Set(loadProfiles().filter(p=>p.cloud).map(p=>p.id));
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith("veeda_data_")){
      const id=k.replace("veeda_data_","");
      if(!cloudIds.has(id))return true;
    }
  }
  return false;
};

const getVideoEmbed=url=>{

const fmt=ts=>new Date(ts).toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"});
// Use LOCAL calendar date so users in UTC-3 (Brazil) don't get moments bucketed
// into the next UTC day when created after 21:00 local time.
const todayStr=()=>{const d=new Date();const y=d.getFullYear();const m=String(d.getMonth()+1).padStart(2,"0");const dy=String(d.getDate()).padStart(2,"0");return`${y}-${m}-${dy}`;};
// offsetDay: create date at local noon to stay on the correct calendar day in any timezone
const offsetDay=(d,n)=>{const[y,mo,dy]=d.split("-").map(Number);const dt=new Date(y,mo-1,dy,12,0,0);dt.setDate(dt.getDate()+n);const yr=dt.getFullYear();const mm=String(dt.getMonth()+1).padStart(2,"0");const dd=String(dt.getDate()).padStart(2,"0");return`${yr}-${mm}-${dd}`;};
const fmtLabel=d=>{const t=todayStr(),y=offsetDay(t,-1);if(d===t)return"hoje";if(d===y)return"ontem";const[yr,m,dy]=d.split("-");return new Date(yr,m-1,dy).toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long"});};
const fmtFull=d=>{const[y,m,dy]=d.split("-");return new Date(y,m-1,dy).toLocaleDateString("pt-BR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});};

function Btn({onClick,children,style={},disabled=false,variant="primary",type="button"}){
  const tapped=useRef(false);
  const base={width:"100%",padding:"15px 0",border:"none",borderRadius:50,fontFamily:PASSO,fontWeight:600,fontSize:15,cursor:disabled?"not-allowed":"pointer",opacity:disabled?.55:1,transition:"transform .12s,opacity .12s",WebkitTapHighlightColor:"transparent",display:"flex",alignItems:"center",justifyContent:"center",gap:6,touchAction:"manipulation"};
  const vars={
    primary:  {background:C.purple,  color:C.white},
    outline:  {background:"transparent",color:C.purple,border:`2px solid ${C.purple}`},
    secondary:{background:C.purpleMid,color:C.purpleSoft},
    ghost:    {background:"none",border:"none",color:C.textMid,fontSize:13,padding:"8px 0",fontFamily:SANS,borderRadius:8},
    danger:   {background:C.red,    color:C.white},
    green:    {background:C.green,  color:C.white},
    teal:     {background:C.teal,   color:C.white},
  };
  const fire=useCallback(e=>{
    if(disabled)return;
    if(tapped.current)return;
    tapped.current=true;
    setTimeout(()=>{tapped.current=false;},350);
    if(onClick)onClick(e);
  },[onClick,disabled]);
  return(
    <button type={type} disabled={disabled} style={{...base,...vars[variant],...style}}
      onTouchStart={e=>{if(!disabled)e.currentTarget.style.transform="scale(0.96)";}}
      onTouchEnd={e=>{e.currentTarget.style.transform="scale(1)";e.preventDefault();fire(e);}}
      onClick={e=>{if(!tapped.current)fire(e);}}>
      {children}
    </button>
  );
}

  useEffect(()=>{const t=setTimeout(onDone,3200);return()=>clearTimeout(t);},[]);

  const col ={info:C.purple,     success:C.green,     error:C.red,    warn:C.amber}[type]||C.purple;

function useToast(){
  const [toasts,setToasts]=useState([]);
  const addToast=useCallback((msg,type="info")=>{const id=Date.now();setToasts(p=>[...p,{id,msg,type}]);},[]);
  const removeToast=useCallback(id=>setToasts(p=>p.filter(t=>t.id!==id)),[]);
  const ToastContainer=()=><>{toasts.map(t=><Toast key={t.id} msg={t.msg} type={t.type} onDone={()=>removeToast(t.id)}/>)}</>;
  return{addToast,ToastContainer};
}

function DrawingCanvas({onSave,onClose}){

  const drawing=useRef(false);

  const saveSnap=()=>{history.current=[...history.current.slice(-4),canvasRef.current.toDataURL()];};
  const undo=()=>{
    if(!history.current.length)return;
    const prev=history.current[history.current.length-1];
    history.current=history.current.slice(0,-1);
    const img=new Image();img.onload=()=>canvasRef.current.getContext("2d").drawImage(img,0,0);img.src=prev;
  };

  useEffect(()=>{
    const c=canvasRef.current;c.width=1000;c.height=1000;
    const ctx=c.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,1000,1000);
  },[]);

  const pos=e=>{
    const c=canvasRef.current,r=c.getBoundingClientRect();
    const s=e.touches?e.touches[0]:e;

  };

  const move=e=>{if(!drawing.current)return;e.preventDefault();const p=pos(e);const ctx=canvasRef.current.getContext("2d");ctx.beginPath();ctx.moveTo(last.current.x,last.current.y);ctx.lineTo(p.x,p.y);ctx.strokeStyle=tool==="eraser"?"#fff":color;ctx.lineWidth=tool==="eraser"?sz*3:sz;ctx.lineCap="round";ctx.lineJoin="round";ctx.stroke();last.current=p;};
  const end=()=>{drawing.current=false;last.current=null;};

  const importImg=f=>{const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{const c=canvasRef.current,ctx=c.getContext("2d");const sc=Math.min(1000/img.width,1000/img.height);const w=img.width*sc,h=img.height*sc;ctx.drawImage(img,(1000-w)/2,(1000-h)/2,w,h);};img.src=ev.target.result;};r.readAsDataURL(f);};

  const COLORS=["#000000","#3A3350","#9000FF","#E91E8C","#5B7FA6","#1D9E75","#D4860A","#C0392B","#FF9800","#ffffff","#FDF5F0","#EDE9F6"];

  return(
    <div style={{position:"fixed",inset:0,background:"#1a1025",zIndex:400,display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto",paddingTop:"env(safe-area-inset-top)",paddingBottom:"env(safe-area-inset-bottom)"}}>

// ═══════════════════════════════════════════════════
// VOICE RECORDER
// ═══════════════════════════════════════════════════
function VoiceRecorder({onSave,onClose}){
  const [state,setState]=useState("idle"); // idle|recording|recorded|saving
  const [duration,setDuration]=useState(0);
  const [audioUrl,setAudioUrl]=useState(null);
  const recRef=useRef(null);
  const streamRef=useRef(null);
  const chunksRef=useRef([]);
  const timerRef=useRef(null);
  const MAX=120;

  const start=async()=>{
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      streamRef.current=stream;
      const rec=new MediaRecorder(stream,{mimeType:"audio/webm;codecs=opus"});
      chunksRef.current=[];
      rec.ondataavailable=e=>chunksRef.current.push(e.data);
      rec.onstop=()=>{
        const blob=new Blob(chunksRef.current,{type:"audio/webm"});
        const url=URL.createObjectURL(blob);
        setAudioUrl(url);
        setState("recorded");
        streamRef.current?.getTracks().forEach(t=>t.stop());
      };
      rec.start(100);
      recRef.current=rec;
      setState("recording");
      setDuration(0);
      timerRef.current=setInterval(()=>{
        setDuration(d=>{if(d>=MAX-1){stop();return d;}return d+1;});
      },1000);
    }catch{onClose();}
  };

  const stop=()=>{
    clearInterval(timerRef.current);
    recRef.current?.stop();
  };

  const save=async()=>{
    setState("saving");
    const blob=new Blob(chunksRef.current,{type:"audio/webm"});
    const reader=new FileReader();
    reader.onload=e=>onSave(e.target.result,duration);
    reader.readAsDataURL(blob);
  };

  useEffect(()=>()=>{clearInterval(timerRef.current);streamRef.current?.getTracks().forEach(t=>t.stop());},[]);

  const fmtDur=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;

  return(
    <div style={{padding:"8px 0"}}>
      <div style={{textAlign:"center",padding:"24px 0"}}>
        <div style={{width:80,height:80,borderRadius:"50%",background:state==="recording"?C.redLight:C.tealLight,border:`3px solid ${state==="recording"?C.red:C.teal}`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",fontSize:32,animation:state==="recording"?"pulse 1s ease infinite":"none"}}>
          {state==="recording"?"🔴":"🎙️"}
        </div>
        {(state==="recording"||state==="recorded")&&(
          <p style={{fontSize:28,fontWeight:700,color:C.text,fontFamily:"monospace",marginBottom:4}}>{fmtDur(duration)}</p>
        )}
        {state==="idle"&&<p style={{fontSize:14,color:C.textMid,marginBottom:0}}>Toque para gravar uma nota de voz</p>}
        {state==="recording"&&<p style={{fontSize:12,color:C.red,marginBottom:0}}>Gravando… max {fmtDur(MAX)}</p>}
      </div>
      {state==="recorded"&&audioUrl&&(
        <audio controls src={audioUrl} style={{width:"100%",marginBottom:16}}/>
      )}
      <div style={{display:"flex",gap:10,flexDirection:"column"}}>
        {state==="idle"&&<Btn onClick={start} variant="teal">🎙️ Iniciar gravação</Btn>}
        {state==="recording"&&<Btn onClick={stop} variant="danger">⏹ Parar gravação</Btn>}
        {state==="recorded"&&<><Btn onClick={save}>✓ Adicionar à timeline</Btn><Btn onClick={start} variant="outline">Regravar</Btn></>}
        {state==="saving"&&<Btn disabled>Salvando… <Spinner/></Btn>}
        <Btn onClick={onClose} variant="ghost">Cancelar</Btn>
      </div>
    </div>
  );
}

// LOCATION PICKER
// ═══════════════════════════════════════════════════
function LocationPicker({value,onChange}){
  const [loading,setLoading]=useState(false);
  const [manual,setManual]=useState(false);
  const [text,setText]=useState(value?.name||"");

  const detect=async()=>{
    setLoading(true);
    try{
      const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:8000}));
      const{latitude:lat,longitude:lng}=pos.coords;
      let name=`${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      try{
        const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=pt`);
        const d=await r.json();
        name=d.address?.city||d.address?.town||d.address?.village||d.display_name?.split(",")[0]||name;
      }catch{}
      onChange({lat,lng,name});
      setText(name);
    }catch{setManual(true);}
    setLoading(false);
  };

  if(value&&!manual){
    return(
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"#E8F8F4",border:`1px solid ${C.greenMid}44`,borderRadius:12,marginBottom:14}}>
        <span style={{fontSize:18}}>📍</span>
        <span style={{flex:1,fontSize:13,color:C.green,fontWeight:500}}>{value.name}</span>
        <button onClick={()=>{onChange(null);setText("");}} style={{background:"none",border:"none",color:C.textLight,cursor:"pointer",fontSize:16}}>×</button>
      </div>
    );
  }

  if(manual){
    return(
      <div style={{marginBottom:14}}>
        <div style={{display:"flex",gap:8}}>
          <input value={text} onChange={e=>setText(e.target.value)} placeholder="Ex: Florianópolis, SC" style={{flex:1,borderRadius:50}}/>
          <button onClick={()=>{if(text.trim())onChange({lat:null,lng:null,name:text.trim()});setManual(false);}} style={{padding:"0 14px",background:C.green,color:"#fff",border:"none",borderRadius:50,cursor:"pointer",fontSize:13,fontWeight:600,flexShrink:0}}>OK</button>
        </div>
      </div>
    );
  }

  return(
    <div style={{display:"flex",gap:8,marginBottom:14}}>
      <button onClick={detect} disabled={loading} style={{flex:1,padding:"10px 0",background:"#E8F8F4",color:C.green,border:`1px solid ${C.greenMid}55`,borderRadius:50,cursor:"pointer",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
        {loading?<><Spinner size={14} color={C.green}/>Detectando...</>:"📍 Adicionar local"}
      </button>
      <button onClick={()=>setManual(true)} style={{padding:"10px 14px",background:C.white,color:C.textMid,border:`1px solid ${C.cardBorder}`,borderRadius:50,cursor:"pointer",fontSize:13}}>✏️</button>
    </div>
  );
}

// MOMENT DETAIL

function MomentDetail({m,onClose,onDelete,onPlay,onTogglePrivacy}){
  const [saving,setSaving]=useState(false);
  const [confirmDelete,setConfirmDelete]=useState(false);
  const audioRef=useRef(null);
  const embed=m.type==="videolink"?getVideoEmbed(m.content):null;
  const allTags=[...DEFAULT_TAGS];
  // Permitir salvar mesmo quando o conteúdo está no IndexedDB (prefixo "IDB:")
  const canSave=(m.type==="foto"||m.type==="arte"||m.type==="video"||m.type==="voz")&&!!m.content;

  const saveToDevice=async()=>{
    if(!m.content)return;
    setSaving(true);
    try{
      let src=m.content;
      // Se o conteúdo está no IndexedDB, resolve primeiro
      if(src.startsWith("IDB:")){
        const loaded=await idbLoad(src.slice(4));
        if(!loaded){setSaving(false);return;}
        src=loaded;
      }
      // Converte data URL para Blob para evitar navegação de página no iOS Safari
      const mimeMap={foto:"image/png",arte:"image/png",video:"video/mp4",voz:"audio/webm"};
      const mime=mimeMap[m.type]||"application/octet-stream";
      let blobUrl;
      try{
        const res=await fetch(src);
        const blob=await res.blob();
        blobUrl=URL.createObjectURL(blob);
      }catch{
        blobUrl=src; // fallback para data URL se fetch falhar
      }
      const ext=m.type==="video"?"mp4":m.type==="voz"?"webm":"png";
      const a=document.createElement("a");
      a.href=blobUrl;
      a.download=`veeda-${m.id}.${ext}`;
      document.body.appendChild(a);a.click();document.body.removeChild(a);
      if(blobUrl!==src)setTimeout(()=>URL.revokeObjectURL(blobUrl),5000);
    }finally{setSaving(false);}
  };

  return(
    <Modal title="" onClose={onClose}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
        <div style={{width:38,height:38,borderRadius:"50%",background:(TYPE_META[m.type]||TYPE_META.texto).bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{(TYPE_META[m.type]||TYPE_META.texto).icon}</div>
        <div style={{flex:1}}>
          <p style={{margin:0,fontSize:12,color:C.textLight}}>{fmt(m.ts)}</p>
          {m.location&&<p style={{margin:0,fontSize:11,color:C.green}}>📍 {m.location.name}</p>}
        </div>
        <button onClick={onClose} style={{background:C.purpleLight,border:"none",borderRadius:"50%",width:30,height:30,color:C.purple,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
      </div>

      {(m.type==="foto"||m.type==="arte")&&m.content&&<img src={m.content} alt="" style={{width:"100%",borderRadius:12,display:"block",marginBottom:12}}/>}
      {m.type==="video"&&m.content&&<video src={m.content} controls style={{width:"100%",borderRadius:12,display:"block",maxHeight:320,marginBottom:12}}/>}
      {m.type==="videolink"&&embed&&<div style={{position:"relative",paddingBottom:"56.25%",height:0,borderRadius:12,overflow:"hidden",marginBottom:12}}><iframe src={embed} style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",border:"none"}} allowFullScreen title="v"/></div>}
      {m.type==="link"&&<a href={m.content} target="_blank" rel="noopener noreferrer" style={{display:"block",color:C.blue,fontSize:14,wordBreak:"break-all",marginBottom:12,padding:"10px 14px",background:C.blueLight,borderRadius:10}}>{m.content}</a>}
      {m.type==="texto"&&<p style={{fontSize:15,color:C.text,lineHeight:1.75,marginBottom:12}}>{m.content}</p>}

      {m.type==="voz"&&m.content&&(
        <div style={{background:C.tealLight,borderRadius:14,padding:14,marginBottom:12,display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:28,flexShrink:0}}>🎙️</span>
          <div style={{flex:1}}>
            <audio ref={audioRef} src={m.content} onEnded={()=>setPlaying(false)} style={{width:"100%"}} controls/>
          </div>
        </div>
      )}

      {m.type==="musica"&&(
        <div style={{background:C.greenLight,borderRadius:14,padding:14,marginBottom:12}}>
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            {m.albumArt&&<img src={m.albumArt} alt="" style={{width:56,height:56,borderRadius:8,objectFit:"cover",flexShrink:0}}/>}
            <div style={{flex:1,overflow:"hidden"}}>
              <p style={{margin:0,fontSize:14,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.trackTitle||m.content}</p>
              <p style={{margin:"2px 0 0",fontSize:12,color:C.textMid}}>{m.trackArtist||""}</p>
            </div>
          </div>
          <div style={{display:"flex",gap:8,marginTop:10}}>
            {m.youtubeId&&<button onClick={()=>{onPlay?.({title:m.trackTitle||m.content,artist:m.trackArtist||"",art:m.albumArt,youtubeId:m.youtubeId});onClose();}} style={{flex:1,padding:"9px 0",background:"#FF0000",border:"none",borderRadius:10,color:"#fff",fontWeight:600,fontSize:13,cursor:"pointer"}}>▶ Ouvir</button>}
          </div>

      )}

      {m.caption&&<p style={{fontSize:13,color:C.textMid,marginBottom:12,fontStyle:"italic",padding:"8px 12px",background:"#FAF9FD",borderRadius:8}}>"{m.caption}"</p>}

      {m.tags?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
        {m.tags.map(tid=>{const t=allTags.find(x=>x.id===tid);return t?<span key={tid} style={{padding:"3px 10px",background:t.bg,color:t.color,borderRadius:20,fontSize:12,fontWeight:500}}>{t.emoji} {t.label}</span>:null;})}
      </div>}

      {canSave&&<Btn onClick={saveToDevice} disabled={saving} variant="outline" style={{marginBottom:8,fontSize:13,padding:"11px 0"}}>{saving?<><Spinner size={14} color={C.purple}/>Preparando…</>:"↓ Salvar no dispositivo"}</Btn>}
      {/* Botão de excluir só aparece se onDelete foi passado (modo edição do próprio DONO). */}
      {onTogglePrivacy&&<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8,background:m.isPrivate?"#FFF3F3":C.purpleLight,borderRadius:10,padding:"10px 14px"}}>
        <span style={{fontSize:12,color:m.isPrivate?C.red:C.textMid}}>{m.isPrivate?"🔒 Privado":"🌐 Público"}</span>
        <button onClick={onTogglePrivacy} style={{fontSize:12,fontWeight:600,background:"none",border:`1px solid ${m.isPrivate?C.red:C.purple}`,borderRadius:20,padding:"4px 12px",color:m.isPrivate?C.red:C.purple,cursor:"pointer"}}>{m.isPrivate?"Tornar público":"Tornar privado"}</button>
      </div>}
      {typeof onDelete==="function"&&!confirmDelete&&(
        <Btn onClick={()=>setConfirmDelete(true)} variant="ghost" style={{color:C.red,fontSize:13}}>Excluir registro</Btn>
      )}
      {typeof onDelete==="function"&&confirmDelete&&(
        <div style={{background:"#FFF3F3",border:`1.5px solid ${C.red}`,borderRadius:12,padding:"14px 16px",marginTop:4}}>
          <p style={{margin:"0 0 10px",fontSize:13,color:C.text,fontWeight:600,lineHeight:1.5}}>Tem certeza? Este registro será excluído permanentemente e não poderá ser recuperado.</p>
          <div style={{display:"flex",gap:8}}>
            <Btn onClick={()=>setConfirmDelete(false)} variant="outline" style={{flex:1,fontSize:13}}>Cancelar</Btn>
            <Btn onClick={()=>{onDelete();onClose();}} style={{flex:1,fontSize:13,background:C.red,color:"#fff",border:"none"}}>Sim, excluir</Btn>
          </div>
        </div>
      )}
    </Modal>
  );
}

// MUSIC PICKER — busca via YouTube (Piped API, sem chave)

const PIPED_HOSTS=["https://pipedapi.kavin.rocks","https://piped-api.garudalinux.org","https://api.piped.projectsegfau.lt"];
async function searchYouTubeMusic(q){
  for(const host of PIPED_HOSTS){
    try{
      const r=await fetch(`${host}/search?q=${encodeURIComponent(q)}&filter=music_songs`,{signal:AbortSignal.timeout(5000)});
      if(!r.ok)continue;
      const d=await r.json();
      const items=(d.items||[]).filter(v=>v.url&&v.title);
      if(items.length)return items.slice(0,10).map(v=>({
        id:v.url.replace("/watch?v=",""),
        title:v.title,
        artist:v.uploaderName||"",
        art:v.thumbnail,
        youtubeId:v.url.replace("/watch?v=",""),
        duration:v.duration
      }));
    }catch{}
  }
  return null;
}

// MINI PLAYER — flutuante, arrastável, persiste entre telas
// ═══════════════════════════════════════════════════
function MiniPlayer({track,onClose}){
  const [offset,setOffset]=useState({x:0,y:0});
  const [expanded,setExpanded]=useState(false);
  const drag=useRef(null);
  const startDrag=e=>{const t=e.touches?e.touches[0]:e;drag.current={sx:t.clientX-offset.x,sy:t.clientY-offset.y,moved:false};};
  const moveDrag=e=>{if(!drag.current)return;e.preventDefault();const t=e.touches?e.touches[0]:e;drag.current.moved=true;setOffset({x:t.clientX-drag.current.sx,y:t.clientY-drag.current.sy});};
  const endDrag=()=>{drag.current=null;};
  if(!track)return null;
  const ytId=track.youtubeId;
  return(
    <div onMouseDown={startDrag} onMouseMove={moveDrag} onMouseUp={endDrag} onMouseLeave={endDrag}
         onTouchStart={startDrag} onTouchMove={moveDrag} onTouchEnd={endDrag}
         style={{position:"fixed",bottom:`calc(80px + env(safe-area-inset-bottom) + ${-offset.y}px)`,
           left:`calc(12px + ${offset.x}px)`,right:`calc(12px - ${offset.x}px)`,
           zIndex:600,background:"rgba(25,15,45,0.96)",backdropFilter:"blur(20px)",
           borderRadius:18,boxShadow:"0 8px 32px rgba(0,0,0,.5)",overflow:"hidden",
           cursor:"grab",userSelect:"none",touchAction:"none"}}>
      {expanded&&ytId&&(
        <div style={{position:"relative",paddingTop:"56.25%",width:"100%"}}>
          <iframe src={`https://www.youtube-nocookie.com/embed/${ytId}?autoplay=1`}
            allow="autoplay; encrypted-media" allowFullScreen
            style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",border:"none"}}/>
        </div>
      )}
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 12px"}}>
        {track.art&&<img src={track.art} alt="" style={{width:38,height:38,borderRadius:8,objectFit:"cover",flexShrink:0}}/>}
        <div style={{flex:1,overflow:"hidden",minWidth:0}} onClick={e=>{e.stopPropagation();if(!drag.current?.moved)setExpanded(x=>!x);}}>
          <p style={{margin:0,fontSize:12,fontWeight:700,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{track.title}</p>
          <p style={{margin:"1px 0 0",fontSize:10,color:"rgba(255,255,255,.55)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{track.artist}</p>
        </div>
        {ytId&&<button onClick={e=>{e.stopPropagation();setExpanded(x=>!x);}} style={{width:34,height:34,borderRadius:"50%",background:"#FF0000",border:"none",color:"#fff",cursor:"pointer",fontSize:13,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{expanded?"▼":"▶"}</button>}
        <button onClick={e=>{e.stopPropagation();onClose();}} style={{width:26,height:26,borderRadius:"50%",background:"rgba(255,255,255,.12)",border:"none",color:"rgba(255,255,255,.7)",cursor:"pointer",fontSize:12,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>✕</button>
      </div>
    </div>
  );
}

// ADD CONTACT MODAL (with cross-device support)
// ═══════════════════════════════════════════════════
function AddContactModal({contacts,myHandle,profile,onAdd,onClose,addToast,prefillCard}){
  const [q,setQ]=useState("");
  const [results,setResults]=useState([]);
  const [searching,setSearching]=useState(false);
  const myH=(myHandle||"").replace(/^@/,"");

  // Retrocompat: se veio via link antigo (?add=vc2_…), pré-preenche a busca com o @handle
  useEffect(()=>{
    if(!prefillCard)return;
    const parsed=parseProfileCard(prefillCard.trim());
    if(parsed?.handle)setQ(parsed.handle);
  },[prefillCard]);

  // Busca com debounce no Supabase
  useEffect(()=>{
    const term=q.trim();
    if(term.length<2){setResults([]);setSearching(false);return;}
    if(!window.VeedaSupabase?.isReady()){
      setResults([]);setSearching(false);
      addToast?.("Conexão com o servidor indisponível. Tente novamente em instantes.","warn");
      return;
    }
    setSearching(true);
    const h=setTimeout(async()=>{
      try{
        const found=await VeedaSupabase.profiles.search(term,myHandle);
        const filtered=found.filter(p=>!contacts.find(c=>(c.handle||"").replace(/^@/,"")===(p.handle||"").replace(/^@/,"")));
        setResults(filtered);
      }catch(e){setResults([]);}
      setSearching(false);
    },350);
    return()=>clearTimeout(h);
  },[q,contacts,myHandle]);

  const [sent,setSent]=useState([]);
  const addContact=async(p)=>{
    if(!window.VeedaSupabase?.isReady()){addToast?.("Sem conexão com o servidor.","warn");return;}
    try{
      await VeedaSupabase.profiles.register(profile);
      await VeedaSupabase.connections.sendRequest(profile,p.handle);
      setSent(s=>[...s,p.handle]);
      addToast?.(`Pedido enviado para ${p.name}! Aguardando confirmação.`,"success");
    }catch(e){addToast?.("Erro ao enviar pedido. Tente novamente.","error");}
  };

  return(
    <div>
      {/* Lembrete do @handle do usuário atual (para ele avisar quem quer adicionar) */}
      {myHandle&&(
        <div style={{background:C.purpleLight,borderRadius:12,padding:"10px 14px",marginBottom:14}}>
          <p style={{margin:0,fontSize:12,color:C.textMid,lineHeight:1.5}}>
            Seu handle: <strong style={{color:C.purple}}>{myHandle}</strong> — compartilhe com quem quer te encontrar.
          </p>
        </div>
      )}

      <p style={{fontSize:13,color:C.textMid,marginBottom:10,lineHeight:1.5}}>
        Busque por <strong>nome</strong> ou <strong>@handle</strong> da pessoa que você quer adicionar ao seu Círculo:
      </p>
      <input
        value={q}
        onChange={e=>setQ(e.target.value)}
        placeholder="Ex: Maria ou @mariasilva"
        autoFocus
        style={{marginBottom:10,padding:"12px 16px",borderRadius:50,border:`1.5px solid ${C.cardBorder}`,fontSize:14,width:"100%",outline:"none",background:C.white}}
      />

      {q.trim()&&q.trim().length<2&&(
        <p style={{fontSize:12,color:C.textLight,margin:"4px 0 8px"}}>Digite pelo menos 2 caracteres para buscar.</p>
      )}

      {searching&&(
        <div style={{padding:"16px 0",textAlign:"center"}}><Spinner size={16}/></div>
      )}

      {!searching&&q.trim().length>=2&&results.length===0&&(
        <div style={{padding:"14px",background:C.amberLight,borderRadius:10,marginTop:4}}>
          <p style={{margin:0,fontSize:12,color:"#7A5800",lineHeight:1.5}}>
            Nenhum usuário encontrado. Confira o nome ou @handle — a pessoa precisa ter uma conta ativa no Veeda.
          </p>
        </div>
      )}

      {results.map(p=>(
        <div key={p.id||p.handle} style={{background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:14,padding:"10px 12px",marginBottom:8,display:"flex",alignItems:"center",gap:12}}>
          <AvatarBubble src={p.avatarSrc} emoji={p.emoji||"🌿"} color={p.avatarColor||C.purpleLight} size={40}/>
          <div style={{flex:1,minWidth:0}}>
            <p style={{margin:0,fontSize:14,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.name}</p>
            <p style={{margin:0,fontSize:12,color:C.purple,fontWeight:500}}>{p.handle}</p>
          </div>
          {sent.includes(p.handle)
            ?<span style={{fontSize:12,color:C.green,fontWeight:600}}>✓ Enviado</span>
            :<button onClick={()=>addContact(p)} style={{background:C.purple,color:C.white,border:"none",borderRadius:50,padding:"8px 16px",fontSize:13,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>Convidar</button>
          }
        </div>
      ))}
    </div>
  );
}

// SHARE DAY MODAL
// ═══════════════════════════════════════════════════
function ShareDayModal({profile,data,curDay,onClose,onShared,addToast}){
  const [tab,setTab]=useState("local");
  const [sel,setSel]=useState([]);const [msg,setMsg]=useState("");const [loading,setLoading]=useState(false);const [done,setDone]=useState(false);
  const [linkCopied,setLinkCopied]=useState(false);
  const contacts=data.contacts||[];
  const moments=((data.moments||{})[curDay]||[]).filter(m=>!m.isPrivate);
  const already=(data.sharedLog||{})[curDay]||[];
  const available=contacts.filter(c=>!already.includes(c.code));
  const toggle=code=>setSel(p=>p.includes(code)?p.filter(x=>x!==code):[...p,code]);
  const feeling=(data.dayFeelings||{})[curDay];

  // ── Gera link cross-device ─────────────────────────
  const sharedCode=useMemo(()=>encodeSharedDay(profile,moments,curDay,feeling,msg),[profile,moments,curDay,feeling,msg]);
  const sharedLink=sharedCode?`${window.location.origin}${window.location.pathname}?day=${encodeURIComponent(sharedCode)}`:null;
  const whatsShareMsg=sharedLink?`${profile.name} quer compartilhar o dia ${fmtFull(curDay)} com você no Veeda 🌿\n\n${sharedLink}`:"";

  const copyShareLink=()=>{if(sharedLink){navigator.clipboard?.writeText(sharedLink);setLinkCopied(true);setTimeout(()=>setLinkCopied(false),2500);}};

  // ── Compartilhamento local + cross-device via Supabase ──
  const doShare=async()=>{
    if(!sel.length)return;setLoading(true);
    // Resolve referências IDB → data URL para que o destinatário veja as imagens
    const resolvedMoments=await Promise.all(moments.map(async m=>{
      if(m.content?.startsWith("IDB:")){
        const real=await idbLoad(m.content.slice(4));
        return real?{...m,content:real}:m;
      }
      return m;
    }));
    const payload={date:curDay,author:profile.name,handle:profile.handle||nameToHandle(profile.name),emoji:profile.emoji,avatarColor:profile.avatarColor,avatarSrc:profile.avatarSrc||null,moments:resolvedMoments,feeling,message:msg.trim(),importedAt:Date.now()};
    sel.forEach(handle=>{
      const k=`veeda_inbox_${handle.replace(/^@/,"")}`;
      const ex=safeLS.get(k,[]);ex.push(payload);safeLS.set(k,ex);
    });
    // Cross-device: envia via Supabase para destinatários em outros dispositivos
    let sbStatus="skip";let sbError=null;
    if(window.VeedaSupabase?.isReady()){
      try{
        const ok=await VeedaSupabase.days.share(profile,sel,payload);
        sbStatus=ok?"sent":"failed";
        console.log("[Veeda share]",{to:sel,date:curDay,sbStatus,profileHandle:profile.handle});
      }catch(e){
        sbStatus="error";sbError=e?.message||String(e);
        console.error("[Veeda share] erro:",e);
      }
    }else{
      console.warn("[Veeda share] Supabase OFFLINE — dia salvo só local. Outro dispositivo NÃO vai receber.");
    }
    if(sbStatus==="failed"||sbStatus==="error"){
      addToast?.(`Compartilhado localmente, mas falhou no servidor: ${sbError||"verifique console"}`,"warn");
    }else{
      addToast?.("Dia compartilhado com sucesso! 🌿","success");
    }
    showNativeNotif("Veeda",`${profile.name} compartilhou o dia com você! 🌿`);
    await onShared({...(data.sharedLog||{}),[curDay]:[...already,...sel]});
    setDone(true);setLoading(false);
  };

  if(done)return<Modal title="" onClose={onClose}><div style={{textAlign:"center",padding:"16px 0"}}><div style={{fontSize:52,marginBottom:14}}>🌿</div><p style={{fontSize:18,fontWeight:600,color:C.text,marginBottom:8}}>Dia compartilhado!</p><Btn onClick={onClose}>Fechar</Btn></div></Modal>;

  return(
    <Modal title="Compartilhar meu Dia de Veeda" onClose={onClose}>
      {moments.length===0
        ?<p style={{fontSize:14,color:C.textMid,textAlign:"center",padding:"20px 0"}}>Nenhum momento registrado hoje ainda.</p>
        :(
        <>

        <p style={{margin:0,fontSize:13,color:C.textMid,fontStyle:"italic"}}>"{message}"</p>

      {textMoments.length>0&&<div style={{marginBottom:14}}>
        <p style={{fontSize:12,fontWeight:600,color:C.textMid,marginBottom:8}}>Momentos do dia</p>

            <span style={{fontSize:13,color:C.text}}>{m.type==="texto"?m.content:m.type==="musica"?`🎵 ${m.content}`:m.content}</span>
            {m.caption&&<p style={{margin:"4px 0 0",fontSize:12,color:C.textMid,fontStyle:"italic"}}>{m.caption}</p>}

        <p style={{margin:0,fontSize:12,color:C.blue}}>📷 Este dia tem {mediaMoments.length} foto/vídeo(s) — não incluídos no link por tamanho.</p>
      </div>}

      <Btn onClick={onAccept} style={{marginBottom:8}}>Aceitar dia 🌿</Btn>

// EVENTS MODAL
// ═══════════════════════════════════════════════════
function EventsModal({data,profile,onSave,onClose}){
  const [tab,setTab]=useState("list");const [title,setTitle]=useState("");const [evType,setEvType]=useState("outro");const [date,setDate]=useState("");const [time,setTime]=useState("");const [notes,setNotes]=useState("");
  const [confirmEvId,setConfirmEvId]=useState(null);

  const add=()=>{if(!title.trim()||!date)return;onSave([...events,{id:Date.now(),title:title.trim(),type:evType,date,time,notes:notes.trim(),createdBy:profile.name}]);setTitle("");setDate("");setTime("");setNotes("");setTab("list");};
  return(
    <Modal title="Eventos futuros" onClose={onClose}>

      {tab==="list"&&(events.length===0?<p style={{textAlign:"center",fontSize:14,color:C.textLight,padding:"24px 0"}}>Nenhum evento programado.</p>:events.map(ev=>{const t2=EVENT_TYPES.find(t=>t.id===ev.type)||EVENT_TYPES[4];return<div key={ev.id} style={{background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:14,padding:14,marginBottom:10}}><div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:36,height:36,borderRadius:10,background:C.amberLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{t2.emoji}</div><div style={{flex:1}}><p style={{margin:0,fontSize:14,fontWeight:600,color:C.text}}>{ev.title}</p><p style={{margin:0,fontSize:12,color:C.textMid}}>{fmtLabel(ev.date)}{ev.time?` às ${ev.time}`:""}</p></div>{confirmEvId!==ev.id?<button onClick={()=>setConfirmEvId(ev.id)} style={{background:"none",border:"none",color:C.textLight,cursor:"pointer",fontSize:12}}>remover</button>:<div style={{display:"flex",gap:6,alignItems:"center"}}><span style={{fontSize:11,color:C.red,fontWeight:600}}>Remover?</span><button onClick={()=>setConfirmEvId(null)} style={{background:"none",border:`1px solid ${C.cardBorder}`,borderRadius:6,cursor:"pointer",fontSize:11,padding:"3px 8px",color:C.textMid}}>Não</button><button onClick={()=>{onSave(events.filter(e=>e.id!==ev.id));setConfirmEvId(null);}} style={{background:C.red,border:"none",borderRadius:6,cursor:"pointer",fontSize:11,padding:"3px 8px",color:"#fff",fontWeight:600}}>Sim</button></div>}</div>{ev.notes&&<p style={{margin:"8px 0 0",fontSize:13,color:C.textMid}}>{ev.notes}</p>}</div>}))}
      {tab==="new"&&<div><div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>{EVENT_TYPES.map(et=><button key={et.id} onClick={()=>setEvType(et.id)} style={{padding:"6px 12px",background:evType===et.id?C.amberLight:C.white,border:`1.5px solid ${evType===et.id?C.amber:C.cardBorder}`,borderRadius:20,cursor:"pointer",fontSize:12,color:evType===et.id?C.amber:C.textMid}}>{et.emoji} {et.label}</button>)}</div><input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Nome do evento" style={{marginBottom:12}}/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}><input type="date" value={date} onChange={e=>setDate(e.target.value)}/><input type="time" value={time} onChange={e=>setTime(e.target.value)}/></div><textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Observações…" style={{marginBottom:14,minHeight:60}}/><Btn onClick={add} disabled={!title.trim()||!date}>Adicionar evento</Btn></div>}
    </Modal>
  );
}

// ═══════════════════════════════════════════════════
// BACKUP MODAL
// ═══════════════════════════════════════════════════
function BackupModal({data,profile,password,onClose,addToast,zIndex=400}){
  const [status,setStatus]=useState("idle");const [msg,setMsg]=useState("");
  const [driveToken,setDriveToken]=useState(safeLS.get(GDRIVE_KEY)?.access_token||null);
  const fileRef=useRef();

  const snapshots=getMonthlySnapshots(profile.id);
  const totalDays=Object.keys(data.moments||{}).filter(d=>(data.moments[d]||[]).length>0).length;
  const totalMoments=Object.values(data.moments||{}).reduce((s,m)=>s+(m||[]).length,0);

  const connectDrive=async()=>{setStatus("connecting");try{const t=await gdriveAuth();setDriveToken(t);setStatus("idle");addToast?.("Google Drive conectado!","success");}catch(e){setStatus("error");setMsg(e.message);}};
  const uploadDrive=async()=>{setStatus("uploading");try{await gdriveUpload(await encryptObj(data,password),driveToken);setStatus("done");addToast?.("Backup salvo no Google Drive!","success");setMsg("Salvo!");}catch(e){setStatus("error");setMsg("Erro: "+e.message);}};
  const exportLocal=async()=>{const enc=await encryptObj(data,password);const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([enc],{type:"text/plain"}));a.download=`veeda-backup-${todayStr()}.veeda`;a.click();addToast?.("Arquivo baixado!","success");};
  const importLocal=file=>{const r=new FileReader();r.onload=async e=>{try{const{data:d}=await decryptObj(e.target.result,password);addToast?.("Backup verificado com sucesso!","success");setMsg("Backup verificado!");}catch{addToast?.("Arquivo inválido ou senha incorreta.","error");}};r.readAsText(file);};

  return(
    <Modal title="Backup dos Dados" onClose={onClose} fullHeight zIndex={zIndex}>
      <div style={{background:`linear-gradient(135deg,${C.purpleLight},${C.blueLight})`,borderRadius:14,padding:16,textAlign:"center",marginBottom:20}}>
        <p style={{margin:0,fontSize:28}}>🌿</p>
        <p style={{margin:"6px 0 2px",fontSize:15,fontWeight:700,color:C.text}}>{profile.name}</p>
        <p style={{margin:0,fontSize:12,color:C.textMid}}>{totalDays} Dias · {totalMoments} momentos</p>
      </div>

      {snapshots.length>0&&(
        <div style={{background:C.greenLight,borderRadius:12,padding:"12px 14px",marginBottom:16,border:`1px solid ${C.green}44`}}>
          <p style={{margin:"0 0 4px",fontSize:13,fontWeight:600,color:C.green}}>✅ Histórico protegido automaticamente</p>
          <p style={{margin:0,fontSize:12,color:C.textMid}}>Você tem snapshots mensais de: {snapshots.map(s=>s.ym).join(", ")}</p>
        </div>
      )}

      <p style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:10}}>☁️ Google Drive</p>
      {!driveToken&&<Btn onClick={connectDrive} disabled={status==="connecting"} style={{marginBottom:10}}>{status==="connecting"?<><Spinner size={16} color="#fff"/>Conectando…</>:"Conectar Google Drive"}</Btn>}
      {driveToken&&<div style={{display:"flex",gap:8,marginBottom:10}}><Btn onClick={uploadDrive} disabled={status==="uploading"} style={{flex:1,fontSize:13,padding:"11px 0"}}>{status==="uploading"?<><Spinner size={14} color="#fff"/>Salvando…</>:"↑ Salvar"}</Btn><button onClick={()=>{safeLS.del(GDRIVE_KEY);setDriveToken(null);}} style={{padding:"0 12px",background:"none",border:`1px solid ${C.cardBorder}`,borderRadius:10,color:C.textLight,cursor:"pointer",fontSize:12}}>Sair</button></div>}

      <div style={{height:1,background:C.cardBorder,margin:"16px 0"}}/>
      <p style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:10}}>📁 Arquivo local</p>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <Btn onClick={exportLocal} style={{flex:1,fontSize:13,padding:"11px 0"}}>↓ Exportar .veeda</Btn>
        <Btn onClick={()=>fileRef.current.click()} variant="outline" style={{flex:1,fontSize:13,padding:"11px 0"}}>↑ Importar .veeda</Btn>
      </div>
      <input ref={fileRef} type="file" accept=".veeda,.txt" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)importLocal(f);e.target.value="";}}/>
    </Modal>
  );
}
