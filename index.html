// ─── CRYPTO (with key caching for fast saves) ─
const _keyCache = new Map();

const _deriveKey = async (pw, salt) => {
  const km = await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:150000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);
};

// Cached key derivation — caches by stable profile salt key
const getOrDeriveKey = async (pw, salt) => {
  const cacheKey = pw + "|" + salt.slice(0,4).join("-");
  if (_keyCache.has(cacheKey)) return _keyCache.get(cacheKey);
  const key = await _deriveKey(pw, salt);
  _keyCache.set(cacheKey, key);
  return key;
};

// Returns {key, data} — key cached for fast subsequent saves
const decryptObjFull = async (ct, pw) => {
  const {salt,iv,data} = JSON.parse(atob(ct));
  const saltArr = new Uint8Array(salt);
  const key = await getOrDeriveKey(pw, saltArr);
  const buf = await crypto.subtle.decrypt({name:"AES-GCM",iv:new Uint8Array(iv)},key,new Uint8Array(data));
  return {key, salt: saltArr, data: JSON.parse(new TextDecoder().decode(buf))};
};

// Uses pre-cached key — no PBKDF2 on subsequent saves!
const encryptFast = async (obj, key, salt) => {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const buf = await crypto.subtle.encrypt({name:"AES-GCM",iv},key,new TextEncoder().encode(JSON.stringify(obj)));
  return btoa(JSON.stringify({salt:Array.from(salt),iv:Array.from(iv),data:Array.from(new Uint8Array(buf))}));
};

// Full encrypt (first save for new account)
const encryptObj = async (obj, pw) => {
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const key = await getOrDeriveKey(pw, salt);
  return encryptFast(obj, key, salt);
};

const decryptObj = async (ct, pw) => {
  const r = await decryptObjFull(ct, pw);
  return r.data;
};

const hashPw = async pw => {
  const buf = await crypto.subtle.digest("SHA-256",new TextEncoder().encode("veeda:"+pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
};
const genCode = () => {
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789",rand=crypto.getRandomValues(new Uint8Array(16));
  const s=Array.from(rand).map(b=>chars[b%chars.length]).join("");
  return `${s.slice(0,4)}-${s.slice(4,8)}-${s.slice(8,12)}-${s.slice(12,16)}`;
};

  const params=new URLSearchParams({client_id:GOOGLE_CLIENT_ID,redirect_uri:window.location.origin+window.location.pathname,response_type:"token",scope:GDRIVE_SCOPE,state:Math.random().toString(36).slice(2)});

};
const gdriveUpload = async (content,token) => {
  const existing=await gdriveFindFile(token);
  const meta=JSON.stringify({name:GDRIVE_FILE,parents:["appDataFolder"]}),boundary="vb";
  const body=`--${boundary}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${boundary}\r\nContent-Type: text/plain\r\n\r\n${content}\r\n--${boundary}--`;
  const url=existing?`https://www.googleapis.com/upload/drive/v3/files/${existing}?uploadType=multipart`:`https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;
  await fetch(url,{method:existing?"PATCH":"POST",headers:{Authorization:`Bearer ${token}`,"Content-Type":`multipart/related; boundary=${boundary}`},body});
};
const gdriveDownload = async token => {

// ─── DRAWING CANVAS ──────────────────────────
function DrawingCanvas({onSave,onClose}){
  const canvasRef = useRef(null);
  const [color,setColor]   = useState('#3A3350');
  const [brushSz,setBrushSz] = useState(5);
  const [tool,setTool]     = useState('pen');
  const drawing = useRef(false);
  const lastPt  = useRef(null);
  const CANVAS_W = 1000, CANVAS_H = 1000;

  useEffect(()=>{
    const c = canvasRef.current;
    c.width  = CANVAS_W; c.height = CANVAS_H;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0,0,CANVAS_W,CANVAS_H);
  },[]);

  const getPos = e => {
    const c = canvasRef.current;
    const rect = c.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return {
      x:(src.clientX - rect.left)*(CANVAS_W/rect.width),
      y:(src.clientY - rect.top)*(CANVAS_H/rect.height),
    };
  };

  const onStart = e => {
    e.preventDefault(); drawing.current = true;
    const pt = getPos(e); lastPt.current = pt;
    const ctx = canvasRef.current.getContext('2d');
    const r = (tool==='eraser'?brushSz*3:brushSz)/2;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,r,0,Math.PI*2);
    ctx.fillStyle = tool==='eraser'?'#ffffff':color; ctx.fill();
  };

  const onMove = e => {
    if(!drawing.current) return; e.preventDefault();
    const pt = getPos(e);
    const ctx = canvasRef.current.getContext('2d');
    ctx.beginPath(); ctx.moveTo(lastPt.current.x,lastPt.current.y); ctx.lineTo(pt.x,pt.y);
    ctx.strokeStyle = tool==='eraser'?'#ffffff':color;
    ctx.lineWidth   = tool==='eraser'?brushSz*3:brushSz;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
    lastPt.current = pt;
  };

  const onEnd = () => { drawing.current=false; lastPt.current=null; };

  const clear = () => {
    const c = canvasRef.current, ctx = c.getContext('2d');
    ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,c.width,c.height);
  };

  const importImg = file => {
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const c = canvasRef.current, ctx = c.getContext('2d');
        const scale = Math.min(c.width/img.width, c.height/img.height);
        const w = img.width*scale, h = img.height*scale;
        ctx.drawImage(img,(c.width-w)/2,(c.height-h)/2,w,h);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const COLORS = ['#000000','#3A3350','#9000FF','#5B7FA6','#1D9E75','#D4860A','#C0392B','#E91E8C','#FF9800','#607D8B','#ffffff','#FDF5F0'];
  const SIZES  = [2,5,10,20];

  return <div style={{position:'fixed',inset:0,background:'#1a1025',zIndex:400,display:'flex',flexDirection:'column',maxWidth:480,margin:'0 auto'}}>
    {/* Top */}

function MomentCircle({m,isNew,onTap,size=52}){
  const tc = TYPE_COLORS[m.type]||TYPE_COLORS.texto;
  const icon = TYPE_ICONS[m.type]||"✏️";
  const isPhoto = m.type==="foto"||m.type==="arte";
  const isVideo = m.type==="video";
  return (
    <div onClick={onTap} style={{width:size,height:size,borderRadius:"50%",overflow:"hidden",cursor:"pointer",flexShrink:0,border:`2.5px solid ${isNew?C.purpleMid:C.white}`,boxShadow:`0 2px 8px rgba(0,0,0,0.12)`,animation:isNew?"momentPop 0.3s ease":"none",position:"relative",background:tc.bg}}>
      {isPhoto&&m.content

// ─── MOMENT DETAIL MODAL ─────────────────────
function MomentDetail({m,onClose,onDelete}){
  const [playing,setPlaying]=useState(false);
  const audioRef=useRef(null);
  const embed=m.type==="videolink"?getVideoEmbed(m.content):null;
  const allTags=[...DEFAULT_TAGS,...(m.customTagDefs||[])];

  const saveToDevice = () => {
    const a = document.createElement('a');
    a.href = m.content;
    const ext = m.type==='video'?'mp4':'png';
    a.download = `veeda-${m.id}.${ext}`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  };

  const canSave = (m.type==='foto'||m.type==='arte'||m.type==='video') && m.content && !m.content.startsWith('IDB:');

  return <Modal title="" onClose={onClose}>
    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
      <div style={{width:40,height:40,borderRadius:"50%",background:TYPE_COLORS[m.type]?.bg||C.purpleLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>{TYPE_ICONS[m.type]||"✏️"}</div>
      <p style={{margin:0,fontSize:13,color:C.textLight}}>{fmt(m.ts)}</p>
      <button onClick={onClose} style={{marginLeft:"auto",background:C.purpleLight,border:"none",borderRadius:"50%",width:28,height:28,color:C.purple,fontSize:16,cursor:"pointer"}}>×</button>
    </div>

    {(m.type==="foto"||m.type==="arte")&&m.content&&<img src={m.content} alt="" style={{width:"100%",borderRadius:12,display:"block",marginBottom:12}}/>}
    {m.type==="video"&&m.content&&<video src={m.content} controls style={{width:"100%",borderRadius:12,display:"block",maxHeight:320,marginBottom:12}}/>}
    {m.type==="videolink"&&embed&&<div style={{position:"relative",paddingBottom:"56.25%",height:0,borderRadius:12,overflow:"hidden",marginBottom:12}}><iframe src={embed} style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",border:"none"}} allowFullScreen title="v"/></div>}
    {m.type==="link"&&<a href={m.content} target="_blank" rel="noopener noreferrer" style={{display:"block",color:C.blue,fontSize:14,wordBreak:"break-all",marginBottom:12,padding:"10px 14px",background:C.blueLight,borderRadius:10}}>{m.content}</a>}
    {m.type==="texto"&&<p style={{fontSize:15,color:C.text,lineHeight:1.7,marginBottom:12}}>{m.content}</p>}

    {m.type==="musica"&&<div style={{background:"#E6F9F2",borderRadius:14,padding:"14px",marginBottom:12}}>
      <div style={{display:"flex",gap:12,alignItems:"center"}}>
        {m.albumArt&&<img src={m.albumArt} alt="" style={{width:56,height:56,borderRadius:8,objectFit:"cover",flexShrink:0}}/>}
        <div style={{flex:1,overflow:"hidden"}}>
          <p style={{margin:0,fontSize:14,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.trackTitle||m.content}</p>
          <p style={{margin:"2px 0 0",fontSize:12,color:C.textMid}}>{m.trackArtist||""}</p>
          {m.trackAlbum&&<p style={{margin:"1px 0 0",fontSize:11,color:C.textLight}}>{m.trackAlbum}</p>}
        </div>
      </div>
      {m.previewUrl&&<div style={{marginTop:10}}>
        <audio ref={audioRef} src={m.previewUrl} onEnded={()=>setPlaying(false)}/>
        <button onClick={()=>{if(!audioRef.current)return;playing?audioRef.current.pause():audioRef.current.play();setPlaying(p=>!p);}} style={{width:"100%",padding:"9px 0",background:C.green,border:"none",borderRadius:10,color:"#fff",fontWeight:600,fontSize:14,cursor:"pointer"}}>
          {playing?"⏸ Pausar prévia":"▶ Ouvir prévia (30s)"}
        </button>
      </div>}
      {m.appleMusicUrl&&<a href={m.appleMusicUrl} target="_blank" rel="noopener noreferrer" style={{display:"block",marginTop:8,textAlign:"center",fontSize:12,color:C.textMid}}>Abrir no Apple Music →</a>}
    </div>}

    {m.caption&&<p style={{fontSize:13,color:C.textMid,marginBottom:12,fontStyle:"italic"}}>"{m.caption}"</p>}

    {m.tags&&m.tags.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
      {m.tags.map(tagId=>{const t=allTags.find(x=>x.id===tagId);return t?<span key={tagId} style={{padding:"3px 10px",background:t.bg,color:t.color,borderRadius:20,fontSize:12,fontWeight:500}}>{t.emoji} {t.label}</span>:null;})}
    </div>}

    {/* Save to device */}
    {canSave&&<Btn onClick={saveToDevice} variant="outline" style={{marginBottom:8,fontSize:13,padding:"10px 0"}}>
      ↓ Salvar no dispositivo
    </Btn>}

    <Btn onClick={()=>{onDelete();onClose();}} variant="ghost" style={{color:C.red,fontSize:13}}>Remover momento</Btn>
  </Modal>;
}

// ─── SHARE DAY MODAL ─────────────────────────
function ShareDayModal({profile,data,curDay,onClose,onShared}){
  const [sel,setSel]=useState([]),[ msg,setMsg]=useState(""),[ loading,setLoading]=useState(false),[ done,setDone]=useState(false);
  const contacts=data.contacts||[],moments=data.moments[curDay]||[],already=(data.sharedLog||{})[curDay]||[];
  const available=contacts.filter(c=>!already.includes(c.code));
  const toggle=code=>setSel(p=>p.includes(code)?p.filter(x=>x!==code):[...p,code]);
  const doShare=async()=>{if(!sel.length)return;setLoading(true);
    const payload={date:curDay,author:profile.name,handle:profile.handle||nameToHandle(profile.name),emoji:profile.emoji,avatarColor:profile.avatarColor,avatarSrc:profile.avatarSrc||null,moments,feeling:(data.dayFeelings||{})[curDay],message:msg.trim(),importedAt:Date.now()};
    sel.forEach(contactHandle=>{
      const k=`veeda_inbox_${contactHandle.replace(/^@/,"")}`;
      const ex=JSON.parse(localStorage.getItem(k)||"[]");
      ex.push(payload);
      localStorage.setItem(k,JSON.stringify(ex));
    });
    await onShared({...(data.sharedLog||{}),[curDay]:[...already,...sel]});
    setDone(true);setLoading(false);
  };
  if(done)return <Modal title="" onClose={onClose}><div style={{textAlign:"center",padding:"16px 0 8px"}}><div style={{fontSize:52,marginBottom:14}}>🌿</div><p style={{fontSize:18,fontWeight:600,color:C.text,marginBottom:8}}>Dia compartilhado!</p><p style={{fontSize:14,color:C.textMid,marginBottom:24,lineHeight:1.6}}>Seus contatos receberão uma notificação.</p><Btn onClick={onClose}>Fechar</Btn></div></Modal>;
  return <Modal title="Compartilhar meu Dia de Veeda" onClose={onClose}>

// ─── BACKUP MODAL ────────────────────────────
function BackupModal({data,profile,password,onClose}){
  const [status,setStatus]=useState("idle"),[ msg,setMsg]=useState(""),[ driveToken,setDriveToken]=useState(gdriveToken()?.access_token||null);
  const fileRef=useRef();
  const connectDrive=async()=>{setStatus("connecting");setMsg("");try{const token=await gdriveAuth();setDriveToken(token);setStatus("idle");}catch(e){setStatus("error");setMsg(e.message);}};
  const uploadDrive=async()=>{setStatus("uploading");setMsg("");try{await gdriveUpload(await encryptObj(data,password),driveToken);setStatus("done");setMsg("Backup salvo no Google Drive!");}catch(e){setStatus("error");setMsg("Erro: "+e.message);}};
  const exportLocal=()=>encryptObj(data,password).then(enc=>{const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([enc],{type:"text/plain"}));a.download=`veeda-backup-${todayStr()}.veeda`;a.click();setMsg("Arquivo baixado!");});
  const importLocal=file=>{const r=new FileReader();r.onload=async e=>{try{await decryptObj(e.target.result,password);setMsg("Backup verificado!");}catch{setStatus("error");setMsg("Arquivo inválido ou senha incorreta.");}};r.readAsText(file);};
  const busy=status==="connecting"||status==="uploading";
  const totalDays=Object.keys(data.moments||{}).filter(d=>(data.moments[d]||[]).length>0).length;
  const totalMoments=Object.values(data.moments||{}).reduce((s,m)=>s+(m||[]).length,0);
  return <Modal title="Backup dos Dias de Veeda" onClose={onClose}>
    <div style={{background:`linear-gradient(135deg,${C.purpleLight},${C.blueLight})`,borderRadius:14,padding:"16px",textAlign:"center",marginBottom:20}}><p style={{margin:0,fontSize:28}}>🌿</p><p style={{margin:"6px 0 2px",fontSize:15,fontWeight:700,color:C.text}}>{profile.name}</p><p style={{margin:0,fontSize:12,color:C.textMid}}>{totalDays} Dias de Veeda · {totalMoments} momentos</p></div>
    <p style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:10}}>☁️ Google Drive</p>
    {!driveToken&&<Btn onClick={connectDrive} disabled={busy} style={{marginBottom:10}}>{status==="connecting"?<><Spinner/>Conectando...</>:"Conectar Google Drive"}</Btn>}
    {driveToken&&<div style={{display:"flex",gap:8,marginBottom:10}}><Btn onClick={uploadDrive} disabled={busy} style={{flex:1,fontSize:13,padding:"11px 0"}}>{status==="uploading"?<><Spinner/>Salvando...</>:"↑ Salvar"}</Btn><button onClick={()=>{gdriveClear();setDriveToken(null);}} style={{padding:"0 10px",background:"none",border:`1px solid ${C.cardBorder}`,borderRadius:10,color:C.textLight,cursor:"pointer",fontSize:12}}>Sair</button></div>}
    <div style={{height:1,background:C.cardBorder,margin:"16px 0"}}/>
    <p style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:10}}>📁 Arquivo local</p>
    <div style={{display:"flex",gap:8,marginBottom:8}}><Btn onClick={exportLocal} style={{flex:1,fontSize:13,padding:"11px 0"}}>↓ Exportar .veeda</Btn><Btn onClick={()=>fileRef.current.click()} variant="outline" style={{flex:1,fontSize:13,padding:"11px 0"}}>↑ Importar .veeda</Btn></div>
    <input ref={fileRef} type="file" accept=".veeda,.enc,.txt" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)importLocal(f);}}/>
    {msg&&<div style={{marginTop:12,padding:"12px 14px",background:status==="error"?"#FDE8E8":C.greenLight,borderRadius:10}}><p style={{margin:0,fontSize:13,color:status==="error"?C.red:C.green,fontWeight:500}}>{msg}</p></div>}
  </Modal>;
}

// ─── EDIT HANDLE MODAL ───────────────────────
function EditHandleModal({profile,onSave,onClose}){
  const [handle,setHandle] = useState((profile.handle||nameToHandle(profile.name)).replace(/^@/,""));
  const [err,setErr]       = useState("");

  const validate = h => {
    if(!h) return "Handle obrigatório.";
    if(h.length < 3) return "Mínimo 3 caracteres.";
    if(!/^[a-z0-9_]+$/.test(h)) return "Use só letras, números e _.";
    if(!isHandleAvailable("@"+h, profile.id)) return "Este handle já está em uso.";
    return "";
  };

  const save = () => {
    const h = sanitizeHandle(handle);
    const e = validate(h);
    if(e){ setErr(e); return; }
    onSave("@"+h);
  };

  return <Modal title="Alterar seu @handle" onClose={onClose}>
    <p style={{fontSize:13,color:C.textMid,marginBottom:14,lineHeight:1.6}}>
      Seu <strong>@handle</strong> é como as pessoas te encontram no Veeda. Ele precisa ser único.
    </p>
    <div style={{position:"relative",marginBottom:err?6:16}}>
      <span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",fontSize:15,color:C.purple,fontWeight:700,pointerEvents:"none"}}>@</span>
      <input
        value={handle}
        onChange={e=>{setHandle(sanitizeHandle(e.target.value));setErr("");}}
        placeholder="seuhandle"
        style={{paddingLeft:30,border:`1.5px solid ${err?C.red:C.cardBorder}`,borderRadius:50}}
      />
    </div>
    {err&&<p style={{fontSize:13,color:C.red,marginBottom:14,fontWeight:500}}>{err}</p>}
    <Btn onClick={save}>Salvar @handle</Btn>
  </Modal>;
}

function AddContactModal({contacts,myHandle,onAdd,onClose}){

  const [found,setFound]   = useState(null);
  const [err,setErr]       = useState("");

  const allProfiles = useMemo(()=>loadProfiles(),[]);
  const myH = (myHandle||"").replace(/^@/,"");

  // Search results — filter by name or handle, excluding self and existing contacts
  const searchResults = useMemo(()=>{
    if(!query.trim()) return [];
    const q = query.toLowerCase().trim().replace(/^@/,"");
    return allProfiles.filter(p=>{
      if(p.handle && p.handle.replace(/^@/,"")===myH) return false;
      if(contacts.find(c=>c.handle&&c.handle.replace(/^@/,"")===(p.handle||"").replace(/^@/,""))) return false;
      const nameMatch = p.name.toLowerCase().includes(q);
      const handleMatch = (p.handle||"").replace(/^@/,"").includes(q);
      return nameMatch||handleMatch;
    });
  },[query,allProfiles,myH,contacts]);

  const selectProfile = p => { setFound(p); setStep(2); };

  const confirm = () => {
    if(found){
      onAdd({

      {/* Results */}
      {query.trim()&&searchResults.length===0&&<p style={{fontSize:13,color:C.textLight,textAlign:"center",padding:"12px 0"}}>Nenhum usuário encontrado neste dispositivo.</p>}
      {searchResults.map(p=>(
        <button key={p.id} onClick={()=>selectProfile(p)} style={{width:"100%",background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:14,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12,cursor:"pointer",textAlign:"left"}}>

          <div style={{flex:1}}>
            <p style={{margin:0,fontSize:14,fontWeight:600,color:C.text}}>{p.name}</p>
            <p style={{margin:0,fontSize:12,color:C.purple,fontWeight:500}}>{p.handle||nameToHandle(p.name)}</p>
          </div>
          <span style={{fontSize:18,color:C.textLight}}>+</span>
        </button>
      ))}
      {err&&<p style={{fontSize:13,color:C.red,marginTop:6,fontWeight:500}}>{err}</p>}
      <div style={{marginTop:16,padding:"12px 14px",background:"#FFF8E1",borderRadius:10,border:"1px solid #FFD54F"}}>
        <p style={{margin:0,fontSize:12,color:"#7A5800",lineHeight:1.5}}>
          💡 Para adicionar alguém de outro dispositivo, peça o @handle deles e adicione manualmente depois.
        </p>
      </div>
    </>}
    {step===2&&found&&<>
      <div style={{textAlign:"center",marginBottom:20}}>

function VeedaApp({profile,password,onLogout,onUpdateProfile}){
  const dataKey=`veeda_data_${profile.id}`;
  const [data,setData]=useState(null);
  const [view,setView]=useState("hoje");
  const [dayOffset,setDayOffset]=useState(0);
  const [addType,setAddType]=useState("texto");
  const [addContent,setAddContent]=useState("");
  const [addCaption,setAddCaption]=useState("");
  const [addMedia,setAddMedia]=useState(null);
  const [addTags,setAddTags]=useState([]);
  const [showModal,setShowModal]=useState(false);
  const [showMusicPicker,setShowMusicPicker]=useState(false);
  const [showDrawing,setShowDrawing]=useState(false);
  const [showEditDay,setShowEditDay]=useState(false);
  const [showFeeling,setShowFeeling]=useState(false);
  const [showAvatar,setShowAvatar]=useState(false);
  const [showInvite,setShowInvite]=useState(false);
  const [showInviteApp,setShowInviteApp]=useState(false);
  const [showGroupName,setShowGroupName]=useState(false);
  const [showShare,setShowShare]=useState(false);
  const [showReminders,setShowReminders]=useState(false);
  const [showEvents,setShowEvents]=useState(false);
  const [showSettings,setShowSettings]=useState(false);
  const [showGuide,setShowGuide]=useState(false);
  const [viewRec,setViewRec]=useState(null);
  const [pendingNotif,setPendingNotif]=useState(null);
  const [expandedMoment,setExpandedMoment]=useState(null);
  const [now,setNow]=useState(new Date());
  const [newGroup,setNewGroup]=useState("");
  const [lastId,setLastId]=useState(null);
  const [hydratedData,setHydratedData]=useState(null);

  // Cached crypto key and salt for fast saves
  const sessionKey  = useRef(null);
  const sessionSalt = useRef(null);

  const vidRef=useRef(),photoRef=useRef(),galleryRef=useRef();
  const touchX=useRef(null),lastRef=useRef(null);

  // IndexedDB for media
  const mediaDb = useRef(null);
  const openDb = () => new Promise((res,rej)=>{
    if(mediaDb.current){res(mediaDb.current);return;}
    const req=indexedDB.open("veeda_media",1);
    req.onupgradeneeded=e=>e.target.result.createObjectStore("media",{keyPath:"id"});
    req.onsuccess=e=>{mediaDb.current=e.target.result;res(e.target.result);};
    req.onerror=()=>rej("IDB error");
  });
  const saveMedia=async(id,dataUrl)=>{try{const db=await openDb();const tx=db.transaction("media","readwrite");tx.objectStore("media").put({id,dataUrl});}catch(e){console.warn("IDB",e);}};
  const loadMedia=async id=>{try{const db=await openDb();return new Promise((res,rej)=>{const tx=db.transaction("media","readonly");const req=tx.objectStore("media").get(id);req.onsuccess=()=>res(req.result?.dataUrl||null);req.onerror=()=>rej(null);});}catch{return null;}};

  useEffect(()=>{
    (async()=>{
      try{
        const enc=localStorage.getItem(dataKey);
        if(enc){
          const {key,salt,data:d}=await decryptObjFull(enc,password);
          sessionKey.current=key; sessionSalt.current=salt;
          setData(d);
        } else {
          const d=defaultData();
          const enc2=await encryptObj(d,password);
          // Extract key from the freshly created enc
          const {key,salt}=await decryptObjFull(enc2,password);
          sessionKey.current=key; sessionSalt.current=salt;
          setData(d);
          localStorage.setItem(dataKey,enc2);
        }
      }catch{setData(defaultData());}
    })();
    const t=setInterval(()=>setNow(new Date()),30000);
    return()=>clearInterval(t);
  },[]);

  // Check inbox
  useEffect(()=>{
    if(!data)return;
    const myH=(profile.handle||nameToHandle(profile.name)).replace(/^@/,"");
    const keys=[`veeda_inbox_${myH}`,`veeda_inbox_${profile.id}`];
    for(const k of keys){
      const inbox=JSON.parse(localStorage.getItem(k)||"[]");
      if(inbox.length>0){
        const notif=inbox[0];
        if(!(data.received||[]).find(r=>r.date===notif.date&&r.author===notif.author&&r.importedAt===notif.importedAt)){
          setPendingNotif(notif); break;
        }
      }
    }
  },[data]);

  useEffect(()=>{if(lastId&&lastRef.current){setTimeout(()=>lastRef.current&&lastRef.current.scrollIntoView({behavior:"smooth",block:"center"}),120);setLastId(null);}},[lastId,data]);

  // Fast save using cached key
  const save = useCallback(async d => {
    const lightweight={...d,moments:{}};
    Object.keys(d.moments||{}).forEach(day=>{
      lightweight.moments[day]=(d.moments[day]||[]).map(m=>{
        if((m.type==="foto"||m.type==="video"||m.type==="arte")&&m.content&&m.content.startsWith("data:")){
          saveMedia(`${m.id}`,m.content);
          return {...m,content:"IDB:"+m.id};
        }
        return m;
      });
    });
    setData(d);
    // Use cached key for fast encryption (no PBKDF2)
    let enc;
    if(sessionKey.current&&sessionSalt.current){
      enc=await encryptFast(lightweight,sessionKey.current,sessionSalt.current);
    } else {
      enc=await encryptObj(lightweight,password);
    }
    localStorage.setItem(dataKey,enc);
  },[dataKey,password]);

  // Hydrate media
  useEffect(()=>{
    if(!data)return;
    (async()=>{
      const hd={...data,moments:{}};
      for(const day of Object.keys(data.moments||{})){
        hd.moments[day]=await Promise.all((data.moments[day]||[]).map(async m=>{
          if(m.content&&m.content.startsWith("IDB:")){
            const url=await loadMedia(m.content.slice(4));
            return url?{...m,content:url}:m;
          }
          return m;
        }));
      }
      setHydratedData(hd);
    })();
  },[data]);

  const activeData=hydratedData||data;
  const resetModal=useCallback(()=>{setAddContent("");setAddCaption("");setAddMedia(null);setAddTags([]);setShowModal(false);setShowMusicPicker(false);},[]);
  const readFile=(f,cb)=>{const r=new FileReader();r.onload=e=>cb(e.target.result);r.readAsDataURL(f);};

  const clearInbox=notif=>{
    const myH=(profile.handle||nameToHandle(profile.name)).replace(/^@/,"");
    [`veeda_inbox_${myH}`,`veeda_inbox_${profile.id}`].forEach(k=>{
      const inbox=JSON.parse(localStorage.getItem(k)||"[]");
      localStorage.setItem(k,JSON.stringify(inbox.filter(x=>!(x.date===notif.date&&x.author===notif.author&&x.importedAt===notif.importedAt))));
    });
  };

  const acceptNotif=async()=>{if(!pendingNotif)return;clearInbox(pendingNotif);await save({...data,received:[...(data.received||[]),pendingNotif]});setPendingNotif(null);setView("recebidos");setViewRec(pendingNotif);};
  const dismissNotif=()=>{if(!pendingNotif)return;clearInbox(pendingNotif);setPendingNotif(null);};

  const addMoment=useCallback((extra={})=>{
    const isMedia=addType==="foto"||addType==="video";
    if(isMedia&&!addMedia)return;
    if(addType==="musica"&&!extra.trackTitle&&!addContent.trim())return;
    if(!isMedia&&addType!=="musica"&&addType!=="arte"&&!addContent.trim())return;
    let type=addType,content=isMedia?addMedia:addContent.trim();
    if(type==="link"&&isVideoLink(content))type="videolink";
    const id=Date.now();
    const m={id,ts:id,type,content,caption:addCaption.trim(),tags:addTags,...extra};
    save({...data,moments:{...data.moments,[todayStr()]:[...(data.moments[todayStr()]||[]),m]}});
    resetModal();setLastId(id);
  },[addType,addMedia,addContent,addCaption,addTags,data,save,resetModal]);

  const delMoment=useCallback((day,id)=>save({...data,moments:{...data.moments,[day]:(data.moments[day]||[]).filter(m=>m.id!==id)}}),[data,save]);

  const updateAv=useCallback(updated=>{const ps=loadProfiles(),idx=ps.findIndex(p=>p.id===updated.id);if(idx>=0){ps[idx]={...ps[idx],emoji:updated.emoji,avatarColor:updated.avatarColor,avatarSrc:updated.avatarSrc};saveProfiles(ps);onUpdateProfile(updated);}},[onUpdateProfile]);

  if(!activeData)return <div style={{padding:32,textAlign:"center",fontSize:32,color:C.textMid}}>🌿</div>;

  const curDay=offsetDay(todayStr(),-dayOffset),isToday=dayOffset===0;
  const moments=useMemo(()=>(activeData.moments[curDay]||[]).slice().sort((a,b)=>a.ts-b.ts),[activeData,curDay]);
  const allDays=useMemo(()=>Object.keys(activeData.moments).filter(d=>(activeData.moments[d]||[]).length>0).sort((a,b)=>b.localeCompare(a)),[activeData]);
  const nowKey=`${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;
  const dayColor=DAY_COLORS.find(c=>c.label===(activeData.dayColors||{})[curDay])||DAY_COLORS[0];
  const feeling=(activeData.dayFeelings||{})[curDay];
  const group=activeData.groupName||"Meu Círculo";
  const lastMId=moments.length>0?moments[moments.length-1].id:null;
  const upcoming=useMemo(()=>(activeData.events||[]).filter(e=>e.date>=todayStr()).sort((a,b)=>a.date.localeCompare(b.date)),[activeData]);

  const slots=useMemo(()=>{
    const byTime={};
    moments.forEach(m=>{const k=fmt(m.ts);if(!byTime[k])byTime[k]=[];byTime[k].push(m);});
    const times=new Set(Object.keys(byTime));
    if(isToday)times.add(nowKey);
    return Array.from(times).sort().map(time=>({time,moments:byTime[time]||[],isNow:isToday&&time===nowKey}));
  },[moments,isToday,nowKey]);

  return <div style={{maxWidth:480,margin:"0 auto",background:`linear-gradient(180deg,${dayColor.bg} 0%,${C.bgGradientEnd} 99%)`,minHeight:"100vh",transition:"background 0.4s",fontFamily:SANS}}>
    {pendingNotif&&<ReceivedNotif notif={pendingNotif} onOpen={acceptNotif} onDismiss={dismissNotif}/>}
    {showGuide&&<InstallGuide onClose={()=>setShowGuide(false)}/>}
    {showDrawing&&<DrawingCanvas onClose={()=>setShowDrawing(false)} onSave={dataUrl=>{setShowDrawing(false);const id=Date.now();const m={id,ts:id,type:"arte",content:dataUrl,caption:addCaption.trim(),tags:addTags};save({...data,moments:{...data.moments,[todayStr()]:[...(data.moments[todayStr()]||[]),m]}});setLastId(id);setAddCaption("");setAddTags([]);}}/>}
    {expandedMoment&&<MomentDetail m={expandedMoment} onClose={()=>setExpandedMoment(null)} onDelete={()=>{delMoment(curDay,expandedMoment.id);setExpandedMoment(null);}}/>}

    {/* Header */}
    <div style={{background:C.white,borderBottom:`1px solid ${C.headerBorder}`}}>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 16px 6px"}}>
        <span style={{fontFamily:PASSO,fontSize:18,fontWeight:700,color:C.text}}>🌿 Veeda</span>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <button onClick={()=>setShowInviteApp(true)} style={{background:C.purpleLight,border:"none",borderRadius:20,padding:"5px 12px",fontSize:12,color:C.purpleLogic,fontWeight:600,cursor:"pointer"}}>+ Convidar</button>
          <button onClick={()=>setShowSettings(true)} style={{background:"none",border:"none",fontSize:20,color:C.textLight,cursor:"pointer",lineHeight:1}}>⚙️</button>
        </div>
      </div>
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 0 12px",borderBottom:`1px solid ${C.headerBorder}`,cursor:"pointer"}} onClick={()=>view==="hoje"&&setShowAvatar(true)}>
        <AvatarBubble src={profile.avatarSrc} emoji={profile.emoji} color={profile.avatarColor||C.purpleLight} size={64} ring/>
        <p style={{margin:"8px 0 0",fontSize:14,fontWeight:600,color:C.text}}>{profile.name}</p>
        <p style={{margin:"2px 0 0",fontSize:12,color:C.purpleLogic,fontWeight:600}}>{profile.handle||nameToHandle(profile.name)}</p>
        {profile.email&&<p style={{margin:"1px 0 0",fontSize:11,color:C.textLight}}>{profile.email}</p>}
        {feeling&&<div style={{display:"inline-flex",alignItems:"center",gap:4,marginTop:4,background:C.purpleLight,borderRadius:20,padding:"3px 12px"}}><span style={{fontSize:13}}>{feeling.emoji}</span><span style={{fontSize:11,color:C.purpleLogic,fontWeight:500}}>{feeling.label}</span></div>}
        {view==="hoje"&&<span style={{fontSize:11,color:C.textLight,marginTop:4}}>editar perfil</span>}
      </div>
      <div style={{display:"flex",padding:"0 8px",overflowX:"auto"}}>
        {[["hoje","Hoje"],["grupo",group],["recebidos","Recebidos"]].map(([v,label])=><button key={v} onClick={()=>setView(v)} style={{padding:"10px 14px",fontSize:13,fontWeight:view===v?600:400,background:"none",border:"none",borderBottom:`2.5px solid ${view===v?C.purpleLogic:"transparent"}`,color:view===v?C.purpleLogic:C.textMid,cursor:"pointer",whiteSpace:"nowrap"}}>{label}</button>)}
      </div>
    </div>

    <div style={{paddingBottom:110}}>
      {/* HOJE */}
      {view==="hoje"&&<div
        onTouchStart={e=>{touchX.current=e.touches[0].clientX;}}
        onTouchEnd={e=>{if(touchX.current===null)return;const dx=touchX.current-e.changedTouches[0].clientX;if(Math.abs(dx)>50){if(dx>0)setDayOffset(o=>o+1);else setDayOffset(o=>Math.max(0,o-1));}touchX.current=null;}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 8px 2px"}}>
          <button onClick={()=>setDayOffset(o=>o+1)} style={{background:"none",border:"none",fontSize:22,color:C.textMid,cursor:"pointer",padding:"4px 10px"}}>‹</button>
          <p style={{margin:0,fontSize:12,color:C.textLight}}>{fmtFull(curDay).split(",").slice(1).join(",").trim()}</p>
          <button onClick={()=>setDayOffset(o=>Math.max(0,o-1))} style={{background:"none",border:"none",fontSize:22,color:dayOffset===0?"transparent":C.textMid,cursor:dayOffset===0?"default":"pointer",padding:"4px 10px",pointerEvents:dayOffset===0?"none":"auto"}}>›</button>
        </div>
        <div style={{display:"flex",gap:8,padding:"6px 16px 8px",justifyContent:"center",flexWrap:"wrap"}}>
          <button onClick={()=>setShowEditDay(true)} style={{fontSize:12,padding:"4px 12px",background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:20,color:C.textMid,cursor:"pointer"}}>🎨 cor</button>
          <button onClick={()=>setShowFeeling(true)} style={{fontSize:12,padding:"4px 12px",background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:20,color:C.textMid,cursor:"pointer"}}>{feeling?`${feeling.emoji} ${feeling.label}`:"😊 sentimento"}</button>
          <button onClick={()=>setShowReminders(true)} style={{fontSize:12,padding:"4px 12px",background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:20,color:C.textMid,cursor:"pointer"}}>🔔</button>
          <button onClick={()=>setShowEvents(true)} style={{fontSize:12,padding:"4px 12px",background:"#FFF3DC",border:`1px solid ${C.amber}44`,borderRadius:20,color:C.amber,cursor:"pointer",fontWeight:500}}>📅{upcoming.length>0?` (${upcoming.length})`:""}</button>
        </div>
        {isToday&&upcoming.length>0&&<div style={{margin:"0 16px 8px",background:"#FFF8E1",border:`1px solid ${C.amber}55`,borderRadius:12,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:18}}>{EVENT_TYPES.find(t=>t.id===upcoming[0].type)?.emoji||"📅"}</span>
          <div><p style={{margin:0,fontSize:13,fontWeight:600,color:C.amber}}>{upcoming[0].title}</p><p style={{margin:0,fontSize:11,color:C.textMid}}>{fmtFull(upcoming[0].date)}{upcoming[0].time?` às ${upcoming[0].time}`:""}</p></div>
        </div>}

        {/* TIMELINE */}
        <div style={{position:"relative",padding:"16px 0 24px"}}>
          {slots.length>0&&<div style={{position:"absolute",left:"50%",top:0,bottom:0,width:3,borderRadius:3,background:`linear-gradient(to bottom,${dayColor.dot}44,${dayColor.dot} 30%,${C.blueMid} 70%,${C.blueLight})`,transform:"translateX(-50%)",zIndex:0}}/>}
          {slots.length===0&&<div style={{textAlign:"center",padding:"3rem 2rem"}}><p style={{fontSize:14,color:C.textLight,margin:0}}>{isToday?"Nenhum momento ainda.":"Nenhum momento neste dia."}</p></div>}
          {slots.map((slot,i)=>{
            const isLeft=i%2===0;
            return <div key={slot.time} style={{position:"relative",display:"flex",alignItems:"flex-start",marginBottom:28,zIndex:1}}>
              <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"flex-end",paddingRight:18,paddingLeft:12,gap:6}}>
                {isLeft&&(slot.isNow
                  ?<button onClick={()=>setShowModal(true)} style={{background:C.white,border:`2px solid ${dayColor.dot}`,borderRadius:20,padding:"9px 14px",fontSize:12,color:C.purple,cursor:"pointer",fontWeight:600,lineHeight:1.4,textAlign:"center",maxWidth:140}}>registrar<br/>acontecimento</button>
                  :slot.moments.map(m=><div key={m.id} ref={m.id===lastMId&&lastId===null?lastRef:null}><MomentCircle m={m} isNew={m.id===lastMId&&lastId===null} onTap={()=>setExpandedMoment(m)}/><span style={{display:"block",textAlign:"right",fontSize:10,color:C.textLight,marginTop:2}}>{fmt(m.ts)}</span></div>)
                )}
              </div>
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0,position:"relative",zIndex:2}}>
                {slot.isNow?<PulsingDot onClick={()=>setShowModal(true)} color={dayColor.dot}/>:<div style={{width:10,height:10,borderRadius:"50%",background:dayColor.dot,border:`2px solid ${C.white}`}}/>}
                <span style={{fontSize:9,color:C.textLight,marginTop:3,whiteSpace:"nowrap"}}>{slot.time}</span>
              </div>
              <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"flex-start",paddingLeft:18,paddingRight:12,gap:6}}>
                {!isLeft&&(slot.isNow
                  ?<button onClick={()=>setShowModal(true)} style={{background:C.white,border:`2px solid ${dayColor.dot}`,borderRadius:20,padding:"9px 14px",fontSize:12,color:C.purple,cursor:"pointer",fontWeight:600,lineHeight:1.4,textAlign:"center",maxWidth:140}}>registrar<br/>acontecimento</button>
                  :slot.moments.map(m=><div key={m.id} ref={m.id===lastMId&&lastId===null?lastRef:null}><MomentCircle m={m} isNew={m.id===lastMId&&lastId===null} onTap={()=>setExpandedMoment(m)}/><span style={{display:"block",fontSize:10,color:C.textLight,marginTop:2}}>{fmt(m.ts)}</span></div>)
                )}
              </div>
            </div>;
          })}
        </div>
      </div>}

      {/* GRUPO (Meu Círculo) */}
      {view==="grupo"&&<div style={{padding:"20px 16px"}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}><p style={{margin:0,fontSize:16,fontWeight:700,color:C.text}}>{group}</p><button onClick={()=>{setNewGroup(group);setShowGroupName(true);}} style={{fontSize:12,color:C.purple,background:"none",border:"none",cursor:"pointer"}}>renomear</button></div>
        <Btn onClick={()=>setShowInvite(true)} style={{marginBottom:20}}>+ Adicionar ao Círculo</Btn>
        {(!activeData.contacts||activeData.contacts.length===0)?<div style={{textAlign:"center",padding:"2rem 0"}}><p style={{fontSize:14,color:C.textLight}}>Nenhum contato ainda.</p><button onClick={()=>setShowInviteApp(true)} style={{marginTop:12,background:"none",border:`1px solid ${C.purple}`,borderRadius:20,padding:"8px 18px",color:C.purple,cursor:"pointer",fontSize:13,fontWeight:600}}>Convidar alguém para o Veeda</button></div>
        :activeData.contacts.map((c,i)=><div key={i} style={{background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:14,padding:"14px",marginBottom:10,display:"flex",alignItems:"center",gap:12}}>
          <AvatarBubble src={c.avatarSrc} emoji={c.emoji||"🌿"} color={c.avatarColor||C.purpleLight} size={42}/>
          <div style={{flex:1}}><p style={{margin:0,fontSize:14,fontWeight:600,color:C.text}}>{c.name}</p><p style={{margin:0,fontSize:12,color:C.purple,fontWeight:500}}>{c.handle}</p></div>
          <button onClick={()=>{const nc=[...activeData.contacts];nc.splice(i,1);save({...data,contacts:nc});}} style={{fontSize:12,color:C.textLight,background:"none",border:"none",cursor:"pointer"}}>remover</button>
        </div>)}
      </div>}

      {/* RECEBIDOS */}
      {view==="recebidos"&&!viewRec&&<div style={{padding:"20px 16px"}}>
        {(activeData.received||[]).length===0?<p style={{fontSize:14,color:C.textLight,textAlign:"center",marginTop:40}}>Nenhum Dia de Veeda recebido ainda.</p>
        :(activeData.received||[]).slice().sort((a,b)=>b.importedAt-a.importedAt).map((r,i)=><div key={i} onClick={()=>setViewRec(r)} style={{background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:14,padding:"14px",marginBottom:10,cursor:"pointer",display:"flex",alignItems:"center",gap:12}}>
          <AvatarBubble src={r.avatarSrc} emoji={r.emoji||"🌿"} color={r.avatarColor||C.purpleLight} size={44} ring/>
          <div style={{flex:1}}><p style={{margin:0,fontSize:14,fontWeight:600,color:C.text}}>{r.author}</p><p style={{margin:0,fontSize:12,color:C.textMid}}>{fmtLabel(r.date)} · {r.moments.length} momento{r.moments.length!==1?"s":""}{r.feeling?` · ${r.feeling.emoji}`:""}</p></div>
          <span style={{color:C.textLight,fontSize:20}}>›</span>
        </div>)}
      </div>}
      {view==="recebidos"&&viewRec&&<div style={{paddingBottom:20}}>
        <div style={{background:C.white,borderBottom:`1px solid ${C.cardBorder}`,display:"flex",flexDirection:"column",alignItems:"center",padding:"18px 16px 14px"}}>
          <AvatarBubble src={viewRec.avatarSrc} emoji={viewRec.emoji||"🌿"} color={viewRec.avatarColor||C.purpleLight} size={70} ring/>
          <p style={{margin:"10px 0 2px",fontSize:16,fontWeight:700,color:C.text}}>{viewRec.author}</p>
          <p style={{margin:0,fontSize:12,color:C.textLight}}>Dia de Veeda · {fmtFull(viewRec.date)}</p>
          {viewRec.feeling&&<div style={{display:"inline-flex",alignItems:"center",gap:4,marginTop:8,background:C.purpleLight,borderRadius:20,padding:"4px 12px"}}><span style={{fontSize:13}}>{viewRec.feeling.emoji}</span><span style={{fontSize:11,color:C.purple,fontWeight:500}}>{viewRec.feeling.label}</span></div>}
          {viewRec.message&&<div style={{margin:"12px 0 0",background:C.purpleLight,borderRadius:12,padding:"12px 16px",width:"100%",boxSizing:"border-box"}}><p style={{margin:0,fontSize:14,color:C.purple,fontStyle:"italic",lineHeight:1.6}}>"{viewRec.message}"</p></div>}
          <button onClick={()=>setViewRec(null)} style={{marginTop:12,fontSize:13,color:C.textMid,background:"none",border:`1px solid ${C.cardBorder}`,borderRadius:20,padding:"5px 16px",cursor:"pointer"}}>‹ Voltar</button>
        </div>
        <div style={{padding:"16px",display:"flex",flexWrap:"wrap",gap:12}}>
          {(viewRec.moments||[]).slice().sort((a,b)=>a.ts-b.ts).map(m=><div key={m.id} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}>
            <MomentCircle m={m} onTap={()=>setExpandedMoment(m)} size={56}/>
            <span style={{fontSize:10,color:C.textLight}}>{fmt(m.ts)}</span>
          </div>)}
        </div>
      </div>}
    </div>

    {/* FABs */}
    {view==="hoje"&&moments.length>0&&<div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,padding:"12px 34px 28px",background:`linear-gradient(to top,${dayColor.bg} 55%,transparent)`,pointerEvents:"none"}}>
      <button onClick={()=>setShowShare(true)} style={{width:"100%",padding:"16px 0",background:C.purple,color:"#fff",border:"none",borderRadius:50,fontWeight:600,fontSize:15,cursor:"pointer",pointerEvents:"auto",boxShadow:"0 6px 24px rgba(144,0,255,0.30)",fontFamily:PASSO}}>Compartilhar meu Dia</button>
    </div>}
    {view==="hoje"&&isToday&&moments.length===0&&<div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,padding:"12px 34px 28px",background:`linear-gradient(to top,${dayColor.bg} 55%,transparent)`,pointerEvents:"none"}}>
      <button onClick={()=>setShowModal(true)} style={{width:"100%",padding:"16px 0",background:C.purple,color:"#fff",border:"none",borderRadius:50,fontWeight:600,fontSize:15,cursor:"pointer",pointerEvents:"auto",boxShadow:"0 6px 24px rgba(144,0,255,0.30)",fontFamily:PASSO}}>+ Registrar primeiro momento</button>
    </div>}

    {/* Modals */}
    {showShare&&<ShareDayModal profile={profile} data={activeData} curDay={curDay} onClose={()=>setShowShare(false)} onShared={async log=>{await save({...data,sharedLog:log});}}/>}
    {showEvents&&<EventsModal data={activeData} profile={profile} onSave={events=>save({...data,events})} onClose={()=>setShowEvents(false)}/>}
    {showReminders&&<RemindersModal reminders={activeData.reminders||[]} onSave={list=>save({...data,reminders:list})} onClose={()=>setShowReminders(false)}/>}
    {showInviteApp&&<InviteModal onClose={()=>setShowInviteApp(false)}/>}
    {showSettings&&<SettingsModal profile={profile} data={activeData} password={password} onUpdateProfile={p=>{updateAv(p);onUpdateProfile(p);}} onSave={save} onLogout={onLogout} onClose={()=>setShowSettings(false)}/>}
    {showMusicPicker&&<MusicPicker onClose={()=>setShowMusicPicker(false)} onSelect={r=>{setShowMusicPicker(false);const id=Date.now();const m={id,ts:id,type:"musica",content:r.title,trackTitle:r.title,trackArtist:r.artist,trackAlbum:r.album,albumArt:r.art,previewUrl:r.preview,appleMusicUrl:r.appleMusicUrl,caption:addCaption.trim(),tags:addTags};save({...data,moments:{...data.moments,[todayStr()]:[...(data.moments[todayStr()]||[]),m]}});setLastId(id);resetModal();}}/>}

    {/* ADD MOMENT MODAL */}
    {showModal&&<Modal title="Registrar acontecimento" onClose={resetModal}>
      {/* Type selector */}
      <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
        {[["texto","✏️","texto"],["foto","📷","foto"],["video","🎬","vídeo"],["link","🔗","link"],["musica","🎵","música"],["arte","🎨","arte"]].map(([t,icon,label])=>(
          <button key={t} onClick={()=>{setAddType(t);setAddMedia(null);setAddContent("");}}
            style={{padding:"6px 12px",fontSize:13,
              background:addType===t?(TYPE_COLORS[t]?.bg||C.purpleLight):"#F5F3FB",
              border:`1.5px solid ${addType===t?(TYPE_COLORS[t]?.fill||C.purple):C.cardBorder}`,
              borderRadius:20,cursor:"pointer",
              color:addType===t?(TYPE_COLORS[t]?.fill||C.purple):C.textMid,
              fontWeight:addType===t?600:400}}>
            {icon} {label}
          </button>
        ))}
      </div>

      {addType==="foto"&&(!addMedia
        ?<div style={{display:"flex",gap:8,marginBottom:10}}>
          <input ref={photoRef} type="file" accept="image/*" capture="environment" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)readFile(f,setAddMedia);}}/>
          <input ref={galleryRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)readFile(f,setAddMedia);}}/>
          <button onClick={()=>photoRef.current.click()} style={{flex:1,padding:"10px 0",background:C.blueLight,color:C.blue,border:`1px solid ${C.blueMid}`,borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:500}}>📷 Câmera</button>
          <button onClick={()=>galleryRef.current.click()} style={{flex:1,padding:"10px 0",background:C.purpleLight,color:C.purple,border:`1px solid ${C.purpleMid}`,borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:500}}>🖼️ Galeria</button>
        </div>
        :<div style={{marginBottom:10,position:"relative"}}><img src={addMedia} alt="" style={{width:"100%",borderRadius:10}}/><button onClick={()=>setAddMedia(null)} style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,0.5)",border:"none",borderRadius:"50%",width:30,height:30,color:"#fff",cursor:"pointer",fontSize:15}}>×</button></div>
      )}

      {addType==="video"&&(!addMedia
        ?<div style={{display:"flex",gap:8,marginBottom:10}}>
          <input ref={vidRef} type="file" accept="video/*" capture="environment" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)readFile(f,setAddMedia);}}/>
          <input type="file" accept="video/*" style={{display:"none"}} id="gvid" onChange={e=>{const f=e.target.files[0];if(f)readFile(f,setAddMedia);}}/>
          <button onClick={()=>vidRef.current.click()} style={{flex:1,padding:"10px 0",background:C.blueLight,color:C.blue,border:`1px solid ${C.blueMid}`,borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:500}}>🎥 Gravar</button>
          <button onClick={()=>document.getElementById("gvid").click()} style={{flex:1,padding:"10px 0",background:C.purpleLight,color:C.purple,border:`1px solid ${C.purpleMid}`,borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:500}}>📁 Galeria</button>
        </div>
        :<div style={{marginBottom:10,position:"relative"}}><video src={addMedia} controls style={{width:"100%",borderRadius:10,maxHeight:240}}/><button onClick={()=>setAddMedia(null)} style={{position:"absolute",top:8,right:8,background:"rgba(0,0,0,0.5)",border:"none",borderRadius:"50%",width:30,height:30,color:"#fff",cursor:"pointer",fontSize:15}}>×</button></div>
      )}

      {addType==="musica"&&<div style={{marginBottom:10}}>
        <button onClick={()=>setShowMusicPicker(true)} style={{width:"100%",padding:"12px 0",background:"#E6F9F2",color:C.green,border:`1px solid ${C.green}44`,borderRadius:10,cursor:"pointer",fontSize:14,fontWeight:600}}>🎵 Buscar música...</button>
        <p style={{fontSize:11,color:C.textLight,textAlign:"center",marginTop:6}}>Pesquisa via Apple Music. Preview de 30s incluído.</p>
      </div>}

      {addType==="arte"&&<div style={{marginBottom:10}}>
        <button onClick={()=>{setShowModal(false);setShowDrawing(true);}} style={{width:"100%",padding:"16px 0",background:C.pinkLight,color:C.pink,border:`1.5px solid ${C.pink}55`,borderRadius:12,cursor:"pointer",fontSize:15,fontWeight:700,letterSpacing:"-0.3px"}}>
          🎨 Abrir tela de desenho
        </button>
        <p style={{fontSize:11,color:C.textLight,textAlign:"center",marginTop:6}}>Pincéis, cores, colagem de imagens. Salva como arte na timeline.</p>
      </div>}

      {(addType==="texto"||addType==="link")&&<textarea value={addContent} onChange={e=>setAddContent(e.target.value)} placeholder={addType==="link"?"Cole o link (YouTube, Vimeo, ou URL)...":"O que aconteceu?"} style={{width:"100%",minHeight:88,marginBottom:10,padding:"10px 12px",border:`1px solid ${C.cardBorder}`,borderRadius:10,fontSize:16,boxSizing:"border-box"}}/>}

      {addType!=="arte"&&addType!=="musica"&&<>
        <input value={addCaption} onChange={e=>setAddCaption(e.target.value)} placeholder="Legenda (opcional)" style={{marginBottom:14}}/>
        <div style={{marginBottom:16}}><TagPicker selectedTags={addTags} onChange={setAddTags} customTags={activeData.customTags||[]}/></div>
        <Btn onClick={()=>addMoment()}>Adicionar momento</Btn>
      </>}
      {addType==="arte"&&<>
        <input value={addCaption} onChange={e=>setAddCaption(e.target.value)} placeholder="Legenda para a arte (opcional)" style={{marginBottom:14}}/>
      </>}
    </Modal>}

    {showEditDay&&<Modal title="Cor do dia" onClose={()=>setShowEditDay(false)}><div style={{display:"flex",gap:10,flexWrap:"wrap",justifyContent:"center",padding:"8px 0"}}>{DAY_COLORS.map(col=><button key={col.label} onClick={()=>{save({...data,dayColors:{...(data.dayColors||{}),[curDay]:col.label}});setShowEditDay(false);}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,background:"none",border:"none",cursor:"pointer",padding:8}}><div style={{width:48,height:48,borderRadius:"50%",background:col.bg,border:`3px solid ${col.dot}`,outline:dayColor.label===col.label?`3px solid ${C.purple}`:"none",outlineOffset:2}}/><span style={{fontSize:11,color:C.textMid,fontWeight:500}}>{col.label}</span></button>)}</div></Modal>}
    {showFeeling&&<Modal title="Como foi esse Dia de Veeda?" onClose={()=>setShowFeeling(false)}><div style={{display:"flex",gap:10,flexWrap:"wrap",justifyContent:"center",padding:"8px 0"}}>{FEELINGS.map(f=><button key={f.label} onClick={()=>{save({...data,dayFeelings:{...(data.dayFeelings||{}),[curDay]:f}});setShowFeeling(false);}} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,background:feeling&&feeling.label===f.label?C.purpleLight:"#F5F3FB",border:`2px solid ${feeling&&feeling.label===f.label?C.purple:C.cardBorder}`,borderRadius:14,padding:"12px 14px",cursor:"pointer",minWidth:68}}><span style={{fontSize:28}}>{f.emoji}</span><span style={{fontSize:11,color:C.textMid,fontWeight:500}}>{f.label}</span></button>)}</div></Modal>}

    {showAvatar&&<Modal title="Personalizar perfil" onClose={()=>setShowAvatar(false)}>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <input ref={photoRef} type="file" accept="image/*" capture="user" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)readFile(f,src=>updateAv({...profile,avatarSrc:src}));}}/>
        <input ref={galleryRef} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)readFile(f,src=>updateAv({...profile,avatarSrc:src}));}}/>
        <button onClick={()=>photoRef.current.click()} style={{flex:1,padding:"9px 0",background:C.blueLight,color:C.blue,border:`1px solid ${C.blueMid}`,borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:500}}>📷 Câmera</button>
        <button onClick={()=>galleryRef.current.click()} style={{flex:1,padding:"9px 0",background:C.purpleLight,color:C.purple,border:`1px solid ${C.purpleMid}`,borderRadius:10,cursor:"pointer",fontSize:13,fontWeight:500}}>🖼️ Galeria</button>
        {profile.avatarSrc&&<button onClick={()=>updateAv({...profile,avatarSrc:null})} style={{padding:"9px 12px",background:"#FDE8E8",color:C.red,border:`1px solid #F5B5B5`,borderRadius:10,cursor:"pointer",fontSize:13}}>Remover</button>}
      </div>
      {!profile.avatarSrc&&<div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:14}}>{AVATAR_EMOJIS.map(e=><button key={e} onClick={()=>updateAv({...profile,emoji:e})} style={{fontSize:20,background:profile.emoji===e?C.purpleLight:"#F5F3FB",border:`2px solid ${profile.emoji===e?C.purple:C.cardBorder}`,borderRadius:10,width:44,height:44,cursor:"pointer"}}>{e}</button>)}</div>
        <div style={{display:"flex",gap:10,marginBottom:14}}>{AVATAR_COLORS.map(col=><button key={col} onClick={()=>updateAv({...profile,avatarColor:col})} style={{width:36,height:36,borderRadius:"50%",background:col,border:`3px solid ${profile.avatarColor===col?C.purple:C.cardBorder}`,cursor:"pointer"}}/>)}</div>
      </div>}
      <div style={{display:"flex",justifyContent:"center",marginBottom:20}}><AvatarBubble src={profile.avatarSrc} emoji={profile.emoji} color={profile.avatarColor||C.purpleLight} size={64} ring/></div>
      <Btn onClick={()=>setShowAvatar(false)}>Salvar</Btn>
    </Modal>}

    {showInvite&&<Modal title="Adicionar ao Meu Círculo" onClose={()=>setShowInvite(false)}>
      <AddContactModal
        contacts={activeData.contacts||[]}
        myHandle={profile.handle||nameToHandle(profile.name)}
        onAdd={c=>{save({...data,contacts:[...(data.contacts||[]),c]});setShowInvite(false);}}
        onClose={()=>setShowInvite(false)}
      />
    </Modal>}

    {showGroupName&&<Modal title="Renomear grupo" onClose={()=>setShowGroupName(false)}>
      <input value={newGroup} onChange={e=>setNewGroup(e.target.value)} placeholder="Nome do grupo" style={{marginBottom:16}}/>
      <Btn onClick={()=>{if(newGroup.trim()){save({...data,groupName:newGroup.trim()});setShowGroupName(false);}}}>Salvar</Btn>
    </Modal>}
  </div>;
}

// ─── ROOT ────────────────────────────────────
function Veeda(){
  const [screen,setScreen]=useState("loading");
  const [profiles,setProfiles]=useState([]);
  const [selProfile,setSelProfile]=useState(null);
  const [activeProfile,setActiveProfile]=useState(null);
  const [activePw,setActivePw]=useState(null);
  const [forgotProfile,setForgotProfile]=useState(null);
  const [showGuide,setShowGuide]=useState(false);

  useEffect(()=>{
    const session=loadSession(),ps=loadProfiles();
    setProfiles(ps);
    if(session?.profileId&&session?.pw){const p=ps.find(x=>x.id===session.profileId);if(p){setActiveProfile(p);setActivePw(session.pw);setScreen("app");return;}}
    setScreen("splash");
  },[]);

  const refresh=()=>{const ps=loadProfiles();setProfiles(ps);return ps;};
  const updateProfile=updated=>{
    const ps=loadProfiles(),idx=ps.findIndex(p=>p.id===updated.id);
    if(idx>=0){
      ps[idx]={...ps[idx],...updated};
      saveProfiles(ps);
      setActiveProfile(prev=>({...prev,...updated}));
    }
  };

  if(screen==="loading")return <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:C.bg,fontSize:40}}>🌿</div>;
  if(screen==="app"&&activeProfile&&activePw)return <VeedaApp profile={activeProfile} password={activePw} onLogout={()=>{clearSession();setActiveProfile(null);setActivePw(null);setScreen("splash");}} onUpdateProfile={updateProfile}/>;
  if(screen==="forgot"&&forgotProfile)return <ScreenForgot profile={forgotProfile} onBack={()=>setScreen("password")} onSuccess={pw=>{const ps=loadProfiles(),p=ps.find(x=>x.id===forgotProfile.id);saveSession(p.id,pw);setActiveProfile(p);setActivePw(pw);setForgotProfile(null);setScreen("app");}}/>;
  if(screen==="password"&&selProfile)return <ScreenPassword profile={selProfile} onBack={()=>setScreen(profiles.length>0?"select":"splash")} onForgot={()=>{setForgotProfile(selProfile);setScreen("forgot");}} onSuccess={pw=>{saveSession(selProfile.id,pw);setActiveProfile(selProfile);setActivePw(pw);setScreen("app");}}/>;
  if(screen==="create")return <ScreenCreate onBack={()=>setScreen("splash")} onDone={(profile,pw)=>{refresh();saveSession(profile.id,pw);setActiveProfile(profile);setActivePw(pw);setScreen("app");}}/>;
  if(screen==="select")return <ScreenSelect profiles={profiles} onSelect={p=>{setSelProfile(p);setScreen("password");}} onNew={()=>setScreen("create")} onBack={()=>setScreen("splash")}/>;
  return <>
    {showGuide&&<InstallGuide onClose={()=>setShowGuide(false)}/>}
    <SplashScreen onLogin={()=>setScreen(profiles.length>0?"select":"password")} onCreate={()=>setScreen("create")} onGuide={()=>setShowGuide(true)}/>
  </>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<Veeda/>);

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    const sw=`const CACHE="veeda-v7",FILES=["./"];self.addEventListener("install",e=>e.waitUntil(caches.open(CACHE).then(c=>c.addAll(FILES))));self.addEventListener("activate",e=>e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k))))));self.addEventListener("fetch",e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request))));`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:"application/javascript"}))).catch(()=>{});
  });
}
</script>
</body>
</html>
