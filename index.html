<style>
/* ═══════════════════════════════════════════════════════════
   VEEDA ADVANCED STYLES — v2.0
   Responsividade, gradientes, glassmorphism, animações
   ═══════════════════════════════════════════════════════════ */

:root {
  /* Gradientes modernos */
  --gradient-primary: linear-gradient(135deg, #9000FF 0%, #7B6FA0 50%, #22FCB7 100%);
  --gradient-secondary: linear-gradient(135deg, #EAFFF8 0%, #F0F6FD 50%, #FDF5F0 100%);
  --gradient-accent: linear-gradient(135deg, #22FCB7 0%, #0097A7 100%);
  --gradient-glass: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0.05) 100%);

  /* Sombras avançadas */
  --shadow-soft: 0 2px 8px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.04);
  --shadow-medium: 0 4px 16px rgba(0,0,0,0.12), 0 2px 6px rgba(0,0,0,0.08);
  --shadow-strong: 0 8px 32px rgba(0,0,0,0.16), 0 4px 12px rgba(0,0,0,0.08);
  --shadow-glow: 0 0 20px rgba(144, 0, 255, 0.3);

  /* Bordas e raios */
  --border-radius-sm: 8px;
  --border-radius-md: 14px;
  --border-radius-lg: 20px;
  --border-radius-xl: 50px;

  /* Espaçamentos responsivos */
  --spacing-xs: 4px;
  --spacing-sm: 8px;
  --spacing-md: 16px;
  --spacing-lg: 20px;
  --spacing-xl: 24px;
  --spacing-2xl: 32px;
}

/* Reset e base */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{
  height:100%;
  overflow-x:hidden;
  overscroll-behavior:none;
  scroll-behavior:smooth;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background: var(--gradient-secondary);
  background-attachment: fixed;
  color:#3A3350;
  -webkit-text-size-adjust:100%;
  padding-bottom:env(safe-area-inset-bottom);
  padding-left:env(safe-area-inset-left);
  padding-right:env(safe-area-inset-right);
  min-height:100vh;
  position:relative;
}

/* Container principal responsivo */
#root{
  max-width:480px;
  margin:0 auto;
  min-height:100vh;
  position:relative;
  z-index:1;
}

/* Responsividade */
@media (max-width: 480px) {
  #root { max-width: 100vw; padding: 0 var(--spacing-md); }
  body { padding-left: 0; padding-right: 0; }
}

@media (min-width: 768px) {
  #root { max-width: 500px; }
}

/* Inputs e form controls aprimorados */
input,textarea,select{
  font-family:inherit;
  font-size:16px;
  border:2px solid rgba(203, 192, 211, 0.6);
  border-radius:var(--border-radius-xl);
  padding: var(--spacing-lg) var(--spacing-xl);
  color:#3A3350;
  width:100%;
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  outline:none;
  -webkit-appearance:none;
  transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: var(--shadow-soft);
}

input:focus,textarea:focus{
  border-color:#9000FF;
  border-width:2px;
  background: rgba(255, 255, 255, 0.95);
  box-shadow: var(--shadow-glow), var(--shadow-medium);
  transform: translateY(-1px);
}

textarea{
  border-radius:var(--border-radius-lg);
  padding: var(--spacing-md) var(--spacing-lg);
  resize:none;
  min-height: 80px;
}

/* Botões aprimorados */
button{
  font-family:inherit;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  transition:all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
  position:relative;
  overflow:hidden;
}

button:before {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  background: rgba(255, 255, 255, 0.3);
  border-radius: 50%;
  transform: translate(-50%, -50%);
  transition: width 0.6s, height 0.6s;
}

button:active:before {
  width: 300px;
  height: 300px;
}

/* Animações aprimoradas */
@keyframes vPulse{
  0%{transform:scale(1);opacity:.6}
  70%{transform:scale(2.4);opacity:0}
  100%{opacity:0}
}

@keyframes slideUp{
  from{transform:translateY(60px);opacity:0}
  to{transform:translateY(0);opacity:1}
}

@keyframes notifDrop{
  from{transform:translateY(-60px) translateX(-50%);opacity:0}
  to{transform:translateY(0) translateX(-50%);opacity:1}
}

@keyframes spin{to{transform:rotate(360deg)}}

@keyframes momentPop{
  0%{transform:scale(0.4) rotate(-8deg);opacity:0}
  70%{transform:scale(1.1) rotate(2deg)}
  100%{transform:scale(1) rotate(0);opacity:1}
}

@keyframes shimmer{
  0%{background-position:-300px 0}
  100%{background-position:300px 0}
}

@keyframes fadeIn{
  from{opacity:0}
  to{opacity:1}
}

@keyframes pulse{
  0%,100%{opacity:.5}
  50%{opacity:1}
}

@keyframes bounceIn{
  0%{transform:scale(0.3);opacity:0}
  50%{transform:scale(1.05)}
  70%{transform:scale(0.9)}
  100%{transform:scale(1);opacity:1}
}

@keyframes slideInRight{
  from{transform:translateX(100%);opacity:0}
  to{transform:translateX(0);opacity:1}
}

@keyframes slideInLeft{
  from{transform:translateX(-100%);opacity:0}
  to{transform:translateX(0);opacity:1}
}

@keyframes glow{
  0%,100%{box-shadow: var(--shadow-soft)}
  50%{box-shadow: var(--shadow-glow)}
}

/* Classes utilitárias */
.shimmer{
  background:linear-gradient(90deg,#f0edf8 25%,#e8e4f4 50%,#f0edf8 75%);
  background-size:600px 100%;
  animation:shimmer 1.4s infinite linear;
}

.glass{
  background: var(--gradient-glass);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255, 255, 255, 0.2);
}

.gradient-bg{
  background: var(--gradient-primary);
  background-clip: text;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.animate-bounce-in{animation: bounceIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55)}
.animate-slide-up{animation: slideUp 0.4s cubic-bezier(0.22, 1, 0.36, 1)}
.animate-fade-in{animation: fadeIn 0.3s ease-out}
.animate-glow{animation: glow 2s ease-in-out infinite}

/* Scrollbar customizada */
::-webkit-scrollbar{
  width: 6px;
  height: 6px;
}

::-webkit-scrollbar-track{
  background: rgba(203, 192, 211, 0.1);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb{
  background: rgba(144, 0, 255, 0.3);
  border-radius: 3px;
}

::-webkit-scrollbar-thumb:hover{
  background: rgba(144, 0, 255, 0.5);
}

/* Selection customizada */
::selection{
  background: rgba(144, 0, 255, 0.2);
  color: #3A3350;
}

/* Focus visible aprimorado */
*:focus-visible{
  outline: 2px solid #9000FF;
  outline-offset: 2px;
  border-radius: var(--border-radius-md);
}

/* Safe area para dispositivos modernos */
@supports (padding: max(0px)) {
  body {
    padding-bottom: max(var(--spacing-md), env(safe-area-inset-bottom));
    padding-left: max(var(--spacing-md), env(safe-area-inset-left));
    padding-right: max(var(--spacing-md), env(safe-area-inset-right));
  }
}

/* High contrast mode support */
@media (prefers-contrast: high) {
  :root {
    --shadow-soft: 0 2px 4px rgba(0,0,0,0.3);
    --shadow-medium: 0 4px 8px rgba(0,0,0,0.4);
    --shadow-strong: 0 6px 12px rgba(0,0,0,0.5);
  }
}

/* Reduced motion support */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>

// ═══════════════════════════════════════════════════════════
// VEEDA CORE — veeda-core.js
// Edite este arquivo para: constantes, tokens, crypto, storage,
// helpers de data/handle, Google Drive, IndexedDB, notificações
// ═══════════════════════════════════════════════════════════
const {useState,useEffect,useRef,useCallback,useMemo} = React;

// ── App metadata ───────────────────────────────────────────
const APP_VERSION  = "2.0.0";
const DATA_VERSION = 3; // bump quando o schema mudar (aciona migração)

// ── LocalStorage keys ──────────────────────────────────────
const PROFILES_KEY = "veeda_profiles_v2";
const SESSION_KEY  = "veeda_session_v2"; // persiste entre aberturas de app
const REGISTRY_KEY = "veeda_public_registry";
const GDRIVE_KEY   = "veeda_gdrive_token";
const GOOGLE_USER_KEY = "veeda_google_user";   // {sub,email,name,picture,ts}
const MIGRATION_KEY   = "veeda_migration_v14"; // {status,ts,backupId}
const PRESERVE_PREFIX = "veeda_preserved_";    // NUNCA apagamos estas keys
const GOOGLE_CLIENT_ID = "377556817223-t88d5ejs7sopv5fftg96j0bq9gdpt18f.apps.googleusercontent.com";
// Scopes: appdata (armazenar blobs cifrados) + openid/email/profile (identidade)
const GDRIVE_SCOPE = "https://www.googleapis.com/auth/drive.appdata openid email profile";
const GDRIVE_FILE  = "veeda-backup-v2.enc";        // legacy: blob único (v1.2+)
const CLOUD_INDEX  = "veeda-account-v14.json";     // index cloud (v1.4+) — plaintext com lista de perfis
const CLOUD_DATA   = id=>`veeda-data-${id}.enc`;   // blob cifrado por perfil
const CLOUD_SNAP   = (id,ym)=>`veeda-snap-${id}-${ym}.enc`;

// ── Design Tokens ──────────────────────────────────────────
const C = {
  purple:"#9000FF", purpleLight:"#EDE9F6", purpleMid:"#BB7DEB", purpleSoft:"#F9F1FF",
  blue:"#5B7FA6",   blueLight:"#E6EEF8",   blueMid:"#A8C0DA",
  amber:"#D4860A",  amberLight:"#FFF3DC",
  green:"#1D9E75",  greenLight:"#EAFFF8",  greenMid:"#4DB896",
  red:"#C0392B",    redLight:"#FDE8E8",
  pink:"#E91E8C",   pinkLight:"#FDE8F4",
  teal:"#0097A7",   tealLight:"#E0F7FA",
  cardBorder:"#CBC0D3", headerBorder:"#DDD8EE",
  bg:"#EAFFF8",  bgGradEnd:"#FEFEFC", splashBg:"#22FCB7",
  text:"#3A3350", textMid:"#7A7090", textLight:"#ADA8C0",
  white:"#FFFFFF", tabActive:"#7B6FA0",
  overlay:"rgba(40,30,60,0.52)",
};
const PASSO = "'Passo', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";
const SANS  = "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif";

// Inject Passo font (graceful: fallback to system if unavailable)
(()=>{
  if(document.getElementById("passo-font"))return;

  l.id="passo-font"; l.rel="stylesheet";
  l.href="https://fonts.googleapis.com/css2?family=Passo:wght@400;600;700&display=swap";
  document.head.appendChild(l);
})();

// ── Data constants ─────────────────────────────────────────
const DAY_COLORS=[
  {label:"Lavanda",bg:"#F7F5FC",dot:"#B8AEDD"},{label:"Pêssego",bg:"#FDF5F0",dot:"#E8B89A"},
  {label:"Menta",bg:"#F0FAF5",dot:"#8FD1B0"},{label:"Céu",bg:"#F0F6FD",dot:"#9ABEDD"},
  {label:"Rosa",bg:"#FDF0F5",dot:"#DDA8C0"},{label:"Baunilha",bg:"#FDFAF0",dot:"#D4C48A"},
  {label:"Cinza",bg:"#F5F5F7",dot:"#ACACBC"},
];
const FEELINGS=[
  {emoji:"😊",label:"Feliz"},{emoji:"😌",label:"Tranquilo"},{emoji:"🥰",label:"Grato"},
  {emoji:"😔",label:"Triste"},{emoji:"😤",label:"Frustrado"},{emoji:"😴",label:"Cansado"},
  {emoji:"🤩",label:"Animado"},{emoji:"😶",label:"Neutro"},
];
const AVATAR_EMOJIS=["🌿","🌸","🌊","🌙","⭐","🦋","🍀","🎵","🌻","🦉","🐾","🌈","🦊","🐬","🌺","🎯","🧩","🪴","🦚","🌵"];
const AVATAR_COLORS=["#EDE9F6","#E6EEF8","#FDF5F0","#F0FAF5","#FDF0F5","#FDFAF0","#F5F5F7"];
const EVENT_TYPES=[
  {id:"show",emoji:"🎵",label:"Show"},{id:"encontro",emoji:"🤝",label:"Encontro"},
  {id:"viagem",emoji:"✈️",label:"Viagem"},{id:"aniversario",emoji:"🎂",label:"Aniversário"},
  {id:"outro",emoji:"📅",label:"Outro"},
];
const DEFAULT_TAGS=[
  {id:"viagem",emoji:"🏖️",label:"Viagem",bg:"#E6F0FD",color:"#5B7FA6"},
  {id:"trabalho",emoji:"💼",label:"Trabalho",bg:"#EDE9F6",color:"#7B6FA0"},
  {id:"gastronomia",emoji:"🍽️",label:"Gastronomia",bg:"#E8FBF0",color:"#1D9E75"},
  {id:"cultura",emoji:"🎵",label:"Cultura",bg:"#FFF3DC",color:"#D4860A"},
  {id:"familia",emoji:"❤️",label:"Família",bg:"#FDE8F0",color:"#C0396A"},
  {id:"natureza",emoji:"🌿",label:"Natureza",bg:"#E8FBF0",color:"#1D9E75"},
  {id:"saude",emoji:"🏃",label:"Saúde",bg:"#E6F0FD",color:"#5B7FA6"},
  {id:"amigos",emoji:"🤝",label:"Amigos",bg:"#EDE9F6",color:"#7B6FA0"},
];
const TYPE_META={
  texto:   {icon:"✏️",fill:C.purple,bg:C.purpleLight},
  foto:    {icon:"📷",fill:C.blue,  bg:C.blueLight},
  video:   {icon:"🎬",fill:C.blue,  bg:C.blueLight},
  link:    {icon:"🔗",fill:C.blue,  bg:C.blueLight},
  videolink:{icon:"▶️",fill:C.blue, bg:C.blueLight},
  musica:  {icon:"🎵",fill:C.green, bg:C.greenLight},
  arte:    {icon:"🎨",fill:C.pink,  bg:C.pinkLight},
  voz:     {icon:"🎙️",fill:C.teal,  bg:C.tealLight},
  evento:  {icon:"📅",fill:C.amber, bg:C.amberLight},
};

// ── Crypto (PBKDF2 key caching) ────────────────────────────
const _keyCache=new Map();
const _deriveKey=async(pw,salt)=>{
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2",salt,iterations:150000,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);
};
const _getCachedKey=async(pw,salt)=>{
  const k=pw+"|"+Array.from(salt.slice(0,4)).join("-");
  if(_keyCache.has(k))return _keyCache.get(k);
  const key=await _deriveKey(pw,salt);
  _keyCache.set(k,key);
  return key;
};
const encryptFast=async(obj,key,salt)=>{
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const buf=await crypto.subtle.encrypt({name:"AES-GCM",iv},key,new TextEncoder().encode(JSON.stringify(obj)));
  return btoa(JSON.stringify({v:2,salt:Array.from(salt),iv:Array.from(iv),data:Array.from(new Uint8Array(buf))}));
};
const encryptObj=async(obj,pw)=>{
  const salt=crypto.getRandomValues(new Uint8Array(16));
  const key=await _getCachedKey(pw,salt);
  return encryptFast(obj,key,salt);
};
const decryptObj=async(ct,pw)=>{
  const {salt,iv,data}=JSON.parse(atob(ct));
  const saltArr=new Uint8Array(salt);
  const key=await _getCachedKey(pw,saltArr);
  const buf=await crypto.subtle.decrypt({name:"AES-GCM",iv:new Uint8Array(iv)},key,new Uint8Array(data));
  return {key,salt:saltArr,data:JSON.parse(new TextDecoder().decode(buf))};
};
const hashPw=async pw=>{
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode("veeda:"+pw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
};
const genCode=()=>{
  const chars="ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
  const rand=crypto.getRandomValues(new Uint8Array(16));
  const s=Array.from(rand).map(b=>chars[b%chars.length]).join("");
  return `${s.slice(0,4)}-${s.slice(4,8)}-${s.slice(8,12)}-${s.slice(12,16)}`;
};

// ── Safe localStorage wrapper ──────────────────────────────
const safeLS={
  get:(k,fb=null)=>{try{const v=localStorage.getItem(k);return v!=null?JSON.parse(v):fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));return true;}catch{return false;}},
  raw:(k)=>{try{return localStorage.getItem(k);}catch{return null;}},
  rawSet:(k,v)=>{try{localStorage.setItem(k,v);return true;}catch{return false;}},
  del:(k)=>{try{localStorage.removeItem(k);}catch{}},
};

// ── Profiles ───────────────────────────────────────────────
const loadProfiles=()=>safeLS.get(PROFILES_KEY,[]);
const saveProfiles=ps=>safeLS.set(PROFILES_KEY,ps);

// ── Session (persiste entre fechamentos do app) ─────────────
const loadSession=()=>safeLS.get(SESSION_KEY,null);
const saveSession=(id,pw)=>safeLS.set(SESSION_KEY,{profileId:id,pw,ts:Date.now()});
const clearSession=()=>safeLS.del(SESSION_KEY);

// ── Monthly snapshot ──────────────────────────────────────
// Sobrescreve o snapshot do mês corrente a cada save (para refletir o estado
// mais recente), mas NUNCA toca em snapshots de meses anteriores — assim
// o usuário nunca perde o histórico do mês atual até fazer backup, e nada
// do passado é apagado.
const saveMonthlySnapshot=(profileId,encBlob)=>{
  const ym=new Date().toISOString().slice(0,7);
  const k=`veeda_snap_${profileId}_${ym}`;
  safeLS.rawSet(k,encBlob);
};
const getMonthlySnapshots=(profileId)=>{
  const out=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith(`veeda_snap_${profileId}_`)){out.push({key:k,ym:k.split("_").pop()});}
  }
  return out.sort((a,b)=>b.ym.localeCompare(a.ym));
};
// Recovery: tenta decifrar snapshots (mais recentes primeiro) até achar um válido
const loadLatestSnapshot=async(profileId,password)=>{
  const snaps=getMonthlySnapshots(profileId);
  for(const s of snaps){
    try{
      const raw=safeLS.raw(s.key);
      if(!raw)continue;
      const{key,salt,data}=await decryptObj(raw,password);
      return{key,salt,data,ym:s.ym};
    }catch(e){continue;}
  }
  return null;
};

// ── Public registry (busca local cross-profile) ────────────
const registryAdd=(profile)=>{
  const reg=safeLS.get(REGISTRY_KEY,[]);
  if(!reg.find(p=>p.handle===profile.handle)){
    reg.push({id:profile.id,name:profile.name,handle:profile.handle,emoji:profile.emoji,avatarColor:profile.avatarColor,avatarSrc:profile.avatarSrc||null,ts:Date.now()});
    safeLS.set(REGISTRY_KEY,reg);
  }
};
const registryUpdate=(profile)=>{
  const reg=safeLS.get(REGISTRY_KEY,[]);
  const idx=reg.findIndex(p=>p.id===profile.id);
  if(idx>=0){reg[idx]={...reg[idx],...profile,ts:Date.now()};safeLS.set(REGISTRY_KEY,reg);}
  else registryAdd(profile);
};
const registrySearch=(q)=>{
  if(!q.trim())return[];
  const clean=q.toLowerCase().replace(/^@/,"");
  return safeLS.get(REGISTRY_KEY,[]).filter(p=>p.name.toLowerCase().includes(clean)||(p.handle||"").replace(/^@/,"").includes(clean));
};

// ── Profile card (código cross-device) ────────────────────
const makeProfileCard=(profile)=>{
  const h=(profile.handle||nameToHandle(profile.name)).replace(/^@/,"");
  const pub={n:profile.name,h,e:profile.emoji||"🌿",c:profile.avatarColor||C.purpleLight};
  return "vc2_"+btoa(unescape(encodeURIComponent(JSON.stringify(pub))));
};
const parseProfileCard=(code)=>{
  try{
    const t=code.trim();
    if(!t.startsWith("vc2_"))return null;
    const pub=JSON.parse(decodeURIComponent(escape(atob(t.slice(4)))));
    if(!pub.h||!pub.n)return null;
    return{name:pub.n,handle:"@"+pub.h,emoji:pub.e||"🌿",avatarColor:pub.c||C.purpleLight,avatarSrc:null,fromCard:true};
  }catch{return null;}
};

// ── Shared Day URL encoding (cross-device sharing) ────────
// Serializa um dia para URL — fotos/vídeos viram placeholder de texto.
// O receptor abre o link, o app decodifica e oferece "Aceitar dia".
const encodeSharedDay=(profile,moments,curDay,feeling,message)=>{
  const safeMoments=(moments||[]).map(m=>{
    // Blobs binários não cabem em URL — substituímos por placeholder
    if((m.type==="foto"||m.type==="video"||m.type==="arte")&&
       (m.content?.startsWith("data:")||m.content?.startsWith("IDB:"))){
      return{...m,content:null,_hasMedia:true};
    }
    if(m.type==="voz"){return{...m,content:null,_hasMedia:true};}
    return m;
  });
  const payload={
    v:1,
    date:curDay,
    author:profile.name,
    handle:profile.handle||nameToHandle(profile.name),
    emoji:profile.emoji||"🌿",
    avatarColor:profile.avatarColor||C.purpleLight,
    feeling:feeling||null,
    moments:safeMoments,
    message:(message||"").trim(),
    sharedAt:Date.now(),
  };
  try{return"vd1_"+btoa(unescape(encodeURIComponent(JSON.stringify(payload))));}

};

  }catch{return null;}
};

// ── Google Auth / Drive ────────────────────────────────────
// Fluxo OAuth2 implicit.
// Modo popup: para browsers normais (desktop/mobile browser aberto).
// Modo redirect: para PWA standalone (iOS bloqueia popups em apps instalados)
//   ou quando o popup é bloqueado. A página navega para o Google e retorna com
//   o token no hash — o boot handler em Veeda() faz o parse.
const _buildOAuthUrl=()=>{
  const params=new URLSearchParams({
    client_id:GOOGLE_CLIENT_ID,
    redirect_uri:window.location.origin+window.location.pathname,
    response_type:"token",
    scope:GDRIVE_SCOPE,
    include_granted_scopes:"true",
    prompt:"select_account",
    state:Math.random().toString(36).slice(2),
  });
  return`https://accounts.google.com/o/oauth2/v2/auth?${params}`;
};
const _isPWAStandalone=()=>
  (window.matchMedia?.("(display-mode: standalone)").matches)||
  (window.navigator.standalone===true);

const gdriveAuth=()=>new Promise((res,rej)=>{
  const authUrl=_buildOAuthUrl();
  if(_isPWAStandalone()){
    // Em PWA não há popup — faz redirect completo da página
    window.location.href=authUrl;
    return; // promise nunca resolve; a página navega
  }
  const popup=window.open(authUrl,"gauth","width=500,height=620");
  if(!popup||popup.closed){
    // Popup bloqueado pelo browser — fallback para redirect
    window.location.href=authUrl;
    return;
  }
  const t=setInterval(()=>{
    try{
      if(!popup||popup.closed){clearInterval(t);rej(new Error("Janela fechada."));return;}
      const hash=popup.location.hash;
      if(hash&&hash.includes("access_token")){
        clearInterval(t);popup.close();
        const p=new URLSearchParams(hash.slice(1));
        const token={
          access_token:p.get("access_token"),
          expires_in:parseInt(p.get("expires_in")||"3600",10),
          scope:p.get("scope"),
          ts:Date.now(),
        };
        safeLS.set(GDRIVE_KEY,token);
        res(token.access_token);
      }
    }catch{}
  },500);
});

// Token helpers — retorna token cacheado ainda válido, ou null
const getCachedToken=()=>{
  const t=safeLS.get(GDRIVE_KEY,null);
  if(!t?.access_token)return null;
  const exp=(t.ts||0)+(t.expires_in||3600)*1000-60000; // -1min de margem
  if(Date.now()>exp)return null;
  return t.access_token;
};

// Drive low-level — nome do arquivo é parametrizado
const _driveFind=async(name,t)=>{
  const r=await fetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='${encodeURIComponent(name)}'&fields=files(id,modifiedTime,size)`,{headers:{Authorization:`Bearer ${t}`}});
  if(!r.ok)throw new Error("drive_find_failed");
  const d=await r.json();
  return d.files?.[0]||null;
};
const driveUpload=async(name,content,t,mime="text/plain")=>{
  const found=await _driveFind(name,t);
  const id=found?.id;
  const meta=JSON.stringify({name,parents:["appDataFolder"]});
  const b="vb_"+Math.random().toString(36).slice(2,10);
  const body=`--${b}\r\nContent-Type: application/json\r\n\r\n${meta}\r\n--${b}\r\nContent-Type: ${mime}\r\n\r\n${content}\r\n--${b}--`;
  const url=id?`https://www.googleapis.com/upload/drive/v3/files/${id}?uploadType=multipart&fields=id,modifiedTime`:`https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,modifiedTime`;
  const r=await fetch(url,{method:id?"PATCH":"POST",headers:{Authorization:`Bearer ${t}`,"Content-Type":`multipart/related; boundary=${b}`},body});
  if(!r.ok)throw new Error("drive_upload_failed");
  return r.json();
};
const driveDownload=async(name,t)=>{
  const found=await _driveFind(name,t);
  if(!found)return null;
  const r=await fetch(`https://www.googleapis.com/drive/v3/files/${found.id}?alt=media`,{headers:{Authorization:`Bearer ${t}`}});
  return r.ok?{content:await r.text(),modifiedTime:found.modifiedTime}:null;
};
const driveList=async t=>{
  const r=await fetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&fields=files(id,name,modifiedTime,size)&pageSize=200`,{headers:{Authorization:`Bearer ${t}`}});
  if(!r.ok)return[];
  const d=await r.json();return d.files||[];
};
const driveDelete=async(name,t)=>{
  const found=await _driveFind(name,t);
  if(!found)return false;
  const r=await fetch(`https://www.googleapis.com/drive/v3/files/${found.id}`,{method:"DELETE",headers:{Authorization:`Bearer ${t}`}});
  return r.ok;
};

// Legacy shims — mantidos para não quebrar tela de Backup antigo (v1.3)
const gdriveFindFile=async t=>{const f=await _driveFind(GDRIVE_FILE,t);return f?.id||null;};
const gdriveUpload  =async(enc,t)=>driveUpload(GDRIVE_FILE,enc,t);
const gdriveDownload=async t=>{const d=await driveDownload(GDRIVE_FILE,t);return d?.content||null;};

// ── Camada cloudAccount / cloudData / cloudSync ────────────
// cloudAccount: metadata plain-text no Drive (lista de perfis, sem dados sensíveis)
//   { v:1, owner:{sub,email}, profiles:[{id,name,handle,emoji,avatarColor,avatarSrc,handleLower,createdAt,updatedAt}], updatedAt }
// cloudData(id): blob cifrado com a senha do usuário, mesma estrutura do veeda_data_<id> local
// cloudSnap(id,ym): snapshot mensal cifrado

const cloudAccount={
  async load(t){
    try{
      const r=await driveDownload(CLOUD_INDEX,t);
      if(!r)return null;
      return JSON.parse(r.content);
    }catch(e){console.warn("cloudAccount.load failed",e);return null;}
  },
  async save(acc,t){
    acc.updatedAt=Date.now();
    await driveUpload(CLOUD_INDEX,JSON.stringify(acc),t,"application/json");
  },
  empty:(owner)=>({v:1,owner,profiles:[],updatedAt:0}),
  mergeProfile(acc,profile){
    const idx=(acc.profiles||[]).findIndex(p=>p.id===profile.id);
    // Incluímos passwordHash e recoveryHash pois são hashes SHA-256 de senhas
    // (não dá pra reverter) — necessários para login cross-device. O blob de
    // dados real já está cifrado com chave derivada da senha via PBKDF2 150k
    // iterações, então ter os hashes aqui não enfraquece a segurança.
    const slim={
      id:profile.id,name:profile.name,handle:profile.handle,
      handleLower:(profile.handle||"").replace(/^@/,"").toLowerCase(),
      emoji:profile.emoji,avatarColor:profile.avatarColor,avatarSrc:profile.avatarSrc||null,
      passwordHash:profile.passwordHash,recoveryHash:profile.recoveryHash,
      email:profile.email||"",googleSub:profile.googleSub||null,
      cloud:true,
      createdAt:profile.createdAt,updatedAt:Date.now(),
    };
    if(idx>=0)acc.profiles[idx]={...acc.profiles[idx],...slim};
    else acc.profiles.push(slim);
    return acc;
  },
};

const cloudData={
  async load(profileId,t){
    const r=await driveDownload(CLOUD_DATA(profileId),t);
    if(!r)return null;
    return{content:r.content,modifiedTime:r.modifiedTime};
  },
  async save(profileId,encBlob,t){
    return driveUpload(CLOUD_DATA(profileId),encBlob,t);
  },
  async saveSnap(profileId,ym,encBlob,t){
    return driveUpload(CLOUD_SNAP(profileId,ym),encBlob,t);
  },
};

// cloudSync.pushDebounced — empurra o blob ao Drive sem bloquear a UI.
// - Coalesce: só o último valor por profileId é enviado após PUSH_DEBOUNCE_MS.
// - Retry off-line: se falhar, marca pendente para retry no próximo save/foco.
const PUSH_DEBOUNCE_MS=2000;
const _pushTimers=new Map();      // profileId -> timeoutId
const _pendingBlobs=new Map();    // profileId -> enc blob

const cloudSync={
  async tokenOrNull(){return getCachedToken();},
  queuePush(profileId,encBlob){
    _pendingBlobs.set(profileId,encBlob);
    clearTimeout(_pushTimers.get(profileId));
    const tid=setTimeout(()=>cloudSync.flushPush(profileId),PUSH_DEBOUNCE_MS);
    _pushTimers.set(profileId,tid);
  },
  async flushPush(profileId){
    const blob=_pendingBlobs.get(profileId);
    if(!blob)return;
    const t=await cloudSync.tokenOrNull();
    if(!t)return; // offline ou sem sessão Google; tenta no próximo save
    try{
      await cloudData.save(profileId,blob,t);
      _pendingBlobs.delete(profileId);
    }catch(e){console.warn("cloud push failed",e);}
  },
  async flushAll(){for(const id of[..._pendingBlobs.keys()])await cloudSync.flushPush(id);},
  // pullOnBoot: compara Drive vs local; se Drive maior/mais recente, substitui local.
  async pullOnBoot(profileId,password,t){
    try{
      const remote=await cloudData.load(profileId,t);
      if(!remote)return{used:"local"};
      const localRaw=safeLS.raw(`veeda_data_${profileId}`);
      if(!localRaw){
        safeLS.rawSet(`veeda_data_${profileId}`,remote.content);
        return{used:"remote",reason:"no_local"};
      }
      // Se idênticos, nada a fazer
      if(localRaw===remote.content)return{used:"equal"};
      // Tenta decifrar ambos e escolher o com moments mais recente
      try{
        const[{data:dl},{data:dr}]=await Promise.all([decryptObj(localRaw,password),decryptObj(remote.content,password)]);
        const ll=dl?.lastSaved||0,rr=dr?.lastSaved||0;
        if(rr>ll){
          safeLS.rawSet(`veeda_data_${profileId}`,remote.content);
          return{used:"remote",reason:"newer"};
        }
        return{used:"local",reason:"newer_or_equal"};
      }catch(e){return{used:"local",reason:"decrypt_failed"};}
    }catch(e){console.warn("cloudSync.pullOnBoot failed",e);return{used:"local",reason:"error"};}
  },
};

// ── Preservação de dados (regra de ouro do app) ────────────
// preserveBeforeMigration: cópia read-only dos dados antigos com carimbo de tempo.
// Estas chaves nunca são apagadas automaticamente — só o usuário pode limpá-las.
const preserveBeforeMigration=(label)=>{
  const ts=Date.now();
  const bkpKey=`${PRESERVE_PREFIX}${label}_${ts}`;
  const payload={ts,label,snapshot:{}};
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(!k||k.startsWith(PRESERVE_PREFIX))continue;
    if(k.startsWith("veeda_"))payload.snapshot[k]=localStorage.getItem(k);
  }
  try{safeLS.rawSet(bkpKey,JSON.stringify(payload));return bkpKey;}
  catch(e){console.warn("preserve failed",e);return null;}
};
const listPreservedBackups=()=>{
  const out=[];
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith(PRESERVE_PREFIX)){
      try{const p=JSON.parse(localStorage.getItem(k));out.push({key:k,ts:p.ts,label:p.label,size:Object.keys(p.snapshot||{}).length});}catch{}
    }
  }
  return out.sort((a,b)=>b.ts-a.ts);
};
const restorePreservedBackup=(key)=>{
  try{
    const p=JSON.parse(localStorage.getItem(key));
    if(!p?.snapshot)return false;
    for(const[k,v]of Object.entries(p.snapshot)){localStorage.setItem(k,v);}
    return true;
  }catch{return false;}
};

// Detectar se há conta local existente (para oferecer migração)
const hasLocalAccounts=()=>{
  // Conta apenas perfis locais (não cloud) para evitar mostrar "Importar conta local" quando o usuário já tem conta Google
  const profiles=loadProfiles().filter(p=>!p.cloud);
  if(profiles.length>0)return true;
  // Órfãos: veeda_data_* sem entrada em profiles (excluindo blobs de perfis cloud)
  const cloudIds=new Set(loadProfiles().filter(p=>p.cloud).map(p=>p.id));
  for(let i=0;i<localStorage.length;i++){
    const k=localStorage.key(i);
    if(k&&k.startsWith("veeda_data_")){
      const id=k.replace("veeda_data_","");
      if(!cloudIds.has(id))return true;
    }
  }
  return false;
};

function Btn({onClick,children,style={},disabled=false,variant="primary",type="button"}){
  const tapped=useRef(false);
  const base={width:"100%",padding:"15px 0",border:"none",borderRadius:50,fontFamily:PASSO,fontWeight:600,fontSize:15,cursor:disabled?"not-allowed":"pointer",opacity:disabled?.55:1,transition:"transform .12s,opacity .12s",WebkitTapHighlightColor:"transparent",display:"flex",alignItems:"center",justifyContent:"center",gap:6,touchAction:"manipulation"};
  const vars={
    primary:  {background:C.purple,  color:C.white},
    outline:  {background:"transparent",color:C.purple,border:`2px solid ${C.purple}`},
    secondary:{background:C.purpleMid,color:C.purpleSoft},
    ghost:    {background:"none",border:"none",color:C.textMid,fontSize:13,padding:"8px 0",fontFamily:SANS,borderRadius:8},
    danger:   {background:C.red,    color:C.white},
    green:    {background:C.green,  color:C.white},
    teal:     {background:C.teal,   color:C.white},
  };
  const fire=useCallback(e=>{
    if(disabled)return;
    if(tapped.current)return;
    tapped.current=true;
    setTimeout(()=>{tapped.current=false;},350);
    if(onClick)onClick(e);
  },[onClick,disabled]);
  return(
    <button type={type} disabled={disabled} style={{...base,...vars[variant],...style}}
      onTouchStart={e=>{if(!disabled)e.currentTarget.style.transform="scale(0.96)";}}
      onTouchEnd={e=>{e.currentTarget.style.transform="scale(1)";e.preventDefault();fire(e);}}
      onClick={e=>{if(!tapped.current)fire(e);}}>
      {children}
    </button>
  );
}

function useToast(){
  const [toasts,setToasts]=useState([]);
  const addToast=useCallback((msg,type="info")=>{const id=Date.now();setToasts(p=>[...p,{id,msg,type}]);},[]);
  const removeToast=useCallback(id=>setToasts(p=>p.filter(t=>t.id!==id)),[]);
  const ToastContainer=()=><>{toasts.map(t=><Toast key={t.id} msg={t.msg} type={t.type} onDone={()=>removeToast(t.id)}/>)}</>;
  return{addToast,ToastContainer};
}

// DRAWING CANVAS (Arte)
// ═══════════════════════════════════════════════════
function DrawingCanvas({onSave,onClose}){
  const canvasRef=useRef(null);
  const [color,setColor]=useState("#3A3350");
  const [sz,setSz]=useState(5);
  const [tool,setTool]=useState("pen");
  const drawing=useRef(false);
  const last=useRef(null);

  useEffect(()=>{
    const c=canvasRef.current;c.width=1000;c.height=1000;
    const ctx=c.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,1000,1000);
  },[]);

  const pos=e=>{
    const c=canvasRef.current,r=c.getBoundingClientRect();
    const s=e.touches?e.touches[0]:e;
    return{x:(s.clientX-r.left)*(1000/r.width),y:(s.clientY-r.top)*(1000/r.height)};
  };
  const start=e=>{e.preventDefault();drawing.current=true;const p=pos(e);last.current=p;const ctx=canvasRef.current.getContext("2d");ctx.beginPath();ctx.arc(p.x,p.y,(tool==="eraser"?sz*3:sz)/2,0,Math.PI*2);ctx.fillStyle=tool==="eraser"?"#fff":color;ctx.fill();};
  const move=e=>{if(!drawing.current)return;e.preventDefault();const p=pos(e);const ctx=canvasRef.current.getContext("2d");ctx.beginPath();ctx.moveTo(last.current.x,last.current.y);ctx.lineTo(p.x,p.y);ctx.strokeStyle=tool==="eraser"?"#fff":color;ctx.lineWidth=tool==="eraser"?sz*3:sz;ctx.lineCap="round";ctx.lineJoin="round";ctx.stroke();last.current=p;};
  const end=()=>{drawing.current=false;last.current=null;};

  const importImg=f=>{const r=new FileReader();r.onload=ev=>{const img=new Image();img.onload=()=>{const c=canvasRef.current,ctx=c.getContext("2d");const sc=Math.min(1000/img.width,1000/img.height);const w=img.width*sc,h=img.height*sc;ctx.drawImage(img,(1000-w)/2,(1000-h)/2,w,h);};img.src=ev.target.result;};r.readAsDataURL(f);};

  const COLORS=["#000000","#3A3350","#9000FF","#E91E8C","#5B7FA6","#1D9E75","#D4860A","#C0392B","#FF9800","#ffffff","#FDF5F0","#EDE9F6"];

  return(
    <div style={{position:"fixed",inset:0,background:"#1a1025",zIndex:400,display:"flex",flexDirection:"column",maxWidth:480,margin:"0 auto"}}>
      <div style={{background:"#2a1d3d",padding:"10px 14px",display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
        <button onClick={onClose} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:8,color:"#fff",padding:"7px 12px",cursor:"pointer",fontSize:13}}>✕</button>
        <span style={{flex:1,color:"rgba(255,255,255,.6)",fontSize:13,fontWeight:600,textAlign:"center",fontFamily:PASSO}}>🎨 Arte Veeda</span>
        <button onClick={()=>onSave(canvasRef.current.toDataURL("image/png"))} style={{background:C.purple,border:"none",borderRadius:8,color:"#fff",padding:"8px 16px",cursor:"pointer",fontSize:13,fontWeight:700}}>Salvar ✓</button>
      </div>
      <div style={{flex:1,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",padding:8,background:"#13091e"}}>
        <canvas ref={canvasRef} style={{width:"100%",height:"100%",objectFit:"contain",touchAction:"none",borderRadius:10,cursor:tool==="eraser"?"cell":"crosshair"}}
          onTouchStart={start} onTouchMove={move} onTouchEnd={end}
          onMouseDown={start} onMouseMove={move} onMouseUp={end} onMouseLeave={end}/>
      </div>
      <div style={{background:"#2a1d3d",padding:"10px 12px 22px",flexShrink:0}}>
        <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap",marginBottom:10}}>
          {COLORS.map(c=><button key={c} onClick={()=>{setTool("pen");setColor(c);}} style={{width:26,height:26,borderRadius:"50%",background:c,border:`3px solid ${color===c&&tool==="pen"?"#fff":"rgba(255,255,255,.15)"}`,cursor:"pointer",flexShrink:0}}/>)}
        </div>
        <div style={{display:"flex",gap:6,justifyContent:"center",alignItems:"center",flexWrap:"wrap"}}>
          {[["pen","✏️ Pincel",C.purple],["eraser","⬜ Borracha",C.purpleMid]].map(([t,l,ac])=>(
            <button key={t} onClick={()=>setTool(t)} style={{padding:"5px 12px",background:tool===t?ac:"rgba(255,255,255,.1)",border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontSize:12,fontWeight:600}}>{l}</button>
          ))}
          {[2,5,10,20].map(s=>(
            <button key={s} onClick={()=>setSz(s)} style={{width:30,height:30,display:"flex",alignItems:"center",justifyContent:"center",background:sz===s?"rgba(255,255,255,.28)":"rgba(255,255,255,.08)",border:`2px solid ${sz===s?"#fff":"transparent"}`,borderRadius:"50%",cursor:"pointer"}}>
              <div style={{width:Math.max(3,s*.65),height:Math.max(3,s*.65),borderRadius:"50%",background:"#fff"}}/>
            </button>
          ))}
          <label style={{padding:"5px 10px",background:"rgba(255,255,255,.1)",borderRadius:8,color:"#fff",cursor:"pointer",fontSize:12}}>
            🖼️<input type="file" accept="image/*" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)importImg(f);}}/>
          </label>
          <button onClick={()=>{const c=canvasRef.current,ctx=c.getContext("2d");ctx.fillStyle="#fff";ctx.fillRect(0,0,c.width,c.height);}} style={{padding:"5px 10px",background:"rgba(255,255,255,.1)",border:"none",borderRadius:8,color:"#fff",cursor:"pointer",fontSize:12}}>🗑️</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════
// VOICE RECORDER
// ═══════════════════════════════════════════════════
function VoiceRecorder({onSave,onClose}){
  const [state,setState]=useState("idle"); // idle|recording|recorded|saving
  const [duration,setDuration]=useState(0);
  const [audioUrl,setAudioUrl]=useState(null);
  const recRef=useRef(null);
  const streamRef=useRef(null);
  const chunksRef=useRef([]);
  const timerRef=useRef(null);
  const MAX=120;

  const start=async()=>{
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      streamRef.current=stream;
      const rec=new MediaRecorder(stream,{mimeType:"audio/webm;codecs=opus"});
      chunksRef.current=[];
      rec.ondataavailable=e=>chunksRef.current.push(e.data);
      rec.onstop=()=>{
        const blob=new Blob(chunksRef.current,{type:"audio/webm"});
        const url=URL.createObjectURL(blob);
        setAudioUrl(url);
        setState("recorded");
        streamRef.current?.getTracks().forEach(t=>t.stop());
      };
      rec.start(100);
      recRef.current=rec;
      setState("recording");
      setDuration(0);
      timerRef.current=setInterval(()=>{
        setDuration(d=>{if(d>=MAX-1){stop();return d;}return d+1;});
      },1000);
    }catch{onClose();}
  };

  const stop=()=>{
    clearInterval(timerRef.current);
    recRef.current?.stop();
  };

  const save=async()=>{
    setState("saving");
    const blob=new Blob(chunksRef.current,{type:"audio/webm"});
    const reader=new FileReader();
    reader.onload=e=>onSave(e.target.result,duration);
    reader.readAsDataURL(blob);
  };

  useEffect(()=>()=>{clearInterval(timerRef.current);streamRef.current?.getTracks().forEach(t=>t.stop());},[]);

  const fmtDur=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`;

  return(
    <div style={{padding:"8px 0"}}>
      <div style={{textAlign:"center",padding:"24px 0"}}>
        <div style={{width:80,height:80,borderRadius:"50%",background:state==="recording"?C.redLight:C.tealLight,border:`3px solid ${state==="recording"?C.red:C.teal}`,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 16px",fontSize:32,animation:state==="recording"?"pulse 1s ease infinite":"none"}}>
          {state==="recording"?"🔴":"🎙️"}
        </div>
        {(state==="recording"||state==="recorded")&&(
          <p style={{fontSize:28,fontWeight:700,color:C.text,fontFamily:"monospace",marginBottom:4}}>{fmtDur(duration)}</p>
        )}
        {state==="idle"&&<p style={{fontSize:14,color:C.textMid,marginBottom:0}}>Toque para gravar uma nota de voz</p>}
        {state==="recording"&&<p style={{fontSize:12,color:C.red,marginBottom:0}}>Gravando… max {fmtDur(MAX)}</p>}
      </div>
      {state==="recorded"&&audioUrl&&(
        <audio controls src={audioUrl} style={{width:"100%",marginBottom:16}}/>
      )}
      <div style={{display:"flex",gap:10,flexDirection:"column"}}>
        {state==="idle"&&<Btn onClick={start} variant="teal">🎙️ Iniciar gravação</Btn>}
        {state==="recording"&&<Btn onClick={stop} variant="danger">⏹ Parar gravação</Btn>}
        {state==="recorded"&&<><Btn onClick={save}>✓ Adicionar à timeline</Btn><Btn onClick={start} variant="outline">Regravar</Btn></>}
        {state==="saving"&&<Btn disabled>Salvando… <Spinner/></Btn>}
        <Btn onClick={onClose} variant="ghost">Cancelar</Btn>
      </div>
    </div>
  );
}

// LOCATION PICKER
// ═══════════════════════════════════════════════════
function LocationPicker({value,onChange}){
  const [loading,setLoading]=useState(false);
  const [manual,setManual]=useState(false);
  const [text,setText]=useState(value?.name||"");

  const detect=async()=>{
    setLoading(true);
    try{
      const pos=await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:8000}));
      const{latitude:lat,longitude:lng}=pos.coords;
      let name=`${lat.toFixed(4)}, ${lng.toFixed(4)}`;
      try{
        const r=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=pt`);
        const d=await r.json();
        name=d.address?.city||d.address?.town||d.address?.village||d.display_name?.split(",")[0]||name;
      }catch{}
      onChange({lat,lng,name});
      setText(name);
    }catch{setManual(true);}
    setLoading(false);
  };

  if(value&&!manual){
    return(
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"10px 14px",background:"#E8F8F4",border:`1px solid ${C.greenMid}44`,borderRadius:12,marginBottom:14}}>
        <span style={{fontSize:18}}>📍</span>
        <span style={{flex:1,fontSize:13,color:C.green,fontWeight:500}}>{value.name}</span>
        <button onClick={()=>{onChange(null);setText("");}} style={{background:"none",border:"none",color:C.textLight,cursor:"pointer",fontSize:16}}>×</button>
      </div>
    );
  }

  if(manual){
    return(
      <div style={{marginBottom:14}}>
        <div style={{display:"flex",gap:8}}>
          <input value={text} onChange={e=>setText(e.target.value)} placeholder="Ex: Florianópolis, SC" style={{flex:1,borderRadius:50}}/>
          <button onClick={()=>{if(text.trim())onChange({lat:null,lng:null,name:text.trim()});setManual(false);}} style={{padding:"0 14px",background:C.green,color:"#fff",border:"none",borderRadius:50,cursor:"pointer",fontSize:13,fontWeight:600,flexShrink:0}}>OK</button>
        </div>
      </div>
    );
  }

  return(
    <div style={{display:"flex",gap:8,marginBottom:14}}>
      <button onClick={detect} disabled={loading} style={{flex:1,padding:"10px 0",background:"#E8F8F4",color:C.green,border:`1px solid ${C.greenMid}55`,borderRadius:50,cursor:"pointer",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
        {loading?<><Spinner size={14} color={C.green}/>Detectando...</>:"📍 Adicionar local"}
      </button>
      <button onClick={()=>setManual(true)} style={{padding:"10px 14px",background:C.white,color:C.textMid,border:`1px solid ${C.cardBorder}`,borderRadius:50,cursor:"pointer",fontSize:13}}>✏️</button>
    </div>
  );
}

}

// MOMENT DETAIL
// ═══════════════════════════════════════════════════
function MomentDetail({m,onClose,onDelete}){
  const [playing,setPlaying]=useState(false);
  const [saving,setSaving]=useState(false);
  const audioRef=useRef(null);
  const embed=m.type==="videolink"?getVideoEmbed(m.content):null;
  const allTags=[...DEFAULT_TAGS];
  // Permitir salvar mesmo quando o conteúdo está no IndexedDB (prefixo "IDB:")
  const canSave=(m.type==="foto"||m.type==="arte"||m.type==="video"||m.type==="voz")&&!!m.content;

  const saveToDevice=async()=>{
    if(!m.content)return;
    setSaving(true);
    try{
      let src=m.content;
      // Se o conteúdo está no IndexedDB, resolve primeiro
      if(src.startsWith("IDB:")){
        const loaded=await idbLoad(src.slice(4));
        if(!loaded){setSaving(false);return;}
        src=loaded;
      }
      const ext=m.type==="video"?"mp4":m.type==="voz"?"webm":"png";
      const a=document.createElement("a");
      a.href=src;
      a.download=`veeda-${m.id}.${ext}`;
      document.body.appendChild(a);a.click();document.body.removeChild(a);
    }finally{setSaving(false);}
  };

  return(
    <Modal title="" onClose={onClose}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
        <div style={{width:38,height:38,borderRadius:"50%",background:(TYPE_META[m.type]||TYPE_META.texto).bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{(TYPE_META[m.type]||TYPE_META.texto).icon}</div>
        <div style={{flex:1}}>
          <p style={{margin:0,fontSize:12,color:C.textLight}}>{fmt(m.ts)}</p>
          {m.location&&<p style={{margin:0,fontSize:11,color:C.green}}>📍 {m.location.name}</p>}
        </div>
        <button onClick={onClose} style={{background:C.purpleLight,border:"none",borderRadius:"50%",width:30,height:30,color:C.purple,fontSize:18,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>×</button>
      </div>

      {(m.type==="foto"||m.type==="arte")&&m.content&&<img src={m.content} alt="" style={{width:"100%",borderRadius:12,display:"block",marginBottom:12}}/>}
      {m.type==="video"&&m.content&&<video src={m.content} controls style={{width:"100%",borderRadius:12,display:"block",maxHeight:320,marginBottom:12}}/>}
      {m.type==="videolink"&&embed&&<div style={{position:"relative",paddingBottom:"56.25%",height:0,borderRadius:12,overflow:"hidden",marginBottom:12}}><iframe src={embed} style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",border:"none"}} allowFullScreen title="v"/></div>}
      {m.type==="link"&&<a href={m.content} target="_blank" rel="noopener noreferrer" style={{display:"block",color:C.blue,fontSize:14,wordBreak:"break-all",marginBottom:12,padding:"10px 14px",background:C.blueLight,borderRadius:10}}>{m.content}</a>}
      {m.type==="texto"&&<p style={{fontSize:15,color:C.text,lineHeight:1.75,marginBottom:12}}>{m.content}</p>}

      {m.type==="voz"&&m.content&&(
        <div style={{background:C.tealLight,borderRadius:14,padding:14,marginBottom:12,display:"flex",alignItems:"center",gap:12}}>
          <span style={{fontSize:28,flexShrink:0}}>🎙️</span>
          <div style={{flex:1}}>
            <audio ref={audioRef} src={m.content} onEnded={()=>setPlaying(false)} style={{width:"100%"}} controls/>
          </div>
        </div>
      )}

      {m.type==="musica"&&(
        <div style={{background:C.greenLight,borderRadius:14,padding:14,marginBottom:12}}>
          <div style={{display:"flex",gap:12,alignItems:"center"}}>
            {m.albumArt&&<img src={m.albumArt} alt="" style={{width:56,height:56,borderRadius:8,objectFit:"cover",flexShrink:0}}/>}
            <div style={{flex:1,overflow:"hidden"}}>
              <p style={{margin:0,fontSize:14,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{m.trackTitle||m.content}</p>
              <p style={{margin:"2px 0 0",fontSize:12,color:C.textMid}}>{m.trackArtist||""}</p>
            </div>
          </div>
          {m.previewUrl&&(
            <div style={{marginTop:10}}>
              <audio ref={audioRef} src={m.previewUrl} onEnded={()=>setPlaying(false)}/>
              <button onClick={()=>{playing?audioRef.current?.pause():audioRef.current?.play();setPlaying(p=>!p);}} style={{width:"100%",padding:"9px 0",background:C.green,border:"none",borderRadius:10,color:"#fff",fontWeight:600,fontSize:14,cursor:"pointer"}}>{playing?"⏸ Pausar":"▶ Ouvir prévia (30s)"}</button>
            </div>
          )}
        </div>
      )}

      {m.caption&&<p style={{fontSize:13,color:C.textMid,marginBottom:12,fontStyle:"italic",padding:"8px 12px",background:"#FAF9FD",borderRadius:8}}>"{m.caption}"</p>}

      {m.tags?.length>0&&<div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
        {m.tags.map(tid=>{const t=allTags.find(x=>x.id===tid);return t?<span key={tid} style={{padding:"3px 10px",background:t.bg,color:t.color,borderRadius:20,fontSize:12,fontWeight:500}}>{t.emoji} {t.label}</span>:null;})}
      </div>}

      {canSave&&<Btn onClick={saveToDevice} disabled={saving} variant="outline" style={{marginBottom:8,fontSize:13,padding:"11px 0"}}>{saving?<><Spinner size={14} color={C.purple}/>Preparando…</>:"↓ Salvar no dispositivo"}</Btn>}
      <Btn onClick={()=>{onDelete();onClose();}} variant="ghost" style={{color:C.red,fontSize:13}}>Remover momento</Btn>
    </Modal>
  );
}

// MUSIC PICKER
// ═══════════════════════════════════════════════════
function MusicPicker({onSelect,onClose}){
  const [q,setQ]=useState("");const [res,setRes]=useState([]);const [loading,setLoading]=useState(false);const [err,setErr]=useState("");
  const search=async()=>{
    if(!q.trim())return;setLoading(true);setErr("");setRes([]);
    try{const r=await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&media=music&limit=8`);const d=await r.json();if(!d.results?.length){setErr("Nenhum resultado.");return;}setRes(d.results.map(r=>({id:r.trackId,title:r.trackName,artist:r.artistName,album:r.collectionName,art:r.artworkUrl100,preview:r.previewUrl,appleMusicUrl:r.trackViewUrl})));}
    catch{setErr("Erro ao buscar. Verifique sua conexão.");}
    setLoading(false);
  };
  return(
    <Modal title="Buscar música" onClose={onClose}>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        <input value={q} onChange={e=>setQ(e.target.value)} onKeyDown={e=>e.key==="Enter"&&search()} placeholder="Nome da música ou artista…" style={{flex:1}}/>
        <button onClick={search} disabled={loading} style={{padding:"0 16px",background:C.purple,color:"#fff",border:"none",borderRadius:50,cursor:"pointer",fontSize:13,fontWeight:600,flexShrink:0,display:"flex",alignItems:"center",gap:4}}>{loading?<Spinner size={14} color="#fff"/>:"Buscar"}</button>
      </div>
      {err&&<p style={{fontSize:13,color:C.red,marginBottom:10}}>{err}</p>}
      <div style={{maxHeight:340,overflowY:"auto"}}>
        {res.map(r=>(
          <div key={r.id} style={{display:"flex",gap:10,padding:"10px 0",borderBottom:`1px solid ${C.cardBorder}`,alignItems:"center"}}>
            {r.art&&<img src={r.art} alt="" style={{width:44,height:44,borderRadius:8,objectFit:"cover",flexShrink:0}}/>}
            <div style={{flex:1,overflow:"hidden"}}>
              <p style={{margin:0,fontSize:13,fontWeight:600,color:C.text,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.title}</p>
              <p style={{margin:0,fontSize:12,color:C.textMid,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{r.artist}</p>
            </div>
            <button onClick={()=>onSelect(r)} style={{padding:"7px 12px",background:C.green,color:"#fff",border:"none",borderRadius:20,fontSize:12,fontWeight:600,cursor:"pointer",flexShrink:0}}>Adicionar</button>
          </div>
        ))}
      </div>
    </Modal>
  );
}

function TagPicker({selectedTags,onChange,customTags=[]}){

// ADD CONTACT MODAL (with cross-device support)
// ═══════════════════════════════════════════════════
function AddContactModal({contacts,myHandle,profile,onAdd,onClose,addToast,prefillCard}){
  const [cardCode,setCardCode]=useState(prefillCard||"");
  const [tab,setTab]=useState("add"); // add | search
  const [step,setStep]=useState(1);
  const [found,setFound]=useState(null);
  const [q,setQ]=useState("");
  const [myLinkCopied,setMyLinkCopied]=useState(false);

  const myH=(myHandle||"").replace(/^@/,"");
  const myCode=profile?makeProfileCard(profile):null;
  const myLink=myCode?`${window.location.origin}${window.location.pathname}?add=${encodeURIComponent(myCode)}`:null;

  const copyMyLink=()=>{
    if(!myLink)return;
    navigator.clipboard?.writeText(myLink);
    setMyLinkCopied(true);setTimeout(()=>setMyLinkCopied(false),2500);
  };
  const shareMyLink=()=>{
    if(!myLink)return;
    navigator.share?.({title:"Veeda",text:`Olá! Sou ${profile?.name||myHandle} no Veeda. Me adiciona no Meu Círculo:\n${myLink}`}).catch(()=>{});
  };

  // Auto-decode prefilled code from invite link
  useEffect(()=>{
    if(!prefillCard)return;
    const parsed=parseProfileCard(prefillCard.trim());
    if(parsed){
      if(parsed.handle.replace(/^@/,"")===myH){addToast?.("Este é o seu próprio código.","warn");return;}
      if(contacts.find(c=>(c.handle||"").replace(/^@/,"")===(parsed.handle||"").replace(/^@/,""))){
        addToast?.(`${parsed.name} já está no seu Círculo.`,"info");return;
      }
      setFound(parsed);setStep(2);
    } else {
      addToast?.("Link de convite inválido ou corrompido.","error");
    }
  },[prefillCard]);

  const localResults=useMemo(()=>{
    return registrySearch(q).filter(p=>{
      if(p.handle.replace(/^@/,"")===myH)return false;
      if(contacts.find(c=>(c.handle||"").replace(/^@/,"")===(p.handle||"").replace(/^@/,"")))return false;
      return true;
    });
  },[q,myH,contacts]);

  const tryParseCard=()=>{
    // Aceita tanto vc2_... direto quanto uma URL que contenha ?add=vc2_...
    let raw=cardCode.trim();
    try{const u=new URL(raw);const p=u.searchParams.get("add");if(p)raw=p;}catch{}
    const parsed=parseProfileCard(raw);
    if(!parsed){addToast?.("Código inválido. Peça ao contato para gerar o código novamente.","error");return;}
    if(parsed.handle.replace(/^@/,"")===myH){addToast?.("Este é o seu próprio código.","warn");return;}
    if(contacts.find(c=>(c.handle||"").replace(/^@/,"")===(parsed.handle||"").replace(/^@/,""))){
      addToast?.(`${parsed.name} já está no seu Círculo.`,"info");return;
    }
    setFound(parsed);setStep(2);
  };

  const confirm=()=>{
    if(!found)return;
    onAdd({name:found.name,handle:found.handle,code:found.handle.replace(/^@/,""),emoji:found.emoji||"🌿",avatarColor:found.avatarColor||C.purpleLight,avatarSrc:found.avatarSrc||null,addedAt:Date.now()});
  };

  return(
    <div>
      {step===1&&<>
        {/* Seção: Compartilhar MEU código */}
        {myLink&&(
          <div style={{background:C.greenLight,borderRadius:14,padding:"14px",marginBottom:18,border:`1px solid ${C.green}33`}}>
            <p style={{margin:"0 0 4px",fontSize:12,fontWeight:700,color:C.green,textTransform:"uppercase",letterSpacing:"0.5px"}}>🔗 Primeiro: compartilhe seu link</p>
            <p style={{margin:"0 0 12px",fontSize:12,color:C.textMid,lineHeight:1.5}}>Envie para quem você quer adicionar — quando tocar no link, o Veeda já vai mostrar seu perfil para adicionar.</p>
            <div style={{display:"flex",gap:8}}>
              <button onClick={copyMyLink} style={{flex:1,padding:"10px 0",background:myLinkCopied?C.green:C.white,color:myLinkCopied?C.white:C.green,border:`1.5px solid ${C.green}`,borderRadius:50,fontWeight:600,fontSize:13,cursor:"pointer"}}>
                {myLinkCopied?"✓ Copiado!":"Copiar meu link"}
              </button>
              {navigator.share&&<button onClick={shareMyLink} style={{flex:1,padding:"10px 0",background:C.purple,color:C.white,border:"none",borderRadius:50,fontWeight:600,fontSize:13,cursor:"pointer"}}>Compartilhar ↑</button>}
            </div>
          </div>
        )}

        {/* Tabs: Adicionar pelo código | Buscar neste dispositivo */}
        <div style={{display:"flex",gap:6,marginBottom:14}}>
          {[["add","📋 Adicionar pelo código"],["search","🔍 Buscar aqui"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"9px 4px",background:tab===k?C.purple:C.purpleLight,color:tab===k?C.white:C.purple,border:"none",borderRadius:10,fontWeight:600,cursor:"pointer",fontSize:12}}>{l}</button>
          ))}
        </div>

        {tab==="add"&&<>
          <p style={{fontSize:13,color:C.textMid,marginBottom:10,lineHeight:1.5}}>Cole o <strong>link ou código</strong> que seu contato compartilhou com você:</p>
          <textarea value={cardCode} onChange={e=>setCardCode(e.target.value)} placeholder="Cole aqui o link de convite ou código vc2_…" style={{marginBottom:12,minHeight:72,borderRadius:14}}/>
          <Btn onClick={tryParseCard} disabled={!cardCode.trim()}>Identificar perfil</Btn>
        </>}

        {tab==="search"&&<>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar por nome ou @handle…" autoFocus style={{marginBottom:8}}/>
          {q.trim()&&localResults.length===0&&(
            <div style={{padding:"14px",background:C.amberLight,borderRadius:10,border:`1px solid ${C.amber}44`,marginTop:4}}>
              <p style={{margin:"0 0 4px",fontSize:12,color:"#7A5800",fontWeight:600}}>Nenhum usuário encontrado aqui</p>
              <p style={{margin:0,fontSize:12,color:"#7A5800",lineHeight:1.5}}>A busca funciona para perfis do mesmo dispositivo. Para adicionar alguém de outro celular, use a aba "Adicionar pelo código".</p>
            </div>
          )}
          {localResults.map(p=>(
            <button key={p.id||p.handle} onClick={()=>{setFound(p);setStep(2);}} style={{width:"100%",background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:14,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12,cursor:"pointer",textAlign:"left"}}>
              <AvatarBubble src={p.avatarSrc} emoji={p.emoji||"🌿"} color={p.avatarColor||C.purpleLight} size={44}/>
              <div style={{flex:1}}><p style={{margin:0,fontSize:14,fontWeight:600,color:C.text}}>{p.name}</p><p style={{margin:0,fontSize:12,color:C.purple,fontWeight:500}}>{p.handle}</p></div>
              <span style={{fontSize:18,color:C.textLight}}>+</span>
            </button>
          ))}
        </>}
      </>}

      {step===2&&found&&<>
        <div style={{textAlign:"center",marginBottom:20}}>
          <AvatarBubble src={found.avatarSrc} emoji={found.emoji} color={found.avatarColor||C.purpleLight} size={64} ring/>
          <p style={{margin:"10px 0 2px",fontSize:16,fontWeight:700,color:C.text}}>{found.name}</p>
          <p style={{margin:0,fontSize:14,color:C.purple,fontWeight:600}}>{found.handle}</p>
          {found.fromCard&&<p style={{margin:"6px 0 0",fontSize:12,color:C.green}}>✓ Perfil identificado pelo código</p>}
        </div>
        <Btn onClick={confirm} style={{marginBottom:10}}>Adicionar ao Meu Círculo</Btn>
        <Btn onClick={()=>{setStep(1);setFound(null);setCardCode("");}} variant="ghost">← Voltar</Btn>
      </>}
    </div>
  );
}

        {navigator.share&&<button onClick={shareNative} style={{flex:1,padding:"11px 0",background:C.white,color:C.purple,border:`1.5px solid ${C.purple}`,borderRadius:50,fontWeight:600,fontSize:13,cursor:"pointer"}}>Compartilhar ↑</button>}

      <details style={{marginBottom:4}}>
        <summary style={{fontSize:12,color:C.textMid,cursor:"pointer",padding:"6px 0"}}>Ou use o código de texto (para colar manualmente)</summary>

          <p style={{margin:"0 0 8px",fontSize:10,color:C.textMid,fontWeight:600,textTransform:"uppercase",letterSpacing:"1px"}}>Seu código</p>
          <p style={{margin:"0 0 10px",fontSize:11,color:C.text,wordBreak:"break-all",fontFamily:"monospace",lineHeight:1.7}}>{code}</p>
          <Btn onClick={copy} variant="outline" style={{fontSize:13,padding:"10px 0"}}>{copied?"✓ Copiado!":"Copiar código"}</Btn>

}

// SHARE DAY MODAL
// ═══════════════════════════════════════════════════
function ShareDayModal({profile,data,curDay,onClose,onShared,addToast}){
  const [tab,setTab]=useState("local");
  const [sel,setSel]=useState([]);const [msg,setMsg]=useState("");const [loading,setLoading]=useState(false);const [done,setDone]=useState(false);
  const [linkCopied,setLinkCopied]=useState(false);
  const contacts=data.contacts||[];
  const moments=(data.moments||{})[curDay]||[];
  const already=(data.sharedLog||{})[curDay]||[];
  const available=contacts.filter(c=>!already.includes(c.code));
  const toggle=code=>setSel(p=>p.includes(code)?p.filter(x=>x!==code):[...p,code]);
  const feeling=(data.dayFeelings||{})[curDay];

  // ── Gera link cross-device ─────────────────────────
  const sharedCode=useMemo(()=>encodeSharedDay(profile,moments,curDay,feeling,msg),[profile,moments,curDay,feeling,msg]);
  const sharedLink=sharedCode?`${window.location.origin}${window.location.pathname}?day=${encodeURIComponent(sharedCode)}`:null;
  const whatsShareMsg=sharedLink?`${profile.name} quer compartilhar o dia ${fmtFull(curDay)} com você no Veeda 🌿\n\n${sharedLink}`:"";

  const copyShareLink=()=>{if(sharedLink){navigator.clipboard?.writeText(sharedLink);setLinkCopied(true);setTimeout(()=>setLinkCopied(false),2500);}};

  // ── Compartilhamento local (mesmo device) ──────────
  const doShare=async()=>{
    if(!sel.length)return;setLoading(true);
    const payload={date:curDay,author:profile.name,handle:profile.handle||nameToHandle(profile.name),emoji:profile.emoji,avatarColor:profile.avatarColor,avatarSrc:profile.avatarSrc||null,moments,feeling,message:msg.trim(),importedAt:Date.now()};
    sel.forEach(handle=>{
      const k=`veeda_inbox_${handle.replace(/^@/,"")}`;
      const ex=safeLS.get(k,[]);ex.push(payload);safeLS.set(k,ex);
    });
    showNativeNotif("Veeda",`${profile.name} compartilhou o dia com você! 🌿`);
    await onShared({...(data.sharedLog||{}),[curDay]:[...already,...sel]});
    addToast?.("Dia compartilhado com sucesso! 🌿","success");
    setDone(true);setLoading(false);
  };

  if(done)return<Modal title="" onClose={onClose}><div style={{textAlign:"center",padding:"16px 0"}}><div style={{fontSize:52,marginBottom:14}}>🌿</div><p style={{fontSize:18,fontWeight:600,color:C.text,marginBottom:8}}>Dia compartilhado!</p><Btn onClick={onClose}>Fechar</Btn></div></Modal>;

  return(
    <Modal title="Compartilhar meu Dia de Veeda" onClose={onClose}>
      {moments.length===0
        ?<p style={{fontSize:14,color:C.textMid,textAlign:"center",padding:"20px 0"}}>Nenhum momento registrado hoje ainda.</p>
        :(
        <>
          <p style={{fontSize:13,color:C.textMid,marginBottom:12}}>{moments.length} momento{moments.length!==1?"s":""} · {fmtFull(curDay)}</p>
          {/* Tabs */}
          <div style={{display:"flex",gap:6,marginBottom:16}}>
            {[["local","👥 Meu Círculo"],["link","🔗 Via link"]].map(([k,l])=>(
              <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"9px 0",background:tab===k?C.purple:C.purpleLight,color:tab===k?C.white:C.purple,border:"none",borderRadius:10,fontWeight:600,cursor:"pointer",fontSize:13}}>{l}</button>
            ))}
          </div>

          {/* ── Tab: compartilhar com contatos locais ── */}
          {tab==="local"&&<>
            {available.length===0
              ?<div style={{background:C.amberLight,borderRadius:12,padding:"12px 14px",marginBottom:14}}><p style={{fontSize:13,color:"#7A5800",margin:0}}>Você já compartilhou hoje com todos os seus contatos. Use "Via link" para compartilhar com alguém de outro dispositivo.</p></div>
              :available.map(c=>(
                <button key={c.code} onClick={()=>toggle(c.code)} style={{width:"100%",background:sel.includes(c.code)?C.purpleLight:C.white,border:`2px solid ${sel.includes(c.code)?C.purple:C.cardBorder}`,borderRadius:14,padding:"12px 14px",marginBottom:8,display:"flex",alignItems:"center",gap:12,cursor:"pointer",textAlign:"left"}}>
                  <AvatarBubble src={c.avatarSrc} emoji={c.emoji||"🌿"} color={c.avatarColor||C.purpleLight} size={38}/>
                  <span style={{fontSize:14,fontWeight:500,color:C.text,flex:1}}>{c.name}</span>

  return(
    <Modal title="Dia compartilhado com você 🌿" onClose={onClose} fullHeight>

      <div style={{display:"flex",alignItems:"center",gap:14,padding:"14px 16px",background:C.purpleLight,borderRadius:14,marginBottom:16}}>
        <AvatarBubble emoji={emoji||"🌿"} color={avatarColor||C.purpleLight} size={48} ring/>
        <div>
          <p style={{margin:0,fontSize:15,fontWeight:700,color:C.text}}>{author}</p>
          <p style={{margin:0,fontSize:12,color:C.purple,fontWeight:600}}>{handle}</p>
          <p style={{margin:0,fontSize:11,color:C.textLight,marginTop:2}}>{fmtFull(date)}</p>
        </div>
        {feeling&&<div style={{marginLeft:"auto",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <span style={{fontSize:20}}>{feeling.emoji}</span>
          <span style={{fontSize:10,color:C.textMid}}>{feeling.label}</span>
        </div>}
      </div>
      {message&&<div style={{background:C.white,borderRadius:12,padding:"12px 14px",marginBottom:14,border:`1px solid ${C.cardBorder}`}}>
        <p style={{margin:0,fontSize:13,color:C.textMid,fontStyle:"italic"}}>"{message}"</p>
      </div>}
      {/* Moments preview */}
      {textMoments.length>0&&<div style={{marginBottom:14}}>
        <p style={{fontSize:12,fontWeight:600,color:C.textMid,marginBottom:8}}>Momentos do dia</p>
        {textMoments.slice(0,5).map((m,i)=>(
          <div key={i} style={{background:C.white,borderRadius:12,padding:"10px 12px",marginBottom:8,border:`1px solid ${C.cardBorder}`}}>
            <span style={{fontSize:11,color:C.textLight,marginRight:6}}>{TYPE_META[m.type]?.icon||"✏️"}</span>
            <span style={{fontSize:13,color:C.text}}>{m.type==="texto"?m.content:m.type==="musica"?`🎵 ${m.content}`:m.content}</span>
            {m.caption&&<p style={{margin:"4px 0 0",fontSize:12,color:C.textMid,fontStyle:"italic"}}>{m.caption}</p>}
          </div>
        ))}
        {textMoments.length>5&&<p style={{fontSize:12,color:C.textLight,textAlign:"center"}}>+{textMoments.length-5} outros momentos</p>}
      </div>}

        <p style={{margin:0,fontSize:12,color:C.blue}}>📷 Este dia tem {mediaMoments.length} foto/vídeo(s) — não incluídos no link por tamanho.</p>
      </div>}
      {(moments||[]).length===0&&<p style={{textAlign:"center",fontSize:13,color:C.textLight,padding:"12px 0"}}>Nenhum momento de texto neste dia.</p>}
      <Btn onClick={onAccept} style={{marginBottom:8}}>Aceitar dia 🌿</Btn>
      <Btn onClick={onClose} variant="ghost">Recusar</Btn>
    </Modal>
  );
}

// EVENTS MODAL
// ═══════════════════════════════════════════════════
function EventsModal({data,profile,onSave,onClose}){
  const [tab,setTab]=useState("list");const [title,setTitle]=useState("");const [evType,setEvType]=useState("outro");const [date,setDate]=useState("");const [time,setTime]=useState("");const [notes,setNotes]=useState("");
  const events=(data.events||[]).sort((a,b)=>a.date.localeCompare(b.date));
  const add=()=>{if(!title.trim()||!date)return;onSave([...events,{id:Date.now(),title:title.trim(),type:evType,date,time,notes:notes.trim(),createdBy:profile.name}]);setTitle("");setDate("");setTime("");setNotes("");setTab("list");};
  return(
    <Modal title="Eventos futuros" onClose={onClose}>
      <div style={{display:"flex",gap:8,marginBottom:18}}>{[["list","📋 Próximos"],["new","+ Novo"]].map(([k,l])=><button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"9px 0",background:tab===k?C.purple:C.purpleLight,color:tab===k?C.white:C.purple,border:"none",borderRadius:10,fontWeight:600,cursor:"pointer",fontSize:13}}>{l}</button>)}</div>
      {tab==="list"&&(events.length===0?<p style={{textAlign:"center",fontSize:14,color:C.textLight,padding:"24px 0"}}>Nenhum evento programado.</p>:events.map(ev=>{const t2=EVENT_TYPES.find(t=>t.id===ev.type)||EVENT_TYPES[4];return<div key={ev.id} style={{background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:14,padding:14,marginBottom:10}}><div style={{display:"flex",alignItems:"center",gap:10}}><div style={{width:36,height:36,borderRadius:10,background:C.amberLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{t2.emoji}</div><div style={{flex:1}}><p style={{margin:0,fontSize:14,fontWeight:600,color:C.text}}>{ev.title}</p><p style={{margin:0,fontSize:12,color:C.textMid}}>{fmtLabel(ev.date)}{ev.time?` às ${ev.time}`:""}</p></div><button onClick={()=>onSave(events.filter(e=>e.id!==ev.id))} style={{background:"none",border:"none",color:C.textLight,cursor:"pointer",fontSize:12}}>remover</button></div>{ev.notes&&<p style={{margin:"8px 0 0",fontSize:13,color:C.textMid}}>{ev.notes}</p>}</div>}))}
      {tab==="new"&&<div><div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>{EVENT_TYPES.map(et=><button key={et.id} onClick={()=>setEvType(et.id)} style={{padding:"6px 12px",background:evType===et.id?C.amberLight:C.white,border:`1.5px solid ${evType===et.id?C.amber:C.cardBorder}`,borderRadius:20,cursor:"pointer",fontSize:12,color:evType===et.id?C.amber:C.textMid}}>{et.emoji} {et.label}</button>)}</div><input value={title} onChange={e=>setTitle(e.target.value)} placeholder="Nome do evento" style={{marginBottom:12}}/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}><input type="date" value={date} onChange={e=>setDate(e.target.value)}/><input type="time" value={time} onChange={e=>setTime(e.target.value)}/></div><textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Observações…" style={{marginBottom:14,minHeight:60}}/><Btn onClick={add} disabled={!title.trim()||!date}>Adicionar evento</Btn></div>}
    </Modal>
  );
}

// ═══════════════════════════════════════════════════
// BACKUP MODAL
// ═══════════════════════════════════════════════════
function BackupModal({data,profile,password,onClose,addToast,zIndex=400}){
  const [status,setStatus]=useState("idle");const [msg,setMsg]=useState("");
  const [driveToken,setDriveToken]=useState(safeLS.get(GDRIVE_KEY)?.access_token||null);
  const fileRef=useRef();

  const snapshots=getMonthlySnapshots(profile.id);
  const totalDays=Object.keys(data.moments||{}).filter(d=>(data.moments[d]||[]).length>0).length;
  const totalMoments=Object.values(data.moments||{}).reduce((s,m)=>s+(m||[]).length,0);

  const connectDrive=async()=>{setStatus("connecting");try{const t=await gdriveAuth();setDriveToken(t);setStatus("idle");addToast?.("Google Drive conectado!","success");}catch(e){setStatus("error");setMsg(e.message);}};
  const uploadDrive=async()=>{setStatus("uploading");try{await gdriveUpload(await encryptObj(data,password),driveToken);setStatus("done");addToast?.("Backup salvo no Google Drive!","success");setMsg("Salvo!");}catch(e){setStatus("error");setMsg("Erro: "+e.message);}};
  const exportLocal=async()=>{const enc=await encryptObj(data,password);const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([enc],{type:"text/plain"}));a.download=`veeda-backup-${todayStr()}.veeda`;a.click();addToast?.("Arquivo baixado!","success");};
  const importLocal=file=>{const r=new FileReader();r.onload=async e=>{try{const{data:d}=await decryptObj(e.target.result,password);addToast?.("Backup verificado com sucesso!","success");setMsg("Backup verificado!");}catch{addToast?.("Arquivo inválido ou senha incorreta.","error");}};r.readAsText(file);};

  return(
    <Modal title="Backup dos Dados" onClose={onClose} fullHeight zIndex={zIndex}>
      <div style={{background:`linear-gradient(135deg,${C.purpleLight},${C.blueLight})`,borderRadius:14,padding:16,textAlign:"center",marginBottom:20}}>
        <p style={{margin:0,fontSize:28}}>🌿</p>
        <p style={{margin:"6px 0 2px",fontSize:15,fontWeight:700,color:C.text}}>{profile.name}</p>
        <p style={{margin:0,fontSize:12,color:C.textMid}}>{totalDays} Dias · {totalMoments} momentos</p>
      </div>

      {snapshots.length>0&&(
        <div style={{background:C.greenLight,borderRadius:12,padding:"12px 14px",marginBottom:16,border:`1px solid ${C.green}44`}}>
          <p style={{margin:"0 0 4px",fontSize:13,fontWeight:600,color:C.green}}>✅ Histórico protegido automaticamente</p>
          <p style={{margin:0,fontSize:12,color:C.textMid}}>Você tem snapshots mensais de: {snapshots.map(s=>s.ym).join(", ")}</p>
        </div>
      )}

      <p style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:10}}>☁️ Google Drive</p>
      {!driveToken&&<Btn onClick={connectDrive} disabled={status==="connecting"} style={{marginBottom:10}}>{status==="connecting"?<><Spinner size={16} color="#fff"/>Conectando…</>:"Conectar Google Drive"}</Btn>}
      {driveToken&&<div style={{display:"flex",gap:8,marginBottom:10}}><Btn onClick={uploadDrive} disabled={status==="uploading"} style={{flex:1,fontSize:13,padding:"11px 0"}}>{status==="uploading"?<><Spinner size={14} color="#fff"/>Salvando…</>:"↑ Salvar"}</Btn><button onClick={()=>{safeLS.del(GDRIVE_KEY);setDriveToken(null);}} style={{padding:"0 12px",background:"none",border:`1px solid ${C.cardBorder}`,borderRadius:10,color:C.textLight,cursor:"pointer",fontSize:12}}>Sair</button></div>}

      <div style={{height:1,background:C.cardBorder,margin:"16px 0"}}/>
      <p style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:10}}>📁 Arquivo local</p>
      <div style={{display:"flex",gap:8,marginBottom:8}}>
        <Btn onClick={exportLocal} style={{flex:1,fontSize:13,padding:"11px 0"}}>↓ Exportar .veeda</Btn>
        <Btn onClick={()=>fileRef.current.click()} variant="outline" style={{flex:1,fontSize:13,padding:"11px 0"}}>↑ Importar .veeda</Btn>
      </div>
      <input ref={fileRef} type="file" accept=".veeda,.txt" style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(f)importLocal(f);e.target.value="";}}/>
    </Modal>
  );
}

// ═══════════════════════════════════════════════════
// SETTINGS / DASHBOARD
// ═══════════════════════════════════════════════════
function SettingsModal({profile,data,password,onUpdateProfile,onSave,onLogout,onClose,addToast}){
  const [showBackup,setShowBackup]=useState(false);
  const [showCode,setShowCode]=useState(false);
  const [showHandle,setShowHandle]=useState(false);
  const [handleInput,setHandleInput]=useState((profile.handle||nameToHandle(profile.name)).replace(/^@/,""));
  const [handleErr,setHandleErr]=useState("");
  const [tab,setTab]=useState("conta");

  const saveHandle=()=>{
    const h=sanitizeHandle(handleInput);
    if(h.length<3){setHandleErr("Mínimo 3 caracteres.");return;}
    if(!/^[a-z0-9_]+$/.test(h)){setHandleErr("Use apenas letras, números e _.");return;}
    if(!isHandleAvailable("@"+h,profile.id)){setHandleErr("Este @handle já está em uso.");return;}
    const ps=loadProfiles();const idx=ps.findIndex(p=>p.id===profile.id);
    if(idx>=0){ps[idx].handle="@"+h;saveProfiles(ps);registryUpdate({...ps[idx]});onUpdateProfile({...profile,handle:"@"+h});}
    addToast?.("@handle atualizado!","success");
    setShowHandle(false);
  };

  const totalDays=Object.keys(data.moments||{}).filter(d=>(data.moments[d]||[]).length>0).length;
  const totalMoments=Object.values(data.moments||{}).reduce((s,m)=>s+(m||[]).length,0);

  return(
    <>
      {showBackup&&<BackupModal data={data} profile={profile} password={password} onClose={()=>setShowBackup(false)} addToast={addToast}/>}
      {showCode&&<ConnectionCodeModal profile={profile} onClose={()=>setShowCode(false)}/>}

      <Modal title="Configurações" onClose={onClose} fullHeight>
        {/* Profile Card */}
        <div style={{textAlign:"center",paddingBottom:20,marginBottom:16,borderBottom:`1px solid ${C.headerBorder}`}}>
          <AvatarBubble src={profile.avatarSrc} emoji={profile.emoji} color={profile.avatarColor||C.purpleLight} size={68} ring/>
          <p style={{margin:"10px 0 2px",fontSize:16,fontWeight:700,color:C.text,fontFamily:PASSO}}>{profile.name}</p>
          <p style={{margin:"0 0 2px",fontSize:13,color:C.purple,fontWeight:600}}>{profile.handle||nameToHandle(profile.name)}</p>
          {profile.email&&<p style={{margin:0,fontSize:12,color:C.textLight}}>{profile.email}</p>}
          <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:10,flexWrap:"wrap"}}>
            <span style={{padding:"3px 10px",background:C.purpleLight,borderRadius:20,fontSize:11,color:C.purple}}>{totalDays} dias</span>
            <span style={{padding:"3px 10px",background:C.greenLight,borderRadius:20,fontSize:11,color:C.green}}>{totalMoments} momentos</span>
          </div>
        </div>

        {/* Tab nav */}
        <div style={{display:"flex",gap:6,marginBottom:20,overflowX:"auto",paddingBottom:4}}>
          {[["conta","Conta"],["dados","Meus Dados"],["notif","Notif."],["sobre","Sobre"]].map(([k,l])=>(
            <button key={k} onClick={()=>setTab(k)} style={{padding:"7px 14px",background:tab===k?C.purple:C.purpleLight,color:tab===k?C.white:C.purple,border:"none",borderRadius:20,fontWeight:600,cursor:"pointer",fontSize:12,flexShrink:0}}>{l}</button>
          ))}
        </div>

        {tab==="conta"&&<div>
          {/* ── Conta Google / Nuvem ── */}
          {(profile.cloud||getCachedUser())&&<div style={{background:C.white,border:`1px solid ${C.cardBorder}`,borderRadius:14,padding:"14px 16px",marginBottom:16}}>
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
              {getCachedUser()?.picture?<img src={getCachedUser().picture} alt="" style={{width:36,height:36,borderRadius:"50%"}}/>:<div style={{width:36,height:36,borderRadius:"50%",background:C.purpleLight,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18}}>☁️</div>}
              <div style={{flex:1}}>
                <p style={{margin:0,fontSize:11,color:C.textMid,fontWeight:600,letterSpacing:".3px",textTransform:"uppercase"}}>Conta Google {profile.cloud?"· Nuvem ativa":""}</p>
                <p style={{margin:"2px 0 0",fontSize:13,color:C.text,fontWeight:500}}>{getCachedUser()?.email||profile.email||"—"}</p>
              </div>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
              {profile.cloud&&<button onClick={async()=>{
                const t=await cloudSync.tokenOrNull();
                if(!t){addToast?.("Faça login no Google novamente.","error");return;}
                await cloudSync.flushAll();
                const enc=safeLS.raw(`veeda_data_${profile.id}`);
                if(enc){try{await cloudData.save(profile.id,enc,t);addToast?.("Sincronizado com a nuvem ☁️","success");}catch{addToast?.("Falha ao sincronizar.","error");}}
              }} style={{flex:1,minWidth:120,padding:"9px 12px",background:C.purpleLight,color:C.purple,border:`1px solid ${C.purple}44`,borderRadius:10,cursor:"pointer",fontSize:12,fontWeight:600}}>☁️ Sincronizar agora</button>}

                clearGoogleAuth();
